<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>XUYUAN | 官方商城</title>
  <meta name="description" content="XUYUAN｜精品包袋、專業髮品、官方商城" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#fffaf7;
      --bg-soft:#fff3f5;
      --bg-warm:#fff6ef;
      --card:#ffffff;
      --card-soft:rgba(255,255,255,.88);
      --text:#5a4744;
      --text-soft:#8b7470;
      --line:rgba(120,90,86,.12);
      --pink:#efcfd3;
      --pink-deep:#dcaab2;
      --gold:#dcc4a2;
      --gold-deep:#b79269;
      --shadow:0 18px 40px rgba(177,136,130,.10);
      --radius-xl:32px;
      --radius-lg:24px;
      --radius-md:18px;
      --nav-height:72px;
      --max:1180px;
      --serif:'Playfair Display','Noto Sans TC',serif;
      --sans:'Noto Sans TC',sans-serif;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      padding-bottom:calc(96px + env(safe-area-inset-bottom));
      background:
        radial-gradient(circle at 12% 0%, rgba(239,207,211,.70), transparent 24%),
        radial-gradient(circle at 88% 6%, rgba(255,235,220,.82), transparent 26%),
        linear-gradient(180deg,#fffaf7 0%,#fffdfb 42%,#fff5f6 100%);
    }
    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}

    .container{width:min(calc(100% - 32px), var(--max));margin:0 auto}

    .navbar{
      position:sticky;
      top:0;
      z-index:120;
      backdrop-filter:blur(16px);
      background:rgba(255,250,247,.78);
      border-bottom:1px solid rgba(120,90,86,.08);
    }
    .nav-inner{
      height:var(--nav-height);
      display:grid;
      grid-template-columns:80px 1fr 80px;
      align-items:center;
    }
    .nav-left,.nav-right{display:flex}
    .nav-left{justify-content:flex-start}
    .nav-right{justify-content:flex-end}
    .nav-btn{
      width:44px;height:44px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.82);
      display:flex;align-items:center;justify-content:center;
      font-size:18px;color:var(--text);
      box-shadow:0 10px 20px rgba(0,0,0,.04);
      cursor:pointer;
    }
    .brand{text-align:center}
    .brand-title{
      font-family:var(--serif);
      font-size:24px;
      letter-spacing:.18em;
      color:#6b5552;
      line-height:1;
    }
    .brand-sub{
      margin-top:6px;
      font-size:10px;
      letter-spacing:.28em;
      color:var(--text-soft);
      line-height:1;
    }
.site-menu-mask{
  position:fixed;
  inset:0;
  background:rgba(68,52,49,.28);
  backdrop-filter:blur(5px);
  -webkit-backdrop-filter:blur(5px);
  opacity:0;
  pointer-events:none;
  transition:opacity .28s ease;
  z-index:1998;
}
.site-menu-mask.show{
  opacity:1;
  pointer-events:auto;
}

.site-menu-panel{
  position:fixed;
  top:0;
  left:0;
  width:min(88vw, 360px);
  height:100dvh;
  max-height:100dvh;
  background:linear-gradient(180deg, rgba(255,252,249,.98) 0%, rgba(255,246,243,.97) 100%);
  border-right:1px solid rgba(216,195,165,.22);
  box-shadow:0 20px 42px rgba(120,86,82,.18);
  transform:translateX(-102%);
  transition:transform .28s ease;
  z-index:1999;
  display:flex;
  flex-direction:column;
  padding:18px 14px calc(22px + env(safe-area-inset-bottom, 0px));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.site-menu-panel.show{
  transform:translateX(0);
}

.site-menu-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  padding:4px 2px 16px;
  margin-bottom:14px;
  border-bottom:1px solid rgba(120,90,86,.08);
}

.site-menu-brand-wrap{
  min-width:0;
}

.site-menu-brand{
  font-family:var(--serif);
  font-size:20px;
  letter-spacing:.14em;
  color:#6b5552;
  line-height:1.1;
}

.site-menu-brand-sub{
  margin-top:6px;
  font-size:10px;
  letter-spacing:.20em;
  color:#a08b87;
}

.site-menu-close{
  width:34px;
  height:34px;
  border-radius:999px;
  border:1px solid rgba(141,119,116,.16);
  background:rgba(255,255,255,.90);
  color:var(--text);
  cursor:pointer;
  font-size:16px;
  flex:0 0 auto;
}

.site-menu-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  flex:none;
  min-height:auto;
  overflow:visible;
  padding-right:4px;
  padding-bottom:8px;
  scrollbar-width:none;
}
.site-menu-list::-webkit-scrollbar{
  display:none;
}

.site-menu-scroll-hint{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-top:8px;
  padding:8px 10px 4px;
  font-size:11px;
  letter-spacing:.06em;
  color:#a08b87;
  background:linear-gradient(180deg, rgba(255,252,249,0), rgba(255,246,243,.82));
  border-radius:14px;
}
.site-menu-scroll-hint::before{
  content:"⌄";
  font-size:14px;
  line-height:1;
}

.site-menu-link{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 14px;
  border-radius:18px;
  color:var(--text);
  text-decoration:none;
  border:1px solid rgba(120,90,86,.08);
  box-shadow:0 10px 24px rgba(177,136,130,.07);
  transition:all .2s ease;
}
.site-menu-link:hover{
  transform:translateX(2px);
  background:#fff;
}

.site-menu-text{
  min-width:0;
}

.site-menu-title-row{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:4px;
  flex-wrap:wrap;
}

.site-menu-title-row strong{
  display:block;
  font-size:15px;
  font-weight:700;
  letter-spacing:.02em;
  color:#5b4744;
  line-height:1.25;
}

.site-menu-title-row span{
  font-size:10px;
  font-weight:600;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#b08b73;
  line-height:1.2;
}

.site-menu-link small{
  display:block;
  margin-top:2px;
  font-size:11px;
  color:var(--text-soft);
  line-height:1.5;
}

.site-menu-arrow{
  width:28px;
  height:28px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  color:rgba(90,71,68,.48);
  background:rgba(255,255,255,.72);
  border:1px solid rgba(120,90,86,.06);
  flex:0 0 auto;
}

.menu-home{
  background:linear-gradient(135deg, #fcf7f1, #fffdfb);
  border-color:rgba(198,164,123,.18);
}
.menu-home .site-menu-arrow{
  background:#f7ecde;
  color:#9a7a54;
}

.menu-shop{
  background:linear-gradient(135deg, #fff1de, #fffaf3);
  border-color:rgba(208,160,84,.26);
}
.menu-shop .site-menu-arrow{
  background:#f8ddb0;
  color:#9f6b1f;
}

.menu-service{
  background:linear-gradient(135deg, #ffeef4, #fffafd);
  border-color:rgba(206,128,160,.24);
}
.menu-service .site-menu-arrow{
  background:#f6d4e3;
  color:#a65e7d;
}

.menu-info{
  background:linear-gradient(135deg, #f4efec, #fffdfb);
  border-color:rgba(138,116,109,.18);
}
.menu-info .site-menu-arrow{
  background:#e7d8cf;
  color:#7d6962;
}

.site-menu-member{
  margin-top:14px;
  padding-top:14px;
  border-top:1px solid rgba(120,90,86,.08);
}

.site-menu-member a{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:15px 15px;
  border-radius:20px;
  background:linear-gradient(135deg, #fff1f5, #fff8fb);
  border:1px solid rgba(183,138,164,.16);
  box-shadow:0 14px 28px rgba(183,138,164,.08);
  text-decoration:none;
}

.site-menu-member strong{
  display:block;
  font-size:14px;
  letter-spacing:.03em;
  color:#5b4744;
}

.site-menu-member small{
  display:block;
  margin-top:4px;
  font-size:11px;
  color:#8d707b;
  line-height:1.5;
}

.site-menu-member .site-menu-arrow{
  background:rgba(255,255,255,.78);
  color:#9a6f86;
}

@media (max-width: 480px){
  .site-menu-panel{
    width:min(88vw, 340px);
    padding:16px 12px 16px;
  }

  .site-menu-top{
    padding-bottom:14px;
    margin-bottom:12px;
  }

  .site-menu-brand{
    font-size:18px;
  }

  .site-menu-brand-sub{
    font-size:9px;
    margin-top:5px;
  }

  .site-menu-close{
    width:32px;
    height:32px;
    font-size:15px;
  }

  .site-menu-link{
    padding:13px 12px;
    border-radius:16px;
  }

  .site-menu-title-row strong,
  .site-menu-member strong{
    font-size:13px;
  }

  .site-menu-title-row span{
    font-size:10px;
  }

  .site-menu-link small,
  .site-menu-member small{
    font-size:10px;
  }

  .site-menu-arrow{
    width:26px;
    height:26px;
    font-size:13px;
  }
}

.brand-scroll-wrapper{
  position:sticky;
  top:var(--nav-height);
  z-index:110;
  background:rgba(255,250,247,.94);
  backdrop-filter:blur(16px);
  border-bottom:1px solid transparent;
  transition:border-color .2s ease;
  padding:12px 0 16px;
}
.brand-scroll-wrapper.stuck{border-bottom-color:rgba(120,90,86,.08)}

.brand-list{
  display:flex;
  gap:16px;
  overflow-x:auto;
  padding:0 18px;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.brand-list::-webkit-scrollbar{display:none}

.brand-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:9px;
  min-width:76px;
  flex-shrink:0;
  cursor:pointer;
}

.brand-avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  background:rgba(255,255,255,.92);
  border:1px solid rgba(120,90,86,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 18px rgba(0,0,0,.04);
  transition:all .25s ease;
}

.brand-text-logo{
  font-family:var(--serif);
  font-size:11px;
  color:#846a66;
  letter-spacing:.04em;
  text-align:center;
}

.brand-name-label{
  font-size:11px;
  color:#876f6b;
  max-width:92px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  text-align:center;
}

.brand-item.active .brand-avatar,
.brand-item.all-btn.active .brand-avatar{
  background:linear-gradient(135deg,#fff3f4,#f7e6d3);
  border-color:rgba(183,146,105,.45);
  box-shadow:0 10px 24px rgba(220,170,178,.16);
}
.brand-item.active .brand-text-logo,
.brand-item.active .brand-name-label{color:var(--gold-deep)}

.brand-item.all-btn .brand-text-logo{font-size:13px}

.subcat-list{
  margin-top:12px;
  padding:12px 18px 0;
  border-top:1px solid rgba(120,90,86,.08);
  background:linear-gradient(180deg, rgba(255,245,240,.88), rgba(255,250,247,0));
}

.subcat-list .brand-item{
  min-width:70px;
}

.subcat-list .brand-avatar{
  width:52px;
  height:52px;
  background:#fff8f2;
  border:1px solid rgba(183,146,105,.16);
  box-shadow:none;
}

.subcat-list .brand-text-logo{
  font-size:10px;
  color:#9a7a72;
}

.subcat-list .brand-name-label{
  font-size:10px;
  max-width:86px;
  color:#9a7d76;
}

.subcat-list .brand-item.active .brand-avatar{
  background:linear-gradient(135deg,#fff1ea,#f7e6d3);
  border-color:rgba(183,146,105,.34);
  box-shadow:0 8px 18px rgba(220,170,178,.10);
}

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:12px;
      margin:20px 0 16px;
    }
    .toolbar-title{
      font-family:var(--serif);
      font-size:28px;
      color:#5f4a47;
      line-height:1.2;
      margin:0;
    }
    .loader{
      width:100%;
      text-align:center;
      padding:32px 0 42px;
      color:#8d7774;
      font-size:12px;
      letter-spacing:.18em;
    }
    .empty{
      text-align:center;
      padding:52px 0;
      color:#8d7774;
      font-size:12px;
      letter-spacing:.10em;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      row-gap:22px;
      padding-bottom:38px;
    }
    .product-card{
  display:flex;
  flex-direction:column;
  background:rgba(255,255,255,.90);
  border:1px solid rgba(220,196,162,.24);
  border-radius:24px;
  padding:12px;
  box-shadow:var(--shadow);
  cursor:pointer;
  transition:transform .18s ease, box-shadow .18s ease;
}
    .product-card:active{transform:scale(.985)}
    .img-wrapper{
      position:relative;
      width:100%;
      padding-top:100%;
      overflow:hidden;
      border-radius:18px;
      background:linear-gradient(135deg,#fff7f8,#fff1e7);
      margin-bottom:12px;
    }
    .img-wrapper img{
      position:absolute;inset:0;
      width:100%;height:100%;
      object-fit:contain;
      background:transparent;
    }
    .card-info{
  display:flex;
  flex-direction:column;
  flex:1;
}
    .p-meta{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      font-size:10px;
      letter-spacing:.08em;
      line-height:1;
    }
    .p-meta .p-cat{color:rgba(90,71,68,.55);text-transform:uppercase}
    .p-meta .p-sep{color:rgba(90,71,68,.28)}
    .p-meta .p-sub{color:var(--gold-deep);text-transform:uppercase}
    .p-title{
      font-size:14px;
      font-weight:700;
      line-height:1.45;
      color:#5a4643;
      min-height:42px;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }
    .title-brand{
      color:var(--gold-deep);
      font-weight:700;
      margin-left:6px;
      letter-spacing:.04em;
      white-space:nowrap;
    }
    .p-price{
  margin-top:auto;
  padding-top:10px;
  text-align:right;
  font-family:var(--sans);
  font-size:16px;
  font-weight:700;
  color:#6e5753;
  letter-spacing:0;
}

    .detail-modal{
      display:none;
      position:fixed;
      inset:0;
      z-index:2000;
      background:rgba(93,73,70,.36);
      backdrop-filter:blur(10px);
      align-items:flex-end;
      animation:fadeIn .24s ease;
    }
    .detail-modal.active{display:flex}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .detail-content{
      background:linear-gradient(180deg,#fffefe 0%, #fff7f8 100%);
      width:100%;
      max-width:560px;
      height:86vh;
      border-radius:28px 28px 0 0;
      display:flex;
      flex-direction:column;
      position:relative;
      box-shadow:0 -18px 40px rgba(0,0,0,.12);
      animation:slideUp .3s ease;
    }
    @media(min-width:768px){
      .detail-modal{align-items:center;justify-content:center}
      .detail-content{height:auto;max-height:88vh;border-radius:30px}
    }
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
    .detail-close{
      position:absolute;
      top:16px;right:16px;
      width:34px;height:34px;
      border-radius:999px;
      border:1px solid rgba(120,90,86,.12);
      background:rgba(255,255,255,.84);
      display:flex;align-items:center;justify-content:center;
      font-size:22px;
      color:#6f5855;
      z-index:20;
      cursor:pointer;
    }
    .detail-scroll-area{flex:1;overflow-y:auto}
    .detail-gallery{
      position:relative;
      width:100%;
      aspect-ratio:1/1;
      background:linear-gradient(135deg,#fff7f8,#fff1e7);
      overflow:hidden;
    }
    .detail-main-img{width:100%;height:100%;object-fit:contain;display:block;transition:opacity .18s ease}
    .gallery-nav{
      position:absolute;
      top:50%;transform:translateY(-50%);
      width:44px;height:44px;
      border-radius:999px;
      background:rgba(255,255,255,.82);
      border:1px solid rgba(120,90,86,.12);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;z-index:10;
      color:#6b5552;
      font-size:24px;
      box-shadow:0 8px 18px rgba(0,0,0,.06);
    }
    .gallery-nav.prev{left:14px}
    .gallery-nav.next{right:14px}
    .gallery-dots{
      position:absolute;
      left:0;right:0;bottom:16px;
      display:flex;justify-content:center;gap:8px;z-index:10;
    }
    .dot{width:7px;height:7px;border-radius:50%;background:rgba(111,88,85,.20)}
    .dot.active{background:#8f6c67;transform:scale(1.2)}
    .detail-info{padding:28px 24px}
    .d-brand{
      font-size:11px;
      letter-spacing:.16em;
      color:var(--gold-deep);
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .d-title{
      font-family:var(--serif);
      font-size:24px;
      line-height:1.3;
      color:#5c4744;
      margin-bottom:12px;
    }
    .d-price{
  font-family:var(--sans);
  font-size:22px;
  font-weight:700;
  color:#6e5753;
  margin-bottom:22px;
  padding-bottom:18px;
  border-bottom:1px solid rgba(120,90,86,.10);
  letter-spacing:0;
}
    .d-desc{
  font-size:14px;
  line-height:1.9;
  color:#6f5d59;
  letter-spacing:.01em;
}

.desc-heading{
  margin:18px 0 8px;
  font-size:15px;
  font-weight:700;
  color:#5a4643;
  letter-spacing:.03em;
}

.desc-line{
  margin:0 0 8px;
}

.desc-bullet{
  margin:0 0 6px;
  padding-left:1em;
  text-indent:-1em;
}

.desc-space{
  height:10px;
}
    .detail-actions{
      padding:18px 24px 24px;
      border-top:1px solid rgba(120,90,86,.08);
      background:rgba(255,255,255,.74);
      backdrop-filter:blur(8px);
    }
    .btn-detail-add{
      width:100%;
      padding:16px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,#f8e6d2,#e9c7cc);
      color:#5a4643;
      font-size:13px;
      font-weight:700;
      letter-spacing:.12em;
      cursor:pointer;
      box-shadow:0 12px 24px rgba(220,170,178,.18);
    }

    .checkout-bar{
      position:fixed;
      bottom:24px;
      left:50%;
      transform:translateX(-50%) translateY(150%);
      width:calc(100% - 32px);
      max-width:420px;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(14px);
      border:1px solid rgba(220,196,162,.26);
      border-radius:999px;
      padding:8px 8px 8px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      z-index:140;
      transition:transform .28s ease;
      box-shadow:0 16px 36px rgba(177,136,130,.14);
    }
    .checkout-bar.visible{transform:translateX(-50%) translateY(0)}
    .cart-left{display:flex;align-items:center;gap:10px}
    .btn-clear{
      width:30px;height:30px;border-radius:999px;
      border:none;background:transparent;color:#8a716d;font-size:16px;cursor:pointer;
    }
    .cart-info{font-size:12px;letter-spacing:.05em;color:#6d5855}
    .btn-checkout{
      border:none;
      padding:12px 22px;
      border-radius:999px;
      background:linear-gradient(135deg,#f8e6d2,#e9c7cc);
      color:#5a4643;
      font-size:12px;
      font-weight:700;
      letter-spacing:.10em;
      cursor:pointer;
    }

    .toast{
      position:fixed;
      top:50%;left:50%;
      transform:translate(-50%,-50%) scale(.92);
      background:rgba(255,255,255,.94);
      color:#5a4643;

    { sku:'KS01', brand:'KATE SPADE', title:'Kate Spade 尼龍後背包 - 黑色', price:3800, list_price:8800, category:'BOUTIQUE', subcategory:'KS', image:'https://images.unsplash.com/photo-1605733513597-a8f8341084e6?auto=format&fit=crop&q=80&w=800', description:'輕便防潑水，旅遊必備。' }
  ];

  let allItems = [];
  let cartCount = 0;
  let cartToken = '';
  let isDemoMode = false;
  let currentImgIdx = 0;
  let currentProductImages = [];
  let allCats = [];

  const params = new URLSearchParams(location.search);
  let selectedCat = params.get('cat') || 'ALL';
  let selectedSub = params.get('sub') || 'ALL';

  const $ = (id) => document.getElementById(id);
  const SHOP_CACHE_KEY = 'XUYUAN_SHOP_CACHE_V1';
const SHOP_CACHE_TTL = 1000 * 60 * 10;

function readShopCache(){
  try{
    const raw = sessionStorage.getItem(SHOP_CACHE_KEY);
    if(!raw) return null;
    const obj = JSON.parse(raw);
    if(!obj || !Array.isArray(obj.items)) return null;
    if(Date.now() - Number(obj.ts || 0) > SHOP_CACHE_TTL) return null;
    return obj;
  }catch(e){
    return null;
  }
}

function writeShopCache(items, categories){
  try{
    sessionStorage.setItem(SHOP_CACHE_KEY, JSON.stringify({
      ts: Date.now(),
      items: items || [],
      categories: categories || []
    }));
  }catch(e){}
}

  window.addEventListener('scroll', () => {
    const bar = $('brandBarWrapper');
    if (window.scrollY > 120) bar.classList.add('stuck');
    else bar.classList.remove('stuck');
  });

  function showToast(msg){
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  function openProductDetail(product){
    $('detailBrand').innerHTML = topLine(product) || 'XUYUAN';
    $('detailTitle').textContent = product.title || product.sku;
    $('detailPrice').textContent = 'NT$' + Number(product.price || 0).toLocaleString();
    $('detailDesc').innerHTML = formatDetailDesc(product.description || '');
currentProductImages = product.images && product.images.length ? product.images : [product.image || product.image_url || ''];
currentImgIdx = 0;
preloadGalleryImages(currentProductImages);
updateGalleryImage();
    $('detailAddBtn').onclick = () => {
      handleAddToCart(product.sku, 1);
      closeDetail();
    };
    $('productDetailModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  window.openProductDetail = openProductDetail;

  function closeDetail(){
    $('productDetailModal').classList.remove('active');
    document.body.style.overflow = '';
  }
  window.closeDetail = closeDetail;

  function updateGalleryImage(){
    const imgEl = $('detailImg');
    const dotsEl = $('galleryDots');
    imgEl.style.opacity = 0;
    setTimeout(() => {
      imgEl.src = currentProductImages[currentImgIdx] || '';
      imgEl.style.opacity = 1;
    }, 120);

    dotsEl.innerHTML = '';
    if (currentProductImages.length > 1){
      currentProductImages.forEach((_, idx) => {
        const d = document.createElement('div');
        d.className = 'dot' + (idx === currentImgIdx ? ' active' : '');
        dotsEl.appendChild(d);
      });
    }
    const showNav = currentProductImages.length > 1;
    document.querySelectorAll('.gallery-nav').forEach(el => {
      el.style.display = showNav ? 'flex' : 'none';
    });
  }
  function preloadGalleryImages(arr){
  (arr || []).forEach(src => {
    if (!src) return;
    const img = new Image();
    img.src = src;
  });
}

  function prevImage(e){
    e.stopPropagation();
    if (currentProductImages.length <= 1) return;
    currentImgIdx = (currentImgIdx - 1 + currentProductImages.length) % currentProductImages.length;
    updateGalleryImage();
  }
  function nextImage(e){
    e.stopPropagation();
    if (currentProductImages.length <= 1) return;
    currentImgIdx = (currentImgIdx + 1) % currentProductImages.length;
    updateGalleryImage();
  }
  window.prevImage = prevImage;
  window.nextImage = nextImage;

  function clearCart(){
    if (confirm('確定要清空購物車嗎？')){
      cartToken = '';
      localStorage.removeItem(CART_KEY);
      cartCount = 0;
      updateCartUI(0);
      showToast('購物車已清空');
    }
  }

  async function jfetch(url, opt){
    try {
      const r = await fetch(url, Object.assign({ headers:{ 'content-type':'application/json' } }, opt));
      if (!r.ok) throw new Error(r.statusText);
      const txt = await r.text();
      try { return JSON.parse(txt); } catch { return { raw: txt }; }
    } catch(e){
      return { ok:false };
    }
  }

  function setCartToken(t){
    cartToken = t || '';
    try { localStorage.setItem(CART_KEY, cartToken); } catch(e){}
  }

  function updateCartUI(count){
    cartCount = count;
    $('cartCount').textContent = String(cartCount);
    const bar = $('checkoutBar');
    if (cartCount > 0) bar.classList.add('visible');
    else bar.classList.remove('visible');
  }

  async function restoreCart(){
    let saved = localStorage.getItem(CART_KEY);
    if (saved){
      setCartToken(saved);
      try {
        const r = await fetch(`${API_BASE}/cart/${encodeURIComponent(saved)}`);
        if (r.ok){
          const j = await r.json();
          let c = 0;
          (j.items || []).forEach(i => c += Number(i.qty || 0));
          updateCartUI(c);
        }
      } catch(e){}
    }
  }

  async function ensureCart(){
    if (cartToken) return cartToken;
    if (isDemoMode) return 'DEMO';

    const res = await jfetch(API_BASE + '/cart/create', {
      method:'POST',
      body: JSON.stringify({ streamer_name:'官網', customer_type:'web' })
    });

    if (res && res.cart_token){
      setCartToken(res.cart_token);
      return cartToken;
    }

    isDemoMode = true;
    return 'DEMO';
  }

async function fetchProducts(){
  const loader = $('loading');
  const grid = $('productList');

  const cached = readShopCache();
  if (cached && Array.isArray(cached.items) && cached.items.length){
    allItems = cached.items || [];
    allCats = cached.categories || [];
    loader.style.display = 'none';
    renderCategoryBar(allCats);
    renderSubcatBar(allCats, selectedCat);
    renderProducts(filterItems(allItems));
  } else {
    loader.style.display = 'block';
    grid.innerHTML = '';
  }

  try {
    const res = await fetch(PRODUCT_API);
    const json = await res.json();
    allItems = json.items || [];
    allCats = json.categories || [];

    if (!Array.isArray(allCats) || allCats.length === 0){
      const catMap = new Map();
      allItems.forEach(it => {
        const c = String(it.category || it.category_code || '').trim();
        if (!c) return;
        if (!catMap.has(c)) catMap.set(c, { code:c, name:c, subcategories:[] });
        const s = String(it.subcategory || it.subcategory_code || it.brand || '').trim();
        if (s){
          const node = catMap.get(c);
          if (!node.subcategories.find(x => x.code === s)) node.subcategories.push({ code:s, name:s });
        }
      });
      allCats = Array.from(catMap.values());
    }

    writeShopCache(allItems, allCats);

    loader.style.display = 'none';
    if (allItems.length > 0){
      if (selectedCat !== 'ALL' && !allCats.find(c => String(c.code || '').trim() === String(selectedCat).trim())) {
        selectedCat = 'ALL';
        selectedSub = 'ALL';
      }
      renderCategoryBar(allCats);
      renderSubcatBar(allCats, selectedCat);
      renderProducts(filterItems(allItems));
    } else {
      $('emptyTip').style.display = 'block';
    }
  } catch(err){
    if (!allItems.length){
      allItems = mockProducts;
      isDemoMode = true;

      const catMap = new Map();
      allItems.forEach(it => {
        const c = String(it.category || '').trim();
        if (!c) return;
        if (!catMap.has(c)) catMap.set(c, { code:c, name:c, subcategories:[] });
        const s = String(it.subcategory || it.brand || '').trim();
        if (s){
          const node = catMap.get(c);
          if (!node.subcategories.find(x => x.code === s)) node.subcategories.push({ code:s, name:s });
        }
      });
      allCats = Array.from(catMap.values());

      loader.style.display = 'none';
      renderCategoryBar(allCats);
      renderSubcatBar(allCats, selectedCat);
      renderProducts(filterItems(allItems));
    }
  }
}

  function labelOfCat(c){
    const code = String(c?.code || '').trim();
    const name = String(c?.name || '').trim();
    return name || code || '';
  }
  function labelOfSub(s){
    const code = String(s?.code || '').trim();
    const name = String(s?.name || '').trim();
    return name || code || '';
  }
  function updateToolbarTitle(){
  const el = document.querySelector('.toolbar-title');
  if (!el) return;

  if (selectedCat === 'ALL'){
    el.textContent = '新品上市';
    return;
  }

  const cat = (allCats || []).find(x => String(x.code || '').trim() === String(selectedCat).trim());
  if (!cat){
    el.textContent = '新品上市';
    return;
  }

  if (selectedSub !== 'ALL' && Array.isArray(cat.subcategories)){
    const sub = cat.subcategories.find(x => String(x.code || '').trim() === String(selectedSub).trim());
    if (sub){
      el.textContent = labelOfSub(sub);
      return;
    }
  }

  el.textContent = labelOfCat(cat);
}
  function avatarText(label, code){
    const s = String(label || code || '').trim();
    if (!s) return '';
    if (String(code).toUpperCase() === 'ALL') return 'ALL';
    if (/[^\x00-\x7F]/.test(s)) return s.slice(0,2);
    const words = s.replace(/_/g, ' ').split(/\s+/).filter(Boolean);
    if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
    return words[0].slice(0,4).toUpperCase();
  }

function renderCategoryBar(categories){
  const listEl = $('brandList');
  listEl.innerHTML = '';

  const addBtn = (key, label, circleText) => {
    const item = document.createElement('div');
    item.className = 'brand-item' + (key === 'ALL' ? ' all-btn' : '');
    if ((key === 'ALL' && selectedCat === 'ALL') || key === selectedCat) item.classList.add('active');
    item.innerHTML = `
      <div class="brand-avatar"><div class="brand-text-logo">${circleText}</div></div>
      <span class="brand-name-label">${label}</span>
    `;
    item.onclick = () => {
      selectedCat = key;
      selectedSub = 'ALL';
      syncQS();
      renderCategoryBar(categories);
      renderSubcatBar(categories, selectedCat);
      renderProducts(filterItems(allItems));
      scrollToProducts();
    };
    listEl.appendChild(item);
  };

  addBtn('ALL', '新品上市', 'NEW');

  (categories || []).forEach(c => {
    const code = String(c.code || '').trim();
    const label = labelOfCat(c);
    if (!code) return;
    addBtn(code, label, avatarText(code, code));
  });
}

  function renderSubcatBar(categories, catCode){
  const subEl = $('subcatList');
  subEl.innerHTML = '';

  if (catCode === 'ALL'){
    subEl.style.display = 'none';
    return;
  }

  subEl.style.display = 'flex';

  const addBtn = (key, label, circleText) => {
    const item = document.createElement('div');
    item.className = 'brand-item' + (key === 'ALL' ? ' all-btn' : '');
    if ((key === 'ALL' && selectedSub === 'ALL') || key === selectedSub) item.classList.add('active');
    item.innerHTML = `
      <div class="brand-avatar"><div class="brand-text-logo">${circleText}</div></div>
      <span class="brand-name-label">${label}</span>
    `;
    item.onclick = () => {
      selectedSub = key;
      syncQS();
      renderSubcatBar(categories, catCode);
      renderProducts(filterItems(allItems));
      scrollToProducts();
    };
    subEl.appendChild(item);
  };

  addBtn('ALL', '全部', 'ALL');

  const cat = (categories || []).find(x => String(x.code || '').trim() === String(catCode).trim());
  const subs = (cat && Array.isArray(cat.subcategories)) ? cat.subcategories : [];

  subs.forEach(s => {
    const code = String(s.code || '').trim();
    const label = labelOfSub(s);
    if (!code) return;
    addBtn(code, label, avatarText(code, code));
  });
}

  function scrollToProducts(){
    const grid = $('productList');
    if (!grid) return;
    const navH = 72;
    const bar = $('brandBarWrapper');
    const barH = bar ? Math.round(bar.getBoundingClientRect().height) : 0;
    const targetY = window.scrollY + grid.getBoundingClientRect().top - navH - barH - 14;
    if (Math.abs(window.scrollY - targetY) < 160) return;
    const topInView = grid.getBoundingClientRect().top - (navH + barH);
    if (topInView >= -40 && topInView <= 260) return;
    requestAnimationFrame(() => {
      window.scrollTo({ top: Math.max(0, targetY), behavior:'smooth' });
    });
  }

  function filterItems(items){
    return (items || []).filter(p => {
      const c = String(p.category_code || p.category || '').trim();
      const s = String(p.subcategory_code || p.subcategory || p.brand || '').trim();
      if (selectedCat !== 'ALL' && c !== selectedCat) return false;
      if (selectedSub !== 'ALL' && s !== selectedSub) return false;
      return true;
    });
  }

  function escapeHtml(s){
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function stripTags(s){
    return String(s ?? '').replace(/<[^>]*>/g, '').trim();
  }

  function formatDetailDesc(text){
  const lines = String(text || '').split(/\r?\n/);

  return lines.map(line => {
    const s = escapeHtml(line.trim());

    if (!s) return '<div class="desc-space"></div>';

    const m = s.match(/^【(.+?)】$/);
    if (m) return `<div class="desc-heading">${m[1]}</div>`;

    if (/^[•・\-]/.test(s)) return `<div class="desc-bullet">${s}</div>`;

    return `<div class="desc-line">${s}</div>`;
  }).join('');
}

  function topLine(p){
    const cName = String(p.category_name || p.category || p.category_code || '').trim();
    const sName = String(p.subcategory_name || p.subcategory || p.subcategory_code || '').trim();
    const brand = String(p.brand || '').trim();
    if (brand && sName) return `<span class="p-sub">${brand}</span><span class="p-sep">·</span><span class="p-cat">${sName}</span>`;
    if (cName && sName) return `<span class="p-cat">${cName}</span><span class="p-sep">·</span><span class="p-sub">${sName}</span>`;
    const one = sName || cName || brand || '';
    return `<span class="p-sub">${one}</span>`;
  }

 function renderProducts(list){
  const wrap = $('productList');
  $('emptyTip').style.display = list.length ? 'none' : 'block';
  wrap.innerHTML = '';

  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    const img = String(p.thumb_url || p.image_url || p.image || '').trim();
    const safeTitle = escapeHtml(stripTags(p.title || ''));
    card.innerHTML = `
      <div class="img-wrapper">
          <img src="${escapeHtml(img)}" loading="lazy" alt="${safeTitle}">
      </div>
      <div class="card-info">
        <div class="p-meta">${topLine(p)}</div>
        <div class="p-title">${safeTitle}${p.brand ? ` <span class="title-brand">${escapeHtml(p.brand)}</span>` : ''}</div>
        <div class="p-price">NT$${Number(p.price || 0).toLocaleString()}</div>
      </div>
    `;
    card.onclick = () => openProductDetail(p);
    wrap.appendChild(card);
  });

  updateToolbarTitle();
}

  async function handleAddToCart(sku, qty){
    showToast('加入中...');
    const token = await ensureCart();
    if (isDemoMode){
      setTimeout(() => {
        cartCount += 1;
        updateCartUI(cartCount);
        showToast('已加入購物車');
      }, 260);
      return;
    }
    const res = await jfetch(API_BASE + '/cart/add', {
      method:'POST',
      body: JSON.stringify({ cart_token: token, sku, qty: qty || 1 })
    });
    if (res && res.items){
      let c = 0;
      res.items.forEach(i => c += Number(i.qty || 0));
      updateCartUI(c);
      showToast('已加入購物車');
    }
  }

  async function goCheckout(){
    if (!cartToken) await restoreCart();
    if (isDemoMode){ alert('目前為演示模式'); return; }
    if (!cartToken || cartCount <= 0){ showToast('購物車是空的'); return; }
    location.href = `${LIFF_CHECKOUT}?cart_token=${encodeURIComponent(cartToken)}`;
  }

  function syncQS(){
    const u = new URL(location.href);
    if (selectedCat && selectedCat !== 'ALL') u.searchParams.set('cat', selectedCat); else u.searchParams.delete('cat');
    if (selectedSub && selectedSub !== 'ALL') u.searchParams.set('sub', selectedSub); else u.searchParams.delete('sub');
    history.replaceState({}, '', u.toString());
  }

  window.addEventListener('DOMContentLoaded', async () => {
    await restoreCart();
    await fetchProducts();
    $('checkoutBtn').onclick = goCheckout;
    $('clearCartBtn').onclick = clearCart;

    $('productDetailModal').addEventListener('click', (e) => {
      if (e.target.id === 'productDetailModal') closeDetail();
    });
  });
</script>
</body>
