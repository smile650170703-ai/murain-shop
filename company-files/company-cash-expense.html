  <script>
  const STORAGE_OK = "company_entry_ok";
  if (sessionStorage.getItem(STORAGE_OK) !== "1") {
    location.href = "/company-files/company-index.html";
  }

const API_CREATE = "https://api.murain.tw/op/company/cash-expense/create";
const API_PHOTO_UPLOAD = "https://api.murain.tw/op/company/cash-expense/photo-upload";
const API_REVIEW = "https://api.murain.tw/op/company/cash-expense/review-list";
const API_UPDATE = "https://api.murain.tw/op/company/cash-expense/update";
const API_LIST = "https://api.murain.tw/op/company/cash-expense/list";
const API_CATEGORY_OPTIONS = "https://api.murain.tw/op/company/cash-expense/category-options";

let CATEGORY_OPTIONS = [
  "🟫💸 公司入帳｜妹妹代墊｜要請款",
  "🟫 公司雜項｜公司付款｜扣公司費用",
  "借支 💰 - 妹妹",
  "🚫 不入帳｜對帳排除",
  "🚚💸 不入公司帳｜妹妹運費｜要請款",
  "🚫 不入貨款｜台中匯款｜貨款排除",
  "🟫📦髮品｜公司入帳｜公司貨款",
  "🧾 待確認｜會計師申報核對"
];

const $ = (id) => document.getElementById(id);

function esc(v) {
  return String(v ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function money(n) {
  const v = Number(n || 0) || 0;
  return `NT$ ${v.toLocaleString("zh-TW")}`;
}

async function apiGet(url) {
  const r = await fetch(url);
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}

async function apiGetWithQuery(url, params = {}) {
  const u = new URL(url, location.origin);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null && String(v).trim() !== "") {
      u.searchParams.set(k, String(v));
    }
  });

  const r = await fetch(u.toString());
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}
async function loadCategoryOptions() {
  try {
    const data = await apiGet(API_CATEGORY_OPTIONS);
    const list = Array.isArray(data.options) ? data.options : [];

    if (list.length) {
      CATEGORY_OPTIONS = list;
    }

    if (data.source !== "airtable_metadata") {
      console.warn("費用支出對象目前使用備用選項，若要完全跟 Airtable 欄位同步，請確認 Airtable Token 有 schema.bases:read 權限。", data);
    }
  } catch (err) {
    console.warn("讀取費用支出對象選項失敗，改用前端備用選項：", err);
  }
}
async function apiPost(url, payload) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}

function categorySelect(id, value) {
  return `
    <select class="rowCategory" data-id="${esc(id)}">
      <option value="">請選擇</option>
      ${CATEGORY_OPTIONS.map(c => `
        <option value="${esc(c)}" ${c === value ? "selected" : ""}>${esc(c)}</option>
      `).join("")}
    </select>
  `;
}

function renderPhotoPreview(target, url) {
  const box = typeof target === "string" ? $(target) : target;
  if (!box) return;

  const s = String(url || "").trim();

  if (!s) {
    box.innerHTML = `貼上圖片<br>Ctrl+V`;
    box.dataset.photoUrl = "";
    box.style.cursor = "pointer";
    return;
  }

  box.dataset.photoUrl = s;
  box.style.cursor = "zoom-in";
  box.innerHTML = `<img src="${esc(s)}" alt="拍照/截圖" />`;
}

async function uploadCashPhotoFile(file, inputEl, previewEl) {
  if (!file || !file.type || !file.type.startsWith("image/")) {
    alert("請貼上圖片檔。");
    return;
  }

  const oldPreview = previewEl?.innerHTML || "";
  if (previewEl) previewEl.textContent = "上傳中...";

  try {
    const info = await apiPost(API_PHOTO_UPLOAD, {
      filename: file.name || `cash-expense-${Date.now()}.png`,
      contentType: file.type || "image/png"
    });

    const fd = new FormData();
    fd.append("file", file, file.name || "cash-expense.png");

    const up = await fetch(info.uploadURL, {
      method: "POST",
      body: fd
    });

    const upData = await up.json().catch(() => ({}));

    if (!up.ok || !upData.success) {
      throw new Error(`圖片上傳失敗：${JSON.stringify(upData).slice(0, 300)}`);
    }

    const url = info.delivery_url || info.url || "";
    if (!url) throw new Error("圖片已上傳，但後端沒有回傳圖片網址。");

    inputEl.value = url;
    renderPhotoPreview(previewEl, url);
  } catch (err) {
    if (previewEl) previewEl.innerHTML = oldPreview;
    alert(err.message || err);
  }
}

function bindPasteImage(inputEl, previewEl) {
  if (!inputEl || inputEl.dataset.pasteBound === "1") return;
  inputEl.dataset.pasteBound = "1";

  inputEl.addEventListener("paste", async (e) => {
    const items = [...(e.clipboardData?.items || [])];
    const imgItem = items.find(x => x.type && x.type.startsWith("image/"));
    if (!imgItem) return;

    e.preventDefault();
    const file = imgItem.getAsFile();
    await uploadCashPhotoFile(file, inputEl, previewEl);
  });

  inputEl.addEventListener("change", () => {
    renderPhotoPreview(previewEl, inputEl.value);
  });

   if (previewEl) {
    previewEl.addEventListener("click", (e) => {
      e.stopPropagation();

      const url = String(inputEl.value || previewEl.dataset.photoUrl || "").trim();

      if (url) {
        window.open(url, "_blank", "noopener,noreferrer");
        return;
      }

      inputEl.focus();
    });
  }
}

function bindAllPhotoPasteInputs() {
  bindPasteImage($("newPhoto"), $("newPhotoPreview"));

  document.querySelectorAll(".rowPhoto").forEach(input => {
    const id = input.dataset.id;
    const preview = document.querySelector(`.rowPhotoPreview[data-id="${id}"]`);
    bindPasteImage(input, preview);
  });
}

    function bindReviewRowAutoPick() {
  document.querySelectorAll(".reviewDataRow").forEach(tr => {
    if (tr.dataset.rowPickBound === "1") return;
    tr.dataset.rowPickBound = "1";

    const ck = tr.querySelector(".rowPick");
    if (!ck) return;

    const sync = () => {
      tr.classList.toggle("is-picked", ck.checked);
    };

    ck.addEventListener("change", sync);

    tr.addEventListener("click", (e) => {
      const tag = String(e.target?.tagName || "").toLowerCase();

      if (tag === "input" || tag === "select" || tag === "button" || tag === "a") {
        if (!ck.checked) {
          ck.checked = true;
          sync();
        }
        return;
      }

      ck.checked = !ck.checked;
      sync();
    });

    sync();
  });
}
function fillNewCategorySelect() {
  const sel = $("newCategory");
  if (sel) {
    sel.innerHTML = `
      <option value="">請選擇</option>
      ${CATEGORY_OPTIONS.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("")}
    `;
  }

  const confirmedSel = $("confirmedCategory");
  if (confirmedSel) {
    confirmedSel.innerHTML = `
      <option value="">全部</option>
      ${CATEGORY_OPTIONS.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("")}
    `;
  }
}
async function fillConfirmedMonthSelect() {
  const sel = $("confirmedMonth");
  if (!sel) return;

  const oldValue = sel.value || "";

  try {
    const data = await apiGetWithQuery(API_LIST, {
      checked: "yes",
      max: 500
    });

    const list = Array.isArray(data.rows) ? data.rows : [];

    const months = [...new Set(
      list
        .map(r => String(r.month || r.date || "").slice(0, 7))
        .filter(v => /^\d{4}-\d{2}$/.test(v))
    )].sort().reverse();

    sel.innerHTML = `
      <option value="">全部月份</option>
      ${months.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join("")}
    `;

    if (oldValue && months.includes(oldValue)) {
      sel.value = oldValue;
    }
  } catch (err) {
    sel.innerHTML = `<option value="">全部月份</option>`;
  }
}
function setTodayForNewDate() {
  const el = $("newDate");
  if (!el || el.value) return;

  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  el.value = `${y}-${m}-${day}`;
}
async function renderUnconfirmedRows() {
  const tbody = $("unconfirmedRows");
  tbody.innerHTML = `<tr><td colspan="9" class="empty">載入中...</td></tr>`;

  try {
    const data = await apiGet(API_REVIEW);
    const list = Array.isArray(data.rows) ? data.rows : [];

    $("unconfirmedCountTag").textContent = `${list.length} 筆`;

    tbody.innerHTML = list.length ? list.map(r => `
      <tr class="reviewDataRow" data-id="${esc(r.id)}">
        <td>
          <input type="checkbox" class="rowPick" data-id="${esc(r.id)}" style="width:18px;height:18px;" />
        </td>

        <td>
          <input class="rowDetail" data-id="${esc(r.id)}" value="${esc(r.detail)}" />
        </td>

        <td class="thumb-cell">
          <div class="paste-preview rowPhotoPreview" data-id="${esc(r.id)}">
            ${r.photo ? `<img src="${esc(r.photo)}" alt="拍照/截圖" />` : `貼上圖片<br>Ctrl+V`}
          </div>

          <input class="rowPhoto photo-edit-input" data-id="${esc(r.id)}" value="${esc(r.photo)}" placeholder="圖片網址 / 可貼圖" />
        </td>

        <td>
          <input class="rowAmount" data-id="${esc(r.id)}" type="number" value="${Number(r.amount || 0)}" />
        </td>

        <td>
          <input class="rowDate" data-id="${esc(r.id)}" type="date" value="${esc(String(r.date || "").slice(0,10))}" />
        </td>

        <td>
          ${categorySelect(r.id, r.category || "")}
        </td>

        <td style="text-align:center;">
          <label style="display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:800;margin:0;">
            <input
              type="checkbox"
              class="rowManualBank"
              data-id="${esc(r.id)}"
              ${r.manualBank ? "checked" : ""}
              style="width:18px;height:18px;"
            />
            送對帳
          </label>
        </td>

        <td>
          <input
            class="rowInputInvoiceAmount"
            data-id="${esc(r.id)}"
            type="number"
            min="0"
            value="${Number(r.inputInvoiceAmount || 0) > 0 ? Number(r.inputInvoiceAmount || 0) : ""}"
            placeholder="有發票才填"
          />
        </td>

        <td>
          <input class="rowNote" data-id="${esc(r.id)}" value="${esc(r.note)}" />
        </td>
      </tr>
    `).join("") : `<tr><td colspan="9" class="empty">目前沒有未確認現金支出。</td></tr>`;

       bindAllPhotoPasteInputs();
    bindReviewRowAutoPick();
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty">❌ ${esc(err.message || err)}</td></tr>`;
    $("unconfirmedCountTag").textContent = `0 筆`;
  }
}

async function renderConfirmedRows() {
  const tbody = $("confirmedRows");
  tbody.innerHTML = `<tr><td colspan="6" class="empty">載入中...</td></tr>`;

  const month = $("confirmedMonth")?.value?.trim() || "";
  const category = $("confirmedCategory")?.value?.trim() || "";
  const keyword = $("confirmedKeyword")?.value?.trim() || "";

  try {
    const data = await apiGetWithQuery(API_LIST, {
      checked: "yes",
      month,
      category,
      keyword,
      max: 500
    });

    const list = Array.isArray(data.rows) ? data.rows : [];
    const total = list.reduce((sum, r) => sum + (Number(r.amount || 0) || 0), 0);

    $("confirmedCountTag").textContent = `${list.length} 筆`;
    $("confirmedTotal").textContent = money(total);

    tbody.innerHTML = list.length ? list.map(r => `
      <tr>
        <td>${esc(r.detail)}</td>
        <td class="thumb-cell">
          ${r.photo ? `
            <a href="${esc(r.photo)}" target="_blank" rel="noopener">
              <img src="${esc(r.photo)}" alt="拍照/截圖" />
            </a>
          ` : ""}
        </td>
        <td>${money(r.amount)}</td>
        <td>${esc(r.date)}</td>
        <td>${esc(r.category)}</td>
        <td>${esc(r.note)}</td>
      </tr>
    `).join("") : `<tr><td colspan="6" class="empty">目前沒有已確認現金支出。</td></tr>`;

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">❌ ${esc(err.message || err)}</td></tr>`;
    $("confirmedCountTag").textContent = `0 筆`;
    $("confirmedTotal").textContent = money(0);
  }
}

async function refreshAll() {
  await Promise.all([
    renderUnconfirmedRows(),
    renderConfirmedRows()
  ]);
}

$("btnBatchConfirm").addEventListener("click", async () => {
  const picked = [...document.querySelectorAll(".rowPick:checked")];

  if (!picked.length) {
    alert("請先勾選要確認的現金支出。");
    return;
  }

  const payloads = picked.map(ck => {
  const id = ck.dataset.id;

  return {
    id,
    detail: document.querySelector(`.rowDetail[data-id="${id}"]`)?.value || "",
    photo: document.querySelector(`.rowPhoto[data-id="${id}"]`)?.value || "",
    amount: document.querySelector(`.rowAmount[data-id="${id}"]`)?.value || "",
    category: document.querySelector(`.rowCategory[data-id="${id}"]`)?.value || "",
    manualBank: !!document.querySelector(`.rowManualBank[data-id="${id}"]`)?.checked,
    inputInvoiceAmount: document.querySelector(`.rowInputInvoiceAmount[data-id="${id}"]`)?.value || "",
    note: document.querySelector(`.rowNote[data-id="${id}"]`)?.value || "",
    checked: true
  };
});

  for (const p of payloads) {
  if (!p.category) {
    alert("有勾選的資料還沒選費用支出對象。");
    return;
  }

  const amount = Number(String(p.amount || "").replace(/,/g, "").trim()) || 0;
  const invoiceAmount = Number(String(p.inputInvoiceAmount || "").replace(/,/g, "").trim()) || 0;

  if (invoiceAmount < 0) {
    alert("發票金額不能小於 0。");
    return;
  }

  if (invoiceAmount > amount) {
    alert("發票金額不能大於交易金額。");
    return;
  }
}

  const btn = $("btnBatchConfirm");
  const oldText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "處理中...";

  try {
    await Promise.all(payloads.map(p => apiPost(API_UPDATE, p)));
    await refreshAll();
  } catch (err) {
    alert(`儲存失敗：${err.message || err}`);
  } finally {
    btn.disabled = false;
    btn.textContent = oldText;
  }
});
$("btnCreateCashExpense").addEventListener("click", async () => {
const payload = {
  detail: $("newDetail")?.value || "",
  photo: $("newPhoto")?.value || "",
  amount: $("newAmount")?.value || "",
  category: $("newCategory")?.value || "",
  note: $("newNote")?.value || ""
};

  if (!String(payload.detail).trim()) {
    alert("請輸入交易明細備註。");
    return;
  }

  if (!String(payload.amount).trim()) {
    alert("請輸入交易金額。");
    return;
  }

  if (!String(payload.category).trim()) {
    alert("請選擇費用支出對象。");
    return;
  }

  const btn = $("btnCreateCashExpense");
  const msg = $("createMsg");
  const oldText = btn.textContent;

  btn.disabled = true;
  btn.textContent = "新增中...";
  msg.textContent = "";
  msg.className = "msg";

  try {
    await apiPost(API_CREATE, payload);

    $("newDetail").value = "";
    $("newPhoto").value = "";
    renderPhotoPreview("newPhotoPreview", "");
    $("newAmount").value = "";
    $("newNote").value = "";
    $("newCategory").value = "";
    setTodayForNewDate();

    msg.textContent = "✅ 已新增到未確認現金支出。";
    msg.className = "msg ok";

    await refreshAll();
  } catch (err) {
    msg.textContent = `❌ 新增失敗：${err.message || err}`;
    msg.className = "msg err";
  } finally {
    btn.disabled = false;
    btn.textContent = oldText;
  }
});
$("btnConfirmedFilter").addEventListener("click", async () => {
  await renderConfirmedRows();
});

$("btnConfirmedReset").addEventListener("click", async () => {
  $("confirmedMonth").value = "";
  $("confirmedCategory").value = "";
  $("confirmedKeyword").value = "";
  await renderConfirmedRows();
});

async function initCashExpensePage() {
  await loadCategoryOptions();

  fillNewCategorySelect();
  setTodayForNewDate();
  bindAllPhotoPasteInputs();

  await fillConfirmedMonthSelect();
  await refreshAll();
}

initCashExpensePage();
</script>
