<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#c81e1e;
      --ok:#0f766e;
      --warn:#b45309;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
      --brown:#7a5a3a;
      --red:#b91c1c;
      --gold:#b45309;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.sub-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.sub-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
    }
    .page-tab{
      color:#fff;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,.sub-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .sub-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .wrap{
      max-width:1380px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .page-head-left{ flex:1; min-width:0; }
    .page-head-right{ width:420px; max-width:100%; flex:0 0 auto; }
    h1{ margin:0 0 8px; font-size:32px; }
    h2{ margin:0 0 14px; font-size:20px; }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .soft-box{
      background:var(--soft);
      border:1px solid var(--soft-border);
      border-radius:16px;
      padding:16px;
    }
    .soft-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }
    .soft-text{
      color:#31538f;
      line-height:1.7;
      font-size:14px;
      white-space:pre-wrap;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .stats-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }
    .full{ grid-column:1 / -1; }

    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.brown{ background:var(--brown); }
    .btn.red{ background:var(--red); }
    .btn.gold{ background:var(--gold); }
    .btn.small{
      min-width:auto;
      padding:9px 12px;
      border-radius:10px;
      font-size:13px;
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .summary-card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
      box-shadow:0 8px 20px rgba(15,23,42,.04);
    }
    .summary-card h3{
      margin:0 0 10px;
      font-size:16px;
    }
    .mini-list{
      display:grid;
      gap:8px;
      font-size:14px;
    }
    .mini-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
    }
    .mini-row strong{
      color:var(--text);
      font-weight:800;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid #cfe3ff;
      background:#eef6ff;
      color:#0f3f8c;
    }
    .tag.warn{
      border-color:#f5d7a1;
      background:#fff7e6;
      color:#b45309;
    }
    .tag.danger{
      border-color:#f0b2b2;
      background:#fff1f1;
      color:#b91c1c;
    }
    .tag.ok{
      border-color:#b7e4d7;
      background:#effcf6;
      color:#0f766e;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    table{
      width:100%;
      min-width:1180px;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:middle;
    }
    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }
    .review-row-selected td{
  background:#eef6ff;
}
.reviewPick{
  accent-color:#1e90ff;
}
.thumb-cell img{
  width:54px;
  height:54px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid var(--line);
  display:block;
}

    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
      margin-top:10px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .empty{
      color:var(--muted);
      font-size:14px;
      padding:14px 0;
    }
    .split-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    @media (max-width: 1180px){
      .summary-grid,.stats-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
      .grid{ grid-template-columns:1fr; }
      .page-head{ flex-direction:column; }
      .page-head-right{ width:100%; }
    }
    @media (max-width: 720px){
      .summary-grid,.stats-grid{ grid-template-columns:1fr; }
    }
    .hidden-section{
  display:none !important;
}

<script>
  const STORAGE_OK = "company_entry_ok";
  if (sessionStorage.getItem(STORAGE_OK) !== "1") {
    location.href = "/company-files/company-index.html";
  }

  const API_SUMMARY = "https://api.murain.tw/op/company/cash-expense/summary";
  const API_REVIEW = "https://api.murain.tw/op/company/cash-expense/review-list";
  const API_SIGN = "https://api.murain.tw/op/company/cash-expense/sign-list";
  const API_UPDATE = "https://api.murain.tw/op/company/cash-expense/update";
  const API_LIST = "https://api.murain.tw/op/company/cash-expense/list";

  const CATEGORY_OPTIONS = [
  "公司 🟥 - 妹妹",
  "公司 🟫 - LUMI",
  "公司🟫 - 貨款",
  "借支 💰 - 妹妹",
  "借支 💰 - LUMI",
  "✨ 不用入 對帳用",
  "✨ 不用入台中貨款",
  "公司 - 妹妹 - 運費"
];


  const $ = (id) => document.getElementById(id);

  function money(n) {
    const v = Number(n || 0) || 0;
    return `NT$ ${v.toLocaleString("zh-TW")}`;
  }

  function monthText(dateStr) {
    const s = String(dateStr || "").trim().replace(/月/g, "");
    const m = s.match(/^(\d{4})-(\d{2})/);
    return m ? `${m[1]}-${m[2]}` : s;
  }

  async function apiGet(url) {
    const r = await fetch(url);
    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "API 失敗");
    }
    return data;
  }

  async function apiPost(url, payload) {
    const r = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "API 失敗");
    }
    return data;
  }

  async function apiGetWithQuery(url, params = {}) {
    const u = new URL(url, location.origin);
    Object.entries(params).forEach(([k, v]) => {
      if (v !== undefined && v !== null && String(v).trim() !== "") {
        u.searchParams.set(k, String(v));
      }
    });

    const r = await fetch(u.toString());
    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "API 失敗");
    }
    return data;
  }

  function renderSummary(summary) {
    const s = summary || {};
    $("summaryGrid").innerHTML = `
      <div class="summary-card">
        <h3>待核對</h3>
        <div class="mini-list">
          <div class="mini-row"><span>筆數</span><strong>${Number(s.reviewCount || 0)}</strong></div>
        </div>
      </div>
      <div class="summary-card">
        <h3>待簽收</h3>
        <div class="mini-list">
          <div class="mini-row"><span>筆數</span><strong>${Number(s.signCount || 0)}</strong></div>
        </div>
      </div>
      <div class="summary-card">
        <h3>本月已完成</h3>
        <div class="mini-list">
          <div class="mini-row"><span>總額</span><strong>${money(s.thisMonthDoneTotal || 0)}</strong></div>
        </div>
      </div>
      <div class="summary-card">
        <h3>全部已完成</h3>
        <div class="mini-list">
          <div class="mini-row"><span>總額</span><strong>${money(s.doneTotal || 0)}</strong></div>
        </div>
      </div>
    `;
  }

  async function renderSummaryFromApi() {
  const data = await apiGet(API_SUMMARY);
  renderSummary(data.summary || {});
}

async function renderReviewRowsFromApi() {
  const tbody = $("reviewRows");
  tbody.innerHTML = `<tr><td colspan="7" class="empty">載入中...</td></tr>`;

  try {
    const data = await apiGet(API_REVIEW);
    const list = Array.isArray(data.rows) ? data.rows : [];

    $("reviewCountTag").textContent = `${list.length} 筆`;

    tbody.innerHTML = list.length ? list.map(r => {
      return `
        <tr class="reviewDataRow" data-row-id="${r.id}" style="cursor:pointer;">
          <td>
            <input type="checkbox" class="reviewPick" data-id="${r.id}" style="width:18px;height:18px;" />
          </td>
          <td>${r.detail || ""}</td>
          <td class="thumb-cell">
            ${r.photo ? `
              <a href="${r.photo}" target="_blank" rel="noopener">
                <img src="${r.photo}" alt="拍照/截圖" />
              </a>
            ` : ""}
          </td>
          <td>${money(r.amount)}</td>
          <td>${r.date || ""}</td>
          <td>${r.category || `<span class="tag warn">未分類</span>`}</td>
          <td>
            <select class="reviewCategory" data-id="${r.id}">
              <option value="">請選擇分類</option>
              ${CATEGORY_OPTIONS.map(c => `<option value="${c}" ${r.category===c?"selected":""}>${c}</option>`).join("")}
            </select>
          </td>
        </tr>
      `;
    }).join("") : `<tr><td colspan="7" class="empty">目前沒有待核對資料。</td></tr>`;

    document.querySelectorAll(".reviewPick").forEach(ck => {
      ck.addEventListener("change", () => {
        const tr = ck.closest("tr");
        if (tr) tr.classList.toggle("review-row-selected", ck.checked);
      });
    });

    document.querySelectorAll(".reviewDataRow").forEach(tr => {
      tr.addEventListener("click", (e) => {
        if (
          e.target.closest("a") ||
          e.target.closest("input") ||
          e.target.closest("select") ||
          e.target.closest("button")
        ) return;

        const ck = tr.querySelector(".reviewPick");
        if (!ck) return;

        ck.checked = !ck.checked;
        tr.classList.toggle("review-row-selected", ck.checked);
      });
    });

    const batchBtn = $("btnBatchSaveCheck");
    if (batchBtn) {
      batchBtn.onclick = async () => {
        const picked = [...document.querySelectorAll(".reviewPick:checked")];

        if (!picked.length) {
          alert("請先點選要處理的列。");
          return;
        }

        const payloads = [];
        for (const ck of picked) {
          const id = ck.dataset.id;
          const sel = document.querySelector(`.reviewCategory[data-id="${id}"]`);
          const category = String(sel?.value || "").trim();

          if (!category) {
            alert("勾選列中有未選分類的資料，請先選好分類。");
            return;
          }

          payloads.push({ id, category, checked: true });
        }

        batchBtn.disabled = true;
        const oldText = batchBtn.textContent;
        batchBtn.textContent = "處理中...";

        try {
          await Promise.all(payloads.map(p => apiPost(API_UPDATE, p)));
          await refreshAll();
        } catch (err) {
          alert(`批次更新失敗：${err.message || err}`);
        } finally {
          batchBtn.disabled = false;
          batchBtn.textContent = oldText;
        }
      };
    }
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">❌ ${err.message || err}</td></tr>`;
    $("reviewCountTag").textContent = `0 筆`;
  }
}

async function renderSignRowsFromApi() {
  const tbody = $("signRows");
  tbody.innerHTML = `<tr><td colspan="6" class="empty">載入中...</td></tr>`;

  try {
    const data = await apiGet(API_SIGN);
    const list = Array.isArray(data.rows) ? data.rows : [];

    $("signCountTag").textContent = `${list.length} 筆`;

    tbody.innerHTML = list.length ? list.map(r => `
      <tr class="signDataRow" data-row-id="${r.id}">
        <td>
          <input type="checkbox" class="signPick" data-id="${r.id}" style="width:18px;height:18px;" />
        </td>
        <td>${r.detail || ""}</td>
        <td class="thumb-cell">
          ${r.photo ? `
            <a href="${r.photo}" target="_blank" rel="noopener">
              <img src="${r.photo}" alt="拍照/截圖" />
            </a>
          ` : ""}
        </td>
        <td>${money(r.amount)}</td>
        <td>${r.date || ""}</td>
        <td>${r.category || ""}</td>
      </tr>
    `).join("") : `<tr><td colspan="6" class="empty">目前沒有待簽收資料。</td></tr>`;

    document.querySelectorAll(".signPick").forEach(ck => {
      ck.addEventListener("change", () => {
        const tr = ck.closest("tr");
        if (tr) tr.classList.toggle("review-row-selected", ck.checked);
      });
    });

    document.querySelectorAll(".signDataRow").forEach(tr => {
      tr.addEventListener("click", (e) => {
        if (e.target.closest("a") || e.target.closest("input")) return;
        const ck = tr.querySelector(".signPick");
        if (!ck) return;
        ck.checked = !ck.checked;
        tr.classList.toggle("review-row-selected", ck.checked);
      });
    });

    const batchBtn = $("btnBatchSigned");
    if (batchBtn) {
      batchBtn.onclick = async () => {
        const picked = [...document.querySelectorAll(".signPick:checked")];

        if (!picked.length) {
          alert("請先勾選要簽收的列。");
          return;
        }

        const payloads = picked.map(ck => ({
          id: ck.dataset.id,
          signed: true
        }));

        batchBtn.disabled = true;
        const oldText = batchBtn.textContent;
        batchBtn.textContent = "處理中...";

        try {
          await Promise.all(payloads.map(p => apiPost(API_UPDATE, p)));
          await refreshAll();
        } catch (err) {
          alert(`批次更新失敗：${err.message || err}`);
        } finally {
          batchBtn.disabled = false;
          batchBtn.textContent = oldText;
        }
      };
    }
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">❌ ${err.message || err}</td></tr>`;
    $("signCountTag").textContent = `0 筆`;
  }
}

  async function renderHistoryRowsFromApi() {
    const month = $("filterMonth").value.trim();
    const category = $("filterCategory").value.trim();
    const checked = $("filterChecked").value.trim();
    const signed = $("filterSigned").value.trim();
    const keyword = $("filterKeyword").value.trim();

    $("historyRows").innerHTML = `<tr><td colspan="8" class="empty">載入中...</td></tr>`;

    try {
      const data = await apiGetWithQuery(API_LIST, {
        month,
        category,
        checked,
        signed,
        keyword,
        max: 200
      });

      const list = Array.isArray(data.rows) ? data.rows : [];

      $("historyRows").innerHTML = list.length ? list.map(r => `
        <tr>
          <td>${r.detail || ""}</td>
          <td>${money(r.amount)}</td>
          <td>${r.date || ""}</td>
          <td>${r.category || ""}</td>
          <td>${r.checked ? "已核對" : "未核對"}</td>
          <td>${r.signed ? "已簽收" : "未簽收"}</td>
          <td>${r.month || ""}</td>
          <td>${r.note || ""}</td>
        </tr>
      `).join("") : `<tr><td colspan="8" class="empty">目前沒有資料。</td></tr>`;

      $("historyMsg").textContent = `✅ 查到 ${list.length} 筆`;
      $("historyMsg").className = "msg ok";
    } catch (err) {
      $("historyRows").innerHTML = `<tr><td colspan="8" class="empty">❌ ${err.message || err}</td></tr>`;
      $("historyMsg").textContent = `❌ ${err.message || err}`;
      $("historyMsg").className = "msg err";
    }
  }

async function refreshAll() {
  await Promise.all([
    renderSummaryFromApi(),
    renderReviewRowsFromApi()
  ]);

  $("historyRows").innerHTML = `<tr><td colspan="8" class="empty">請先設定條件後按查詢。</td></tr>`;
  $("historyMsg").textContent = "";
  $("historyMsg").className = "msg";
}

  $("btnFilter").addEventListener("click", async () => {
    await renderHistoryRowsFromApi();
  });

 $("btnResetFilter").addEventListener("click", () => {
  $("filterMonth").value = "";
  $("filterCategory").value = "";
  $("filterChecked").value = "";
  $("filterSigned").value = "";
  $("filterKeyword").value = "";
  $("historyRows").innerHTML = `<tr><td colspan="8" class="empty">請先設定條件後按查詢。</td></tr>`;
  $("historyMsg").textContent = "已清除查詢條件。";
  $("historyMsg").className = "msg ok";
});

  refreshAll();
</script>
</body>
