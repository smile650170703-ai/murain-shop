<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>公司檔案管理｜現金支出</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#c81e1e;
      --ok:#0f766e;
      --warn:#b45309;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
      --brown:#7a5a3a;
      --red:#b91c1c;
      --gold:#b45309;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.sub-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.sub-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
    }
    .page-tab{
      color:#fff;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,.sub-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .sub-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .wrap{
      max-width:1380px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .page-head-left{ flex:1; min-width:0; }
    .page-head-right{ width:420px; max-width:100%; flex:0 0 auto; }
    h1{ margin:0 0 8px; font-size:32px; }
    h2{ margin:0 0 14px; font-size:20px; }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .soft-box{
      background:var(--soft);
      border:1px solid var(--soft-border);
      border-radius:16px;
      padding:16px;
    }
    .soft-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }
    .soft-text{
      color:#31538f;
      line-height:1.7;
      font-size:14px;
      white-space:pre-wrap;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .stats-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }
    .full{ grid-column:1 / -1; }

    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.brown{ background:var(--brown); }
    .btn.red{ background:var(--red); }
    .btn.gold{ background:var(--gold); }
    .btn.small{
      min-width:auto;
      padding:9px 12px;
      border-radius:10px;
      font-size:13px;
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .summary-card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
      box-shadow:0 8px 20px rgba(15,23,42,.04);
    }
    .summary-card h3{
      margin:0 0 10px;
      font-size:16px;
    }
    .mini-list{
      display:grid;
      gap:8px;
      font-size:14px;
    }
    .mini-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
    }
    .mini-row strong{
      color:var(--text);
      font-weight:800;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid #cfe3ff;
      background:#eef6ff;
      color:#0f3f8c;
    }
    .tag.warn{
      border-color:#f5d7a1;
      background:#fff7e6;
      color:#b45309;
    }
    .tag.danger{
      border-color:#f0b2b2;
      background:#fff1f1;
      color:#b91c1c;
    }
    .tag.ok{
      border-color:#b7e4d7;
      background:#effcf6;
      color:#0f766e;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    table{
      width:100%;
      min-width:1180px;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:middle;
    }
    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }
    .review-row-selected td{
  background:#eef6ff;
}
.reviewPick{
  accent-color:#1e90ff;
}
.thumb-cell img{
  width:54px;
  height:54px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid var(--line);
  display:block;
}

    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
      margin-top:10px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .empty{
      color:var(--muted);
      font-size:14px;
      padding:14px 0;
    }
    .split-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    @media (max-width: 1180px){
      .summary-grid,.stats-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
      .grid{ grid-template-columns:1fr; }
      .page-head{ flex-direction:column; }
      .page-head-right{ width:100%; }
    }
    @media (max-width: 720px){
      .summary-grid,.stats-grid{ grid-template-columns:1fr; }
    }
    .hidden-section{
  display:none !important;
}
  </style>
</head>

      <a class="page-tab" href="/procurement-center/procurement-index.html" target="_blank" rel="noopener noreferrer">進貨</a>

      <a class="page-tab" href="/admin-line-message" target="_blank" rel="noopener noreferrer">LINE 客服推播</a>

<div class="sub-tabs-bar">
  <a class="sub-tab" href="/company-files/company-profit-summary.html">公司進利總結</a>
  <a class="sub-tab is-active" href="/company-files/company-cash-expense.html">現金支出</a>

  <div class="wrap">
   <div class="page-head">
  <div class="page-head-left">
    <h1>現金支出</h1>
  </div>
</div>

<div class="card">
  <div class="split-head">
    <h2 style="margin:0;">1. 未確認現金支出</h2>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <span class="tag warn" id="unconfirmedCountTag">0 筆</span>
      <button class="btn brown small" type="button" id="btnBatchConfirm">儲存＋確認完成</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:56px;">勾選</th>
          <th style="min-width:260px;">交易明細備註</th>
          <th style="width:160px;">拍照/截圖</th>
          <th style="width:140px;">交易金額</th>
          <th style="width:150px;">交易日期</th>
          <th style="min-width:200px;">費用支出對象</th>
          <th style="min-width:220px;">備註</th>
        </tr>
      </thead>
      <tbody id="unconfirmedRows"></tbody>
    </table>
  </div>
</div>

<div class="card">
  <div class="split-head">
    <h2 style="margin:0;">2. 已確認現金支出</h2>
    <span class="tag ok" id="confirmedCountTag">0 筆</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>交易明細備註</th>
          <th>拍照/截圖</th>
          <th>交易金額</th>
          <th>交易日期</th>
          <th>費用支出對象</th>
          <th>備註</th>
        </tr>
      </thead>
      <tbody id="confirmedRows"></tbody>
    </table>
  </div>
</div>
  </div>

<script>
  const STORAGE_OK = "company_entry_ok";
  if (sessionStorage.getItem(STORAGE_OK) !== "1") {
    location.href = "/company-files/company-index.html";
  }

const API_REVIEW = "https://api.murain.tw/op/company/cash-expense/review-list";
const API_UPDATE = "https://api.murain.tw/op/company/cash-expense/update";
const API_LIST = "https://api.murain.tw/op/company/cash-expense/list";

const CATEGORY_OPTIONS = [
  "公司 🟥 - 妹妹",
  "公司 🟫 - LUMI",
  "公司🟫 - 貨款",
  "借支 💰 - 妹妹",
  "借支 💰 - LUMI",
  "✨ 不用入 對帳用",
  "✨ 不用入台中貨款",
  "公司 - 妹妹 - 運費"
];

const $ = (id) => document.getElementById(id);

function esc(v) {
  return String(v ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;");
}

function money(n) {
  const v = Number(n || 0) || 0;
  return `NT$ ${v.toLocaleString("zh-TW")}`;
}

async function apiGet(url) {
  const r = await fetch(url);
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}

async function apiGetWithQuery(url, params = {}) {
  const u = new URL(url, location.origin);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null && String(v).trim() !== "") {
      u.searchParams.set(k, String(v));
    }
  });

  const r = await fetch(u.toString());
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}

async function apiPost(url, payload) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}

function categorySelect(id, value) {
  return `
    <select class="rowCategory" data-id="${esc(id)}">
      <option value="">請選擇</option>
      ${CATEGORY_OPTIONS.map(c => `
        <option value="${esc(c)}" ${c === value ? "selected" : ""}>${esc(c)}</option>
      `).join("")}
    </select>
  `;
}

async function renderUnconfirmedRows() {
  const tbody = $("unconfirmedRows");
  tbody.innerHTML = `<tr><td colspan="7" class="empty">載入中...</td></tr>`;

  try {
    const data = await apiGet(API_REVIEW);
    const list = Array.isArray(data.rows) ? data.rows : [];

    $("unconfirmedCountTag").textContent = `${list.length} 筆`;

    tbody.innerHTML = list.length ? list.map(r => `
      <tr class="reviewDataRow" data-id="${esc(r.id)}">
        <td>
          <input type="checkbox" class="rowPick" data-id="${esc(r.id)}" style="width:18px;height:18px;" />
        </td>

        <td>
          <input class="rowDetail" data-id="${esc(r.id)}" value="${esc(r.detail)}" />
        </td>

        <td>
          <input class="rowPhoto" data-id="${esc(r.id)}" value="${esc(r.photo)}" placeholder="圖片網址" />
          ${r.photo ? `<a href="${esc(r.photo)}" target="_blank" rel="noopener" style="display:block;margin-top:6px;">查看圖片</a>` : ""}
        </td>

        <td>
          <input class="rowAmount" data-id="${esc(r.id)}" type="number" value="${Number(r.amount || 0)}" />
        </td>

        <td>
          <input class="rowDate" data-id="${esc(r.id)}" type="date" value="${esc(String(r.date || "").slice(0,10))}" />
        </td>

        <td>
          ${categorySelect(r.id, r.category || "")}
        </td>

        <td>
          <input class="rowNote" data-id="${esc(r.id)}" value="${esc(r.note)}" />
        </td>
      </tr>
    `).join("") : `<tr><td colspan="7" class="empty">目前沒有未確認現金支出。</td></tr>`;

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">❌ ${esc(err.message || err)}</td></tr>`;
    $("unconfirmedCountTag").textContent = `0 筆`;
  }
}

async function renderConfirmedRows() {
  const tbody = $("confirmedRows");
  tbody.innerHTML = `<tr><td colspan="6" class="empty">載入中...</td></tr>`;

  try {
    const data = await apiGetWithQuery(API_LIST, {
      checked: "yes",
      max: 300
    });

    const list = Array.isArray(data.rows) ? data.rows : [];

    $("confirmedCountTag").textContent = `${list.length} 筆`;

    tbody.innerHTML = list.length ? list.map(r => `
      <tr>
        <td>${esc(r.detail)}</td>
        <td>
          ${r.photo ? `<a href="${esc(r.photo)}" target="_blank" rel="noopener">查看圖片</a>` : ""}
        </td>
        <td>${money(r.amount)}</td>
        <td>${esc(r.date)}</td>
        <td>${esc(r.category)}</td>
        <td>${esc(r.note)}</td>
      </tr>
    `).join("") : `<tr><td colspan="6" class="empty">目前沒有已確認現金支出。</td></tr>`;

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">❌ ${esc(err.message || err)}</td></tr>`;
    $("confirmedCountTag").textContent = `0 筆`;
  }
}

async function refreshAll() {
  await Promise.all([
    renderUnconfirmedRows(),
    renderConfirmedRows()
  ]);
}

$("btnBatchConfirm").addEventListener("click", async () => {
  const picked = [...document.querySelectorAll(".rowPick:checked")];

  if (!picked.length) {
    alert("請先勾選要確認的現金支出。");
    return;
  }

  const payloads = picked.map(ck => {
    const id = ck.dataset.id;

    return {
      id,
      detail: document.querySelector(`.rowDetail[data-id="${id}"]`)?.value || "",
      photo: document.querySelector(`.rowPhoto[data-id="${id}"]`)?.value || "",
      amount: document.querySelector(`.rowAmount[data-id="${id}"]`)?.value || "",
      date: document.querySelector(`.rowDate[data-id="${id}"]`)?.value || "",
      category: document.querySelector(`.rowCategory[data-id="${id}"]`)?.value || "",
      note: document.querySelector(`.rowNote[data-id="${id}"]`)?.value || "",
      checked: true
    };
  });

  for (const p of payloads) {
    if (!p.category) {
      alert("有勾選的資料還沒選費用支出對象。");
      return;
    }
  }

  const btn = $("btnBatchConfirm");
  const oldText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "處理中...";

  try {
    await Promise.all(payloads.map(p => apiPost(API_UPDATE, p)));
    await refreshAll();
  } catch (err) {
    alert(`儲存失敗：${err.message || err}`);
  } finally {
    btn.disabled = false;
    btn.textContent = oldText;
  }
});

refreshAll();
</script>
