<!doctype html>
<html lang="zh-Hant">
<head>

  <title>公司檔案管理｜現金支出</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#c81e1e;
      --ok:#0f766e;
      --warn:#b45309;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
      --brown:#7a5a3a;
      --red:#b91c1c;
      --gold:#b45309;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.sub-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.sub-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
    }
    .page-tab{
      color:#fff;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,.sub-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .sub-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .wrap{
      max-width:1380px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .page-head-left{ flex:1; min-width:0; }
    .page-head-right{ width:420px; max-width:100%; flex:0 0 auto; }
    h1{ margin:0 0 8px; font-size:32px; }
    h2{ margin:0 0 14px; font-size:20px; }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .soft-box{
      background:var(--soft);
      border:1px solid var(--soft-border);
      border-radius:16px;
      padding:16px;
    }
    .soft-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }
    .soft-text{
      color:#31538f;
      line-height:1.7;
      font-size:14px;
      white-space:pre-wrap;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .stats-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }
    .full{ grid-column:1 / -1; }

    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.brown{ background:var(--brown); }
    .btn.hot{
  background:linear-gradient(90deg,#1e90ff,#22d3ee);
  color:#fff;
  box-shadow:0 6px 14px rgba(34,211,238,.28);
}

.btn.hot:hover{
  filter:brightness(1.05);
}
    .btn.red{ background:var(--red); }
    .btn.gold{ background:var(--gold); }
    .btn.small{
      min-width:auto;
      padding:9px 12px;
      border-radius:10px;
      font-size:13px;
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .summary-card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
      box-shadow:0 8px 20px rgba(15,23,42,.04);
    }
    .summary-card h3{
      margin:0 0 10px;
      font-size:16px;
    }
    .mini-list{
      display:grid;
      gap:8px;
      font-size:14px;
    }
    .mini-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
    }
    .mini-row strong{
      color:var(--text);
      font-weight:800;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid #cfe3ff;
      background:#eef6ff;
      color:#0f3f8c;
    }
    .tag.warn{
      border-color:#f5d7a1;
      background:#fff7e6;
      color:#b45309;
    }
    .tag.danger{
      border-color:#f0b2b2;
      background:#fff1f1;
      color:#b91c1c;
    }
    .tag.ok{
      border-color:#b7e4d7;
      background:#effcf6;
      color:#0f766e;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    table{
      width:100%;
      min-width:1180px;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:middle;
    }
    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }
    .review-row-selected td{
  background:#eef6ff;
}
.reviewPick{
  accent-color:#1e90ff;
}
.thumb-cell{
  width:96px;
  min-width:96px;
}

.thumb-cell a{
  display:inline-block;
}

.thumb-cell img{
  width:62px;
  height:62px;
  object-fit:cover;
  border-radius:10px;
  border:1px solid var(--line);
  display:block;
}

.photo-edit-input{
  margin-top:6px;
  padding:7px 8px;
  font-size:12px;
  border-radius:8px;
}
/* 圖片網址不要顯示在畫面上，但保留欄位給程式存值 */
.rowPhoto.photo-edit-input,
#newPhoto.photo-edit-input{
  display:none;
}

.rowPhotoPreview{
  cursor:pointer;
}

.reviewDataRow{
  cursor:pointer;
}

.reviewDataRow.is-picked td{
  background:#eef6ff;
}
    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
      margin-top:10px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .empty{
      color:var(--muted);
      font-size:14px;
      padding:14px 0;
    }
    .split-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    @media (max-width: 1180px){
      .summary-grid,.stats-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
      .grid{ grid-template-columns:1fr; }
      .page-head{ flex-direction:column; }
      .page-head-right{ width:100%; }
    }
    @media (max-width: 720px){
      .summary-grid,.stats-grid{ grid-template-columns:1fr; }
    }
    .hidden-section{
  display:none !important;
}
    /* ===== 現金支出頁：緊湊版面 ===== */
.wrap{
  max-width:1380px;
  padding:12px 18px;
}

h1{
  font-size:28px;
  margin-bottom:4px;
}

h2{
  font-size:18px;
}

.card{
  padding:16px;
  border-radius:16px;
  margin-bottom:14px;
}

.table-wrap{
  border-radius:12px;
}

table{
  min-width:980px;
  table-layout:fixed;
}

/* 未確認現金支出有 9 欄，要比較寬才不會擠壞 */
.cash-table-review{
  width:100%;
  min-width:1120px;
}

.cash-table-review th,
.cash-table-review td{
  overflow:hidden;
}

.cash-table-review input,
.cash-table-review select{
  min-width:0;
}

.cash-table-review .rowManualBank{
  width:18px !important;
  flex:0 0 18px;
}

.cash-table-review .rowPhotoPreview{
  width:112px;
}

th,td{
  padding:7px 8px;
  font-size:13px;
}

input, select, button{
  padding:8px 10px;
  border-radius:10px;
  font-size:13px;
}

.btn.small{
  padding:8px 11px;
  font-size:13px;
}

.thumb-cell{
  width:120px;
  min-width:120px;
}

.thumb-cell img{
  width:46px;
  height:46px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid var(--line);
  display:block;
}

.photo-edit-input{
  margin-top:5px;
  padding:6px 7px;
  font-size:12px;
  border-radius:8px;
}

.cash-filter-bar{
  display:grid;
  grid-template-columns:130px 200px minmax(140px,1fr) 58px 58px 150px;
  gap:8px;
  align-items:end;
  margin-bottom:10px;
}

.cash-filter-bar label{
  margin-bottom:4px;
}

.cash-total-box{
  background:#f8fafc;
  border:1px solid var(--line);
  border-radius:10px;
  padding:8px 9px;
  font-size:13px;
  font-weight:900;
  color:#0f172a;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.paste-preview{
  width:112px;
  min-height:88px;
  border:1px dashed #b8c4d8;
  border-radius:10px;
  background:#f8fafc;
  color:#64748b;
  font-size:12px;
  line-height:1.4;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:6px;
  cursor:pointer;
  overflow:visible;
}

.paste-preview.has-photo{
  border:none;
  background:transparent;
  padding:0;
  min-height:auto;
}

.photo-placeholder{
  width:100%;
  min-height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.photo-actions{
  margin-top:5px;
  display:flex;
  flex-direction:column;
  gap:5px;
}

.photo-file-btn{
  width:112px;
  min-width:112px;
  padding:6px 6px;
  border-radius:8px;
  border:1px solid #67e8f9;
  background:#ecfeff;
  color:#0e7490;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}

.new-photo-cell{
  width:260px !important;
  min-width:260px !important;
}

.photo-slot-list{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:flex-start;
}

.photo-slot{
  width:112px;
  position:relative;
}

.photo-slot-preview{
  width:112px;
  min-height:88px;
}

.photo-slot-preview.has-photo{
  border:none;
  background:transparent;
  padding:0;
  min-height:auto;
}

.btn-add-photo-slot{
  width:112px;
  min-width:112px;
  margin-top:8px;
  padding:6px 6px;
  border-radius:8px;
  border:1px solid #c7d7ef;
  background:#eef6ff;
  color:#0f3f8c;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}

.photo-thumb-grid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(2, 42px);
  justify-content:center;
  gap:6px;
}

.photo-thumb-item{
  position:relative;
  width:42px;
  height:42px;
}

.photo-thumb-img{
  width:42px !important;
  height:42px !important;
  object-fit:cover;
  border-radius:8px;
  border:1px solid var(--line);
  display:block;
  cursor:zoom-in;
}

.photo-remove-btn{
  position:absolute;
  top:-7px;
  right:-7px;
  width:18px;
  height:18px;
  min-width:18px;
  padding:0;
  border-radius:999px;
  border:none;
  background:#ef4444;
  color:#fff;
  font-size:12px;
  font-weight:900;
  line-height:18px;
  cursor:pointer;
  z-index:2;
}
.photo-slot-remove{
  position:absolute;
  top:-7px;
  right:-7px;
  width:18px;
  height:18px;
  min-width:18px;
  padding:0;
  border-radius:999px;
  border:none;
  background:#ef4444;
  color:#fff;
  font-size:12px;
  font-weight:900;
  line-height:18px;
  cursor:pointer;
  z-index:5;
}

/* 第二區塊：圖片操作縮小，避免左右滑 */
.row-photo-cell{
  width:150px !important;
  min-width:150px !important;
}

.row-photo-cell .photo-slot-list{
  gap:4px;
}

.row-photo-cell .photo-slot{
  width:64px;
}

.row-photo-cell .paste-preview,
.row-photo-cell .photo-slot-preview{
  width:64px;
  min-height:54px;
  font-size:10px;
  padding:4px;
}

.row-photo-cell .photo-actions{
  margin-top:3px;
}

.row-photo-cell .photo-file-btn{
  width:64px;
  min-width:64px;
  padding:4px 3px;
  font-size:10px;
  border-radius:7px;
}

.row-photo-cell .btn-add-photo-slot{
  width:64px;
  min-width:64px;
  margin-top:4px;
  padding:4px 3px;
  font-size:10px;
  border-radius:7px;
}

.row-photo-cell .photo-thumb-grid{
  grid-template-columns:repeat(1, 42px);
}

.btn.save{
  background:#0f766e;
  color:#fff;
}
.photo-count{
  margin-top:3px;
  font-size:11px;
  font-weight:900;
  color:#0f766e;
}

/* 同頁面圖片放大，不開新視窗 */
.photo-lightbox{
  position:fixed;
  inset:0;
  z-index:99999;
  background:rgba(15,23,42,.72);
  display:none;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.photo-lightbox.is-open{
  display:flex;
}

.photo-lightbox-inner{
  position:relative;
  max-width:94vw;
  max-height:92vh;
}

.photo-lightbox-img{
  max-width:94vw;
  max-height:88vh;
  object-fit:contain;
  border-radius:14px;
  background:#fff;
  box-shadow:0 18px 60px rgba(0,0,0,.35);
}

.photo-lightbox-close{
  position:absolute;
  top:-14px;
  right:-14px;
  width:32px;
  height:32px;
  min-width:32px;
  padding:0;
  border-radius:999px;
  border:none;
  background:#ef4444;
  color:#fff;
  font-size:20px;
  font-weight:900;
  line-height:32px;
  cursor:pointer;
}
/* ===== 區塊標題：跟欄位標題分開辨識 ===== */
.section-title{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:18px;
  font-weight:900;
}

.section-title .no{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:26px;
  height:26px;
  padding:0 8px;
  border-radius:999px;
  color:#fff;
  font-size:14px;
  font-weight:900;
}

.section-title.create,
.section-title.pending,
.section-title.done{
  color:#0f766e;
}

.section-title.create .no,
.section-title.pending .no,
.section-title.done .no{
  background:#10b981;
}

th{
  background:#eef4ff;
  color:#0f172a;
  font-weight:900;
  font-size:12px;
  border-bottom:1px solid #c7d7ef;
}
@media (max-width: 900px){
  .cash-filter-bar{
    grid-template-columns:1fr;
  }
}

function isValidPhotoUrl(url) {
  const s = String(url || "").trim();
  if (!s) return false;

  let u = null;
  try {
    u = new URL(s);
  } catch (_) {
    return false;
  }

  if (u.protocol !== "http:" && u.protocol !== "https:") return false;

  const path = u.pathname || "";
  if (path.includes("..")) return false;
  if (path.includes("//")) return false;

  // Cloudflare Images 正確格式：
  // /帳號hash/圖片ID/版本
  if (u.hostname === "imagedelivery.net") {
    const parts = path.split("/").filter(Boolean);
    if (parts.length < 3) return false;
  }

  return true;
}

function photoUrlsFromValue(value) {
  let raw = [];

  if (Array.isArray(value)) {
    raw = value.map(x => {
      if (x == null) return "";
      if (typeof x === "object") return String(x.url || "").trim();
      return String(x).trim();
    });
  } else {
    const s = String(value || "").trim();

    if (!s || s === "[]" || s === "{}") return [];

    // 支援 dataset 裡面的 JSON 字串，例如 ["url1","url2"]
    if ((s.startsWith("[") && s.endsWith("]")) || (s.startsWith("{") && s.endsWith("}"))) {
      try {
        const parsed = JSON.parse(s);
        return photoUrlsFromValue(parsed);
      } catch (_) {}
    }

    raw = s.split(/[\n,]+/g);
  }

  return [...new Set(
    raw
      .map(s => String(s || "").trim())
      .filter(isValidPhotoUrl)
  )];
}

function photoValueFromUrls(value) {
  return photoUrlsFromValue(value).join("\n");
}

async function uploadCashPhotoFile(file, inputEl, previewEl, opts = {}) {
  if (!file || !file.type || !file.type.startsWith("image/")) {
    alert("請選擇圖片檔。");
    return "";
  }

  const oldPreview = previewEl?.innerHTML || "";
  const oldValue = inputEl?.value || "";

  if (previewEl) previewEl.textContent = "上傳中...";

  try {
    const info = await apiPost(API_PHOTO_UPLOAD, {
      filename: file.name || `cash-expense-${Date.now()}.png`,
      contentType: file.type || "image/png"
    });

    const fd = new FormData();
    fd.append("file", file, file.name || "cash-expense.png");

    const up = await fetch(info.uploadURL, {
      method: "POST",
      body: fd
    });

    const upData = await up.json().catch(() => ({}));

    if (!up.ok || !upData.success) {
      throw new Error(`圖片上傳失敗：${JSON.stringify(upData).slice(0, 300)}`);
    }

    const url = info.delivery_url || info.url || "";
    if (!isValidPhotoUrl(url)) {
      throw new Error("圖片已上傳，但後端回傳的圖片網址格式不正確。");
    }

    if (typeof opts.onUploaded === "function") {
      opts.onUploaded(url);
      return url;
    }

    const urls = photoUrlsFromValue(inputEl.value);
    if (!urls.includes(url)) urls.push(url);

    inputEl.value = photoValueFromUrls(urls);
    renderPhotoPreview(previewEl, inputEl.value);
    markPhotoRowPicked(inputEl, previewEl);

    return url;
  } catch (err) {
    inputEl.value = oldValue;
    if (previewEl) previewEl.innerHTML = oldPreview;
    alert(err.message || err);
    return "";
  }
}

async function uploadCashPhotoFiles(files, inputEl, previewEl, opts = {}) {
  const list = [...(files || [])].filter(f => f && f.type && f.type.startsWith("image/"));
  if (!list.length) return;

  for (const file of list) {
    await uploadCashPhotoFile(file, inputEl, previewEl, opts);
  }
}

function bindPasteImage(inputEl, previewEl, fileInputEl, addBtnEl) {
  if (!inputEl || inputEl.dataset.pasteBound === "1") return;
  inputEl.dataset.pasteBound = "1";

  const handlePaste = async (e) => {
    const items = [...(e.clipboardData?.items || [])];
    const imgItems = items.filter(x => x.type && x.type.startsWith("image/"));
    if (!imgItems.length) return;

    e.preventDefault();

    for (const imgItem of imgItems) {
      const file = imgItem.getAsFile();
      if (file) await uploadCashPhotoFile(file, inputEl, previewEl);
    }
  };

  inputEl.addEventListener("paste", handlePaste);

  inputEl.addEventListener("change", () => {
    inputEl.value = photoValueFromUrls(inputEl.value);
    renderPhotoPreview(previewEl, inputEl.value);
  });

  if (previewEl) {
    renderPhotoPreview(previewEl, inputEl.value);

    previewEl.tabIndex = 0;
    previewEl.addEventListener("paste", handlePaste);

    previewEl.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();

      const removeBtn = e.target?.closest?.(".photo-remove-btn");

      if (removeBtn) {
        const idx = Number(removeBtn.dataset.photoIdx);
        const urls = photoUrlsFromValue(inputEl.value);

        if (Number.isFinite(idx) && idx >= 0) {
          urls.splice(idx, 1);
          inputEl.value = photoValueFromUrls(urls);
          renderPhotoPreview(previewEl, inputEl.value);
          markPhotoRowPicked(inputEl, previewEl);
        }

        return;
      }

      const img = e.target?.closest?.(".photo-thumb-img");

      if (img) {
        const url = String(img.dataset.photoUrl || img.src || "").trim();
        openPhotoLightbox(url);
        return;
      }

      previewEl.focus();
    });
  }

  if (addBtnEl && fileInputEl) {
    addBtnEl.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      fileInputEl.click();
    });
  }

  if (fileInputEl) {
    fileInputEl.addEventListener("change", async () => {
      await uploadCashPhotoFiles(fileInputEl.files, inputEl, previewEl);
      fileInputEl.value = "";
    });
  }
}

    async function uploadFilesToNewPhotoSlot(files, slot) {
  const list = [...(files || [])].filter(f => f && f.type && f.type.startsWith("image/"));
  if (!list.length || !slot) return;

  for (let i = 0; i < list.length; i++) {
    const targetSlot = i === 0 ? slot : addNewPhotoSlot();
    const preview = targetSlot?.querySelector?.(".photo-slot-preview");

    await uploadCashPhotoFile(list[i], $("newPhoto"), preview, {
      onUploaded: (url) => {
        renderNewPhotoSlot(targetSlot, url);
      }
    });
  }
}

function bindNewPhotoSlot(slot) {
  if (!slot || slot.dataset.slotBound === "1") return;
  slot.dataset.slotBound = "1";

  const preview = slot.querySelector(".photo-slot-preview");
  const fileInput = slot.querySelector(".photo-slot-file");
  const chooseBtn = slot.querySelector(".photo-slot-choose");
  const slotRemoveBtn = slot.querySelector(".photo-slot-remove");

  if (slotRemoveBtn) {
    slotRemoveBtn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();

      const allSlots = [...document.querySelectorAll(".newPhotoSlot")];
      const hasPhoto = !!String(slot.dataset.photoUrl || "").trim();

      if (hasPhoto) {
        renderNewPhotoSlot(slot, "");
        return;
      }

      if (allSlots.length > 1) {
        slot.remove();
        updateNewPhotoHiddenFromSlots();
      }
    });
  }

  if (preview) {
    preview.tabIndex = 0;

    preview.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();

      const img = e.target?.closest?.(".photo-thumb-img");
      if (img) {
        const url = String(img.dataset.photoUrl || img.src || "").trim();
        openPhotoLightbox(url);
        return;
      }

      preview.focus();
    });

    preview.addEventListener("paste", async (e) => {
      const items = [...(e.clipboardData?.items || [])];
      const imgItems = items.filter(x => x.type && x.type.startsWith("image/"));
      if (!imgItems.length) return;

      e.preventDefault();

      const files = imgItems
        .map(item => item.getAsFile())
        .filter(Boolean);

      await uploadFilesToNewPhotoSlot(files, slot);
    });
  }

  if (chooseBtn && fileInput) {
    chooseBtn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      fileInput.click();
    });
  }

  if (fileInput) {
    fileInput.addEventListener("change", async () => {
      await uploadFilesToNewPhotoSlot(fileInput.files, slot);
      fileInput.value = "";
    });
  }

  renderNewPhotoSlot(slot, slot.dataset.photoUrl || "");
}

async function uploadFilesToRowPhotoSlot(files, slot) {
  const list = [...(files || [])].filter(f => f && f.type && f.type.startsWith("image/"));
  if (!list.length || !slot) return;

  const id = slot.dataset.id || "";
  const input = document.querySelector(`.rowPhoto[data-id="${id}"]`);

  for (let i = 0; i < list.length; i++) {
    const targetSlot = i === 0 ? slot : addRowPhotoSlot(id);
    const preview = targetSlot?.querySelector?.(".row-photo-slot-preview");

    await uploadCashPhotoFile(list[i], input, preview, {
      onUploaded: (url) => {
        renderRowPhotoSlot(targetSlot, url);
      }
    });
  }
}

function bindRowPhotoSlot(slot) {
  if (!slot || slot.dataset.rowSlotBound === "1") return;
  slot.dataset.rowSlotBound = "1";

  const id = slot.dataset.id || "";
  const preview = slot.querySelector(".row-photo-slot-preview");
  const fileInput = slot.querySelector(".rowPhotoSlotFile");
  const chooseBtn = slot.querySelector(".rowPhotoSlotChoose");
  const removeBtn = slot.querySelector(".photo-slot-remove");

  if (removeBtn) {
    removeBtn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();

      const allSlots = [...document.querySelectorAll(`.rowPhotoSlot[data-id="${id}"]`)];
      const hasPhoto = !!String(slot.dataset.photoUrl || "").trim();

      if (hasPhoto) {
        renderRowPhotoSlot(slot, "");
        return;
      }

      if (allSlots.length > 1) {
        slot.remove();
        updateRowPhotoHiddenFromSlots(id);
      }
    });
  }

  if (preview) {
    preview.tabIndex = 0;

    preview.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();

      const img = e.target?.closest?.(".photo-thumb-img");
      if (img) {
        const url = String(img.dataset.photoUrl || img.src || "").trim();
        openPhotoLightbox(url);
        return;
      }

      preview.focus();
    });

    preview.addEventListener("paste", async (e) => {
      const items = [...(e.clipboardData?.items || [])];
      const imgItems = items.filter(x => x.type && x.type.startsWith("image/"));
      if (!imgItems.length) return;

      e.preventDefault();

      const files = imgItems
        .map(item => item.getAsFile())
        .filter(Boolean);

      await uploadFilesToRowPhotoSlot(files, slot);
    });
  }

  if (chooseBtn && fileInput) {
    chooseBtn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      fileInput.click();
    });
  }

  if (fileInput) {
    fileInput.addEventListener("change", async () => {
      await uploadFilesToRowPhotoSlot(fileInput.files, slot);
      fileInput.value = "";
    });
  }

  renderRowPhotoSlot(slot, slot.dataset.photoUrl || "");
}

function bindRowPhotoSlots() {
  document.querySelectorAll(".rowPhotoSlot").forEach(bindRowPhotoSlot);

  document.querySelectorAll(".rowPhotoAddSlot").forEach(btn => {
    if (btn.dataset.addBound === "1") return;
    btn.dataset.addBound = "1";

    btn.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();

      const id = btn.dataset.id || "";
      const slot = addRowPhotoSlot(id);
      slot?.querySelector?.(".row-photo-slot-preview")?.focus();
    });
  });
}
    
function bindAllPhotoPasteInputs() {
  document.querySelectorAll(".newPhotoSlot").forEach(bindNewPhotoSlot);

  const btnAddSlot = $("btnNewPhotoAdd");
  if (btnAddSlot && btnAddSlot.dataset.slotAddBound !== "1") {
    btnAddSlot.dataset.slotAddBound = "1";

    btnAddSlot.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();

      const slot = addNewPhotoSlot();
      slot?.querySelector?.(".photo-slot-preview")?.focus();
    });
  }

  bindRowPhotoSlots();
}

    function bindReviewRowAutoPick() {
  document.querySelectorAll(".reviewDataRow").forEach(tr => {
    if (tr.dataset.rowPickBound === "1") return;
    tr.dataset.rowPickBound = "1";

    const ck = tr.querySelector(".rowPick");
    if (!ck) return;

    const sync = () => {
      tr.classList.toggle("is-picked", ck.checked);
    };

    ck.addEventListener("change", sync);

    tr.addEventListener("click", (e) => {
      const tag = String(e.target?.tagName || "").toLowerCase();

      if (tag === "input" || tag === "select" || tag === "button" || tag === "a") {
        if (!ck.checked) {
          ck.checked = true;
          sync();
        }
        return;
      }

      ck.checked = !ck.checked;
      sync();
    });

    sync();
  });
}
function fillNewCategorySelect() {
  const sel = $("newCategory");
  if (sel) {
    sel.innerHTML = `
      <option value="">請選擇</option>
      ${CATEGORY_OPTIONS.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("")}
    `;
  }

  const confirmedSel = $("confirmedCategory");
  if (confirmedSel) {
    confirmedSel.innerHTML = `
      <option value="">全部</option>
      ${CATEGORY_OPTIONS.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join("")}
    `;
  }
}
async function fillConfirmedMonthSelect() {
  const sel = $("confirmedMonth");
  if (!sel) return;

  const oldValue = sel.value || "";

  try {
    const data = await apiGetWithQuery(API_LIST, {
      checked: "yes",
      max: 500
    });

    const list = Array.isArray(data.rows) ? data.rows : [];

    const months = [...new Set(
      list
        .map(r => String(r.month || r.date || "").slice(0, 7))
        .filter(v => /^\d{4}-\d{2}$/.test(v))
    )].sort().reverse();

    sel.innerHTML = `
      <option value="">全部月份</option>
      ${months.map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join("")}
    `;

    if (oldValue && months.includes(oldValue)) {
      sel.value = oldValue;
    }
  } catch (err) {
    sel.innerHTML = `<option value="">全部月份</option>`;
  }
}
function setTodayForNewDate() {
  const el = $("newDate");
  if (!el || el.value) return;

  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  el.value = `${y}-${m}-${day}`;
}

                       <td>

async function renderConfirmedRows() {
  const tbody = $("confirmedRows");

  const month = $("confirmedMonth")?.value?.trim() || "";
  const category = $("confirmedCategory")?.value?.trim() || "";
  const keyword = $("confirmedKeyword")?.value?.trim() || "";

  if (!month && !category && !keyword) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">請先選擇月份、費用支出對象或輸入關鍵字後，再按「查詢」。</td></tr>`;
    $("confirmedCountTag").textContent = `0 筆`;
    $("confirmedTotal").textContent = money(0);
    return;
  }

  tbody.innerHTML = `<tr><td colspan="6" class="empty">載入中...</td></tr>`;

  try {
    const data = await apiGetWithQuery(API_LIST, {
      checked: "yes",
      month,
      category,
      keyword,
      max: 500
    });

    const list = Array.isArray(data.rows) ? data.rows : [];
    const total = list.reduce((sum, r) => sum + (Number(r.amount || 0) || 0), 0);

    $("confirmedCountTag").textContent = `${list.length} 筆`;
    $("confirmedTotal").textContent = money(total);

    tbody.innerHTML = list.length ? list.map(r => `
      <tr>
        <td>${esc(r.detail)}</td>
                <td class="thumb-cell">
          ${photoThumbLinksHtml(r.photos || r.photo)}
        </td>
        <td>${money(r.amount)}</td>
        <td>${esc(r.date)}</td>
        <td>${esc(r.category)}</td>
        <td>${esc(r.note)}</td>
      </tr>
    `).join("") : `<tr><td colspan="6" class="empty">目前沒有已確認現金支出。</td></tr>`;

  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">❌ ${esc(err.message || err)}</td></tr>`;
    $("confirmedCountTag").textContent = `0 筆`;
    $("confirmedTotal").textContent = money(0);
  }
}

async function refreshAll() {
  await renderUnconfirmedRows();
  await renderConfirmedRows();
}

    function buildReviewPayload(id, checked = false) {
  return {
    id,
    detail: document.querySelector(`.rowDetail[data-id="${id}"]`)?.value || "",
    photos: photoUrlsFromValue(document.querySelector(`.rowPhoto[data-id="${id}"]`)?.value || ""),
    amount: document.querySelector(`.rowAmount[data-id="${id}"]`)?.value || "",
    category: document.querySelector(`.rowCategory[data-id="${id}"]`)?.value || "",
    manualBank: !!document.querySelector(`.rowManualBank[data-id="${id}"]`)?.checked,
    inputInvoiceAmount: document.querySelector(`.rowInputInvoiceAmount[data-id="${id}"]`)?.value || "",
    note: document.querySelector(`.rowNote[data-id="${id}"]`)?.value || "",
    checked
  };
}

function validateReviewPayload(p, requireCategory = false) {
  if (requireCategory && !p.category) {
    alert("有勾選的資料還沒選費用支出對象。");
    return false;
  }

  const amount = Number(String(p.amount || "").replace(/,/g, "").trim()) || 0;
  const invoiceAmount = Number(String(p.inputInvoiceAmount || "").replace(/,/g, "").trim()) || 0;

  if (invoiceAmount < 0) {
    alert("發票金額不能小於 0。");
    return false;
  }

  if (invoiceAmount > amount) {
    alert("發票金額不能大於交易金額。");
    return false;
  }

  return true;
}

function bindRowSaveButtons() {
  document.querySelectorAll(".rowSaveBtn").forEach(btn => {
    if (btn.dataset.saveBound === "1") return;
    btn.dataset.saveBound = "1";

    btn.addEventListener("click", async (e) => {
      e.preventDefault();
      e.stopPropagation();

      const id = btn.dataset.id;
      if (!id) return;

      const payload = buildReviewPayload(id, false);

      if (!validateReviewPayload(payload, false)) return;

      const oldText = btn.textContent;
      btn.disabled = true;
      btn.textContent = "儲存中...";

      try {
        await apiPost(API_UPDATE, payload);
        await renderUnconfirmedRows();
        alert("✅ 已單獨儲存。");
      } catch (err) {
        alert(`單獨儲存失敗：${err.message || err}`);
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    });
  });
}

$("btnBatchConfirm").addEventListener("click", async () => {
  const picked = [...document.querySelectorAll(".rowPick:checked")];

  if (!picked.length) {
    alert("請先勾選要確認的現金支出。");
    return;
  }

  const payloads = picked.map(ck => buildReviewPayload(ck.dataset.id, true));

  for (const p of payloads) {
    if (!validateReviewPayload(p, true)) return;
  }

  const btn = $("btnBatchConfirm");
  const oldText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "處理中...";

  try {
    await Promise.all(payloads.map(p => apiPost(API_UPDATE, p)));
    await refreshAll();
  } catch (err) {
    alert(`儲存失敗：${err.message || err}`);
  } finally {
    btn.disabled = false;
    btn.textContent = oldText;
  }
});
$("btnCreateCashExpense").addEventListener("click", async () => {
const payload = {
  detail: $("newDetail")?.value || "",
  photos: photoUrlsFromValue($("newPhoto")?.value || ""),
  amount: $("newAmount")?.value || "",
  category: $("newCategory")?.value || "",
  note: $("newNote")?.value || ""
};

  if (!String(payload.detail).trim()) {
    alert("請輸入交易明細備註。");
    return;
  }

  if (!String(payload.amount).trim()) {
    alert("請輸入交易金額。");
    return;
  }

  if (!String(payload.category).trim()) {
    alert("請選擇費用支出對象。");
    return;
  }

  const btn = $("btnCreateCashExpense");
  const msg = $("createMsg");
  const oldText = btn.textContent;

  btn.disabled = true;
  btn.textContent = "新增中...";
  msg.textContent = "";
  msg.className = "msg";

  try {
    await apiPost(API_CREATE, payload);

    $("newDetail").value = "";
    $("newPhoto").value = "";
    resetNewPhotoSlots();
    $("newAmount").value = "";
    $("newNote").value = "";
    $("newCategory").value = "";
    setTodayForNewDate();

    msg.textContent = "✅ 已新增到未確認現金支出。";
    msg.className = "msg ok";

    await refreshAll();
  } catch (err) {
    msg.textContent = `❌ 新增失敗：${err.message || err}`;
    msg.className = "msg err";
  } finally {
    btn.disabled = false;
    btn.textContent = oldText;
  }
});
$("btnConfirmedFilter").addEventListener("click", async () => {
  await renderConfirmedRows();
});

$("btnConfirmedReset").addEventListener("click", async () => {
  $("confirmedMonth").value = "";
  $("confirmedCategory").value = "";
  $("confirmedKeyword").value = "";

  $("confirmedRows").innerHTML = `<tr><td colspan="6" class="empty">請先選擇月份、費用支出對象或輸入關鍵字後，再按「查詢」。</td></tr>`;
  $("confirmedCountTag").textContent = `0 筆`;
  $("confirmedTotal").textContent = money(0);
});

  await loadCategoryOptions();

  fillNewCategorySelect();
  setTodayForNewDate();
  bindAllPhotoPasteInputs();

  await fillConfirmedMonthSelect();
  await refreshAll();
}

initCashExpensePage();
