<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>公司檔案管理｜公司進利總結總清單</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --ok:#0f766e;
      --warn:#b45309;
      --danger:#c81e1e;
      --blue:#0b4a9e;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
      --orange:#b45309;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.sub-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.sub-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
    }
    .page-tab{
      color:#fff;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,.sub-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .sub-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .wrap{
      max-width:1500px;
      margin:0 auto;
      padding:24px;
    }
    h1{
      margin:0 0 14px;
      font-size:30px;
      font-weight:900;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .title{
      font-size:20px;
      font-weight:900;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    button{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      background:#fff;
      color:var(--text);
    }
    .btn{
      border:none;
      background:var(--btn);
      color:#fff;
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.blue{ background:#0ea5e9; }
    .btn.orange{ background:#c0560a; }
    .btn.green{ background:#0f766e; }
    .btn.gray{ background:#7b8491; }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .btn-mini{
      padding:7px 10px;
      font-size:12px;
      border-radius:10px;
      white-space:nowrap;
    }
    .msg{
      white-space:pre-wrap;
      line-height:1.6;
      font-size:14px;
      min-height:22px;
      margin-top:8px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
    
    .hero-total{
      display:flex;
      justify-content:center;
      align-items:center;
      margin:4px 0 18px;
    }
    .hero-total-card{
      min-width:360px;
      max-width:min(680px,96%);
      background:#fff;
      border:2px solid #cfe3ff;
      border-radius:26px;
      padding:18px 28px;
      box-shadow:0 14px 34px rgba(15,23,42,.08);
      text-align:center;
    }
    .hero-total-label{
      color:#64748b;
      font-size:14px;
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:.5px;
    }
    .hero-total-value{
      color:#0b4a9e;
      font-size:40px;
      line-height:1.15;
      font-weight:900;
      letter-spacing:.3px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      max-height:calc(100vh - 240px);
    }
    table{
      width:100%;
      min-width:1650px;
      border-collapse:separate;
      border-spacing:0;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 9px;
      vertical-align:middle;
      font-size:14px;
      white-space:nowrap;
      background:#fff;
    }
    th{
      position:sticky;
      top:0;
      z-index:2;
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      color:#0f172a;
    }
    th:first-child, td:first-child{
      position:sticky;
      left:0;
      z-index:3;
      background:#fff;
      box-shadow:1px 0 0 var(--line);
    }
    th:first-child{
      z-index:4;
      background:#f8fafc;
    }
    tr:hover td{ background:#fbfdff; }
    tr:hover td:first-child{ background:#fbfdff; }
    .money-link{
      color:#063f91;
      font-weight:900;
      text-decoration:underline;
      text-underline-offset:2px;
      cursor:pointer;
    }
    .money-link:hover{ color:#0ea5e9; }
    .tag{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:58px;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      border:1px solid #cfe3ff;
      background:#eef6ff;
      color:#0f3f8c;
    }
    .tag.ok{
      border-color:#b7e4d7;
      background:#effcf6;
      color:#0f766e;
    }
    .tag.warn{
      border-color:#f5d7a1;
      background:#fff7e6;
      color:#b45309;
    }
    .tag.danger{
      border-color:#f0b2b2;
      background:#fff1f1;
      color:#b91c1c;
    }
    .tag.gray{
      border-color:#d8deea;
      background:#f8fafc;
      color:#64748b;
    }
    .ops{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
      min-width:360px;
    }
    .empty{
      color:var(--muted);
      padding:16px 0;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(2,8,23,.46);
      display:none;
      align-items:center;
      justify-content:center;
      padding:22px;
      z-index:50;
    }
    .modal-backdrop.show{ display:flex; }
    .modal{
      width:min(1080px,96vw);
      max-height:88vh;
      overflow:hidden;
      background:#fff;
      border-radius:22px;
      border:1px solid var(--line);
      box-shadow:0 30px 80px rgba(2,8,23,.35);
      display:flex;
      flex-direction:column;
    }
    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      background:#f8fafc;
    }
    .modal-title{
      font-size:19px;
      font-weight:900;
    }
    .modal-body{
      padding:18px 20px;
      overflow:auto;
    }
    .modal-table{
      min-width:850px;
      width:100%;
    }
    .modal-table th,
    .modal-table td{
      position:static !important;
      box-shadow:none !important;
      font-size:14px;
    }
    .close-btn{
      width:auto;
      border:none;
      background:#0f172a;
      color:#fff;
      border-radius:12px;
      padding:10px 14px;
    }
    .mono{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;
    }
    @media (max-width: 768px){
      .wrap{ padding:16px; }
      h1{ font-size:26px; }
      .table-wrap{ max-height:none; }
      .ops{ min-width:360px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html">直播主開單</a>
      <a class="page-tab" href="/admin.html">訂單後台</a>
      <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
      <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
      <a class="page-tab" href="/shop-product-admin">上架官網</a>
      <a class="page-tab" href="/stock.html">庫存查詢</a>
      <a class="page-tab" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
      <a class="page-tab is-active" href="/company-files/company-index.html">公司檔案管理</a>
    </div>

    <div class="sub-tabs-bar">
      <a class="sub-tab" href="/company-files/company-cash-expense-sign.html">員工簽收</a>
      <a class="sub-tab" href="/company-files/company-invoice-check.html">發票核對</a>
      <a class="sub-tab" href="/company-files/company-card-bills.html">信用卡帳單</a>

  <div class="wrap">
    <h1>公司進利總結</h1>

    <div class="hero-total">
      <div class="hero-total-card">
        <div class="hero-total-label">目前公司總資產</div>
        <div class="hero-total-value" id="heroTotalAsset">NT$ 0</div>
      </div>
    </div>

    <div class="card">
      <div class="head">
        <div>
          <div class="title">總清單表</div>
          <div class="hint">全部月份都在這一張表。上方總資產＝最新版基準總資產＋已確認月份結餘加總；點藍色金額可看來源明細。</div>
        </div>
        <div class="toolbar">
          <button class="btn" type="button" id="btnReload">重新整理</button>
          <button class="btn secondary" type="button" id="btnLatest">跳到最新月份</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>月份</th>
              <th>總資產</th>
              <th>確認入公司帳</th>
              <th>結餘</th>
              <th>本月淨利</th>
              <th>公司總支出</th>
              <th>每月開銷</th>
              <th>信用卡公司</th>
              <th>信用卡妹妹</th>
              <th>現金 LUMI</th>
              <th>現金借支妹妹</th>
              <th>現金公司妹妹</th>
              <th>現金運費妹妹</th>
              <th>支付妹妹公司費用</th>
              <th>妹妹費用轉還款</th>
              <th>轉房貸金額</th>
              <th>備註</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="18" class="empty">載入中...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="msg" id="msg"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="modalTitle">來源明細</div>
          <div class="hint" id="modalHint"></div>
        </div>
        <button type="button" class="close-btn" id="btnCloseModal">關閉</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>

<script>
const STORAGE_OK = "company_entry_ok";
if (sessionStorage.getItem(STORAGE_OK) !== "1") {
  location.href = "/company-files/company-index.html";
}

const API_LIST = "https://api.murain.tw/op/company/profit-summary/list";
const API_DETAIL = "https://api.murain.tw/op/company/profit-summary/detail";
const API_ACTION = "https://api.murain.tw/op/company/profit-summary/action";

const $ = (id) => document.getElementById(id);
let allRows = [];

function money(v) {
  const n = Number(String(v ?? "").replace(/[^\d.-]/g, "")) || 0;
  const sign = n < 0 ? "-" : "";
  return `${sign}NT$ ${Math.abs(Math.round(n)).toLocaleString("zh-TW")}`;
}

function text(v) {
  if (Array.isArray(v)) return v.map(x => typeof x === "object" ? (x.name || x.id || "") : String(x)).filter(Boolean).join(" / ");
  if (v == null) return "";
  return String(v);
}

function bool(v) {
  if (typeof v === "boolean") return v;
  const s = String(v ?? "").trim().toLowerCase();
  return ["1","true","yes","y","on","checked","是","已確認","已建立","已扣款"].includes(s);
}

function escHtml(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

async function apiGet(url, params = {}) {
  const u = new URL(url, location.origin);
  Object.entries(params).forEach(([k,v]) => {
    if (v !== undefined && v !== null && String(v).trim() !== "") {
      u.searchParams.set(k, String(v));
    }
  });
  const r = await fetch(u.toString());
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) throw new Error(data.message || data.error || "API 失敗");
  return data;
}

async function apiPost(url, body = {}) {
  const r = await fetch(url, {
    method:"POST",
    headers:{ "content-type":"application/json" },
    body:JSON.stringify(body)
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) throw new Error(data.message || data.error || "API 失敗");
  return data;
}

function tagYesNo(ok, yesText, noText) {
  return ok
    ? `<span class="tag ok">${yesText}</span>`
    : `<span class="tag warn">${noText}</span>`;
}

function tagGray(txt) {
  return `<span class="tag gray">${escHtml(txt || "-")}</span>`;
}

function monthLabel(r) {
  return text(r.month || r.Month || r["月份"] || "");
}

function amountLink(r, key, label, amount) {
  const month = monthLabel(r);
  return `<span class="money-link" data-detail-key="${key}" data-detail-label="${escHtml(label)}" data-month="${escHtml(month)}">${money(amount)}</span>`;
}

function getRowByMonth(month) {
  return allRows.find(r => monthLabel(r) === month) || null;
}

function renderHeroTotal() {
  if (!allRows.length) {
    $("heroTotalAsset").textContent = "NT$ 0";
    return;
  }

  // 規則：
  // 1. 「最新版」那筆總資產 = 從舊公司檔案沿用過來的起始基準金額。
  // 2. 之後只加上「確認入公司帳 = ✓」的月份結餘。
  // 3. 未確認月份、額外結帳列、最新版基準列，都不加進去。
  const isBaseRow = (r) => {
    const m = monthLabel(r);
    return m.includes("最新版") || m.includes("基準") || m.includes("結轉");
  };

  const isMonthRow = (r) => /^\\d{4}-\\d{2}月?$/.test(monthLabel(r));

  const baseRow =
    allRows.find(isBaseRow) ||
    allRows.find(r => Number(String((r.totalAsset ?? r["總資產"]) ?? "").replace(/[^\\d.-]/g, "")) !== 0) ||
    null;

  const baseAsset = baseRow
    ? Number(String((baseRow.totalAsset ?? baseRow["總資產"]) ?? "").replace(/[^\\d.-]/g, "")) || 0
    : 0;

  const confirmedBalanceTotal = allRows
    .filter(r => !isBaseRow(r))
    .filter(r => isMonthRow(r))
    .filter(r => bool(r.confirmed ?? r.confirmedCompanyAccount ?? r["確認入公司帳"]))
    .reduce((sum, r) => {
      const n = Number(String((r.balance ?? r["結餘"]) ?? "").replace(/[^\\d.-]/g, ""));
      return sum + (Number.isFinite(n) ? n : 0);
    }, 0);

  const currentTotalAsset = baseAsset + confirmedBalanceTotal;

  $("heroTotalAsset").textContent = money(currentTotalAsset);
}

function renderRows() {
  if (!allRows.length) {
    $("rows").innerHTML = `<tr><td colspan="18" class="empty">目前沒有資料。</td></tr>`;
    return;
  }

  $("rows").innerHTML = allRows.map(r => {
    const month = monthLabel(r);
    const id = r.id || r.recordId || "";
    const confirmed = bool(r.confirmed ?? r.confirmedCompanyAccount ?? r["確認入公司帳"]);
    const sisterFeeAuto = bool(r.useSisterFeeForMortgage ?? r.sisterFeeRepayAuto ?? r["轉房貸_用妹妹公司費用"]);
    const balanceRepay = bool(r.useBalanceForMortgage ?? r.balanceRepay ?? r["轉房貸_用結餘"]);
    const repayCreated = bool(r.repaymentRecordCreated ?? r.refundCreated ?? r["已建立還款紀錄"]);
    const note = text(r.note ?? r["備註"]);

    const totalAsset = r.totalAsset ?? r["總資產"];
    const balance = r.balance ?? r["結餘"];
    const monthlyProfit = r.monthlyProfit ?? r["本月淨利"];
    const companyTotalExpense = r.companyTotalExpense ?? r["公司總支出"];
    const monthlyExpense = r.monthlyExpense ?? r["每月開銷支出費用"];
    const cardCompanyExpense = r.cardCompanyExpense ?? r["信用卡公司支出"];
    const cardSisterExpense = r.cardSisterExpense ?? r["信用卡-妹妹個人支出"];
    const cashCompanyLumi = r.cashCompanyLumi ?? r["現金-公司支出 [ LUMI ]"];
    const cashBorrowSister = r.cashBorrowSister ?? r["現金-借支 [妹妹]"] ?? r["現金-借支 [ 妹妹 ]"];
    const cashCompanySister = r.cashCompanySister ?? r["現金-公司支出 [妹妹]"] ?? r["現金-公司支出 [ 妹妹 ]"];
    const cashCompanyShippingSister = r.cashCompanyShippingSister ?? r["現金-公司運費 [妹妹]"] ?? r["現金-公司運費 [ 妹妹 ]"];
    const paySisterCompanyExpense = r.paySisterCompanyExpense ?? r["支付妹妹公司費用"];
    const transferMortgageAmount = r.transferMortgageAmount ?? r.transferRepayAmount ?? r["轉房貸金額"];

    return `
      <tr data-row-id="${escHtml(id)}" data-month="${escHtml(month)}">
        <td><strong>${escHtml(month)}</strong></td>
        <td>${amountLink(r, "totalAsset", "總資產", totalAsset)}</td>
        <td>${tagYesNo(confirmed, "已確認", "未確認")}</td>
        <td>${amountLink(r, "balance", "結餘", balance)}</td>
        <td>${amountLink(r, "monthlyProfit", "本月淨利", monthlyProfit)}</td>
        <td>${amountLink(r, "companyTotalExpense", "公司總支出", companyTotalExpense)}</td>
        <td>${amountLink(r, "monthlyExpense", "每月開銷支出費用", monthlyExpense)}</td>
        <td>${amountLink(r, "cardCompanyExpense", "信用卡公司支出", cardCompanyExpense)}</td>
        <td>${amountLink(r, "cardSisterExpense", "信用卡-妹妹個人支出", cardSisterExpense)}</td>
        <td>${amountLink(r, "cashCompanyLumi", "現金-公司支出 [ LUMI ]", cashCompanyLumi)}</td>
        <td>${amountLink(r, "cashBorrowSister", "現金-借支 [妹妹]", cashBorrowSister)}</td>
        <td>${amountLink(r, "cashCompanySister", "現金-公司支出 [妹妹]", cashCompanySister)}</td>
        <td>${amountLink(r, "cashCompanyShippingSister", "現金-公司運費 [妹妹]", cashCompanyShippingSister)}</td>
        <td>${amountLink(r, "paySisterCompanyExpense", "支付妹妹公司費用", paySisterCompanyExpense)}</td>
        <td>${sisterFeeAuto ? `<span class="tag ok">已自動成立</span>` : ""}</td>
        <td>${amountLink(r, "transferMortgageAmount", "轉房貸金額", transferMortgageAmount)}</td>
        <td>${escHtml(note)}</td>
        <td>
          <div class="ops">
            <button class="btn-mini btn green" data-action="confirm_company_account" data-id="${escHtml(id)}" ${confirmed ? "disabled" : ""}>確認入帳</button>
            <button class="btn-mini btn orange" data-action="use_balance_repay" data-id="${escHtml(id)}" ${balanceRepay ? "disabled" : ""}>結餘轉還款</button>
            <button class="btn-mini btn gray" data-loan-panel="1" data-id="${escHtml(id)}" data-month="${escHtml(month)}" data-created="${repayCreated ? "1" : "0"}">房貸／借款主檔紀錄</button>
          </div>
        </td>
      </tr>
    `;
  }).join("");
}

async function loadRows({ keepScroll = false } = {}) {
  const oldScroll = document.querySelector(".table-wrap")?.scrollTop || 0;
  $("msg").textContent = "載入中...";
  $("msg").className = "msg";

  try {
    const data = await apiGet(API_LIST, { max: 300 });
    allRows = Array.isArray(data.rows) ? data.rows : [];
    renderHeroTotal();
    renderRows();
    $("msg").textContent = `✅ 載入 ${allRows.length} 筆`;
    $("msg").className = "msg ok";
    if (keepScroll) {
      setTimeout(() => { document.querySelector(".table-wrap").scrollTop = oldScroll; }, 0);
    }
  } catch (err) {
    $("rows").innerHTML = `<tr><td colspan="18" class="empty">❌ ${escHtml(err.message || err)}</td></tr>`;
    $("msg").textContent = `❌ ${err.message || err}`;
    $("msg").className = "msg err";
  }
}

function closeModal() {
  $("modalBackdrop").classList.remove("show");
}

function openModal(title, hint, html) {
  $("modalTitle").textContent = title;
  $("modalHint").textContent = hint || "";
  $("modalBody").innerHTML = html;
  $("modalBackdrop").classList.add("show");
}

function renderDetailTable(items) {
  if (!Array.isArray(items) || !items.length) {
    return `<div class="empty">目前沒有來源明細。</div>`;
  }

  const keys = [];
  for (const it of items) {
    Object.keys(it || {}).forEach(k => {
      if (!keys.includes(k) && !["id","recordId"].includes(k)) keys.push(k);
    });
  }

  const preferred = ["date","日期","month","月份","category","分類","title","項目","detail","說明","note","備註","amount","金額","status","狀態","signed","簽收","checked","核對"];
  const finalKeys = [
    ...preferred.filter(k => keys.includes(k)),
    ...keys.filter(k => !preferred.includes(k)).slice(0, 8)
  ];

  return `
    <div class="table-wrap" style="max-height:58vh;">
      <table class="modal-table">
        <thead>
          <tr>${finalKeys.map(k => `<th>${escHtml(labelForKey(k))}</th>`).join("")}</tr>
        </thead>
        <tbody>
          ${items.map(it => `
            <tr>
              ${finalKeys.map(k => `<td>${formatDetailValue(k, it?.[k])}</td>`).join("")}
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function labelForKey(k) {
  const map = {
    date:"日期", month:"月份", category:"分類", title:"項目", detail:"說明", note:"備註",
    amount:"金額", status:"狀態", signed:"簽收", checked:"核對"
  };
  return map[k] || k;
}

function formatDetailValue(k, v) {
  if (k === "amount" || k === "金額") return `<strong>${money(v)}</strong>`;
  if (typeof v === "boolean") return v ? "是" : "否";
  return escHtml(text(v));
}

async function openDetail(month, key, label) {
  openModal(`${month}｜${label}`, "載入來源明細中...", `<div class="empty">載入中...</div>`);

  try {
    const data = await apiGet(API_DETAIL, { month, key, field: key, type: key });
    const items = Array.isArray(data.items) ? data.items :
                  Array.isArray(data.rows) ? data.rows :
                  Array.isArray(data.details) ? data.details : [];

    const summaryHtml = data.summary ? `
      <div style="margin-bottom:12px;line-height:1.7;">
        ${Object.entries(data.summary).map(([k,v]) => `<div><strong>${escHtml(k)}：</strong>${escHtml(text(v))}</div>`).join("")}
      </div>
    ` : "";

    openModal(`${month}｜${label}`, `來源明細：${items.length} 筆`, summaryHtml + renderDetailTable(items));
  } catch (err) {
    openModal(`${month}｜${label}`, "讀取失敗", `<div class="empty">❌ ${escHtml(err.message || err)}</div>`);
  }
}

function openLoanPanel(id, month) {
  const row = allRows.find(r => (r.id || r.recordId || "") === id) || getRowByMonth(month) || {};
  const sisterFeeAuto = bool(row.useSisterFeeForMortgage ?? row.sisterFeeRepayAuto ?? row["轉房貸_用妹妹公司費用"]);
  const balanceRepay = bool(row.useBalanceForMortgage ?? row.balanceRepay ?? row["轉房貸_用結餘"]);
  const repayCreated = bool(row.repaymentRecordCreated ?? row.refundCreated ?? row["已建立還款紀錄"]);
  const repayDate = text(row.mortgageRepayDate ?? row.repaymentDate ?? row["房貸還款日期"]);
  const repayAmount = row.transferMortgageAmount ?? row.transferRepayAmount ?? row["轉房貸金額"];

  const html = `
    <div style="display:grid;gap:12px;line-height:1.8;">
      <div><strong>月份：</strong>${escHtml(month)}</div>
      <div><strong>轉房貸金額：</strong><span class="money-link">${money(repayAmount)}</span></div>
      <div><strong>妹妹費用轉還款：</strong>${sisterFeeAuto ? `<span class="tag ok">已自動成立</span>` : `<span class="tag gray">尚未成立</span>`}</div>
      <div><strong>結餘轉還款：</strong>${balanceRepay ? `<span class="tag ok">已勾選</span>` : `<span class="tag gray">未勾選</span>`}</div>
      <div><strong>還款紀錄：</strong>${repayCreated ? `<span class="tag ok">已建立</span>` : `<span class="tag warn">尚未建立</span>`}</div>
      <div><strong>房貸還款日期：</strong>${escHtml(repayDate || "-")}</div>
      <div class="hint">這裡只看還款狀態。清單表不再顯示結餘轉還款、還款紀錄等欄位，保持乾淨。</div>
      <div class="toolbar">
        <button class="btn orange" data-action="use_balance_repay" data-id="${escHtml(id)}" ${balanceRepay ? "disabled" : ""}>結餘轉還款</button>
        <button class="btn gray" data-action="create_repayment_record" data-id="${escHtml(id)}" ${repayCreated ? "disabled" : ""}>建立還款紀錄</button>
      </div>
    </div>
  `;

  openModal(`${month}｜房貸／借款主檔紀錄`, "結餘轉還款、妹妹費用轉還款、還款紀錄都集中在這裡看。", html);
}


async function runAction(action, id) {
  const tr = document.querySelector(`tr[data-row-id="${CSS.escape(id)}"]`);
  const month = tr?.dataset?.month || "";
  const actionText = {
    confirm_company_account: "確認入公司帳",
    mark_baihe_mortgage_paid: "白河房貸已扣款",
    use_balance_repay: "結餘轉還款",
    create_repayment_record: "建立還款紀錄"
  }[action] || action;

  if (!id) {
    $("msg").textContent = "❌ 找不到這筆資料 ID";
    $("msg").className = "msg err";
    return;
  }

  if (!confirm(`確定要執行「${actionText}」？\n月份：${month}`)) return;

  $("msg").textContent = `執行中：${actionText}...`;
  $("msg").className = "msg";

  try {
    const data = await apiPost(API_ACTION, { id, action, month });
    const warn = data.warning ? `\n⚠️ ${data.warning}` : "";
    $("msg").textContent = `✅ 已完成：${actionText}${warn}`;
    $("msg").className = data.warning ? "msg err" : "msg ok";
    await loadRows({ keepScroll:true });
  } catch (err) {
    $("msg").textContent = `❌ ${err.message || err}`;
    $("msg").className = "msg err";
  }
}

$("btnReload").addEventListener("click", () => loadRows());
$("btnLatest").addEventListener("click", () => {
  if (!allRows.length) return;
  const latest = monthLabel(allRows[0]);
  const tr = document.querySelector(`tr[data-month="${CSS.escape(latest)}"]`);
  tr?.scrollIntoView({ behavior:"smooth", block:"center" });
});
$("btnCloseModal").addEventListener("click", closeModal);
$("modalBackdrop").addEventListener("click", (e) => {
  if (e.target.id === "modalBackdrop") closeModal();
});

document.addEventListener("click", (e) => {
  const detail = e.target.closest("[data-detail-key]");
  if (detail) {
    openDetail(detail.dataset.month, detail.dataset.detailKey, detail.dataset.detailLabel);
    return;
  }

  const loanBtn = e.target.closest("[data-loan-panel]");
  if (loanBtn) {
    openLoanPanel(loanBtn.dataset.id, loanBtn.dataset.month);
    return;
  }

  const actionBtn = e.target.closest("[data-action]");
  if (actionBtn) {
    runAction(actionBtn.dataset.action, actionBtn.dataset.id);
  }
});

loadRows();
</script>
</body>
</html>
