<!doctype html>
<html lang="zh-Hant">
<head>

  <title>公司檔案管理｜公司進利總結總清單</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --ok:#0f766e;
      --warn:#b45309;
      --danger:#c81e1e;
      --blue:#0b4a9e;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
      --orange:#b45309;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.sub-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.sub-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
    }
    .page-tab{
      color:#fff;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,.sub-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .sub-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .wrap{
      max-width:1500px;
      margin:0 auto;
      padding:24px;
    }
    h1{
      margin:0 0 14px;
      font-size:30px;
      font-weight:900;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .head{
    
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .title{
      font-size:20px;
      font-weight:900;
    }
    .toolbar{
    
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    button{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      background:#fff;
      color:var(--text);
    }
    .btn{
      border:none;
      background:var(--btn);
      color:#fff;
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.blue{ background:#0ea5e9; }
    .btn.orange{ background:#c0560a; }
    .btn.green{ background:#0f766e; }
    .btn.gray{ background:#7b8491; }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .btn-mini{
      padding:7px 10px;
      font-size:12px;
      border-radius:10px;
      white-space:nowrap;
    }
    .msg{
      white-space:pre-wrap;
      line-height:1.6;
      font-size:14px;
      min-height:22px;
      margin-top:8px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.6;
    }
    
    .hero-total{
    
      justify-content:center;
      align-items:center;
      margin:4px 0 18px;
    }
    .hero-total-card{
      min-width:420px;
      max-width:min(680px,96%);
      background:#fff;
      border:2px solid #cfe3ff;
      border-radius:26px;
      padding:18px 28px;
      box-shadow:0 14px 34px rgba(15,23,42,.08);
      text-align:center;
    }
    .hero-total-label{
      color:#64748b;
      font-size:14px;
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:.5px;
    }
    .hero-total-value{
      color:#0b4a9e;
      font-size:40px;
      line-height:1.15;
      font-weight:900;
      letter-spacing:.3px;
    }


    .hero-total-sub{color:#64748b;font-size:13px;margin-top:8px;line-height:1.6}
.hero-overview-row{
  display:grid;
  grid-template-columns:minmax(420px,540px) minmax(320px,420px);
  gap:16px;
  align-items:start;
  justify-content:space-between;
  margin:4px 0 18px;
}

.hero-overview-row .hero-total{
  margin:0;
}

.pending-mini-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:10px 14px;
  box-shadow:0 8px 24px rgba(15,23,42,.05);
}

.pending-mini-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  margin-bottom:6px;
}

.pending-mini-title-wrap{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.pending-mini-title{
  font-size:15px;
  font-weight:900;
}

.pending-mini-head-actions{
  display:flex;
  align-items:center;
  gap:6px;
  flex-wrap:wrap;
}

.pending-mini-head-actions .btn-mini{
  padding:6px 9px;
  font-size:11.5px;
  border-radius:9px;
}

.pending-mini-grid-head,
.pending-mini-row{
  display:grid;
  grid-template-columns:28px 100px 1fr;
  gap:8px;
  align-items:center;
}

.pending-mini-grid-head{
  padding:0 6px 5px;
  color:#64748b;
  font-size:10.5px;
  font-weight:900;
  border-bottom:1px solid var(--line);
}

.pending-mini-list{
  max-height:72px;
  overflow-y:auto;
  overflow-x:hidden;
}

.pending-mini-row{
  min-height:34px;
  padding:5px 6px;
  border-bottom:1px solid var(--line);
}

.pending-mini-row:last-child{
  border-bottom:none;
}

.pending-mini-check{
  width:14px;
  height:14px;
  margin:0;
  accent-color:#0f766e;
}

.pending-mini-month{
  font-weight:900;
  font-size:12.5px;
}

.pending-mini-balance{
  color:#063f91;
  font-weight:900;
  font-size:12.5px;
}

.pending-mini-actions .btn-mini{
  font-size:12px;
  padding:7px 10px;
  border-radius:10px;
}

.confirmed-card-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  flex-wrap:wrap;
}

.confirmed-card-titlebar{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.confirmed-card-tools{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:10px;
  margin-left:auto;
}

@media (max-width:980px){
  .hero-overview-row{
    grid-template-columns:1fr;
  }

  .pending-mini-list{
  max-height:72px;
}

  .confirmed-card-tools{
    width:100%;
    justify-content:flex-start;
    margin-left:0;
  }
}
    .plus-btn{width:24px;height:24px;min-width:24px;padding:0;margin-left:6px;border-radius:999px;border:1px solid #bfdbfe;background:#eff6ff;color:#0b4a9e;font-weight:900;line-height:1}
    .money-inline{display:inline-flex;align-items:center;gap:4px}
    .detail-row td{background:#fbfdff!important;white-space:normal}
    .breakdown{border:1px solid #dbeafe;background:#f8fbff;border-radius:16px;padding:14px;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .break-item{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px;line-height:1.45}
    .break-label{font-size:12px;color:#64748b;font-weight:900;margin-bottom:6px}
    .break-value{font-size:16px;color:#0b4a9e;font-weight:900}

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      max-height:calc(100vh - 240px);
    }
    .confirmed-table{
  min-width:920px;
}

.confirmed-table th,
.confirmed-table td{
  padding:7px 8px;
  font-size:12.5px;
}

.confirmed-table th{
  font-size:12px;
}

.confirmed-table .money-link{
  font-size:13px;
  font-weight:900;
}

.confirmed-table .plus-btn{
  width:20px;
  height:20px;
  min-width:20px;
  font-size:13px;
  margin-left:4px;
}

.confirmed-table td:first-child,
.confirmed-table th:first-child{
  width:120px;
}

.confirmed-table td:nth-child(2),
.confirmed-table th:nth-child(2){
  width:150px;
}

.confirmed-table td:nth-child(3),
.confirmed-table th:nth-child(3){
  width:150px;
}

.confirmed-table td:nth-child(4),
.confirmed-table th:nth-child(4){
  width:190px;
}

.confirmed-table td:nth-child(5),
.confirmed-table th:nth-child(5){
  width:210px;
}
    table{
      width:100%;
      min-width:1180px;
      border-collapse:separate;
      border-spacing:0;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 9px;
      vertical-align:middle;
      font-size:14px;
      white-space:nowrap;
      background:#fff;
    }
    th{
      position:sticky;
      top:0;
      z-index:2;
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      color:#0f172a;
    }
    th:first-child, td:first-child{
      position:sticky;
      left:0;
      z-index:3;
      background:#fff;
      box-shadow:1px 0 0 var(--line);
    }
    th:first-child{
      z-index:4;
      background:#f8fafc;
    }
    tr:hover td{ background:#fbfdff; }
    tr:hover td:first-child{ background:#fbfdff; }
    .money-link{
      color:#063f91;
      font-weight:900;
      text-decoration:underline;
      text-underline-offset:2px;
      cursor:pointer;
    }
    .money-link:hover{ color:#0ea5e9; }
    .balance-col-head{
  color:#b4235a;
}
.modal-table th.net-profit-col{
  color:#9f1239;
}

.modal-table td.net-profit-col strong.profit-positive{
  color:#047857;
}

.modal-table td.net-profit-col strong.profit-negative{
  color:#be123c;
}
.balance-col .money-link{
  color:#b4235a;
}

.balance-col .money-link:hover{
  color:#e11d48;
}
   
/* ✅ 金額顏色：只改數字，不改整列、不改整張卡 */
.amount-red{
  color:#be123c !important;
}

.amount-green{
  color:#047857 !important;
}
.green-check{
  color:#047857;
  font-size:18px;
  font-weight:900;
}

.red-text{
  color:#be123c !important;
  font-weight:900;
}
.amount-red strong,
.amount-green strong{
  color:inherit !important;
}

.money-link.amount-red,
strong.amount-red{
  color:#be123c !important;
}

.money-link.amount-green,
strong.amount-green{
  color:#047857 !important;
}

/* ✅ 已確認清單：不要整列底色 */
.confirmed-table tr.is-negative-balance td,
.confirmed-table tr.is-negative-balance:hover td,
.confirmed-table tr.is-negative-balance td:first-child,
.confirmed-table tr.is-negative-balance:hover td:first-child,
.confirmed-table tr.is-positive-balance td,
.confirmed-table tr.is-positive-balance:hover td,
.confirmed-table tr.is-positive-balance td:first-child,
.confirmed-table tr.is-positive-balance:hover td:first-child{
  background:#fff !important;
}

/* ✅ 本月淨利、每月開銷、妹妹開銷：主清單維持藍色 */
.confirmed-table td:not(.balance-col) .money-link{
  color:#063f91 !important;
}

.confirmed-table td:not(.balance-col) .money-link:hover{
  color:#0ea5e9 !important;
}

/* ✅ 結餘數字才依正負變色 */
.balance-col .money-link.amount-red{
  color:#be123c !important;
}

.balance-col .money-link.amount-green{
  color:#047857 !important;
}

.balance-col .money-link:hover{
  color:#0ea5e9 !important;
}

/* ✅ 小卡不要整張變色，只讓金額變色 */
.break-item,
.break-item.break-red,
.break-item.break-green,
.break-item.break-total{
  background:#fff !important;
  border-color:var(--line) !important;
}

.break-item .break-label{
  color:#64748b !important;
}

.break-item .break-value{
  color:#0b4a9e;
}

.break-item .break-value .amount-red{
  color:#be123c !important;
}

.break-item .break-value .amount-green{
  color:#047857 !important;
}

/* ✅ 彈窗一般列不要整列變色 */
.modal-table tr.row-positive td,
.modal-table tr.row-negative td,
.modal-table tr.row-total td,
.modal-table tr.row-expense-total td,
.modal-table tr.row-sister-subtotal td,
.modal-table tr.balance-row-positive td,
.modal-table tr.balance-row-negative td{
  background:#fff !important;
  font-weight:normal;
}

/* ✅ 結餘 / 每月開銷 / 妹妹開銷：跳出清單最後一列淡黃色 */
.modal-table tr.row-final-total td{
  background:#fff8db !important;
  font-weight:900;
}

    .modal-table th,

<div class="msg" id="msg"></div>
  </div>

      <div class="modal-head">
        <div>
          <div class="modal-title" id="modalTitle">來源明細</div>
          <div class="hint" id="modalHint"></div>

</div>

<script>
const STORAGE_OK = "company_entry_ok";
if (sessionStorage.getItem(STORAGE_OK) !== "1") {
  location.href = "/company-files/company-index.html";
}

const API_LIST = "https://api.murain.tw/op/company/profit-summary/list";
const API_DETAIL = "https://api.murain.tw/op/company/profit-summary/detail";
const API_ACTION = "https://api.murain.tw/op/company/profit-summary/action";

const $ = (id) => document.getElementById(id);
let allRows = [];

function money(v) {
  const n = Number(String(v ?? "").replace(/[^\d.-]/g, "")) || 0;
  const sign = n < 0 ? "-" : "";
  return `${sign}NT$ ${Math.abs(Math.round(n)).toLocaleString("zh-TW")}`;
}
function signedMoney(v, mode = "auto") {
  const raw = num(v);
  const absText = Math.abs(Math.round(raw)).toLocaleString("zh-TW");

  if (mode === "expense") {
    return `-NT$ ${absText}`;
  }

  if (mode === "income") {
    return `NT$ ${absText}`;
  }

  const sign = raw < 0 ? "-" : "";
  return `${sign}NT$ ${absText}`;
}
function openPhotoPreview(url){
  $("photoPreviewImg").src = url;
  $("photoBackdrop").classList.add("show");
}

function closePhotoPreview(){
  $("photoBackdrop").classList.remove("show");
  $("photoPreviewImg").src = "";
}
function signedAmountClass(v, mode = "auto") {
  if (mode === "expense") return "amount-red";
  if (mode === "income") return "amount-green";
  return num(v) < 0 ? "amount-red" : "amount-green";
}

function signedMoneyHtml(v, mode = "auto") {
  return `<strong class="${signedAmountClass(v, mode)}">${signedMoney(v, mode)}</strong>`;
}
  const EXPENSE_DETAIL_KEYS = new Set([
  "companyGoodsExpense",
  "monthlyReturnSettlement",
  "useCompanySubsidy",
  "cardCompanyExpense",
  "cashCompanyLumi",
  "cashCompanySister",
  "cashCompanyShippingSister",
  "cardSisterExpense",
  "cashBorrowSister"
]);

const INCOME_DETAIL_KEYS = new Set([
  "depositForfeitProfit"
]);
function subsidyTypeZh(v) {
  const raw = String(v || "").trim().toLowerCase();

  const map = {
    use: "使用",
    refund: "退款",
    add: "新增",
    adjust: "調整",
    hold: "保留",
    manual: "手動"
  };

  return map[raw] || String(v || "-");
}
function detailAmountHtml(v, detailKey = "") {
  const n = num(v);
  const absText = Math.abs(Math.round(n)).toLocaleString("zh-TW");

  // 支出類：原本正數 → 顯示 -NT$，紅色
  // 如果原本就是負數 → 代表反向/退回，顯示正數，綠色
  if (EXPENSE_DETAIL_KEYS.has(detailKey)) {
    if (n < 0) {
      return `<strong class="amount-green">NT$ ${absText}</strong>`;
    }
    return `<strong class="amount-red">-NT$ ${absText}</strong>`;
  }

  // 收入類：正數綠色；負數紅色
  if (INCOME_DETAIL_KEYS.has(detailKey)) {
    if (n < 0) {
      return `<strong class="amount-red">-NT$ ${absText}</strong>`;
    }
    return `<strong class="amount-green">NT$ ${absText}</strong>`;
  }

  return `<strong>${money(v)}</strong>`;
}
function text(v) {
  if (Array.isArray(v)) return v.map(x => typeof x === "object" ? (x.name || x.id || "") : String(x)).filter(Boolean).join(" / ");
  if (v == null) return "";
  return String(v);
}
function dateOnly(v){
  const s = text(v).trim();
  if(!s) return "";

  const m1 = s.match(/^(\d{4}年\d{1,2}月\d{1,2}日)/);
  if(m1) return m1[1];

  const m2 = s.match(/^(\d{4}-\d{1,2}-\d{1,2})/);
  if(m2) return m2[1];

  return s;
}
function bool(v) {
  if (typeof v === "boolean") return v;
  const s = String(v ?? "").trim().toLowerCase();
  return ["1","true","yes","y","on","checked","是","已確認","已建立","已扣款"].includes(s);
}

function escHtml(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

async function apiGet(url, params = {}) {
  const u = new URL(url, location.origin);
  Object.entries(params).forEach(([k,v]) => {
    if (v !== undefined && v !== null && String(v).trim() !== "") {
      u.searchParams.set(k, String(v));
    }
  });
  const r = await fetch(u.toString());
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) throw new Error(data.message || data.error || "API 失敗");
  return data;
}

async function apiPost(url, body = {}) {
  const r = await fetch(url, {
    method:"POST",
    headers:{ "content-type":"application/json" },
    body:JSON.stringify(body)
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) throw new Error(data.message || data.error || "API 失敗");
  return data;
}

function tagYesNo(ok, yesText, noText) {
  return ok
    ? `<span class="tag ok">${yesText}</span>`
    : `<span class="tag warn">${noText}</span>`;
}

function tagGray(txt) {
  return `<span class="tag gray">${escHtml(txt || "-")}</span>`;
}

function monthLabel(r) {
  return text(r.month || r.Month || r["月份"] || "");
}

function amountLink(r, key, label, amount) {
  const month = monthLabel(r);
  const id = r.id || r.recordId || "";

  let toneClass = "";
  let displayText = money(amount);

  // ✅ 已確認清單：本月淨利跟每月開銷一樣維持藍色
  if (key === "monthlyProfit") {
    toneClass = "";
    displayText = money(amount);
  }

  // ✅ 已確認清單：只有結餘依正負變色
  if (key === "balance") {
    toneClass = signedAmountClass(amount, "auto");
    displayText = signedMoney(amount, "auto");
  }

  return `<span class="money-link ${toneClass}" data-detail-key="${key}" data-detail-label="${escHtml(label)}" data-month="${escHtml(month)}" data-id="${escHtml(id)}">${displayText}</span>`;
}


function num(v) {
  const n = Number(String(v ?? "").replace(/[^\d.-]/g, ""));
  return Number.isFinite(n) ? n : 0;
}

function getVal(r, keys, fallback = 0) {
  for (const k of keys) {
    const v = r?.[k];
    if (v !== undefined && v !== null && String(v).trim?.() !== "") return v;
  }
  return fallback;
}

function isBaseRow(r) {
  const m = monthLabel(r);
  return m.includes("最新版") || m.includes("基準") || m.includes("結轉");
}

function isMonthRow(r) {
  const m = monthLabel(r).trim();
  return /^\d{4}-\d{1,2}月?$/.test(m);
}

function monthlyExpenseValue(r) {
  return getVal(r, ["monthlyExpense", "每月開銷支出費用"], 0);
}

function sisterPersonalExpenseValue(r) {
  const direct = getVal(r, ["monthlySisterPersonalExpense2", "sisterPersonalExpense2", "每個月妹妹個人開銷*2", "每個月妹妹個人開銷２"], null);
  if (direct !== null && direct !== undefined) return direct;
  return num(getVal(r, ["cardSisterExpense", "信用卡-妹妹個人支出"], 0)) +
         num(getVal(r, ["cashBorrowSister", "現金-借支 [妹妹]", "現金-借支 [ 妹妹 ]"], 0)) +
         num(getVal(r, ["sisterMortgage", "妹妹白河農會房貸"], 0));
}

function transferMortgageAmountValue(r) {
  return getVal(r, ["transferMortgageAmount", "transferRepayAmount", "轉房貸金額"], 0);
}

function getRowByMonth(month) {
  return allRows.find(r => monthLabel(r) === month) || null;
}

function getRowById(id) {
  return allRows.find(r => String(r.id || r.recordId || "") === String(id)) || null;
}

function breakdownItems(r, type) {
  if (type === "monthlyExpense") {
    return [
      ["[公司1] 公司貨款支出", getVal(r, ["companyGoodsExpense", "公司貨款支出", "公司1"], 0), "companyGoodsExpense"],
      ["[公司2] 本月退貨結算", getVal(r, ["monthlyReturnSettlement", "本月退貨結算"], 0), "monthlyReturnSettlement"],
      ["[公司3] 使用_公司補貼", getVal(r, ["useCompanySubsidy", "使用_公司補貼"], 0), "useCompanySubsidy"],
      ["[公司4] 信用卡公司支出", getVal(r, ["cardCompanyExpense", "信用卡公司支出"], 0), "cardCompanyExpense"],
      ["[公司5] 現金-公司支出 [ LUMI ]", getVal(r, ["cashCompanyLumi", "現金-公司支出 [ LUMI ]"], 0), "cashCompanyLumi"],
      ["[公司6] 現金-公司支出 [ 妹妹 ]", getVal(r, ["cashCompanySister", "現金-公司支出 [妹妹]", "現金-公司支出 [ 妹妹 ]"], 0), "cashCompanySister"],
      ["[公司7] 現金-公司運費 [ 妹妹 ]", getVal(r, ["cashCompanyShippingSister", "現金-公司運費 [妹妹]", "現金-公司運費 [ 妹妹 ]"], 0), "cashCompanyShippingSister"],
      ["[公司8] 定金沒收進利", getVal(r, ["depositForfeitProfit", "定金沒收進利"], 0), "depositForfeitProfit"]
    ];
  }

  if (type === "sisterPersonal") {
    return [
      ["[妹妹1] 信用卡-妹妹個人支出", getVal(r, ["cardSisterExpense", "信用卡-妹妹個人支出"], 0), "cardSisterExpense"],
      ["[妹妹2] 現金-借支 [ 妹妹 ]", getVal(r, ["cashBorrowSister", "現金-借支 [妹妹]", "現金-借支 [ 妹妹 ]"], 0), "cashBorrowSister"],
      ["[妹妹3] 妹妹白河農會房貸", getVal(r, ["sisterMortgage", "妹妹白河農會房貸"], 0), "sisterMortgage"]
    ];
  }

  if (type === "transferMortgage") {
    const balanceRepay = bool(r.useBalanceForMortgage ?? r.balanceRepay ?? r["轉房貸_用結餘"]);
    const repayCreated = bool(r.repaymentRecordCreated ?? r.refundCreated ?? r["已建立還款紀錄"]);
    return [
      ["支付妹妹公司費用", getVal(r, ["paySisterCompanyExpense", "支付妹妹公司費用"], 0), "paySisterCompanyExpense"],
      ["個人作業業績", balanceRepay ? getVal(r, ["balance", "結餘"], 0) : 0, "personalPerformance"],
      ["已建立還款紀錄", repayCreated ? "已建立" : "尚未建立", "repaymentRecordCreated"],
      ["房貸還款日期", text(getVal(r, ["mortgageRepayDate", "repaymentDate", "房貸還款日期"], "")) || "-", "mortgageRepayDate"]
    ];
  }
  return [];
}
function breakdownValueMode(type, key){
  // 每月開銷：公司1-7 是支出，紅色且前面有 -
  // 公司8 定金沒收進利是收入，綠色
  if (type === "monthlyExpense") {
    return key === "depositForfeitProfit" ? "income" : "expense";
  }

  // 妹妹個人開銷：妹妹1-3 都是支出，紅色且前面有 -
  if (type === "sisterPersonal") {
    return "expense";
  }

  return "auto";
}
function renderBreakdownRow(r, type) {
  const items = breakdownItems(r, type);
  const title = { monthlyExpense:"每月開銷支出費用", sisterPersonal:"每個月妹妹個人開銷*2", transferMortgage:"轉房貸金額" }[type] || "明細";
  return `
    <tr class="detail-row" data-detail-row="${escHtml(monthLabel(r))}-${type}">
<td colspan="5">
<strong>${escHtml(monthLabel(r))}｜${title}</strong>
        <div class="breakdown" style="margin-top:10px;">
          ${items.map(([label,value,key]) => `
            <div class="break-item" data-detail-key="${escHtml(key || type)}" data-detail-label="${escHtml(label)}" data-month="${escHtml(monthLabel(r))}" data-id="${escHtml(r.id || r.recordId || "")}" style="cursor:pointer;">
  <div class="break-label">${escHtml(label)}｜點我看來源</div>
  <div class="break-value">${typeof value === "number" || /^-?\d/.test(String(value)) ? signedMoneyHtml(value, breakdownValueMode(type, key)) : escHtml(value)}</div>
</div>
          `).join("")}
        </div>
      </td>
    </tr>`;
}

function toggleBreakdown(id, type, btn) {
  const row = getRowById(id);
  if (!row) return;

  const tr = btn.closest("tr");
  const key = `${monthLabel(row)}-${type}`;
  const next = tr.nextElementSibling;
  if (next && next.dataset.detailRow === key) {
    next.remove();
    btn.textContent = "＋";
    return;
  }

  document.querySelectorAll(".detail-row").forEach(el => el.remove());
  document.querySelectorAll(".plus-btn").forEach(b => b.textContent = "＋");

  tr.insertAdjacentHTML("afterend", renderBreakdownRow(row, type));
  btn.textContent = "－";
}
function renderHeroTotal() {
  if (!allRows.length) {
    $("heroTotalAsset").textContent = "NT$ 0";
    if ($("heroSub")) $("heroSub").textContent = "目前沒有已確認清單資料。";
    return;
  }

  // ✅ 直接跟「已確認清單」使用同一批資料
  const confirmedRows = allRows.filter(r =>
    bool(r.confirmed ?? r.confirmedCompanyAccount ?? r["確認入公司帳"])
  );

  const confirmedBalanceTotal = confirmedRows.reduce((sum, r) => {
    return sum + num(getVal(r, ["balance", "結餘"], 0));
  }, 0);

  $("heroTotalAsset").textContent = money(confirmedBalanceTotal);

  if ($("heroSub")) {
    $("heroSub").textContent = `目前加總已確認清單內 ${confirmedRows.length} 筆結餘。`;
  }
}

function profitMonthSortValue(r){
  const m = monthLabel(r).trim().match(/^(\d{4})-(\d{1,2})月?/);
  return m ? (Number(m[1]) * 100 + Number(m[2])) : 999999;
}

function renderProfitRowHtml(r){
  const month = monthLabel(r);
  const id = r.id || r.recordId || "";
  const confirmed = bool(r.confirmed ?? r.confirmedCompanyAccount ?? r["確認入公司帳"]);

  const balance = getVal(r, ["balance", "結餘"], 0);
  const monthlyProfit = getVal(r, ["monthlyProfit", "本月淨利"], 0);
  const mExpense = monthlyExpenseValue(r);
  const sExpense = sisterPersonalExpenseValue(r);
  const repayAmount = transferMortgageAmountValue(r);

  return `
    <tr data-row-id="${escHtml(id)}" data-month="${escHtml(month)}">
      <td><strong>${escHtml(month)}</strong></td>
      <td>${tagYesNo(confirmed, "已確認", "未確認")}</td>
    <td class="balance-col">${amountLink(r, "balance", "結餘", balance)}</td>
      <td>${amountLink(r, "monthlyProfit", "本月淨利", monthlyProfit)}</td>
      <td>
        <span class="money-inline">
          ${amountLink(r, "monthlyExpense", "每月開銷支出費用", mExpense)}
          <button class="plus-btn" data-expand="monthlyExpense" data-id="${escHtml(id)}">＋</button>
        </span>
      </td>
      <td>
        <span class="money-inline">
          ${amountLink(r, "sisterPersonalExpense", "每個月妹妹個人開銷*2", sExpense)}
          <button class="plus-btn" data-expand="sisterPersonal" data-id="${escHtml(id)}">＋</button>
        </span>
      </td>
      <td>
        <div class="ops">
          <button
            class="btn-mini btn green"
            data-action="confirm_company_account"
            data-id="${escHtml(id)}"
            ${confirmed ? "disabled" : ""}
          >確認入帳</button>
        </div>
      </td>
    </tr>
  `;
}
function renderConfirmedProfitRowHtml(r){
  const month = monthLabel(r);
  const id = r.id || r.recordId || "";

  const balance = getVal(r, ["balance", "結餘"], 0);
  const monthlyProfit = getVal(r, ["monthlyProfit", "本月淨利"], 0);
  const mExpense = monthlyExpenseValue(r);
  const sExpense = sisterPersonalExpenseValue(r);

  return `
    <tr data-row-id="${escHtml(id)}" data-month="${escHtml(month)}">
      <td><strong>${escHtml(month)}</strong></td>
      <td class="balance-col">${amountLink(r, "balance", "結餘", balance)}</td>
      <td>${amountLink(r, "monthlyProfit", "本月淨利", monthlyProfit)}</td>
      <td>
        <span class="money-inline">
          ${amountLink(r, "monthlyExpense", "每月開銷支出費用", mExpense)}
          <button class="plus-btn" data-expand="monthlyExpense" data-id="${escHtml(id)}">＋</button>
        </span>
      </td>
      <td>
        <span class="money-inline">
          ${amountLink(r, "sisterPersonalExpense", "每個月妹妹個人開銷*2", sExpense)}
          <button class="plus-btn" data-expand="sisterPersonal" data-id="${escHtml(id)}">＋</button>
        </span>
      </td>
    </tr>
  `;
}
function renderUnconfirmedMiniRowHtml(r){
  const month = monthLabel(r);
  const id = r.id || r.recordId || "";
  const balance = getVal(r, ["balance", "結餘"], 0);

  return `
    <div class="pending-mini-row" data-row-id="${escHtml(id)}" data-month="${escHtml(month)}">
      <div>
        <input
          type="checkbox"
          class="pending-mini-check"
          data-id="${escHtml(id)}"
          data-month="${escHtml(month)}"
        />
      </div>
      <div class="pending-mini-month">${escHtml(month)}</div>
      <div class="pending-mini-balance">${money(balance)}</div>
    </div>
  `;
}
function renderRows() {
  const confirmedRows = allRows.filter(r =>
    bool(r.confirmed ?? r.confirmedCompanyAccount ?? r["確認入公司帳"])
  );

  const unconfirmedRows = allRows.filter(r => {
    const confirmed = bool(
      r.confirmed ??
      r.confirmedCompanyAccount ??
      r["確認入公司帳"]
    );

    const balanceRepay = bool(
      r.useBalanceForMortgage ??
      r.balanceRepay ??
      r["轉房貸_用結餘"]
    );

       // 已確認入帳，或已勾結餘轉還款，就不要再出現在小框框
    return !confirmed && !balanceRepay;
  }).sort((a, b) => profitMonthSortValue(a) - profitMonthSortValue(b));

  $("confirmedCountTag").textContent = `${confirmedRows.length} 筆`;
  $("pendingMiniCountTag").textContent = `${unconfirmedRows.length} 筆`;

  $("confirmedRows").innerHTML = confirmedRows.length
    ? confirmedRows.map(renderConfirmedProfitRowHtml).join("")
    : `<tr><td colspan="5" class="empty">目前沒有已確認資料。</td></tr>`;

  $("unconfirmedMiniRows").innerHTML = unconfirmedRows.length
    ? unconfirmedRows.map(renderUnconfirmedMiniRowHtml).join("")
    : `<div class="empty">目前沒有未確認資料。</div>`;
}
async function loadRows({ keepScroll = false } = {}) {
  const oldScroll = document.querySelector(".table-wrap")?.scrollTop || 0;
  $("msg").textContent = "載入中...";
  $("msg").className = "msg";

  try {
    const data = await apiGet(API_LIST, { max: 300 });
    allRows = Array.isArray(data.rows) ? data.rows : [];
    renderHeroTotal();
    renderRows();
    $("msg").textContent = `✅ 載入 ${allRows.length} 筆`;
    $("msg").className = "msg ok";
    if (keepScroll) {
      setTimeout(() => { document.querySelector(".table-wrap").scrollTop = oldScroll; }, 0);
    }
  } catch (err) {
    const errHtmlConfirmed = `<tr><td colspan="5" class="empty">❌ ${escHtml(err.message || err)}</td></tr>`;
const errHtmlUnconfirmed = `<div class="empty">❌ ${escHtml(err.message || err)}</div>`;
$("confirmedRows").innerHTML = errHtmlConfirmed;
$("unconfirmedMiniRows").innerHTML = errHtmlUnconfirmed;
    $("unconfirmedMiniRows").innerHTML = `<div class="empty">❌ ${escHtml(err.message || err)}</div>`;
    $("msg").textContent = `❌ ${err.message || err}`;
    $("msg").className = "msg err";
  }
}

function closeModal() {
  $("modalBackdrop").classList.remove("show");
}

function openModal(title, hint, html) {
  $("modalTitle").textContent = title;
  $("modalHint").textContent = hint || "";
  $("modalBody").innerHTML = html;
  $("modalBackdrop").classList.add("show");
}
function renderBalanceDetailTable(r){
  const monthlyProfit = num(getVal(r, ["monthlyProfit", "本月淨利"], 0));
  const monthlyExpense = num(monthlyExpenseValue(r));
  const sisterExpense = num(sisterPersonalExpenseValue(r));
  const balance = num(getVal(r, ["balance", "結餘"], 0));

  return `
    <div class="table-wrap" style="max-height:58vh;">
      <table class="modal-table">
        <thead>
          <tr>
            <th>欄位</th>
            <th>金額</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>本月淨利</td>
            <td>${signedMoneyHtml(monthlyProfit, "auto")}</td>
          </tr>
          <tr>
            <td>每月開銷支出費用</td>
            <td>${signedMoneyHtml(monthlyExpense, "expense")}</td>
          </tr>
          <tr>
            <td>每個月妹妹個人開銷*2</td>
            <td>${signedMoneyHtml(sisterExpense, "expense")}</td>
          </tr>
          <tr class="row-final-total">
            <td>結餘</td>

  function detailColumnsByKey(detailKey, keys) {
  const has = (k) => keys.includes(k);
  const keep = (arr) => arr.filter(k => has(k));

  // 公司1、公司5、公司6、公司7、妹妹2：現金支出類
  if ([
    "companyGoodsExpense",
    "cashCompanyLumi",
    "cashCompanySister",
    "cashCompanyShippingSister",
    "cashBorrowSister"
  ].includes(detailKey)) {
    return keep([
      "date",
      "category",
      "detail",
      "photoUrls",
      "amount",
      "statusChecked",
      "signedChecked"
    ]);
  }

  // 公司2：退貨結算 / 取消訂單淨利表
  if (detailKey === "monthlyReturnSettlement") {
    return keep([
      "orderId",
      "createdAt",
      "cancelDate",
      "netProfit",
      "productDetail"
    ]);
  }

  // 公司3：購物金
if (detailKey === "useCompanySubsidy") {
  return keep([
    "orderId",
    "createdAt",
    "lineName",
    "type",
    "companySubsidyUsed"
  ]);
}

 // 公司4：信用卡公司支出，保留關聯欄位
if (detailKey === "cardCompanyExpense") {
  return keep([
    "bank",
    "billMonth",
    "transDate",
    "cardDetail",
    "amount",
    "note",
    "expenseCategory",
    "purchaseLink",
    "shippingLink",
    "refundLink"
  ]);
}

// 妹妹1：信用卡-妹妹個人支出，去除 3 個關聯欄位
if (detailKey === "cardSisterExpense") {
  return keep([
    "bank",
    "billMonth",
    "transDate",
    "cardDetail",
    "amount",
    "note",
    "expenseCategory"
  ]);
}

  // 公司8：定金沒收進利
  if (detailKey === "depositForfeitProfit") {
    return keep([
      "orderId",
      "createdAt",
      "lineName",
      "depositForfeitAmount",
      "cancelReason",
      "depositForfeitDecision",
      "depositForfeitTime",
      "productDetail"
    ]);
  }

  // 妹妹3：手動輸入
  if (detailKey === "sisterMortgage") {
    return keep([
      "month",
      "sisterMortgageAmount"
    ]);
  }

  // 本月淨利來源
  if (detailKey === "monthlyProfit") {
    return keep([
      "orderId",
      "createdAt",
      "lineName",
      "streamer",
      "paidAmount",
      "netProfit",
      "productDetail"
    ]);
  }

  return keep([
    "date",
    "category",
    "detail",
    "photoUrls",
    "amount",
    "statusChecked",
    "signedChecked"
  ]);
}
function renderDetailTable(items, detailKey = "") {
  if (!Array.isArray(items) || !items.length) {
    return `<div class="empty">目前沒有來源明細。</div>`;
  }

  const keys = [];
  for (const it of items) {
    Object.keys(it || {}).forEach(k => {
      if (!keys.includes(k) && !["id", "recordId", "source"].includes(k)) {
        keys.push(k);
      }
    });
  }

  let finalKeys = detailColumnsByKey(detailKey, keys);

  if (!finalKeys.length) {
    finalKeys = keys.filter(k => !["id", "recordId", "source"].includes(k)).slice(0, 8);
  }

  return `
    <div class="table-wrap" style="max-height:58vh;">
      <table class="modal-table">
        <thead>
          <tr>${finalKeys.map(k => `
            <th class="${k === "netProfit" ? "net-profit-col" : ""}">
              ${escHtml(labelForKey(k))}
            </th>
          `).join("")}</tr>
        </thead>
        <tbody>
          ${items.map(it => `
            <tr>
              ${finalKeys.map(k => `
                <td class="${k === "netProfit" ? "net-profit-col" : ""}">
                  ${formatDetailValue(k, it?.[k], detailKey)}
                </td>
              `).join("")}
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function labelForKey(k) {
  const map = {
    // 現金支出類
    date:"日期",
    category:"分類",
    detail:"說明",
    photoUrls:"圖片",
    amount:"金額",
    statusChecked:"狀態",
    signedChecked:"簽收",

    // 公司2 / 公司3 / 公司8
    orderId:"單號",
    createdAt:"建單時間",
    cancelDate:"取消日期",
    netProfit:"取消進利",
    productDetail:"商品明細",
   lineName:"Line名稱",
type:"類型",
companySubsidyUsed:"支出購物金金額",

    // 信用卡帳單
    bank:"銀行",
    billMonth:"月份",
    transDate:"交易日期",
    cardDetail:"明細",
    note:"備註",
    expenseCategory:"類別",
    purchaseLink:"[關聯] 採購單",
    shippingLink:"[關聯] 轉運單",
    refundLink:"[關聯] 退款登記",

    // 公司8
    depositForfeitAmount:"訂金沒收金額",
    cancelReason:"取消原因",
    depositForfeitDecision:"訂金沒收判定",
    depositForfeitTime:"訂金沒收時間",

    // 妹妹3
    month:"月份",
    sisterMortgageAmount:"白河農會房貸",

    // 本月淨利
    streamer:"直播主",
    paidAmount:"應付金額",

    status:"狀態",
    signed:"簽收",
    checked:"核對"
  };
  return map[k] || k;
}
function formatDetailValue(k, v, detailKey = "") {
  if (k === "type") {
  return escHtml(subsidyTypeZh(v));
}
  // 現金支出類：狀態 / 簽收分開欄位，有打勾才顯示綠色勾勾
  if (k === "statusChecked" || k === "signedChecked") {
    return bool(v) ? `<span class="green-check">✓</span>` : "";
  }

  if (k === "photoUrls") {
    const urls = Array.isArray(v) ? v : (text(v) ? [text(v)] : []);

    if (!urls.length) return "-";

    return `
      <div class="photo-thumb-list">
        ${urls.map(url => `
          <img
            src="${escHtml(url)}"
            class="photo-thumb"
            data-photo-url="${escHtml(url)}"
            alt="拍照/截圖"
          />
        `).join("")}
      </div>
    `;
  }

  if ([
    "createdAt",
    "cancelDate",
    "transDate",
    "depositForfeitTime"
  ].includes(k)) {
    const value = escHtml(dateOnly(v));
    if (k === "cancelDate") return `<span class="red-text">${value}</span>`;
    return value;
  }

  if (k === "productDetail") {
    const detail = escHtml(text(v) || "-");
    return `
      <button type="button" class="product-detail-toggle">＋</button>
      <div class="product-detail-box">${detail}</div>
    `;
  }

 // 公司2：取消進利，維持紅色
if (k === "netProfit") {
  return `<strong class="amount-red">${money(v)}</strong>`;
}

// 公司3：支出購物金金額
// 正數 → 加 -，紅色；負數 → 去掉 -，綠色
if (k === "companySubsidyUsed") {
  return detailAmountHtml(v, "useCompanySubsidy");
}

// 公司8：定金沒收進利，顯示綠色
if (k === "depositForfeitAmount") {
  return `<strong class="amount-green">${money(Math.abs(num(v)))}</strong>`;
}

  // 妹妹3 手動輸入金額
  if (k === "sisterMortgageAmount") {
    return `<strong>${money(v)}</strong>`;
  }

  // 一般金額
  if (["amount", "金額", "paidAmount"].includes(k)) {
    if (k === "amount" || k === "金額") {
      return detailAmountHtml(v, detailKey);
    }
    return `<strong>${money(v)}</strong>`;
  }

  if (typeof v === "boolean") return v ? "是" : "否";
  return escHtml(text(v) || "-");
}

async function openDetail(month, key, label, id = "") {
  if (key === "balance") {
    const row = getRowById(id) || getRowByMonth(month);

    if (row) {
      openModal(
        `${month}｜結餘`,
        "結餘＝本月淨利－每月開銷支出費用－每個月妹妹個人開銷*2",
        renderBalanceDetailTable(row)
      );
      return;
    }
  }

  openModal(`${month}｜${label}`, "載入來源明細中...", `<div class="empty">載入中...</div>`);

  try {
    const data = await apiGet(API_DETAIL, { id, month, key, field: key, type: key });
    const items = Array.isArray(data.items) ? data.items :
                  Array.isArray(data.rows) ? data.rows :
                  Array.isArray(data.details) ? data.details : [];

    const summaryHtml = data.summary ? `
      <div style="margin-bottom:12px;line-height:1.7;">
        ${Object.entries(data.summary).map(([k,v]) => `<div><strong>${escHtml(k)}：</strong>${escHtml(text(v))}</div>`).join("")}
      </div>
    ` : "";

   if (key === "monthlyExpense") {
  openModal(
    `${month}｜${label}`,
    `來源明細：${items.length} 筆`,
    renderMonthlyExpenseSummaryTable(items)
  );
  return;
}

if (key === "sisterPersonalExpense") {
  openModal(
    `${month}｜${label}`,
    `來源明細：${items.length} 筆`,
    renderSisterExpenseSummaryTable(items)
  );
  return;
}

openModal(`${month}｜${label}`, `來源明細：${items.length} 筆`, summaryHtml + renderDetailTable(items, key));
  } catch (err) {
    openModal(`${month}｜${label}`, "讀取失敗", `<div class="empty">❌ ${escHtml(err.message || err)}</div>`);
  }
}

function openLoanPanel(id, month) {
  const row = allRows.find(r => (r.id || r.recordId || "") === id) || getRowByMonth(month) || {};
  const sisterFeeAuto = bool(row.useSisterFeeForMortgage ?? row.sisterFeeRepayAuto ?? row["轉房貸_用妹妹公司費用"]);
  const balanceRepay = bool(row.useBalanceForMortgage ?? row.balanceRepay ?? row["轉房貸_用結餘"]);
  const repayCreated = bool(row.repaymentRecordCreated ?? row.refundCreated ?? row["已建立還款紀錄"]);
  const repayDate = text(row.mortgageRepayDate ?? row.repaymentDate ?? row["房貸還款日期"]);
  const repayAmount = row.transferMortgageAmount ?? row.transferRepayAmount ?? row["轉房貸金額"];

  const html = `
    <div style="display:grid;gap:12px;line-height:1.8;">
      <div><strong>月份：</strong>${escHtml(month)}</div>
      <div><strong>轉房貸金額：</strong><span class="money-link">${money(repayAmount)}</span></div>
      <div><strong>妹妹費用轉還款：</strong>${sisterFeeAuto ? `<span class="tag ok">已自動成立</span>` : `<span class="tag gray">尚未成立</span>`}</div>
      <div><strong>結餘轉還款：</strong>${balanceRepay ? `<span class="tag ok">已勾選</span>` : `<span class="tag gray">未勾選</span>`}</div>
      <div><strong>還款紀錄：</strong>${repayCreated ? `<span class="tag ok">已建立</span>` : `<span class="tag warn">尚未建立</span>`}</div>
      <div><strong>房貸還款日期：</strong>${escHtml(repayDate || "-")}</div>
      <div class="hint">這裡只看還款狀態。清單表不再顯示結餘轉還款、還款紀錄等欄位，保持乾淨。</div>
      <div class="toolbar">
        <button class="btn orange" data-action="use_balance_repay" data-id="${escHtml(id)}" ${balanceRepay ? "disabled" : ""}>結餘轉還款</button>
        <button class="btn gray" data-action="create_repayment_record" data-id="${escHtml(id)}" ${repayCreated ? "disabled" : ""}>建立還款紀錄</button>
      </div>
    </div>
  `;

  openModal(`${month}｜房貸／借款主檔紀錄`, "結餘轉還款、妹妹費用轉還款、還款紀錄都集中在這裡看。", html);
}

function getSelectedPendingMiniRows(){
  return [...document.querySelectorAll(".pending-mini-check:checked")].map(ck => ({
    id: ck.dataset.id || "",
    month: ck.dataset.month || ""
  })).filter(x => x.id);
}

async function runPendingMiniBatchAction(action){
  const picked = getSelectedPendingMiniRows();

  if (!picked.length) {
    alert("請先勾選要處理的月份。");
    return;
  }

  const actionText = {
    confirm_company_account: "確認入帳",
    use_balance_repay: "結餘轉還款"
  }[action] || action;

  const monthText = picked.map(x => x.month).filter(Boolean).join("、");

  if (!confirm(`確定要對 ${picked.length} 筆執行「${actionText}」？\n${monthText}`)) {
    return;
  }

  $("msg").textContent = `執行中：${actionText}...`;
  $("msg").className = "msg";

  try {
    for (const row of picked) {
      await apiPost(API_ACTION, {
        id: row.id,
        action,
        month: row.month
      });
    }

    $("msg").textContent = `✅ 已完成：${actionText} ${picked.length} 筆`;
    $("msg").className = "msg ok";
    await loadRows({ keepScroll:true });
  } catch (err) {
    $("msg").textContent = `❌ ${err.message || err}`;
    $("msg").className = "msg err";
  }
}
async function runAction(action, id) {
  const rowEl = document.querySelector(`[data-row-id="${CSS.escape(id)}"]`);
const month = rowEl?.dataset?.month || "";
  const actionText = {
    confirm_company_account: "確認入公司帳",
    mark_baihe_mortgage_paid: "白河房貸已扣款",
    use_balance_repay: "結餘轉還款",
    create_repayment_record: "建立還款紀錄"
  }[action] || action;

  if (!id) {
    $("msg").textContent = "❌ 找不到這筆資料 ID";
    $("msg").className = "msg err";
    return;
  }

  if (!confirm(`確定要執行「${actionText}」？\n月份：${month}`)) return;

  $("msg").textContent = `執行中：${actionText}...`;
  $("msg").className = "msg";

  try {
    const data = await apiPost(API_ACTION, { id, action, month });
    const warn = data.warning ? `\n⚠️ ${data.warning}` : "";
    $("msg").textContent = `✅ 已完成：${actionText}${warn}`;
    $("msg").className = data.warning ? "msg err" : "msg ok";
    await loadRows({ keepScroll:true });
  } catch (err) {
    $("msg").textContent = `❌ ${err.message || err}`;
    $("msg").className = "msg err";
  }
}
$("btnMiniConfirm").addEventListener("click", () => {
  runPendingMiniBatchAction("confirm_company_account");
});

$("btnMiniBalanceRepay").addEventListener("click", () => {
  runPendingMiniBatchAction("use_balance_repay");
});
$("btnReload").addEventListener("click", () => loadRows());
$("btnLatest").addEventListener("click", () => {
  if (!allRows.length) return;
  const latest = monthLabel(allRows.find(r => isMonthRow(r)) || allRows[0]);
  const tr = document.querySelector(`tr[data-month="${CSS.escape(latest)}"]`);
  tr?.scrollIntoView({ behavior:"smooth", block:"center" });
});
$("btnCloseModal").addEventListener("click", closeModal);
$("modalBackdrop").addEventListener("click", (e) => {
  if (e.target.id === "modalBackdrop") closeModal();
});

document.addEventListener("click", (e) => {
  const photoThumb = e.target.closest(".photo-thumb");
if (photoThumb) {
  const url = photoThumb.dataset.photoUrl || "";
  if (url) openPhotoPreview(url);
  return;
}
    const productBtn = e.target.closest(".product-detail-toggle");
  if (productBtn) {
    const box = productBtn.nextElementSibling;
    const isOpen = box?.classList?.contains("show");

    document.querySelectorAll(".product-detail-box.show").forEach(el => el.classList.remove("show"));
    document.querySelectorAll(".product-detail-toggle").forEach(btn => btn.textContent = "＋");

    if (box && !isOpen) {
      box.classList.add("show");
      productBtn.textContent = "－";
    }
    return;
  }
  const expandBtn = e.target.closest("[data-expand]");
  if (expandBtn) {
    toggleBreakdown(expandBtn.dataset.id, expandBtn.dataset.expand, expandBtn);
    return;
  }

  const detail = e.target.closest("[data-detail-key]");
  if (detail) {
    openDetail(detail.dataset.month, detail.dataset.detailKey, detail.dataset.detailLabel, detail.dataset.id || "");
    return;
  }

  const loanBtn = e.target.closest("[data-loan-panel]");
  if (loanBtn) {
    openLoanPanel(loanBtn.dataset.id, loanBtn.dataset.month);
    return;
  }

  const actionBtn = e.target.closest("[data-action]");
  if (actionBtn) {
    runAction(actionBtn.dataset.action, actionBtn.dataset.id);
  }
});

loadRows();
