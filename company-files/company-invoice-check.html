<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>公司檔案管理｜發票核對</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#c81e1e;
      --ok:#0f766e;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.sub-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }

    .page-tab,.sub-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
    }
    .page-tab{
      color:#fff;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,
    .sub-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .sub-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .page-head-left{
      flex:1;
      min-width:0;
    }
    .page-head-right{
      width:360px;
      max-width:100%;
      flex:0 0 auto;
    }
    h1{
      margin:0 0 8px;
      font-size:32px;
    }
    h2{
      margin:0 0 14px;
      font-size:20px;
    }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .full{ grid-column:1 / -1; }

    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, textarea, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    textarea{
      min-height:120px;
      resize:vertical;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.danger{ background:var(--danger); }

    .soft-box{
      background:var(--soft);
      border:1px solid var(--soft-border);
      border-radius:16px;
      padding:16px;
    }
    .soft-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }
    .soft-text{
      color:#31538f;
      line-height:1.7;
      font-size:14px;
      white-space:pre-wrap;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    table{
      width:100%;
      min-width:1180px;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:top;
    }
    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:#eef6ff;
      border:1px solid #cfe3ff;
      color:#0f3f8c;
      font-size:13px;
      font-weight:700;
    }

    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
      margin-top:10px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }

    @media (max-width: 980px){
      .page-head{ flex-direction:column; }
      .page-head-right{ width:100%; }
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html">直播主開單</a>
      <a class="page-tab" href="/admin.html">訂單後台</a>
      <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
      <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
      <a class="page-tab" href="/op/preorder-cost.html">預購成本補登</a>
      <a class="page-tab" href="/stock.html">庫存查詢</a>
      <a class="page-tab" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
      <a class="page-tab is-active" href="/company-files/company-index.html">公司檔案管理</a>
    </div>

    <div class="sub-tabs-bar">
      <a class="sub-tab is-active" href="/company-files/company-invoice-check.html">發票核對</a>
      <a class="sub-tab" href="/company-files/company-card-bills.html">信用卡帳單</a>
      <a class="sub-tab" href="/company-files/company-cash-expense.html">現金支出</a>
      <a class="sub-tab" href="/company-files/company-profit-summary.html">公司進利總結</a>
      <a class="sub-tab" href="/company-files/company-ship711-settlement.html">賣貨便結算</a>
      <a class="sub-tab" href="/company-files/company-loan-mortgage.html">房貸／借款主檔紀錄</a>
    </div>
  </div>

  <div class="wrap">
    <div class="page-head">
      <div class="page-head-left">
        <h1>發票核對</h1>
        <div class="sub">
          這一版先做空白骨架頁。<br>
          之後可以往下接：查詢條件、核對清單、異常標記、儲存結果、匯出資料。
        </div>
      </div>

      <div class="page-head-right">
        <div class="soft-box">
          <div class="soft-title">登入狀態</div>
          <div class="soft-text" id="gateStatus">檢查中...</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>1. 查詢條件</h2>
      <div class="grid">
        <div>
          <label>關鍵字</label>
          <input id="keyword" placeholder="搜尋發票號碼 / 訂單編號 / 備註" />
        </div>
        <div>
          <label>開始日期</label>
          <input id="dateFrom" type="date" />
        </div>
        <div>
          <label>結束日期</label>
          <input id="dateTo" type="date" />
        </div>
        <div>
          <label>狀態</label>
          <select id="status">
            <option value="">全部</option>
            <option value="pending">待核對</option>
            <option value="done">已核對</option>
            <option value="error">異常</option>
          </select>
        </div>
      </div>

      <div class="toolbar">
        <button class="btn" type="button" id="btnSearch">查詢</button>
        <button class="btn secondary" type="button" id="btnReset">清除條件</button>
      </div>

      <div class="msg" id="msg">這是發票核對空白頁，尚未接 Airtable API。</div>
    </div>

    <div class="card">
      <h2>2. 核對清單</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:140px;">發票日期</th>
              <th style="width:160px;">發票號碼</th>
              <th style="width:180px;">訂單編號</th>
              <th style="width:140px;">金額</th>
              <th>備註</th>
              <th style="width:120px;">狀態</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="6" style="color:#6b7280;">目前尚未接資料，這裡先保留表格版型。</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>3. 備註 / 異常說明</h2>
      <label for="noteBox">備註內容</label>
      <textarea id="noteBox" placeholder="這裡可先放你之後要補的核對說明或異常備註"></textarea>

      <div class="toolbar">
        <button class="btn" type="button">儲存</button>
        <button class="btn secondary" type="button">下載／匯出</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_OK = "company_entry_ok";

    if (sessionStorage.getItem(STORAGE_OK) !== "1") {
      location.href = "/company-files/company-index.html";
    }

    document.getElementById("gateStatus").textContent = "✅ 已通過首頁驗證，可以進入此模組。";

    const msgEl = document.getElementById("msg");
    const keywordEl = document.getElementById("keyword");
    const dateFromEl = document.getElementById("dateFrom");
    const dateToEl = document.getElementById("dateTo");
    const statusEl = document.getElementById("status");

    document.getElementById("btnSearch").addEventListener("click", () => {
      msgEl.textContent =
        `查詢條件（尚未接 API）\n關鍵字：${keywordEl.value.trim()}\n開始日期：${dateFromEl.value}\n結束日期：${dateToEl.value}\n狀態：${statusEl.value || "全部"}`;
      msgEl.className = "msg ok";
    });

    document.getElementById("btnReset").addEventListener("click", () => {
      keywordEl.value = "";
      dateFromEl.value = "";
      dateToEl.value = "";
      statusEl.value = "";
      msgEl.textContent = "已清除查詢條件。";
      msgEl.className = "msg ok";
    });
  </script>
</body>
</html>
