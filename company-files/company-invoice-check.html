<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>公司檔案管理｜發票核對</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#c81e1e;
      --ok:#0f766e;
      --warn:#b45309;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.sub-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.sub-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
    }
    .page-tab{
      color:#fff;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,
    .sub-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .sub-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }

    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .page-head-left{
      flex:1;
      min-width:0;
    }
    .page-head-right{
      width:380px;
      max-width:100%;
      flex:0 0 auto;
    }
    h1{
      margin:0 0 8px;
      font-size:32px;
    }
    h2{
      margin:0 0 14px;
      font-size:20px;
    }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .soft-box{
      background:var(--soft);
      border:1px solid var(--soft-border);
      border-radius:16px;
      padding:16px;
    }
    .soft-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }
    .soft-text{
      color:#31538f;
      line-height:1.7;
      font-size:14px;
      white-space:pre-wrap;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    table{
      width:100%;
      min-width:980px;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:middle;
    }
    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid #cfe3ff;
      background:#eef6ff;
      color:#0f3f8c;
    }
    .badge.warn{
      border-color:#f5d7a1;
      background:#fff7e6;
      color:#b45309;
    }
    .badge.danger{
      border-color:#f0b2b2;
      background:#fff1f1;
      color:#b91c1c;
    }
    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
      margin-top:10px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .empty{
      color:var(--muted);
      font-size:14px;
      padding:14px 0;
    }

    @media (max-width: 980px){
      .page-head{ flex-direction:column; }
      .page-head-right{ width:100%; }
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html">直播主開單</a>
      <a class="page-tab" href="/admin.html">訂單後台</a>
      <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
      <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
      <a class="page-tab" href="/op/preorder-cost.html">預購成本補登</a>
      <a class="page-tab" href="/stock.html">庫存查詢</a>
      <a class="page-tab" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
      <a class="page-tab is-active" href="/company-files/company-index.html">公司檔案管理</a>
    </div>

    <div class="sub-tabs-bar">
      <a class="sub-tab is-active" href="/company-files/company-invoice-check.html">發票核對</a>
      <a class="sub-tab" href="/company-files/company-card-bills.html">信用卡帳單</a>
      <a class="sub-tab" href="/company-files/company-cash-expense.html">現金支出</a>
      <a class="sub-tab" href="/company-files/company-profit-summary.html">公司進利總結</a>
      <a class="sub-tab" href="/company-files/company-ship711-settlement.html">賣貨便結算</a>
      <a class="sub-tab" href="/company-files/company-loan-mortgage.html">房貸／借款主檔紀錄</a>
    </div>
  </div>

  <div class="wrap">
    <div class="page-head">
      <div class="page-head-left">
        <h1>發票核對</h1>
        <div class="sub">
          只顯示「還沒收到發票」的清單。<br>
          收到後按「已收到」，那筆會從頁面清除。頁面也會顯示日期與待收天數，方便你掌握催廠商與給會計師的時間。
        </div>
      </div>

      <div class="page-head-right">
  <div class="soft-box">
    <div class="soft-title">查詢條件</div>

    <label for="keyword">關鍵字</label>
    <input id="keyword" placeholder="搜尋流水號 / 金額" />

    <label for="limit" style="margin-top:10px;">每次顯示筆數</label>
    <select id="limit">
      <option value="20">20</option>
      <option value="50" selected>50</option>
      <option value="100">100</option>
    </select>

    <div class="toolbar">
      <button class="btn" type="button" id="btnSearch">查詢</button>
      <button class="btn secondary" type="button" id="btnReset">清除條件</button>
    </div>

    <div class="msg" id="msg">尚未查詢</div>
  </div>
</div>
    </div>

    <div class="card">
      <h2>1. 待收發票清單</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:120px;">流水號</th>
              <th style="width:140px;">日期</th>
              <th style="width:120px;">金額</th>
              <th style="width:120px;">待收天數</th>
              <th style="width:120px;">提醒</th>
              <th style="width:120px;">動作</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6" class="empty">尚未查詢</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_OK = "company_entry_ok";
    if (sessionStorage.getItem(STORAGE_OK) !== "1") {
      location.href = "/company-files/company-index.html";
    }

    const API_LIST = "https://api.murain.tw/op/company/invoice/pending-list";
    const API_MARK = "https://api.murain.tw/op/company/invoice/mark-received";

    const $ = (id) => document.getElementById(id);
    const rowsEl = $("rows");
    const msgEl = $("msg");

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setMsg(text, type) {
      msgEl.textContent = text || "";
      msgEl.className = "msg";
      if (type === "ok") msgEl.classList.add("ok");
      if (type === "err") msgEl.classList.add("err");
    }

    async function apiGet(url) {
      const r = await fetch(url);
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        throw new Error(data.message || data.error || "查詢失敗");
      }
      return data;
    }

    async function apiPost(url, payload) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        throw new Error(data.message || data.error || "操作失敗");
      }
      return data;
    }

    function remindBadge(days) {
      const n = Number(days || 0);
      if (n >= 14) return `<span class="badge danger">超過 14 天</span>`;
      if (n >= 7) return `<span class="badge warn">超過 7 天</span>`;
      return `<span class="badge">正常</span>`;
    }

    function renderRows(rows) {
      const list = Array.isArray(rows) ? rows : [];
      if (!list.length) {
        rowsEl.innerHTML = `<tr><td colspan="6" class="empty">目前沒有待收發票資料。</td></tr>`;
        return;
      }

      rowsEl.innerHTML = list.map(row => `
        <tr data-id="${escapeHtml(row.id || "")}">
          <td>${escapeHtml(row.invoiceNo || "")}</td>
          <td>${escapeHtml(row.invoiceDate || "")}</td>
          <td>${escapeHtml(row.amountText || "")}</td>
          <td>${escapeHtml(row.daysPending || 0)} 天</td>
          <td>${remindBadge(row.daysPending)}</td>
          <td>
            <button class="btn btnMark" type="button" data-id="${escapeHtml(row.id || "")}" style="min-width:96px;">已收到</button>
          </td>
        </tr>
      `).join("");

      rowsEl.querySelectorAll(".btnMark").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-id") || "";
          if (!id) return;

          btn.disabled = true;
          try {
            await apiPost(API_MARK, { id });
            const tr = rowsEl.querySelector(`tr[data-id="${CSS.escape(id)}"]`);
            if (tr) tr.remove();

            if (!rowsEl.querySelector("tr")) {
              rowsEl.innerHTML = `<tr><td colspan="6" class="empty">目前沒有待收發票資料。</td></tr>`;
            }

            setMsg("✅ 已標記為收到，該筆已從頁面清除。", "ok");
          } catch (err) {
            btn.disabled = false;
            setMsg(`❌ ${err.message || err}`, "err");
          }
        });
      });
    }

    async function loadList() {
      const keyword = $("keyword").value.trim();
      const limit = $("limit").value.trim() || "50";

      setMsg("查詢中...");

      try {
        const url = `${API_LIST}?keyword=${encodeURIComponent(keyword)}&limit=${encodeURIComponent(limit)}`;
        const data = await apiGet(url);
        renderRows(data.rows || []);
        setMsg("✅ 清單已更新", "ok");
      } catch (err) {
        rowsEl.innerHTML = `<tr><td colspan="6" class="empty">❌ ${escapeHtml(err.message || String(err))}</td></tr>`;
        setMsg(`❌ ${err.message || err}`, "err");
      }
    }

    $("btnSearch").addEventListener("click", loadList);

    $("btnReset").addEventListener("click", () => {
      $("keyword").value = "";
      $("limit").value = "50";
      loadList();
    });

    $("keyword").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadList();
    });

    loadList();
  </script>
</body>
</html>
