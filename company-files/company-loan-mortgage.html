<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>公司檔案管理｜房貸／借款主檔紀錄</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#d8deea;--text:#14213d;--muted:#6b7280;--btn:#0f172a;--btn2:#475569;--blue:#0b4a9e;--ok:#0f766e;--warn:#b45309;--danger:#c81e1e}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,"Noto Sans TC",sans-serif}
.topbar{background:linear-gradient(180deg,#06142f,#000a1f);padding:18px 28px 12px}.page-tabs-bar,.sub-tabs-bar{display:flex;gap:10px;flex-wrap:wrap}.page-tabs-bar{margin-bottom:12px}
.page-tab,.sub-tab{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 18px;border-radius:999px;text-decoration:none;font-weight:700;font-size:15px}
.page-tab{color:#fff;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.03)}.page-tab.is-active,.sub-tab.is-active{background:linear-gradient(90deg,#1e90ff,#22d3ee);color:#fff;border:none;box-shadow:0 8px 18px rgba(34,211,238,.25)}
.sub-tab{color:#0f172a;border:1px solid #cfe0ff;background:#fff}.wrap{max-width:1440px;margin:0 auto;padding:24px}h1{margin:0 0 14px;font-size:30px;font-weight:900}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:18px;box-shadow:0 10px 30px rgba(15,23,42,.05)}
.head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}.title{font-size:20px;font-weight:900}.hint{color:var(--muted);font-size:13px;line-height:1.6;margin-top:4px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}button{border:1px solid var(--line);border-radius:12px;padding:10px 14px;font-size:14px;font-weight:900;cursor:pointer;background:#fff;color:var(--text)}
.btn{border:none;background:var(--btn);color:#fff}.btn.secondary{background:var(--btn2)}.btn.green{background:#0f766e}.btn:disabled{opacity:.55;cursor:not-allowed}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px}.kpi{border:1px solid var(--line);border-radius:18px;background:#fff;padding:16px;min-height:112px}.kpi .label{color:#64748b;font-size:13px;font-weight:800;margin-bottom:10px}.kpi .value{color:var(--blue);font-size:24px;font-weight:900;line-height:1.25;word-break:break-word}.kpi .sub{color:#64748b;font-size:13px;margin-top:8px;line-height:1.5}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#fff;max-height:calc(100vh - 365px)}table{width:100%;min-width:1050px;border-collapse:separate;border-spacing:0}
th,td{border-bottom:1px solid var(--line);padding:11px 10px;vertical-align:middle;font-size:14px;white-space:nowrap;background:#fff}th{position:sticky;top:0;z-index:2;background:#f8fafc;text-align:left;font-size:13px;color:#0f172a}tr:hover td{background:#fbfdff}
.money{color:#063f91;font-weight:900}.tag{display:inline-flex;align-items:center;justify-content:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900;border:1px solid #cfe3ff;background:#eef6ff;color:#0f3f8c}.tag.ok{border-color:#b7e4d7;background:#effcf6;color:#0f766e}.tag.warn{border-color:#f5d7a1;background:#fff7e6;color:#b45309}
.profit-link{text-decoration:none;cursor:pointer}
.profit-link:hover{filter:brightness(.96);transform:translateY(-1px)}
.msg{white-space:pre-wrap;line-height:1.6;font-size:14px;min-height:22px;margin-top:8px}.msg.ok{color:var(--ok)}.msg.err{color:var(--danger)}.empty{color:var(--muted);padding:16px 0}.photo-link{color:#0b4a9e;font-weight:800;text-decoration:underline;text-underline-offset:2px}
.photo-thumbs{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.photo-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;border:1px solid var(--line);box-shadow:0 4px 10px rgba(15,23,42,.12);cursor:pointer;background:#fff}
.photo-thumb:hover{transform:scale(1.04)}
.photo-viewer-backdrop{position:fixed;inset:0;background:rgba(2,8,23,.72);display:none;align-items:center;justify-content:center;padding:20px;z-index:80}
.photo-viewer-backdrop.show{display:flex}
.photo-viewer{position:relative;max-width:min(920px,96vw);max-height:92vh;background:#fff;border-radius:18px;padding:14px;border:1px solid var(--line);box-shadow:0 30px 90px rgba(2,8,23,.45)}
.photo-viewer img{display:block;max-width:100%;max-height:82vh;border-radius:12px;object-fit:contain}
.photo-viewer-close{position:absolute;top:-12px;right:-12px;width:36px;height:36px;border-radius:999px;border:none;background:#0f172a;color:#fff;font-weight:900;cursor:pointer;box-shadow:0 8px 18px rgba(2,8,23,.25)}
.modal-backdrop{position:fixed;inset:0;background:rgba(2,8,23,.46);display:none;align-items:center;justify-content:center;padding:22px;z-index:50}.modal-backdrop.show{display:flex}.modal{width:min(680px,96vw);max-height:88vh;overflow:hidden;background:#fff;border-radius:22px;border:1px solid var(--line);box-shadow:0 30px 80px rgba(2,8,23,.35);display:flex;flex-direction:column}.modal-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);background:#f8fafc}.modal-title{font-size:19px;font-weight:900}.modal-body{padding:18px 20px;overflow:auto}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}label{display:block;font-size:13px;font-weight:800;margin-bottom:6px;color:#334155}input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 12px;font-size:14px;outline:none;background:#fff}textarea{min-height:90px;resize:vertical}.full{grid-column:1/-1}
@media(max-width:980px){.kpi-grid{grid-template-columns:1fr 1fr}}@media(max-width:640px){.wrap{padding:16px}h1{font-size:26px}.kpi-grid,.form-grid{grid-template-columns:1fr}.table-wrap{max-height:none}}
</style>
</head>
<body>
<div class="topbar">
  <div class="page-tabs-bar">
    <a class="page-tab" href="/op.html">直播主開單</a>
    <a class="page-tab" href="/admin.html">訂單後台</a>
    <a class="page-tab" href="/stock-in.html">入庫</a>
    <a class="page-tab" href="/op/preorder-order.html">預購</a>
    <a class="page-tab" href="/shop-product-admin">上架官網</a>
    <a class="page-tab" href="/stock.html">庫存</a>
    <a class="page-tab" href="/procurement-center/procurement-index.html">進貨</a>
    <a class="page-tab is-active" href="/company-files/company-index.html">公司檔案管理</a>
    <a class="page-tab" href="/admin-streamer-performance.html" target="_blank" rel="noopener noreferrer">直播主業績</a>
  </div>
  <div class="sub-tabs-bar">
    <a class="sub-tab" href="/company-files/company-cash-expense-sign.html">員工簽收</a><a class="sub-tab" href="/company-files/company-invoice-check.html">發票核對</a><a class="sub-tab" href="/company-files/company-card-bills.html">信用卡帳單</a><a class="sub-tab" href="/company-files/company-cash-expense.html">現金支出</a><a class="sub-tab" href="/company-files/company-profit-summary.html">公司進利總結</a><a class="sub-tab" href="/company-files/company-ship711-settlement.html">賣貨便結算</a><a class="sub-tab is-active" href="/company-files/company-loan-mortgage.html">房貸／借款主檔紀錄</a>
  </div>
</div>
<div class="wrap">
  <h1>房貸／借款主檔紀錄</h1>
  <div class="card">
    <div class="head">
      <div><div class="title" id="masterTitle">主檔總覽</div><div class="hint">上方看主檔總額，下方只列還款明細；公司進利總結產生的還款會集中在這裡。</div></div>
      <div class="toolbar"><button class="btn" id="btnReload">重新整理</button><button class="btn secondary" id="btnAdd">手動新增還款</button></div>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="label">原始本金</div><div class="value" id="principalText">NT$ 0</div><div class="sub" id="masterNameText">-</div></div>
      <div class="kpi"><div class="label">已還總額</div><div class="value" id="paidText">NT$ 0</div><div class="sub">所有還款紀錄加總</div></div>
      <div class="kpi"><div class="label">剩餘本金</div><div class="value" id="remainText">NT$ 0</div><div class="sub">原始本金－已還總額</div></div>
      <div class="kpi"><div class="label">最近還款日</div><div class="value" id="lastDateText">-</div><div class="sub" id="countText">0 筆還款紀錄</div></div>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>還款日期</th><th>還款金額</th><th>公司進利總結</th><th>自動帶入還款金額</th><th>備註</th><th>照片</th></tr></thead><tbody id="repayRows"><tr><td colspan="6" class="empty">載入中...</td></tr></tbody></table>
    </div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop"><div class="modal">
  <div class="modal-head"><div class="modal-title">手動新增還款</div><button class="btn" id="btnCloseModal">關閉</button></div>
  <div class="modal-body">
    <div class="form-grid">
      <div><label>還款日期</label><input id="manualDate" type="date"></div>
      <div><label>還款金額</label><input id="manualAmount" type="number" min="0" step="1" placeholder="例如 4305"></div>
      <div class="full"><label>備註</label><textarea id="manualNote" placeholder="例如：手動收到妹妹還款"></textarea></div>
    </div>
    <div class="toolbar" style="margin-top:16px;"><button class="btn green" id="btnSubmitManual">建立還款</button></div>
    <div class="hint" style="margin-top:10px;">若後端尚未開手動新增 API，這顆會顯示 API 錯誤；公司進利總結自動產生的還款不受影響。</div>
  </div>
</div></div>

<div class="photo-viewer-backdrop" id="photoViewer">
  <div class="photo-viewer">
    <button class="photo-viewer-close" id="btnClosePhotoViewer" type="button">×</button>
    <img id="photoViewerImg" src="" alt="還款照片">
  </div>
</div>

<script>
const STORAGE_OK="company_entry_ok"; if(sessionStorage.getItem(STORAGE_OK)!=="1"){location.href="/company-files/company-index.html";}
const API_BASE="https://api.murain.tw";
const API_COMBINED_CANDIDATES=[`${API_BASE}/op/company/loan-mortgage/list`,`${API_BASE}/op/company/loan-mortgage/summary`,`${API_BASE}/op/company/loan/list`,`${API_BASE}/op/company/mortgage/list`];
const API_REPAY_CANDIDATES=[`${API_BASE}/op/company/loan-mortgage/repayment-list`,`${API_BASE}/op/company/loan-mortgage/repayments`,`${API_BASE}/op/company/loan-repayment/list`,`${API_BASE}/op/company/mortgage-repayment/list`];
const API_CREATE_REPAY_CANDIDATES=[`${API_BASE}/op/company/loan-mortgage/repayment-create`,`${API_BASE}/op/company/loan-repayment/create`,`${API_BASE}/op/company/mortgage-repayment/create`];
const $=id=>document.getElementById(id); let master=null, repayments=[];
function money(v){const n=Number(String(v??"").replace(/[^\d.-]/g,""))||0;const sign=n<0?"-":"";return `${sign}NT$ ${Math.abs(Math.round(n)).toLocaleString("zh-TW")}`;}
function num(v){const n=Number(String(v??"").replace(/[^\d.-]/g,""));return Number.isFinite(n)?n:0;}
function text(v){if(Array.isArray(v))return v.map(x=>x==null?"":typeof x==="object"?String(x.name||x.url||x.id||""):String(x)).filter(Boolean).join(" / ");if(v==null)return "";if(typeof v==="object")return String(v.name||v.url||v.id||"");return String(v);}
function escHtml(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");}
function pick(obj,names){const src=obj||{};for(const name of names){if(src[name]!==undefined&&src[name]!==null&&String(text(src[name])).trim()!=="")return src[name];}return "";}
function normalizeMaster(row){const f=row?.fields||row||{};return{id:row?.id||row?.recordId||"",name:text(pick(f,["借款主檔","主檔名稱","name","Name","名稱"]))||"房貸／借款主檔",principal:num(pick(f,["原始本金","本金","loan_principal","principal"])),paidTotal:num(pick(f,["已退總額","已還總額","已還金額","repaid_total","paidTotal"])),remain:num(pick(f,["剩餘本金","剩餘金額","remaining","remain"])),lastDate:text(pick(f,["最近還款日","last_repay_date","lastDate"]))};}
function isRecIdText(s){
  const t = String(s || "").trim();
  if (!t) return false;
  return /^rec[a-zA-Z0-9]+( \/ rec[a-zA-Z0-9]+)*$/.test(t);
}

function cleanLinkedText(v, fallback = ""){
  const s = text(v).trim();
  if (!s) return fallback;
  return isRecIdText(s) ? fallback : s;
}
function linkedIds(v){
  if(Array.isArray(v)){
    return v.map(x=>{
      if(x && typeof x === "object") return String(x.id || x.recordId || x.value || "").trim();
      return String(x || "").trim();
    }).filter(x=>/^rec[a-zA-Z0-9]+$/.test(x));
  }

  if(v && typeof v === "object"){
    const id = String(v.id || v.recordId || v.value || "").trim();
    return /^rec[a-zA-Z0-9]+$/.test(id) ? [id] : [];
  }

  const s = String(v || "").trim();
  return /^rec[a-zA-Z0-9]+$/.test(s) ? [s] : [];
}

function firstLinkedId(v){
  return linkedIds(v)[0] || "";
}

function profitSummaryUrl(id){
  if(!id) return "";
  return `/company-files/company-profit-summary.html?profit_id=${encodeURIComponent(id)}`;
}
function normalizeRepayment(row){
  const f = row?.fields || row || {};

  const profitLinked = pick(f, [
    "公司進利總結",
    "profitSummary"
  ]);

  const profitId = firstLinkedId(profitLinked);
  const hasProfitLink = !!profitId || !!text(profitLinked).trim();

  // 這裡不要再把「公司進利總結」關聯欄位放進來
  // 因為 Airtable API 會回 recXXXX，不會回「額外結帳3」
  const profitDisplay = pick(f, [
    "公司進利總結顯示",
    "公司進利總結名稱",
    "結帳名稱",
    "月份顯示",
    "月份",
    "來源月份",
    "profitSummaryName",
    "profitSummaryMonth"
  ]);

  const profitText =
    cleanLinkedText(profitDisplay, "") ||
    (hasProfitLink ? "查看公司進利總結" : "手動新增");

  const autoAmount = num(pick(f, [
    "自動帶入還款金額",
    "auto_repay_amount",
    "autoAmount"
  ]));

  const repayAmount = num(pick(f, [
    "還款金額",
    "金額",
    "amount",
    "repayAmount"
  ]));

  return {
    id: row?.id || row?.recordId || "",
    date: text(pick(f, ["還款日期","日期","repayDate","date"])),
    amount: repayAmount || autoAmount,
    profitId,
    profitSummary: hasProfitLink ? profitText : "",
    autoAmount,
    note: text(pick(f, ["備註","note","Note"])),
    photo: pick(f, ["備註 照片","備註照片","照片","photo","attachment"])
  };
}
function photoUrls(v){
  if(Array.isArray(v) && v.length){
    return v.map(x=>{
      if(typeof x === "object"){
        return x.thumbnails?.large?.url || x.url || x.thumbnails?.full?.url || "";
      }
      return String(x || "");
    }).filter(Boolean);
  }

  const s = text(v).trim();
  if(/^https?:\/\//i.test(s)) return [s];
  return [];
}

function photoHtml(v){
  const urls = photoUrls(v);
  if(!urls.length) return "";

  return `<div class="photo-thumbs">` + urls.map((u,i)=>{
    const safeUrl = escHtml(u);
    const encoded = encodeURIComponent(u);
    return `<img class="photo-thumb" src="${safeUrl}" alt="還款照片${i+1}" onclick="openPhotoViewer(decodeURIComponent('${encoded}'))">`;
  }).join("") + `</div>`;
}

function openPhotoViewer(url){
  if(!url) return;
  $("photoViewerImg").src = url;
  $("photoViewer").classList.add("show");
}

function closePhotoViewer(){
  $("photoViewer").classList.remove("show");
  $("photoViewerImg").src = "";
}
async function fetchJson(url,params={}){const u=new URL(url,location.origin);Object.entries(params).forEach(([k,v])=>{if(v!==undefined&&v!==null&&String(v).trim()!=="")u.searchParams.set(k,String(v));});const r=await fetch(u.toString());const data=await r.json().catch(()=>({}));if(!r.ok||data.ok===false)throw new Error(data.message||data.error||`${r.status} ${r.statusText}`);return data;}
async function firstWorking(urls,params={}){let lastErr=null;for(const u of urls){try{return{url:u,data:await fetchJson(u,params)}}catch(e){lastErr=e}}throw lastErr||new Error("找不到可用 API");}
function readMasterFromData(data){const rows=Array.isArray(data.masters)?data.masters:Array.isArray(data.masterRows)?data.masterRows:Array.isArray(data.rows)?data.rows:Array.isArray(data.data)?data.data:[];if(data.master)return normalizeMaster(data.master);return rows.length?normalizeMaster(rows[0]):null;}
function readRepaymentsFromData(data){const rows=Array.isArray(data.repayments)?data.repayments:Array.isArray(data.repaymentRows)?data.repaymentRows:Array.isArray(data.items)?data.items:Array.isArray(data.rows)?data.rows:Array.isArray(data.data)?data.data:[];return rows.map(normalizeRepayment);}
function yyyyMMddValue(){const now=new Date();const tw=new Date(now.toLocaleString("en-US",{timeZone:"Asia/Taipei"}));return `${tw.getFullYear()}-${String(tw.getMonth()+1).padStart(2,"0")}-${String(tw.getDate()).padStart(2,"0")}`;}
function render(){const computedPaid=repayments.reduce((sum,r)=>sum+num(r.amount),0);const principal=master?.principal||0;const paidTotal=master?.paidTotal||computedPaid;const remain=master?.remain||Math.max(0,principal-paidTotal);const lastDate=master?.lastDate||repayments.map(r=>r.date).filter(Boolean).sort().slice(-1)[0]||"-";$("masterTitle").textContent=master?.name||"主檔總覽";$("masterNameText").textContent=master?.name||"-";$("principalText").textContent=money(principal);$("paidText").textContent=money(paidTotal);$("remainText").textContent=money(remain);$("lastDateText").textContent=lastDate||"-";$("countText").textContent=`${repayments.length} 筆還款紀錄`;if(!repayments.length){
  $("repayRows").innerHTML=`<tr><td colspan="6" class="empty">目前沒有還款紀錄。</td></tr>`;
  return;
}

$("repayRows").innerHTML=repayments.map(r=>`
  <tr>
    <td>${escHtml(r.date||"-")}</td>
    <td class="money">${money(r.amount)}</td>
    <td>${
  r.profitSummary
    ? (
      r.profitId
        ? `<a class="tag ok profit-link" href="${escHtml(profitSummaryUrl(r.profitId))}" target="_blank" title="開啟這筆公司進利總結">${escHtml(r.profitSummary)}</a>`
        : `<span class="tag ok">${escHtml(r.profitSummary)}</span>`
    )
    : `<span class="tag warn">手動／未連結</span>`
}</td>
    <td class="money">${r.autoAmount ? money(r.autoAmount) : "-"}</td>
    <td>${escHtml(r.note||"")}</td>
    <td>${photoHtml(r.photo)}</td>
  </tr>
`).join("");}
async function loadAll(){$("msg").textContent="載入中...";$("msg").className="msg";try{const combined=await firstWorking(API_COMBINED_CANDIDATES,{max:300});master=readMasterFromData(combined.data);repayments=readRepaymentsFromData(combined.data);if(!repayments.length){try{const repayData=await firstWorking(API_REPAY_CANDIDATES,{max:500,master_id:master?.id||""});repayments=readRepaymentsFromData(repayData.data);}catch{}}repayments.sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));render();$("msg").textContent=`✅ 載入完成：${repayments.length} 筆還款紀錄`;$("msg").className="msg ok";}catch(err){$("msg").textContent=`❌ ${err.message||err}\n請確認後端是否有房貸／借款主檔紀錄 API。`;$("msg").className="msg err";$("repayRows").innerHTML=`<tr><td colspan="7" class="empty">❌ ${escHtml(err.message||err)}</td></tr>`;}}
function openModal(){$("manualDate").value=yyyyMMddValue();$("manualAmount").value="";$("manualNote").value="";$("modalBackdrop").classList.add("show");}
function closeModal(){$("modalBackdrop").classList.remove("show");}
async function firstWorkingPost(urls,body={}){let lastErr=null;for(const u of urls){try{const r=await fetch(u,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)});const data=await r.json().catch(()=>({}));if(!r.ok||data.ok===false)throw new Error(data.message||data.error||`${r.status} ${r.statusText}`);return{url:u,data};}catch(e){lastErr=e}}throw lastErr||new Error("找不到可用新增 API");}
async function createManualRepayment(){const date=$("manualDate").value;const amount=Number($("manualAmount").value||0)||0;const note=$("manualNote").value.trim();if(!date){alert("請選擇還款日期");return}if(!amount){alert("請輸入還款金額");return}$("btnSubmitManual").disabled=true;try{await firstWorkingPost(API_CREATE_REPAY_CANDIDATES,{master_id:master?.id||"",date,amount,note});closeModal();await loadAll();}catch(err){alert(`建立失敗：${err.message||err}`);}finally{$("btnSubmitManual").disabled=false;}}
$("btnReload").addEventListener("click",loadAll);
$("btnAdd").addEventListener("click",openModal);
$("btnCloseModal").addEventListener("click",closeModal);
$("modalBackdrop").addEventListener("click",e=>{if(e.target.id==="modalBackdrop")closeModal();});
$("btnSubmitManual").addEventListener("click",createManualRepayment);

$("btnClosePhotoViewer").addEventListener("click",closePhotoViewer);
$("photoViewer").addEventListener("click",e=>{if(e.target.id==="photoViewer")closePhotoViewer();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePhotoViewer();});

loadAll();
</script>
</body>
