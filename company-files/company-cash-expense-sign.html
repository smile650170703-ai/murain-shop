    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#b91c1c;
      --ok:#0f766e;
      --brown:#7a5a3a;
      --soft:#eef6ff;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }

    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 14px;
      color:#fff;
    }
.page-tabs-bar,.sub-tabs-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.page-tabs-bar{
  margin-bottom:12px;
}

.page-tab,.sub-tab{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:40px;
  padding:0 18px;
  border-radius:999px;
  text-decoration:none;
  font-weight:700;
  font-size:15px;
}

.page-tab{
  color:#fff;
  border:1px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.03);
}

.page-tab.is-active,.sub-tab.is-active{
  background:linear-gradient(90deg,#1e90ff,#22d3ee);
  color:#fff;
  border:none;
  box-shadow:0 8px 18px rgba(34,211,238,.25);
}

.sub-tab{
  color:#0f172a;
  border:1px solid #cfe0ff;
  background:#fff;
}
    .topbar h1{
      margin:0;
      font-size:24px;
    }

    .topbar .sub{
      margin-top:8px;
      color:rgba(255,255,255,.72);
      font-size:14px;
      line-height:1.7;
    }

    .wrap{
      max-width:1180px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }

    .split-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    h2{
      margin:0;
      font-size:20px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid #f0b2b2;
      background:#fff1f1;
      color:#b91c1c;
    }

    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }

    .btn.brown{ background:var(--brown); }

    .btn.secondary{ background:var(--btn2); }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    table{
      width:100%;
      min-width:980px;
      border-collapse:collapse;
    }

    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:middle;
    }

    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }

    .signDataRow{
      cursor:pointer;
    }

    .row-selected td{
      background:#eef6ff;
    }

    .signPick{
      accent-color:#1e90ff;
    }

    .thumb-cell img{
      width:54px;
      height:54px;
      object-fit:cover;
      border-radius:10px;
      border:1px solid var(--line);
      display:block;
    }

    .empty{
      color:var(--muted);
      font-size:14px;
      padding:14px 0;
    }

    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
      margin-top:12px;
    }

    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    @media (max-width:720px){
      .wrap{ padding:16px; }
      .topbar{ padding:16px; }
      .card{ padding:16px; }
      .btn{ width:100%; }
      .split-head{ align-items:flex-start; }
    }
  </style>
</head>

<body>

  <div class="page-tabs-bar">
    <a class="page-tab" href="/op.html">直播主開單</a>
    <a class="page-tab" href="/admin.html">訂單後台</a>
    <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
    <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
    <a class="page-tab" href="/shop-product-admin">上架官網</a>

    <a class="page-tab" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
    <a class="page-tab is-active" href="/company-files/company-index.html">公司檔案管理</a>
  </div>

  <div class="sub-tabs-bar">
    <a class="sub-tab is-active" href="/company-files/company-cash-expense-sign.html">簽收</a>
    <a class="sub-tab" href="/company-files/company-invoice-check.html">發票核對</a>
    <a class="sub-tab" href="/company-files/company-card-bills.html">信用卡帳單</a>

    <a class="sub-tab" href="/company-files/company-profit-summary.html">公司進利總結</a>

  <h1>簽收｜現金支出</h1>
  <div class="sub">
    此頁只顯示待簽收清單。請點選要簽收的資料列，再按「標記已簽收」。
  </div>
</div>

  <div class="wrap">
    <div class="card">
      <div class="split-head">
        <h2>待簽收清單</h2>
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
          <span class="tag" id="signCountTag">0 筆</span>
          <button class="btn brown" type="button" id="btnBatchSigned">標記已簽收</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:56px;">勾選</th>
              <th style="min-width:240px;">交易明細備註</th>
              <th style="width:86px;">拍照/截圖</th>
              <th style="width:120px;">交易金額</th>
              <th style="width:130px;">交易日期</th>
              <th style="min-width:180px;">費用支出對象</th>
            </tr>
          </thead>
          <tbody id="signRows"></tbody>
        </table>
      </div>

      <div class="toolbar">
        <button class="btn secondary" type="button" id="btnReload">重新整理</button>
      </div>

      <div class="msg" id="pageMsg"></div>
    </div>
  </div>

<script>
  const STORAGE_OK = "company_entry_ok";

  if (sessionStorage.getItem(STORAGE_OK) !== "1") {
    location.href = "/company-files/company-index.html";
  }

  const API_SIGN = "https://api.murain.tw/op/company/cash-expense/sign-list";
  const API_UPDATE = "https://api.murain.tw/op/company/cash-expense/update";

  const $ = (id) => document.getElementById(id);

  function money(n) {
    const v = Number(n || 0) || 0;
    return `NT$ ${v.toLocaleString("zh-TW")}`;
  }

  async function apiGet(url) {
    const r = await fetch(url);
    const data = await r.json().catch(() => ({}));

    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "API 失敗");
    }

    return data;
  }

  async function apiPost(url, payload) {
    const r = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "API 失敗");
    }

    return data;
  }

  function setMsg(text, type = "") {
    $("pageMsg").textContent = text || "";
    $("pageMsg").className = type ? `msg ${type}` : "msg";
  }

  async function renderSignRowsFromApi() {
    const tbody = $("signRows");
    tbody.innerHTML = `<tr><td colspan="6" class="empty">載入中...</td></tr>`;
    setMsg("");

    try {
      const data = await apiGet(API_SIGN);
      const list = Array.isArray(data.rows) ? data.rows : [];

      $("signCountTag").textContent = `${list.length} 筆`;

      tbody.innerHTML = list.length ? list.map(r => `
        <tr class="signDataRow" data-row-id="${r.id}">
          <td>
            <input type="checkbox" class="signPick" data-id="${r.id}" style="width:18px;height:18px;" />
          </td>
          <td>${r.detail || ""}</td>
          <td class="thumb-cell">
            ${r.photo ? `
              <a href="${r.photo}" target="_blank" rel="noopener">
                <img src="${r.photo}" alt="拍照/截圖" />
              </a>
            ` : ""}
          </td>
          <td>${money(r.amount)}</td>
          <td>${r.date || ""}</td>
          <td>${r.category || ""}</td>
        </tr>
      `).join("") : `<tr><td colspan="6" class="empty">目前沒有待簽收資料。</td></tr>`;

      document.querySelectorAll(".signPick").forEach(ck => {
        ck.addEventListener("change", () => {
          const tr = ck.closest("tr");
          if (tr) tr.classList.toggle("row-selected", ck.checked);
        });
      });

      document.querySelectorAll(".signDataRow").forEach(tr => {
        tr.addEventListener("click", (e) => {
          if (
            e.target.closest("a") ||
            e.target.closest("input") ||
            e.target.closest("button")
          ) return;

          const ck = tr.querySelector(".signPick");
          if (!ck) return;

          ck.checked = !ck.checked;
          tr.classList.toggle("row-selected", ck.checked);
        });
      });

      setMsg(`✅ 已載入 ${list.length} 筆待簽收資料。`, "ok");
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="6" class="empty">❌ ${err.message || err}</td></tr>`;
      $("signCountTag").textContent = `0 筆`;
      setMsg(`❌ ${err.message || err}`, "err");
    }
  }

  $("btnBatchSigned").addEventListener("click", async () => {
    const picked = [...document.querySelectorAll(".signPick:checked")];

    if (!picked.length) {
      alert("請先點選要簽收的列。");
      return;
    }

    const ok = confirm(`確定要將 ${picked.length} 筆標記為已簽收嗎？`);
    if (!ok) return;

    const payloads = picked.map(ck => ({
      id: ck.dataset.id,
      signed: true
    }));

    const btn = $("btnBatchSigned");
    const oldText = btn.textContent;
    btn.disabled = true;
    btn.textContent = "處理中...";

    try {
      await Promise.all(payloads.map(p => apiPost(API_UPDATE, p)));
      setMsg(`✅ 已完成 ${payloads.length} 筆簽收。`, "ok");
      await renderSignRowsFromApi();
    } catch (err) {
      alert(`批次更新失敗：${err.message || err}`);
      setMsg(`❌ 批次更新失敗：${err.message || err}`, "err");
    } finally {
      btn.disabled = false;
      btn.textContent = oldText;
    }
  });

  $("btnReload").addEventListener("click", async () => {
    await renderSignRowsFromApi();
  });

  renderSignRowsFromApi();
</script>
</body>
</html>
