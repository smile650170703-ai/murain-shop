    function todayLocal(offsetDays = 0){
      const d = new Date();
      d.setDate(d.getDate() + offsetDays);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
    }

    function money(v){
      const raw = String(v ?? "").trim();
      const n = Number(raw.replace(/[^\d.-]/g, ""));

        function roundByFailCount(n){
      const c = Math.max(0, Number(String(n ?? "0").replace(/[^\d.-]/g, "")) || 0);
      const next = Math.min(c + 1, 3);
      const label = next === 1 ? "第一次" : next === 2 ? "第二次" : "第三次";
      return { round: label, failCount: String(next) };
    }

function displayRoundLabel(it){
  const mode = $("actionMode")?.value || "";
  const usedCount = Math.max(
    0,
    Number(String(it.baseFailCount ?? it.failCount ?? "0").replace(/[^\d.-]/g, "")) || 0
  );

  if (mode === "owner_price_update") {
    return "主動改價";
  }

  if (usedCount >= 3) {
    return "已達三次上限";
  }

  const nextRound =
    usedCount === 0 ? "第一次" :
    usedCount === 1 ? "第二次" :
    "第三次";

    return mode === "fail_notice"
    ? `${nextRound}流標`
    : `${nextRound}確認`;
}

  };
}

      let data = {};

      if (!res.ok || data.ok === false) {
  const msg = data.message || data.detail || data.error || `HTTP ${res.status}`;
  throw new Error(msg);
}
      return data;

function selectedConsignorRecordId(){
  const sel = $("consignorName");
  const opt = sel?.selectedOptions?.[0];
  return String(opt?.dataset?.recordId || "").trim();
}
function safeFilePart(s, fallback = "寄賣文件"){
  const text = String(s || "").trim() || fallback;
  return text
    .replace(/[\\/:*?"<>|#%{}^~[\]`]/g, "_")
    .replace(/\s+/g, "_")
    .slice(0, 80);
}

function selectedConsignorLineName(){
  const sel = $("consignorName");
  const opt = sel?.selectedOptions?.[0];

  const fromData = String(opt?.dataset?.lineName || "").trim();
  if (fromData) return fromData;

  const label = String(opt?.textContent || "").trim();
  const m = label.match(/LINE[：:]\s*(.+)$/);
  if (m?.[1]) return m[1].trim();

  return String(sel?.value || "").trim();
}

function auctionPrintFileName(prefix, lineName, docDate){
  return `${safeFilePart(lineName, "寄賣人")}_${safeFilePart(docDate || todayLocal(), todayLocal())}_${safeFilePart(prefix, "寄賣文件")}`;
}

function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function imageExtFromMime(type){
  const t = String(type || "").toLowerCase();
  if (t.includes("png")) return "png";
  if (t.includes("webp")) return "webp";
  if (t.includes("gif")) return "gif";
  return "jpg";
}

function imageExtFromUrl(url){
  const clean = String(url || "").split("?")[0].split("#")[0];
  const m = clean.match(/\.([a-z0-9]{2,5})$/i);
  const ext = String(m?.[1] || "").toLowerCase();
  return ["jpg","jpeg","png","webp","gif"].includes(ext) ? ext : "";
}

function checkedImageFileBaseName(it){
  const name = safeFilePart(it.name || it.sku || "商品", "商品");
  const start = safeFilePart(numberOnly(it.startPrice) || it.startPrice || "0", "0");
  const step = safeFilePart(numberOnly(it.stepPrice) || it.stepPrice || "0", "0");

  return `${name}_起標價格_${start}_一標_${step}`;
}

async function downloadImageFile(url, fileBaseName){
  const imageUrl = String(url || "").trim();
  if (!imageUrl) throw new Error("missing_image_url");

  const res = await fetch(imageUrl);
  if (!res.ok) throw new Error(`圖片下載失敗 HTTP ${res.status}`);

  const blob = await res.blob();
  const ext = imageExtFromUrl(imageUrl) || imageExtFromMime(blob.type);
  const objectUrl = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = objectUrl;
  a.download = `${fileBaseName}.${ext}`;
  document.body.appendChild(a);
  a.click();
  a.remove();

  setTimeout(() => URL.revokeObjectURL(objectUrl), 1500);
}

async function exportCheckedImages(){
  const rows = pickedItems();

  if (!rows.length) {
    showPopup("請先勾選要產生直播截圖的商品");
    return;
  }

  const targets = rows
    .map(it => ({
      item: it,
      url: String(it.image || it.media || "").trim()
    }))
    .filter(x => x.url);

  if (!targets.length) {
    showPopup("勾選商品沒有直播截圖 / 商品截圖網址");
    return;
  }

  let ok = 0;
  let fail = 0;

  for (const t of targets) {
    try{
      await downloadImageFile(t.url, checkedImageFileBaseName(t.item));
      ok++;
      await sleep(250);
    }catch(err){
      fail++;
      console.warn("[exportCheckedImages failed]", t.item, err);
    }
  }

  if (fail) {
    showPopup(`已產生 ${ok} 張，失敗 ${fail} 張。若瀏覽器擋下載，請允許此網站下載多個檔案。`);
  } else {
    showPopup(`已產生 ${ok} 張勾選商品直播截圖`);
  }
}

async function waitPrintImages(timeoutMs = 8000){
  const area = $("printArea");
  const imgs = Array.from(area?.querySelectorAll("img") || []);

  if (!imgs.length) return;

  const waitOne = (img) => new Promise(resolve => {
    if (img.complete) {
      resolve();
      return;
    }

    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      resolve();
    };

    img.addEventListener("load", finish, { once:true });
    img.addEventListener("error", finish, { once:true });

    if (typeof img.decode === "function") {
      img.decode().then(finish).catch(finish);
    }
  });

  await Promise.race([
    Promise.all(imgs.map(waitOne)),
    sleep(timeoutMs)
  ]);
}

function focusAndSelectInput(input){
  if (!input) return false;
  input.focus();
  setTimeout(() => input.select(), 0);
  return true;
}

function focusPriceInputByRow(rowIndex, key){
  const rows = Array.from(itemBody.querySelectorAll("tr"));
  const row = rows[rowIndex];
  if (!row) return false;

  const input = row.querySelector(`[data-k="${key}"]`);
  return focusAndSelectInput(input);
}

function focusNextPriceField(input){
  const tr = input.closest("tr");
  const rows = Array.from(itemBody.querySelectorAll("tr"));
  const rowIndex = rows.indexOf(tr);
  const key = input.dataset.k;

  if (key === "newStartPrice") {
    return focusAndSelectInput(tr.querySelector('[data-k="newStepPrice"]'));
  }

  if (key === "newStepPrice") {
    return focusPriceInputByRow(rowIndex + 1, "newStartPrice");
  }

  return false;
}

itemBody.addEventListener("focusin", (e) => {
  if (e.target?.matches?.('[data-k="newStartPrice"], [data-k="newStepPrice"]')) {
    setTimeout(() => e.target.select(), 0);
  }
});

itemBody.addEventListener("keydown", (e) => {
  const input = e.target;
  if (!input?.matches?.('[data-k="newStartPrice"], [data-k="newStepPrice"]')) return;

  const tr = input.closest("tr");
  const rows = Array.from(itemBody.querySelectorAll("tr"));
  const rowIndex = rows.indexOf(tr);

  if (e.key === "Tab") {
    e.preventDefault();

    if (e.shiftKey) {
      focusPriceInputByRow(rowIndex - 1, "newStartPrice");
    } else {
      focusPriceInputByRow(rowIndex + 1, "newStartPrice");
    }

    return;
  }

  if (e.key === "Enter") {
    e.preventDefault();
    focusNextPriceField(input);
  }
});
