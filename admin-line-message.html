<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LINE 客服推播｜栩願後台</title>
  <script src="/config.js?v=20260627-auth-fix"></script>
  <style>
    :root {
      --bg: #07111f;
      --panel: #101a2d;
      --panel2: #162238;
      --line: #27364f;
      --text: #f8fafc;
      --muted: #94a3b8;
      --brand: #22d3ee;
      --brand2: #a78bfa;
      --danger: #fb7185;
      --ok: #34d399;
      --warn: #fbbf24;
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(34,211,238,.18), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(167,139,250,.18), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: .04em;
    }

    .title p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      background: rgba(16,26,45,.72);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
    }
/* ===== 共用後台頁籤 ===== */
.page-tabs{
  margin:0 0 18px;
}

.page-tabs-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px 14px;
  border-radius:18px;
  background:#020617;
  border:1px solid rgba(148,163,184,.28);
  box-shadow:0 10px 30px rgba(15,23,42,.12);
}

.page-tab{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:0 18px;
  border-radius:999px;
  text-decoration:none;
  font-size:14px;
  font-weight:800;
  letter-spacing:.01em;
  background:rgba(15,23,42,.92);
  color:#e2e8f0;
  border:1px solid rgba(148,163,184,.55);
  transition:.18s ease;
}

.page-tab:hover{
  transform:translateY(-1px);
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.18);
}

.page-tab.is-active{
  background:#22d3ee;
  color:#0f172a;
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.32);
}

@media (max-width:900px){
  .page-tabs-bar{
    gap:8px;
    padding:10px;
  }
  .page-tab{
    min-height:40px;
    padding:0 14px;
    font-size:13px;
  }
}
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    @media (max-width: 900px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: rgba(16,26,45,.88);
      border: 1px solid rgba(148,163,184,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
      margin: -4px 0 14px;
    }

    label {
      display: block;
      color: #cbd5e1;
      font-weight: 700;
      font-size: 13px;
      margin: 14px 0 8px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 13px;
      outline: none;
      font-size: 15px;
    }

    input:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(34,211,238,.14);
    }

    textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.65;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .row > * { flex: 1; }
    .row .fixed { flex: 0 0 auto; }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 800;
      color: #03101a;
      background: linear-gradient(135deg, var(--brand), #7dd3fc);
      transition: transform .08s ease, opacity .15s ease, filter .15s ease;
      white-space: nowrap;
    }

    button:hover { filter: brightness(1.06); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; transform: none; }

    .btn-soft {
      color: var(--text);
      background: var(--panel2);
      border: 1px solid var(--line);
    }

    .btn-danger {
      color: #fff;
      background: rgba(251,113,133,.2);
      border: 1px solid rgba(251,113,133,.35);
    }

    .btn-send {
      width: 100%;
      margin-top: 12px;
      padding: 15px;
      font-size: 16px;
      background: linear-gradient(135deg, #34d399, #22d3ee);
    }

    .results {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .member {
      text-align: left;
      color: var(--text);
      background: rgba(15,23,42,.72);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px;
      display: grid;
      gap: 6px;
      cursor: pointer;
    }

    .member:hover {
      border-color: var(--brand);
    }

    .member.selected {
      border-color: var(--ok);
      box-shadow: 0 0 0 3px rgba(52,211,153,.13);
    }

    .member .name {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 16px;
      font-weight: 900;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      background: rgba(34,211,238,.12);
      color: #67e8f9;
      border: 1px solid rgba(34,211,238,.24);
      font-weight: 800;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      word-break: break-word;
    }

    .selectedBox {
      border: 1px dashed var(--line);
      background: rgba(15,23,42,.55);
      border-radius: 16px;
      padding: 14px;
      min-height: 84px;
    }

    .templateGrid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0 10px;
    }

    .templateGrid button {
      padding: 9px 10px;
      font-size: 13px;
      color: var(--text);
      background: rgba(167,139,250,.16);
      border: 1px solid rgba(167,139,250,.32);
    }

    .status {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(15,23,42,.68);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .status.ok {
      color: #bbf7d0;
      border-color: rgba(52,211,153,.45);
      background: rgba(52,211,153,.10);
    }

    .status.err {
      color: #fecdd3;
      border-color: rgba(251,113,133,.45);
      background: rgba(251,113,133,.10);
    }

    .status.warn {
      color: #fde68a;
      border-color: rgba(251,191,36,.45);
      background: rgba(251,191,36,.10);
    }

    .mini {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.55;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      user-select: none;
    }

    .checkline input {
      width: auto;
      accent-color: var(--brand);
    }

    .count {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 7px;
    }

    .history {
      margin-top: 18px;
    }

    .historyItem {
      border-top: 1px solid rgba(148,163,184,.16);
      padding-top: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 24px 14px;
    }

    .dangerText { color: #fecdd3; }
  </style>

        </div>

        <label for="messageText">訊息內容</label>
        <textarea id="messageText" maxlength="1000" placeholder="請輸入要推播給客人的 LINE 訊息..."></textarea>
        <div class="count">
          <span>建議先確認收件人再送出。</span>
          <span id="charCount">0 / 1000</span>
        </div>

        <button id="sendBtn" class="btn-send" disabled>送出 LINE 訊息</button>
        <button id="clearBtn" class="btn-soft" type="button" style="width:100%;margin-top:10px;">清空內容</button>

        <div id="sendStatus" class="status" style="display:none;"></div>

        <div class="history">
          <div class="row">
            <h2 style="margin:0;">本機送出紀錄</h2>
            <button id="clearHistoryBtn" class="btn-danger fixed" type="button">清除</button>
          </div>
          <div id="historyList"></div>
          <div style="margin-top:18px;">
  <div class="row">
    <h2 style="margin:0;">發送紀錄</h2>

  <script>
    const API_BASE = String(window.API_BASE || "https://api.murain.tw").replace(/\/+$/, "");
    const STORE_KEY = "murain_admin_line_message_op_key";
    const HISTORY_KEY = "murain_admin_line_message_history";

    const $ = (id) => document.getElementById(id);

    let selectedMember = null;
    let lastRows = [];

    function escHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showStatus(el, msg, type = "") {
      el.style.display = "block";
      el.className = "status" + (type ? " " + type : "");
      el.textContent = msg;
    }

    function hideStatus(el) {
      el.style.display = "none";
      el.textContent = "";
      el.className = "status";
    }

    function memberTitle(m) {
      return m.displayName || m.name || m.phone || m.email || "未命名會員";
    }

    function memberSub(m) {
      const parts = [];
      if (m.name && m.name !== m.displayName) parts.push("姓名：" + m.name);
      if (m.phone) parts.push("電話：" + m.phone);
      if (m.email) parts.push("Email：" + m.email);
      if (m.lineUserId) parts.push("LineUserId：" + m.lineUserId);
      return parts.join("｜") || "沒有其他資料";
    }

    function normalizeRows(data) {
      if (Array.isArray(data?.rows)) return data.rows;
      if (Array.isArray(data?.members)) return data.members;
      if (Array.isArray(data?.results)) return data.results;
      if (data?.member) return [data.member];
      return [];
    }

    async function postJson(path, payload) {
      const res = await fetch(API_BASE + path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload || {})
      });

      const text = await res.text();
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch (e) {
        data = { ok: false, error: "bad_json", message: text || "後端回傳格式不是 JSON" };
      }

      if (!res.ok || data.ok === false) {
        const msg = data.message || data.detail || data.error || ("HTTP " + res.status);
        const err = new Error(msg);
        err.data = data;
        err.status = res.status;
        throw err;
      }

      return data;
    }

function saveKeyIfNeeded() {
  // 共用登入後不再使用本頁記住密碼
}

function restoreKey() {
  const key = window.MURAIN_AUTH && typeof window.MURAIN_AUTH.getKey === "function"
    ? window.MURAIN_AUTH.getKey("admin")
    : "";

  $("opKey").value = key || "";
}

    function renderResults(rows) {
      const box = $("resultList");
      lastRows = rows || [];

      if (!lastRows.length) {
        box.innerHTML = '<div class="empty">找不到符合的 LINE 會員</div>';
        return;
      }

      box.innerHTML = lastRows.map((m, i) => {
        const disabled = !m.recordId && !m.lineUserId;
        return `
          <button type="button"
            class="member ${selectedMember && selectedMember.recordId === m.recordId ? "selected" : ""}"
            data-index="${i}"
            ${disabled ? "disabled" : ""}>
            <div class="name">
              <span>${escHtml(memberTitle(m))}</span>
              ${m.lineUserId ? '<span class="tag">可推播</span>' : '<span class="tag dangerText">缺 LineUserId</span>'}
            </div>
            <div class="sub">${escHtml(memberSub(m))}</div>
          </button>
        `;
      }).join("");

      [...box.querySelectorAll(".member")].forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.dataset.index);
          selectMember(lastRows[idx]);
        });
      });
    }

    function selectMember(m) {
      selectedMember = m || null;

      if (!selectedMember) {
        $("selectedBox").innerHTML = '<div class="empty">尚未選擇客人</div>';
      } else {
        $("selectedBox").innerHTML = `
          <div class="member selected" style="cursor:default;">
            <div class="name">
              <span>${escHtml(memberTitle(selectedMember))}</span>
              <span class="tag">已選擇</span>
            </div>
            <div class="sub">${escHtml(memberSub(selectedMember))}</div>
          </div>
        `;
      }

renderResults(lastRows);
updateSendState();
loadServerLogs();
    }

    async function searchMembers() {
      const keyword = $("keyword").value.trim();
      hideStatus($("sendStatus"));

      if (!keyword) {
        showStatus($("searchStatus"), "請先輸入 LINE 名稱、姓名、電話或 Email。", "warn");
        return;
      }

      selectedMember = null;
      updateSendState();
      showStatus($("searchStatus"), "搜尋中...");

      try {
       const data = await postJson("/op/line-member/search", {
  op_key: $("opKey").value.trim(),
  keyword
});
        const rows = normalizeRows(data);
        renderResults(rows);

        if (!rows.length) {
          showStatus($("searchStatus"), "找不到符合資料。可以改用電話或 Email 搜尋。", "warn");
        } else if (rows.length === 1) {
          showStatus($("searchStatus"), "找到 1 位會員，請確認資料後點選。", "ok");
        } else {
          showStatus($("searchStatus"), "找到 " + rows.length + " 位會員，請點選正確客人。", "ok");
        }
      } catch (e) {
        renderResults([]);
        showStatus($("searchStatus"), "搜尋失敗：" + (e.message || e), "err");
      }
    }

    function templateText(type) {
      const name = selectedMember ? (selectedMember.displayName || selectedMember.name || "您好") : "您好";

      if (type === "order") {
        return `${name} 您好，這邊是栩願。\n想跟您確認訂單資料，目前訂單已收到。\n如需修改收件資料或有任何問題，請直接回覆這則訊息，謝謝您。`;
      }

      if (type === "address") {
        return `${name} 您好，這邊是栩願。\n想跟您確認收件資料，避免寄送錯誤，再麻煩您回覆確認：\n\n收件人：\n電話：\n地址：\n\n謝謝您。`;
      }

      if (type === "payment") {
        return `${name} 您好，這邊是栩願。\n提醒您訂單款項尚未完成確認，再麻煩您完成後回傳帳號後五碼或付款截圖，方便我們幫您核對，謝謝您。`;
      }

      return `${name} 您好，這邊是栩願客服。\n想跟您確認訂單 / 收件相關資訊，再麻煩您看到訊息後回覆我們，謝謝您。`;
    }

    async function sendMessage() {
      const opKey = $("opKey").value.trim();
      const message = $("messageText").value.trim();

      if (!opKey) {
        showStatus($("sendStatus"), "請輸入後台密碼 OP_KEY。", "warn");
        return;
      }

      if (!selectedMember) {
        showStatus($("sendStatus"), "請先搜尋並選擇要傳送的客人。", "warn");
        return;
      }

      if (!message) {
        showStatus($("sendStatus"), "請輸入要傳送的訊息。", "warn");
        return;
      }

      if (!selectedMember.recordId && !selectedMember.lineUserId) {
        showStatus($("sendStatus"), "這位會員沒有 recordId / LineUserId，無法推播。", "err");
        return;
      }

      const who = memberTitle(selectedMember);
      const ok = window.confirm(`確定要傳 LINE 訊息給「${who}」嗎？\n\n送出後客人會直接收到官方 LINE 訊息。`);
      if (!ok) return;

      saveKeyIfNeeded();
      $("sendBtn").disabled = true;
      showStatus($("sendStatus"), "LINE 訊息送出中...");

      try {
        const data = await postJson("/op/line-message/send", {
          op_key: opKey,
          member_record_id: selectedMember.recordId || "",
          line_user_id: selectedMember.lineUserId || "",
          message
        });

        showStatus(
  $("sendStatus"),
  (data.message || "已送出 LINE 訊息。") +
    (data.log_id
      ? "\n紀錄編號：" + data.log_id
      : "\n⚠️ LINE 已送出，但 Airtable 紀錄沒有寫入，請檢查 LineMessageLogs 欄位或 Cloudflare Logs。"),
  "ok"
);
        addHistory({
          at: new Date().toLocaleString("zh-TW", { hour12: false }),
          member: who,
          phone: selectedMember.phone || "",
          email: selectedMember.email || "",
          message
        });
      } catch (e) {
        const data = e.data || {};
        let extra = "";

        if (data.error === "missing_line_token") {
          extra = "\n\n請到 Cloudflare Worker 確認 LINE_CHANNEL_ACCESS_TOKEN 有設定。";
        } else if (data.error === "line_push_failed") {
          extra = "\n\n可能是客人封鎖官方 LINE、LineUserId 無效，或 LINE token 不是同一個官方帳號。";
        } else if (data.error === "forbidden") {
          extra = "\n\n請確認 OP_KEY / ADMIN_KEY 是否正確。";
        }

        showStatus($("sendStatus"), "送出失敗：" + (e.message || e) + extra, "err");
     } finally {
  updateSendState();
  loadServerLogs();
}
    }

    function updateSendState() {
      const canSend = Boolean(
        $("opKey").value.trim() &&
        selectedMember &&
        $("messageText").value.trim()
      );
      $("sendBtn").disabled = !canSend;
      $("charCount").textContent = `${$("messageText").value.length} / 1000`;
    }

    function addHistory(item) {
      const list = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      list.unshift(item);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(0, 20)));
      renderHistory();
    }

    function renderHistory() {
      const list = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      const box = $("historyList");

      if (!list.length) {
        box.innerHTML = '<div class="empty" style="margin-top:10px;">目前沒有本機紀錄</div>';
        return;
      }

      box.innerHTML = list.map(item => `
        <div class="historyItem">
          <strong>${escHtml(item.at || "")}</strong>｜${escHtml(item.member || "")}
          ${item.phone ? "｜" + escHtml(item.phone) : ""}
          <br>
          ${escHtml(String(item.message || "").slice(0, 120))}${String(item.message || "").length > 120 ? "..." : ""}
        </div>
      `).join("");
    }
function renderServerLogs(rows) {
  const box = $("serverLogList");
  if (!box) return;

  if (!Array.isArray(rows) || !rows.length) {
    box.innerHTML = '<div class="empty" style="margin-top:10px;">目前沒有發送紀錄</div>';
    return;
  }

  box.innerHTML = rows.map(row => {
    const ok = row.status === "success";
    const statusText = ok ? "成功" : "失敗";
    const statusClass = ok ? "ok" : "err";

    const who = row.displayName || row.name || row.phone || row.email || row.lineUserId || "未命名會員";
    const err = row.errorCode
      ? `<div class="sub dangerText">錯誤：${escHtml(row.errorCode)} ${row.errorDetail ? "｜" + escHtml(row.errorDetail) : ""}</div>`
      : "";

    return `
      <div class="historyItem">
        <div>
          <span class="tag ${statusClass}">${statusText}</span>
          <strong>${escHtml(row.createdAt || "")}</strong>
          ｜${escHtml(who)}
        </div>
        <div class="sub">
          ${row.phone ? "電話：" + escHtml(row.phone) + "｜" : ""}
          ${row.email ? "Email：" + escHtml(row.email) + "｜" : ""}
          ${row.lineStatus ? "LINE狀態：" + escHtml(row.lineStatus) : ""}
        </div>
        <div style="margin-top:6px;">${escHtml(String(row.message || "").slice(0, 160))}${String(row.message || "").length > 160 ? "..." : ""}</div>
        ${err}
      </div>
    `;
  }).join("");
}

async function loadServerLogs() {
  const box = $("serverLogList");
  if (!box) return;

  const opKey = $("opKey").value.trim();

  if (!opKey) {
    box.innerHTML = '<div class="empty" style="margin-top:10px;">輸入 OP_KEY 後可查看發送紀錄</div>';
    return;
  }

  box.innerHTML = '<div class="empty" style="margin-top:10px;">讀取發送紀錄中...</div>';

  try {
    const payload = {
      op_key: opKey,
      limit: 20
    };

    if (selectedMember) {
      payload.member_record_id = selectedMember.recordId || "";
      payload.line_user_id = selectedMember.lineUserId || "";
    }

    const data = await postJson("/op/line-message/logs", payload);
    renderServerLogs(data.rows || []);
  } catch (e) {
    box.innerHTML = `<div class="status err" style="display:block;margin-top:10px;">讀取發送紀錄失敗：${escHtml(e.message || e)}</div>`;
  }
}
    function initFromQuery() {
      const params = new URLSearchParams(location.search);
      const q = params.get("q") || params.get("keyword") || params.get("phone") || "";
      const msg = params.get("message") || "";

      if (q) $("keyword").value = q;
      if (msg) $("messageText").value = msg;

      updateSendState();

      if (q) {
        setTimeout(searchMembers, 250);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      restoreKey();
      renderHistory();
initFromQuery();
loadServerLogs();

      $("searchBtn").addEventListener("click", searchMembers);
      $("keyword").addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchMembers();
      });

      $("opKey").addEventListener("input", updateSendState);
      // 共用登入後不再使用本頁 rememberKey
      $("messageText").addEventListener("input", updateSendState);

      document.querySelectorAll("[data-template]").forEach(btn => {
        btn.addEventListener("click", () => {
          $("messageText").value = templateText(btn.dataset.template);
          updateSendState();
        });
      });

      $("sendBtn").addEventListener("click", sendMessage);

      $("clearBtn").addEventListener("click", () => {
        $("messageText").value = "";
        hideStatus($("sendStatus"));
        updateSendState();
      });

      // 清除本機紀錄按鈕
$("clearHistoryBtn").addEventListener("click", () => {
  if (!confirm("確定清除本機送出紀錄嗎？")) return;
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
});

// 正式發送紀錄刷新按鈕
const refreshServerLogsBtn = $("refreshServerLogsBtn");
if (refreshServerLogsBtn) {
  refreshServerLogsBtn.addEventListener("click", loadServerLogs);
}
});
  </script>
</body>
</html>
