<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>直播主開單</title>
<style>
  :root {
    --bg:#f3f4f6;
    --card:#ffffff;
    --txt:#111827;
    --muted:#6b7280;
    --pri:#111111;
    --line:#e5e7eb;
    --soft:#f9fafb;
    --soft-2:#f5f7fb;
    --shadow:0 10px 30px rgba(17,24,39,.06);
    --shadow-soft:0 4px 14px rgba(17,24,39,.05);
    --radius:16px;
  }

  body {
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Noto Sans TC, sans-serif;
    background:var(--bg);
    color:var(--txt);
  }

  .wrap {
    max-width: 1080px;
    margin: 28px auto;
    padding: 0 18px 28px;
  }

  .card {
    background:var(--card);
    border:1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px;
    margin-bottom: 18px;
  }

  h2 {
    margin: 0 0 14px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: .01em;
  }

  .row {
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }

  .row > * {
    flex: 1 1 220px;
  }

  input, select, button, textarea, summary {
    width: 100%;
    box-sizing: border-box;
    padding: 11px 13px;
    border-radius: 12px;
    border:1px solid var(--line);
    font-size: 15px;
  }

  input, select, textarea {
    background:#fff;
    color:var(--txt);
  }

  input:focus, select:focus, textarea:focus {
    outline:none;
    border-color:#cfd6df;
    box-shadow: 0 0 0 4px rgba(17,24,39,.04);
  }

  button {
    min-height: 46px;
    background:#111;
    color:#fff;
    cursor:pointer;
    border:none;
    font-weight:700;
    letter-spacing:.01em;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    box-shadow: var(--shadow-soft);
  }

  button:hover {
    transform: translateY(-1px);
  }

  button:disabled {
    opacity:.45;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }

  button.ghost {
    background:#fff;
    color:#111;
    border:1px solid var(--line);
    box-shadow:none;
  }

  .mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .muted {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  .hidden {
    display:none !important;
  }

  .list {
    margin: 14px 0 0;
    padding:0;
    list-style:none;
  }

  .list li {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:12px 14px;
    margin-bottom:10px;
    border:1px solid #eef1f5;
    border-radius:12px;
    background: var(--soft);
  }

  .right {
    text-align:right;
  }

  .grid2 {
    display:grid;
    grid-template-columns: 1fr auto;
    gap:10px;
    align-items: center;
  }

  #cartItemsPanel > div,
  #openCartList > div {
    box-shadow:none !important;
  }

  details {
    border:1px solid var(--line);
    background:var(--soft);
    border-radius:12px;
    padding:10px 12px;
  }

  details summary {
    border:none;
    background:transparent;
    padding:0;
  }

  @media (max-width: 820px) {
    .wrap {
      padding: 0 14px 24px;
    }

    .card {
      padding: 18px;
    }

    h2 {
      font-size: 20px;
    }
  }

  @media (max-width: 720px) {
    #cartAdminBlock > div:last-child {
      display:block !important;
    }
  }
  /* ===== 共用六頁頁籤 ===== */
.page-tabs{
  margin:0 0 18px;
}

.page-tabs-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px 14px;
  border-radius:18px;
  background:#020617;
  border:1px solid rgba(148,163,184,.28);
  box-shadow:0 10px 30px rgba(15,23,42,.12);
}

.page-tab{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:0 18px;
  border-radius:999px;
  text-decoration:none;
  font-size:14px;
  font-weight:800;
  letter-spacing:.01em;
  background:rgba(15,23,42,.92);
  color:#e2e8f0;
  border:1px solid rgba(148,163,184,.55);
  transition:.18s ease;
}

.page-tab:hover{
  transform:translateY(-1px);
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.18);
}

.page-tab.is-active{
  background:#22d3ee;
  color:#0f172a;
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.32);
}

@media (max-width:900px){
  .page-tabs-bar{
    gap:8px;
    padding:10px;
  }
  .page-tab{
    min-height:40px;
    padding:0 14px;
    font-size:13px;
  }
}
</style>
<script>window.API_BASE = "https://api.murain.tw";</script>

  <!-- 3. 加商品 -->

<script>
(async function () {
  const API = window.API_BASE;
  const $  = (s)=>document.querySelector(s);

let OP = '';
let CART = '';

let CURRENT_MODE = 'simple';
let CURRENT_MEMBER_PHONE = '';

function setMode(mode){
  CURRENT_MODE = mode || 'simple';

  const simpleBlock = document.getElementById('simple-list-block');
  const manageBlock = document.getElementById('manage-list-block');
  const btnSimple     = document.getElementById('btn-mode-simple');
const btnManage     = document.getElementById('btn-mode-manage');
const btnBenefit    = document.getElementById('btn-mode-benefit');
const btnCreditList = document.getElementById('btn-mode-credit-list');

const isSimple     = CURRENT_MODE === 'simple';
const isManage     = CURRENT_MODE === 'manage';
const isBenefit    = CURRENT_MODE === 'benefit';
const isCreditList = CURRENT_MODE === 'creditList';

  if (simpleBlock) simpleBlock.classList.toggle('hidden', !(isSimple || isBenefit));
  if (manageBlock) manageBlock.classList.toggle('hidden', !isManage);

 if ($('#card-app')) $('#card-app').classList.toggle('hidden', !isSimple);
if ($('#card-benefit')) $('#card-benefit').classList.toggle('hidden', !isBenefit);
if ($('#card-credit-list')) $('#card-credit-list').classList.toggle('hidden', !isCreditList);
if ($('#card-add')) $('#card-add').classList.toggle('hidden', !isSimple);

 if (btnSimple) btnSimple.classList.toggle('ghost', !isSimple);
if (btnManage) btnManage.classList.toggle('ghost', !isManage);
if (btnBenefit) btnBenefit.classList.toggle('ghost', !isBenefit);
if (btnCreditList) btnCreditList.classList.toggle('ghost', !isCreditList);

if (isCreditList) {
  loadCreditList();
}
}

  // ---------- helpers ----------
  async function jfetch(url, opt) {
    const r = await fetch(url, Object.assign({headers:{'content-type':'application/json'}}, opt||{}));
    const txt = await r.text();
    try { return JSON.parse(txt); } catch { return {raw:txt}; }
  }
  function money(n){ n = +n||0; return 'NT$ ' + n.toLocaleString(); }

function guardCart(){
  if(!CART){
    alert('請先建立購物車');
    return false;
  }
  return true;
}

function hasSelectedCustomer(){
  return !!(getLineUserId() && getCustomerName());
}

function guardCustomer(){
  if(!hasSelectedCustomer()){
    alert('請先查詢並選擇客人，再操作購物車');
    return false;
  }
  return true;
}

function setLoginUI(on){
  $('#card-login').classList.toggle('hidden', !!on);
  $('#card-mode-switch').classList.toggle('hidden', !on);
  $('#card-list').classList.toggle('hidden', !on);

if (!on) {
  $('#card-app').classList.add('hidden');
  $('#card-benefit').classList.add('hidden');
  $('#card-add').classList.add('hidden');
} else {
  setMode(CURRENT_MODE || 'simple');
}

  syncMainButtons();
}

function setCartToken(t) {
  CART = t||'';
  $('#cart_token').textContent = t||'尚未建立';
  $('#btn-clear').disabled = !OP || !CART;
  try { rememberCartForUser(CART); } catch(e) {}
    syncMainButtons();
  updateCurrentCustomerInfo();
  syncBenefitPanel();
  syncCartManageButtons();
}

function clearCurrentCartView(){
  setCartToken('');
  const ul = $('#items');
  if (ul) ul.innerHTML = '';
  if ($('#total')) $('#total').textContent = 'NT$ 0';
  if ($('#link_out')) $('#link_out').value = '';
}

function resetForNextCustomer(){
  clearCurrentCartView();
  if ($('#line_search_name')) $('#line_search_name').value = '';
  if ($('#line_user_id')) $('#line_user_id').value = '';
  if ($('#line_search_info')) $('#line_search_info').textContent = '';
  if ($('#cartmap_info')) $('#cartmap_info').textContent = '';
  if ($('#sku')) $('#sku').value = '';
  if ($('#qty')) $('#qty').value = '1';
  if ($('#override_price')) $('#override_price').value = '';
  CURRENT_MEMBER_PHONE = '';
  updateCurrentCustomerInfo();
  syncMainButtons();
}

 function resetAfterSendSuccess(){
  clearCurrentCartView();

  if ($('#line_search_name')) $('#line_search_name').value = '';
  if ($('#line_user_id')) $('#line_user_id').value = '';
  if ($('#line_search_info')) $('#line_search_info').textContent = '';
  if ($('#cartmap_info')) $('#cartmap_info').textContent = '';

  if ($('#sku')) $('#sku').value = '';
  if ($('#qty')) $('#qty').value = '1';
  if ($('#override_price')) $('#override_price').value = '';
  CURRENT_MEMBER_PHONE = '';

  // ✅ 保留直播主名稱，不清 #streamer
  // ✅ 保留客群，不清 #customer_type

  updateCurrentCustomerInfo();
  syncMainButtons();
  syncBenefitPanel();
}

function switchCustomerSafely(nextLineUserId, nextName){
  const currentUid  = getLineUserId();
  const currentName = getCustomerName();

  if (
    CART &&
    currentUid &&
    nextLineUserId &&
    currentUid !== nextLineUserId
  ) {

// 新增：複製一整段要貼給客人的 LINE 訊息（更穩：先用 clipboard，失敗再 fallback）
async function copyLineMessage() {
  if (!guardCart()) return;

  const url = buildCheckoutUrl();
  const totalText = $('#total') ? $('#total').textContent.trim() : '';

  const msgLines = [
    '親愛的寶寶您好，這是您的專屬結帳連結：',
    url,
    '',
    totalText ? `本次結帳金額：${totalText}` : '',
    '請在 10 分鐘內完成填寫與送出，如需調整可以直接回覆此訊息喔💖'
  ].filter(Boolean);

  const msg = msgLines.join('\n');

  const ta = $('#line_msg') || $('#link_out');
  if (ta) ta.value = msg;

  // ✅ 優先：Clipboard API（HTTPS + 新版瀏覽器最穩）
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(msg);
      alert('已複製 LINE 訊息');
      return;
    }
  } catch (e) {}

  // ✅ fallback：選取 + execCommand（LINE 內建瀏覽器/部分手機）
  try {
    if (ta) {
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
    } else {
      // 如果沒有 textarea/input，就臨時建一個
      const tmp = document.createElement('textarea');
      tmp.value = msg;
      tmp.style.position = 'fixed';
      tmp.style.opacity = '0';
      document.body.appendChild(tmp);
      tmp.select();
      tmp.setSelectionRange(0, tmp.value.length);
    }

    const ok = document.execCommand('copy');
    if (!ok) throw new Error('execCommand copy failed');
    alert('已複製 LINE 訊息');
  } catch (e) {
    alert('複製失敗，請手動長按複製訊息');
  }
}

                    data-qty="${qty}"
                    data-price="${price}"

  root.querySelectorAll('.btn-edit-cart-item').forEach(btn => {
    btn.addEventListener('click', () => {

async function adminAddItem(){
  const token = getSelectedCartUI();
  if (!token) return alert('請先選一台購物車');

  const opk = getOpKeyUI();
  if (!opk) return alert('請輸入 OP Key（右邊那格）');

  const sku = v('addSku');
  const qty = Math.max(1, parseInt(v('addQty') || '1', 10) || 1);

  // 如果現在是「修改模式」，先移除舊商品再重加

      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({ cart_token: token, sku: ADMIN_EDIT_SKU, op_key: opk })
    });

    if (!okRemove || !jsonRemove || jsonRemove.ok !== true) {
      console.log('replace-remove fail', okRemove, jsonRemove);
      return alert('修改前移除舊商品失敗：' + (jsonRemove && (jsonRemove.error || jsonRemove.message) || 'unknown'));
    }
  }

  const body = { cart_token: token, sku, qty, op_key: opk };
  if (priceRaw !== '') body.price = Math.max(0, parseInt(priceRaw, 10) || 0);

  const { ok, json } = await safeJsonFetch(API + '/cart/add', {
    method:'POST',
    headers:{'content-type':'application/json'},

function syncCartManageButtons() {
  const btnListOpen   = document.getElementById('btnListOpen');
  const btnReloadCart = document.getElementById('btnReloadCart');
  const btnClearCart  = document.getElementById('btnClearCart');
  const btnAddItem    = document.getElementById('btnAddItem');
  const btnRemoveItem = document.getElementById('btnRemoveItem');

  const hasAdminKey = !!getAdminKeyUI();
  const hasOpKey    = !!getOpKeyUI();
  const hasCart     = !!getSelectedCartUI();
  const hasAddSku   = !!v('addSku');
  const hasRmSku    = !!v('rmSku');

  if (btnListOpen) {
    btnListOpen.disabled = ADMIN_LIST_LOADING || !hasAdminKey;
    btnListOpen.textContent = ADMIN_LIST_LOADING ? '搜尋中...' : '未完成結單購物車清單';
  }

  if (btnReloadCart) btnReloadCart.disabled = !hasCart;
  if (btnClearCart)  btnClearCart.disabled  = !(hasCart && hasOpKey);
  if (btnAddItem)    btnAddItem.disabled    = !(hasCart && hasOpKey && hasAddSku);
  if (btnRemoveItem) btnRemoveItem.disabled = !(hasCart && hasOpKey && hasRmSku);
}
async function adminListOpenCarts(){
  const ak = getAdminKeyUI();
  if (!ak) return alert('請輸入 Admin Key');

  const kw = v('cartManageKw');
  let r;

  try {
    ADMIN_LIST_LOADING = true;
    syncCartManageButtons();

    if (kw) {
      r = await safeJsonFetch(
        API + '/admin/cart/search?kw=' + encodeURIComponent(kw) + '&admin_key=' + encodeURIComponent(ak),
        { method:'GET' }
      );
    } else {
      r = await safeJsonFetch(
        API + '/admin/cart/open?admin_key=' + encodeURIComponent(ak),
        { method:'GET' }
      );
    }

    if (!r.ok || !r.json || r.json.ok !== true) {
      console.log('list open carts fail', r);

      const err = (r.json && (r.json.error || r.json.message)) || 'unknown';

      if (String(err) === 'not_found') {
        showOpenCartHtml(`<div class="muted">沒有找到符合條件的購物車</div>`);
        alert('搜尋完成，沒有找到符合條件的購物車');
      } else {
        showOpenCartHtml(`<div class="muted">讀取失敗：${escHtml(err)}</div>`);
        alert('讀取失敗：' + err);
      }
      return;
    }

    const cartsRaw = (r.json.carts || []);
    const hasItemCount = cartsRaw.some(c => c && c.item_count != null);
    const carts = hasItemCount
      ? cartsRaw.filter(c => (Number(c.item_count || 0) || 0) > 0)
      : cartsRaw;

    renderOpenCarts(carts);
    alert(`搜尋完成，共找到 ${carts.length} 台購物車`);
  } finally {
    ADMIN_LIST_LOADING = false;
    syncCartManageButtons();
  }
}
