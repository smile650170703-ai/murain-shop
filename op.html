<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>直播主開單</title>
<style>
  :root { --bg:#f7f7f8; --card:#fff; --txt:#222; --muted:#6b7280; --pri:#111; }
  body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Noto Sans TC, sans-serif; background:var(--bg); color:var(--txt); }
  .wrap { max-width: 980px; margin: 24px auto; padding: 0 16px; }
  .card { background:var(--card); border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,.05);
          padding: 20px; margin-bottom: 18px; }
  h2 { margin: 0 0 12px; font-size: 20px; }
  .row { display:flex; gap:10px; flex-wrap:wrap; }
  .row > * { flex: 1 1 220px; }
  input, select, button, textarea {
    width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 10px; border:1px solid #e5e7eb; font-size: 15px;
  }
  button { background:#111; color:#fff; cursor:pointer; border:none; }
  button.ghost { background:#fff; color:#111; border:1px solid #e5e7eb; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .muted { color: var(--muted); font-size: 13px; }
  .hidden { display:none !important; }
  .list { margin: 8px 0 0; padding:0; list-style:none; }
  .list li { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed #eee; }
  .right { text-align:right; }
  .grid2 { display:grid; grid-template-columns: 1fr auto; gap:10px; align-items: center; }
</style>
<script>window.API_BASE = "https://api.murain.tw";</script>
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
<div class="wrap">

  <!-- 登入 -->
  <div class="card" id="card-login">
    <h2>主播開單登入</h2>
    <div class="row">
      <div style="flex:2">
        <label class="muted">OP 密碼</label>
        <input id="op_key" class="mono" placeholder="輸入 OP Key" />
      </div>
      <div style="align-self:end; flex:1">
        <button id="btn-login">登入</button>
      </div>
    </div>
    <div class="muted" style="margin-top:6px">成功後會緩存於此裝置，關閉視窗後需重新登入。</div>
  </div>
    <!-- 功能切換 -->
  <div class="card hidden" id="card-mode-switch">
    <h2>功能切換</h2>
    <div class="row">
      <button id="btn-mode-simple">簡單開單</button>
      <button id="btn-mode-manage" class="ghost">購物車管理</button>
    </div>
  </div>

  <!-- 1. 查詢會員 / 選客人 -->
  <div class="card hidden" id="card-list">
    <div id="simple-list-block">
      <h2>1️⃣查詢會員</h2>

    <div class="row" style="margin-top:10px">
      <input
        id="line_search_name"
        placeholder="輸入客人的 LINE 名稱或本名（完全一樣的字）"
      />
      <button id="btn-search-line" class="ghost">查詢會員</button>
    </div>

    <div class="muted" id="line_search_info" style="margin-top:4px"></div>
    <div class="muted" id="cartmap_info" style="margin-top:4px"></div>

    <div class="row" style="margin-top:10px">
      <button id="btn-load-user-cart" class="ghost">載入此客人購物車</button>
      <button id="btn-create-new-cart" class="ghost">建立新購物車</button>
      <button id="btn-next-customer" class="ghost">下一位客人</button>
    </div>

    <div class="muted" id="current_customer_info" style="margin-top:6px"></div>

    <div class="row" style="margin-top:10px">
      <input id="line_user_id" placeholder="LineUserId（查到會員後會自動帶入）" />
    </div>

    <div class="row" style="margin-top:10px">
      <button id="btn-link" class="ghost">複製結帳連結</button>
      <button id="btn-send-link" class="ghost">從官方 LINE 發結帳卡片</button>
    </div>

    <input id="link_out" class="mono" readonly style="margin-top:10px" />

    <textarea
      id="line_msg"
      rows="4"
      class="mono"
      readonly
      style="margin-top:8px; position:absolute; left:-9999px; top:-9999px; width:1px; height:1px; opacity:0;"
      placeholder="這裡會自動產生要貼給客人的訊息"
    ></textarea>

    <ul id="items" class="list"></ul>

    <div class="grid2" style="margin-top:8px">
      <div class="muted">合計</div>
      <div class="right mono" id="total">NT$ 0</div>
    </div>

    <div class="row" style="margin-top:10px">
      <button class="ghost" id="btn-clear">🕳️清空購物車🕳️</button>
    </div>
    </div>

    <div id="manage-list-block" class="hidden">
      <h2>2️⃣購物車管理</h2>

      <!-- ====== 購物車管理（搜尋 / 查看 / 清除） ====== -->
    <section id="cartAdminBlock" style="margin-top:18px;">
      <div style="display:flex; gap:14px; align-items:flex-start; flex-wrap:wrap;">

        <div style="min-width:280px; flex:0 0 320px;">
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
            <div style="flex:1;">
              <div style="font-size:12px; opacity:.8; margin-bottom:6px;">Admin Key</div>
              <input id="adminKey" placeholder="Admin Key" style="width:100%; padding:10px;" />
            </div>
            <div style="flex:1;">
              <div style="font-size:12px; opacity:.8; margin-bottom:6px;">OP Key</div>
              <input id="opKey" type="password" placeholder="" style="width:100%; padding:10px;" />
            </div>
          </div>

          <div style="display:flex; gap:10px; margin-top:12px; flex-wrap:wrap;">
            <button id="btnListOpen">搜尋未結單購物車</button>
            <button id="btnClearCart">清空購物車</button>
          </div>

          <div style="margin-top:12px; font-size:12px; opacity:.8;">未結單購物車</div>
          <div id="openCartList" style="margin-top:8px;"></div>
        </div>

        <div style="flex:1; min-width:360px;">
          <div style="font-size:12px; opacity:.8;">目前選擇購物車</div>
          <input id="selectedCartToken" readonly style="width:100%; padding:10px; margin-top:6px;" />

          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:12px;">
            <input id="addSku" placeholder="條碼" style="width:140px; padding:10px;" />
            <input id="addQty" type="number" value="1" min="1" placeholder="Qty" style="width:100px; padding:10px;" />
            <input id="addPrice" type="number" placeholder="可改價格" style="width:140px; padding:10px;" />
            <button id="btnAddItem">加購</button>
          </div>

          <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
            <input id="rmSku" placeholder="要移除的條碼" style="width:220px; padding:10px;" />
            <button id="btnRemoveItem">移除</button>
            <button id="btnReloadCart">重新載入</button>
          </div>

          <div style="margin-top:12px; font-size:12px; opacity:.8;">購物車內容</div>
          <textarea id="cartJsonView" style="width:100%; height:220px; padding:10px; margin-top:6px;"></textarea>
        </div>

      </div>
    </section>
    </div>
  </div>

  <!-- 2. 建立購物車 -->
  <div class="card hidden" id="card-app">
    <h2>2️⃣建立購物車</h2>
    <div class="row">
      <div style="flex:2">
        <label class="muted">主播名稱</label>
        <input id="streamer" placeholder="必填" />
      </div>
      <div style="flex:1">
        <label class="muted">客群</label>
        <select id="customer_type">
          <option value="live">直播</option>
          <option value="regular">一般</option>
        </select>
      </div>
      <div style="flex:1; align-self:end">
        <button id="btn-create">建立</button>
      </div>
    </div>
    <div class="grid2" style="margin-top:10px">
      <div class="muted">購物車：<span id="cart_token" class="mono muted">尚未建立</span></div>
      <button class="ghost" id="btn-refresh">重整清單</button>
    </div>
  </div>

  <!-- 3. 加商品 -->
  <div class="card hidden" id="card-add">
    <h2>3️⃣加入商品</h2>
    <div class="row">
      <div><label class="muted">條碼</label><input id="sku" class="mono" placeholder="" /></div>
      <div style="max-width:130px"><label class="muted">數量</label><input id="qty" value="1" /></div>
      <div><label class="muted">改價格(不改價必須清空)</label><input id="override_price" placeholder="" /></div>
      <div style="align-self:end"><button id="btn-add">加入</button></div>
    </div>

    <div class="row hidden" style="margin-top:8px">
      <button class="ghost" id="btn-50" style="max-width:120px">-50</button>
      <button class="ghost" id="btn-100" style="max-width:120px">-100</button>
      <button class="ghost" id="btn-999" style="max-width:120px">特價 999</button>
    </div>

    <div class="row hidden" style="margin-top:10px">
      <div style="flex:3"><input id="note" placeholder="備註 / 贈品說明" /></div>
      <div style="flex:1"><button class="ghost" id="btn-note">儲存備註</button></div>
    </div>
  </div>
<script>
(async function () {
  const API = window.API_BASE;
  const $  = (s)=>document.querySelector(s);

  let OP = '';
  let CART = '';

    let CURRENT_MODE = 'simple';

  function setMode(mode){
    CURRENT_MODE = mode || 'simple';

    const simpleBlock = document.getElementById('simple-list-block');
    const manageBlock = document.getElementById('manage-list-block');
    const btnSimple   = document.getElementById('btn-mode-simple');
    const btnManage   = document.getElementById('btn-mode-manage');

    const isSimple = CURRENT_MODE === 'simple';

    if (simpleBlock) simpleBlock.classList.toggle('hidden', !isSimple);
    if (manageBlock) manageBlock.classList.toggle('hidden', isSimple);

    if ($('#card-app')) $('#card-app').classList.toggle('hidden', !isSimple);
    if ($('#card-add')) $('#card-add').classList.toggle('hidden', !isSimple);

    if (btnSimple) btnSimple.classList.toggle('ghost', !isSimple);
    if (btnManage) btnManage.classList.toggle('ghost', isSimple);
  }

  // ---------- helpers ----------
  async function jfetch(url, opt) {
    const r = await fetch(url, Object.assign({headers:{'content-type':'application/json'}}, opt||{}));
    const txt = await r.text();
    try { return JSON.parse(txt); } catch { return {raw:txt}; }
  }
  function money(n){ n = +n||0; return 'NT$ ' + n.toLocaleString(); }

function guardCart(){
  if(!CART){
    alert('請先建立或載入購物車');
    return false;
  }
  return true;
}

function hasSelectedCustomer(){
  return !!(getLineUserId() && getCustomerName());
}

function guardCustomer(){
  if(!hasSelectedCustomer()){
    alert('請先查詢並選擇客人，再操作購物車');
    return false;
  }
  return true;
}

function setLoginUI(on){
  $('#card-login').classList.toggle('hidden', !!on);
  $('#card-mode-switch').classList.toggle('hidden', !on);
  $('#card-list').classList.toggle('hidden', !on);

  if (!on) {
    $('#card-app').classList.add('hidden');
    $('#card-add').classList.add('hidden');
  } else {
    setMode(CURRENT_MODE || 'simple');
  }

  syncMainButtons();
}

function setCartToken(t) {
  CART = t||'';
  $('#cart_token').textContent = t||'尚未建立';
  $('#btn-clear').disabled = !OP || !CART;
  try { rememberCartForUser(CART); } catch(e) {}
  syncMainButtons();
  updateCurrentCustomerInfo();
}

function clearCurrentCartView(){
  setCartToken('');
  const ul = $('#items');
  if (ul) ul.innerHTML = '';
  if ($('#total')) $('#total').textContent = 'NT$ 0';
  if ($('#link_out')) $('#link_out').value = '';
}

function resetForNextCustomer(){
  clearCurrentCartView();
  if ($('#line_search_name')) $('#line_search_name').value = '';
  if ($('#line_user_id')) $('#line_user_id').value = '';
  if ($('#line_search_info')) $('#line_search_info').textContent = '';
  if ($('#cartmap_info')) $('#cartmap_info').textContent = '';
  if ($('#sku')) $('#sku').value = '';
  if ($('#qty')) $('#qty').value = '1';
  if ($('#override_price')) $('#override_price').value = '';
  updateCurrentCustomerInfo();
  syncMainButtons();
}

function switchCustomerSafely(nextLineUserId, nextName){
  const currentUid  = getLineUserId();
  const currentName = getCustomerName();

  if (
    CART &&
    currentUid &&
    nextLineUserId &&
    currentUid !== nextLineUserId
  ) {
    clearCurrentCartView();
    alert(`已切換客人：\n${currentName || currentUid}\n→ ${nextName || nextLineUserId}\n\n已自動清空目前畫面的購物車選擇，請重新按「載入此客人購物車」或「建立新購物車」。`);
  }
}

function updateCurrentCustomerInfo(){
  const name = getCustomerName();
  const uid  = getLineUserId();
  const el   = $('#current_customer_info');
  if (!el) return;

  if (!name && !uid) {
    el.textContent = '目前尚未選擇客人';
    return;
  }

  el.textContent = `目前客人：${name || '(未命名)'}${uid ? ' / ' + uid : ''}${CART ? ' / 購物車：' + CART : ' / 尚未建立購物車'}`;
}

function syncMainButtons(){
  const hasCustomer = hasSelectedCustomer();
  const hasCart = !!CART;

  if ($('#btn-add')) $('#btn-add').disabled = !(hasCustomer && hasCart);
  if ($('#btn-link')) $('#btn-link').disabled = !hasCart;
  if ($('#btn-send-link')) $('#btn-send-link').disabled = !(hasCustomer && hasCart);
  if ($('#btn-clear')) $('#btn-clear').disabled = !hasCart;
  if ($('#btn-load-user-cart')) $('#btn-load-user-cart').disabled = !hasCustomer;
}

  // ====== ★ 客人購物車記憶（只存在這台 OP 裝置的 localStorage） ======
  const CART_MAP_KEY = 'OP_CART_MAP_V1';
  function loadCartMap() {
    try { return JSON.parse(localStorage.getItem(CART_MAP_KEY) || '{}'); } catch(e) { return {}; }
  }
  function saveCartMap(map) {
    try { localStorage.setItem(CART_MAP_KEY, JSON.stringify(map || {})); } catch(e) {}
  }
  function getLineUserId() {
    return ($('#line_user_id') && ($('#line_user_id').value || '').trim()) || '';
  }
  function getCustomerName() {
  // 你目前唯一有「名字輸入」的欄位就是 #line_search_name
  // 用它當 customer_name（有查會員成功時，我們第 3 步會自動把它改成正確名字）
  return ($('#line_search_name') && ($('#line_search_name').value || '').trim()) || '';
}
  function setCartMapInfo(txt) {
    const el = $('#cartmap_info');
    if (el) el.textContent = txt || '';
  }
  function rememberCartForUser(cartToken) {
    const uid = getLineUserId();
    if (!uid || !cartToken) return;
    const map = loadCartMap();
    map[uid] = { cart_token: String(cartToken), updatedAt: Date.now() };
    saveCartMap(map);
    setCartMapInfo(`已記住此客人購物車：${String(cartToken)}`);
  }
  async function loadCartForUser() {
    const uid = getLineUserId();
    if (!uid) return alert('請先貼上/查到客人的 LineUserId');
    const map = loadCartMap();
    const rec = map[uid];
    if (!rec || !rec.cart_token) return alert('這位客人目前沒有被記住的購物車（你可以先建立一台，再發連結）。');
    setCartToken(rec.cart_token);
    setCartMapInfo(`已載入此客人購物車：${rec.cart_token}`);
    await refreshList();
  }
  function clearCartForUser() {
    const uid = getLineUserId();
    if (!uid) return alert('請先貼上/查到客人的 LineUserId');
    const map = loadCartMap();
    delete map[uid];
    saveCartMap(map);
    setCartMapInfo('已清除此客人購物車記錄');
  }
  function showCartHintIfExists() {
    const uid = getLineUserId();
    if (!uid) { setCartMapInfo(''); return; }
    const map = loadCartMap();
    const rec = map[uid];
    if (rec && rec.cart_token) setCartMapInfo(`這位客人上次購物車：${rec.cart_token}（可按「載入此客人購物車」）`);
    else setCartMapInfo('這位客人目前沒有記住的購物車。');
  }

  // ---------- actions ----------
  async function doLogin() {
    const v = ($('#op_key').value||'').trim();
    if(!v) return alert('請輸入 OP Key');
    const res = await jfetch(API+'/op/auth', { method:'POST', body: JSON.stringify({ op_key: v }) });
    if(!res || res.ok!==true) return alert('OP Key 錯誤');
    OP = v; localStorage.setItem('OP_KEY', v);
    setLoginUI(true);
  }

  async function createCart() {
  if (!guardCustomer()) return;

  const streamer = ($('#streamer').value||'').trim();
  const customer_type = $('#customer_type').value || 'live';

  const payload = {
    streamer_name: streamer || '未命名',
    customer_type,
    line_user_id: getLineUserId(),
    customer_name: getCustomerName()
  };

  const res = await jfetch(API+'/cart/create', {
    method:'POST',
    body: JSON.stringify(payload)
  });

  if(!res.ok) return alert('建立失敗：'+(res.error||''));

  setCartToken(res.cart_token);
  try { showCartHintIfExists(); } catch(e) {}
  await refreshList();
}

  async function addItem() {
  if (!guardCustomer()) return;
  if (!guardCart()) return;

  const sku = ($('#sku').value||'').trim();
  const qty = parseInt($('#qty').value||'1',10)||1;
  const price = ($('#override_price').value||'').trim();

  if (!sku) return alert('請先輸入條碼');

  const body = {
    cart_token: CART,
    sku,
    qty,
    line_user_id: getLineUserId(),
    customer_name: getCustomerName()
  };

  if(price) {
    body.price = parseInt(price,10)||0;
    body.op_key = OP;
  }

  const res = await jfetch(API+'/cart/add', {
    method:'POST',
    body: JSON.stringify(body)
  });

  if(!res.ok) return alert('加入失敗：'+(res.error||''));

  $('#sku').value='';
  await refreshList();
}

  async function saveNote() {
    if(!guardCart()) return;
    const note = $('#note').value||'';
    const res = await jfetch(API+'/cart/note', { method:'POST', body: JSON.stringify({ cart_token: CART, note, op_key: OP })});
    if(!res.ok) return alert('備註失敗：'+(res.error||''));
    alert('已儲存備註');
  }

  async function refreshList() {
  if(!guardCart()) return;

  const res = await jfetch(API+'/cart/'+encodeURIComponent(CART));
  const list = res.items||[];
  const ul = $('#items');
  ul.innerHTML = '';

  let sum = 0;

  list.forEach(it=>{
    sum += (+it.price||0) * (+it.qty||0);

    const li = document.createElement('li');
    li.style.display = 'flex';
    li.style.justifyContent = 'space-between';
    li.style.alignItems = 'center';
    li.style.gap = '10px';

    li.innerHTML = `
      <div style="flex:1; min-width:0;">
        <div class="mono" style="font-weight:700;">${escHtml(it.sku || '')}</div>
        <div class="mono muted" style="margin-top:4px;">${it.qty} × ${money(it.price||0)}</div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="ghost btn-del-item" data-sku="${escHtml(it.sku || '')}" style="max-width:110px;">刪除此商品</button>
      </div>
    `;

    ul.appendChild(li);
  });

  ul.querySelectorAll('.btn-del-item').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const sku = (btn.dataset.sku || '').trim();
      if (!sku) return;
      await removeItemBySku(sku);
    });
  });

  $('#total').textContent = money(sum);
  syncMainButtons();
  updateCurrentCustomerInfo();
}

  async function clearCart() {
    if(!guardCart()) return;
    if(!OP) return alert('需要 OP 才能清空');
    if(!confirm('確定清空整個購物車？')) return;
    const res = await jfetch(API+'/cart/clear', { method:'POST', body: JSON.stringify({cart_token:CART, op_key:OP}) });
    if(!res.ok) return alert('清空失敗：'+(res.error||''));
    await refreshList();
  }
  async function removeItemBySku(sku) {
  if (!guardCart()) return;
  if (!OP) return alert('請先登入 OP Key');
  if (!sku) return alert('缺少 SKU');

  if (!confirm(`確定移除商品：${sku}？`)) return;

  const res = await jfetch(API + '/cart/remove', {
    method:'POST',
    body: JSON.stringify({
      cart_token: CART,
      sku,
      op_key: OP
    })
  });

  if (!res || res.ok !== true) {
    return alert('移除失敗：' + ((res && res.error) || 'unknown'));
  }

  await refreshList();
}

// 共用：組出這一車的結帳網址（✅ 統一走 LIFF + url= 進入正確 Endpoint）
function buildCheckoutUrl() {
  const LIFF_ID = '2008430261-KLwoQjm4';

  // ✅ 1) 先把 CART 裡可能混進來的 liff.state / ?url=... 清掉（只留真正 token）
  const cartToken = String(CART || '').trim();

  // ✅ 2) endpoint 統一用「無副檔名」入口（配合 Pages 308 行為）
  const endpoint = `https://murain.tw/liff-checkout?cart_token=${encodeURIComponent(CART)}&force=1`;

  return `https://liff.line.me/${LIFF_ID}?url=${encodeURIComponent(endpoint)}`;
}

  // 原本「複製結帳連結」按鈕（更穩：clipboard 優先）
async function linkCheckout() {
  if (!guardCart()) return;

  const url = buildCheckoutUrl();
  const out = $('#link_out');
  if (out) out.value = url;

  // ✅ 優先用 clipboard
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(url);
      alert('已複製結帳連結');
      return;
    }
  } catch (e) {}

  // fallback：選取 + execCommand
  try {
    if (out) {
      out.focus();
      out.select();

// 新增：複製一整段要貼給客人的 LINE 訊息（更穩：先用 clipboard，失敗再 fallback）
async function copyLineMessage() {
  if (!guardCart()) return;

  const url = buildCheckoutUrl();
  const totalText = $('#total') ? $('#total').textContent.trim() : '';

  const msgLines = [
    '親愛的寶寶您好，這是您的專屬結帳連結：',
    url,
    '',
    totalText ? `本次結帳金額：${totalText}` : '',
    '請在 10 分鐘內完成填寫與送出，如需調整可以直接回覆此訊息喔💖'
  ].filter(Boolean);

  const msg = msgLines.join('\n');

  const ta = $('#line_msg') || $('#link_out');
  if (ta) ta.value = msg;

  // ✅ 優先：Clipboard API（HTTPS + 新版瀏覽器最穩）
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(msg);
      alert('已複製 LINE 訊息');
      return;
    }
  } catch (e) {}

  // ✅ fallback：選取 + execCommand（LINE 內建瀏覽器/部分手機）
  try {
    if (ta) {
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
    } else {
      // 如果沒有 textarea/input，就臨時建一個
      const tmp = document.createElement('textarea');
      tmp.value = msg;
      tmp.style.position = 'fixed';
      tmp.style.opacity = '0';
      document.body.appendChild(tmp);
      tmp.select();
      tmp.setSelectionRange(0, tmp.value.length);
    }

    const ok = document.execCommand('copy');
    if (!ok) throw new Error('execCommand copy failed');
    alert('已複製 LINE 訊息');
  } catch (e) {
    alert('複製失敗，請手動長按複製訊息');
  }
}

    // ====== 購物車管理（Admin）======
  function escHtml(s){
    return String(s||"").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  // ====== cartAdminBlock（你新 UI 那區）實作：未結單清單 / 選取 / 加購 / 移除 / 清空 / 重載 ======
  function v(id){ const el = document.getElementById(id); return el ? (el.value || '').trim() : ''; }
  function setV(id, val){ const el = document.getElementById(id); if (el) el.value = val ?? ''; }
  function showOpenCartHtml(html){ const el = document.getElementById('openCartList'); if (el) el.innerHTML = html || ''; }

  function getAdminKeyUI(){ return v('adminKey'); }   // ✅ 你的 UI id 是 adminKey
  function getOpKeyUI(){ return v('opKey') || OP || ''; } // ✅ 你的 UI id 是 opKey（也允許沿用你已登入的 OP）
  function getSelectedCartUI(){ return v('selectedCartToken') || CART || ''; }

  async function safeJsonFetch(url, opt){
    const r = await fetch(url, opt || {});
    const txt = await r.text();
    let j = null;
    try { j = JSON.parse(txt); } catch { j = { ok:false, raw:txt }; }
    return { ok: r.ok, status: r.status, json: j };
  }

      const cnt   = Number(c.item_count || c.itemCount || 0) || 0;
      const up    = escHtml(c.updated_at || c.updatedAt || '');

      return `

          <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;">
            <div style="min-width:260px;">
              <div style="font-weight:800;">
                ${name || '(未填名字)'} <span class="muted">(${cnt} 件)</span>
              </div>
              <div class="muted" style="margin-top:2px;">
                status: <b>${st || '-'}</b> ｜ updated: ${up || '-'}

            </div>
          </div>
        </div>
      `;
    }).join('');

    showOpenCartHtml(list || `<div class="muted">沒有資料</div>`);

    // 綁定「選取」
    const root = document.getElementById('openCartList');
    if (root) {
      root.querySelectorAll('.btnPickCart').forEach(btn=>{
        btn.addEventListener('click', async ()=>{

  async function adminAddItem(){
    const token = getSelectedCartUI();

  async function adminListOpenCarts(){
    const ak = getAdminKeyUI();
    if (!ak) return alert('請輸入 Admin Key');

    // ① 先嘗試你可能已經有的 /admin/cart/open（如果後端沒做，會 404）
    let r = await safeJsonFetch(API + '/admin/cart/open?admin_key=' + encodeURIComponent(ak), { method:'GET' });

    // ② 如果沒有這支，就退而求其次：用 search（但需要 kw）
    if (!r.ok) {
      const kw =
        (document.getElementById('line_user_id') && v('line_user_id')) ||

        return;

        API + '/admin/cart/search?kw=' + encodeURIComponent(kw) + '&admin_key=' + encodeURIComponent(ak),
        { method:'GET' }
      );
    }

    if (!r.ok || !r.json || r.json.ok !== true) {
      console.log('list open carts fail', r);
      showOpenCartHtml(`<div class="muted">讀取失敗：${escHtml((r.json && (r.json.error || r.json.message)) || 'unknown')}</div>`);
      return;
    }

    const cartsRaw = (r.json.carts || []);

// ✅ 有 item_count 才過濾；沒有就全部顯示（避免 /admin/cart/open 被你清空）
const hasItemCount = cartsRaw.some(c => c && c.item_count != null);
const carts = hasItemCount
  ? cartsRaw.filter(c => (Number(c.item_count || 0) || 0) > 0)
  : cartsRaw;

renderOpenCarts(carts);
