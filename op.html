<style>
  :root {
    --bg:#f3f4f6;
    --card:#ffffff;
    --txt:#111827;
    --muted:#6b7280;
    --pri:#111111;
    --line:#e5e7eb;
    --soft:#f9fafb;
    --soft-2:#f5f7fb;
    --shadow:0 10px 30px rgba(17,24,39,.06);
    --shadow-soft:0 4px 14px rgba(17,24,39,.05);
    --radius:16px;
  }

  body {
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Noto Sans TC, sans-serif;
    background:var(--bg);
    color:var(--txt);
  }

  .wrap {
    max-width: 1080px;
    margin: 28px auto;
    padding: 0 18px 28px;
  }

  .card {
    background:var(--card);
    border:1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px;
    margin-bottom: 18px;
  }

  h2 {
    margin: 0 0 14px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: .01em;
  }

  .row {
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  }

  .row > * {
    flex: 1 1 220px;
  }

  input, select, button, textarea, summary {
    width: 100%;
    box-sizing: border-box;
    padding: 11px 13px;
    border-radius: 12px;
    border:1px solid var(--line);
    font-size: 15px;
  }

  input, select, textarea {
    background:#fff;
    color:var(--txt);
  }

  input:focus, select:focus, textarea:focus {
    outline:none;
    border-color:#cfd6df;
    box-shadow: 0 0 0 4px rgba(17,24,39,.04);
  }

  button {
    min-height: 46px;
    background:#111;
    color:#fff;
    cursor:pointer;
    border:none;
    font-weight:700;
    letter-spacing:.01em;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    box-shadow: var(--shadow-soft);
  }

  button:hover {
    transform: translateY(-1px);
  }

  button:disabled {
    opacity:.45;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }
button.is-busy {
    opacity: .75;
    cursor: wait;
    transform: translateY(1px) scale(.98);
    box-shadow: none;
  }

  button.is-done {
    background: #16a34a;
    color: #fff;
  }

  .item-price-input {
    width: 88px;
    min-width: 88px;
    padding: 8px 9px;
    border-radius: 10px;
    font-size: 14px;
    text-align: right;
  }
  button.ghost {
    background:#fff;
    color:#111;
    border:1px solid var(--line);
    box-shadow:none;
  }

  .mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  .muted {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
  }

  .hidden {
    display:none !important;
  }

  .list {
    margin: 14px 0 0;
    padding:0;
    list-style:none;
  }

  .list li {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    padding:12px 14px;
    margin-bottom:10px;
    border:1px solid #eef1f5;
    border-radius:12px;
    background: var(--soft);
  }

  .right {
    text-align:right;
  }

  .grid2 {
    display:grid;
    grid-template-columns: 1fr auto;
    gap:10px;
    align-items: center;
  }

  #cartItemsPanel > div,
  #openCartList > div {
    box-shadow:none !important;
  }

  details {
    border:1px solid var(--line);
    background:var(--soft);
    border-radius:12px;
    padding:10px 12px;
  }

  details summary {
    border:none;
    background:transparent;
    padding:0;
  }

  @media (max-width: 820px) {
    .wrap {
      padding: 0 14px 24px;
    }

    .card {
      padding: 18px;
    }

    h2 {
      font-size: 20px;
    }
  }

  /* ===== 共用六頁頁籤 ===== */
.page-tabs{
  margin:0 0 18px;
}

.page-tabs-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px 14px;
  border-radius:18px;
  background:#020617;
  border:1px solid rgba(148,163,184,.28);

.page-tab{

.page-tab:hover{

<script>
(async function () {
const API = String(window.API_BASE || "").replace(/\/$/, "");
if (!API) throw new Error("API_BASE missing");
  const SITE_ORIGIN = String(window.MURAIN_SITE_ORIGIN || "https://murain.tw").replace(/\/$/, "");
  const LIFF_CHECKOUT_ID = String(window.LIFF_CHECKOUT_ID || "2008430261-KLwoQjm4").trim();
  const $  = (s)=>document.querySelector(s);

let OP = '';
let CART = '';

let CURRENT_MODE = 'simple';
let CURRENT_MEMBER_PHONE = '';

let ADD_ITEM_BUSY = false;
let CREATE_CART_BUSY = false;

function setButtonBusy(btn, busy, busyText) {
  if (!btn) return;

  if (busy) {
    btn.dataset.oldText = btn.textContent || '';
    btn.disabled = true;
    btn.classList.add('is-busy');
    btn.textContent = busyText || '處理中...';
    return;
  }

  btn.disabled = false;
  btn.classList.remove('is-busy');
  btn.textContent = btn.dataset.oldText || '加入';
}

function flashButtonDone(btn, doneText) {
  if (!btn) return;

  const oldText = btn.textContent || btn.dataset.oldText || '加入';
  btn.classList.add('is-done');
  btn.textContent = doneText || '已加入 ✓';

  setTimeout(() => {
    btn.classList.remove('is-done');
    btn.textContent = oldText === '加入中...' ? '加入' : oldText;
    syncMainButtons();
  }, 650);
}

function setMode(mode){
  CURRENT_MODE = mode || 'simple';

  const simpleBlock = document.getElementById('simple-list-block');
  const btnSimple     = document.getElementById('btn-mode-simple');
  const btnBenefit    = document.getElementById('btn-mode-benefit');
  const btnCreditList = document.getElementById('btn-mode-credit-list');

  const isSimple     = CURRENT_MODE === 'simple';
  const isBenefit    = CURRENT_MODE === 'benefit';
  const isCreditList = CURRENT_MODE === 'creditList';

  if (simpleBlock) simpleBlock.classList.toggle('hidden', !(isSimple || isBenefit));

  if ($('#card-app')) $('#card-app').classList.toggle('hidden', !isSimple);
  if ($('#card-benefit')) $('#card-benefit').classList.toggle('hidden', !isBenefit);
  if ($('#card-credit-list')) $('#card-credit-list').classList.toggle('hidden', !isCreditList);
  if ($('#card-add')) $('#card-add').classList.toggle('hidden', !isSimple);

  if (btnSimple) btnSimple.classList.toggle('ghost', !isSimple);
  if (btnBenefit) btnBenefit.classList.toggle('ghost', !isBenefit);
  if (btnCreditList) btnCreditList.classList.toggle('ghost', !isCreditList);

  if (isCreditList) {
    loadCreditList();
  }
}

  // ---------- helpers ----------
  async function jfetch(url, opt) {
    const r = await fetch(url, Object.assign({headers:{'content-type':'application/json'}}, opt||{}));
    const txt = await r.text();
    try { return JSON.parse(txt); } catch { return {raw:txt}; }
  }
  function money(n){ n = +n||0; return 'NT$ ' + n.toLocaleString(); }

function guardCart(){
  if(!CART){
    alert('請先建立購物車');
    return false;
  }
  return true;
}

function hasSelectedCustomer(){
  return !!(getLineUserId() && getCustomerName());
}

function guardCustomer(){
  if(!hasSelectedCustomer()){
    alert('請先查詢並選擇客人，再操作購物車');
    return false;
  }
  return true;
}

function setLoginUI(on){
  $('#card-login').classList.toggle('hidden', !!on);
  $('#card-mode-switch').classList.toggle('hidden', !on);
  $('#card-list').classList.toggle('hidden', !on);

if (!on) {
  $('#card-app').classList.add('hidden');
  $('#card-benefit').classList.add('hidden');
  $('#card-add').classList.add('hidden');
} else {
  setMode(CURRENT_MODE || 'simple');
}

  syncMainButtons();
}

function setCartToken(t) {
  CART = t||'';
  $('#cart_token').textContent = t||'尚未建立';
  $('#btn-clear').disabled = !OP || !CART;
  try { rememberCartForUser(CART); } catch(e) {}
    syncMainButtons();
  updateCurrentCustomerInfo();
  syncBenefitPanel();

}

function clearCurrentCartView(){
  setCartToken('');
  const ul = $('#items');
  if (ul) ul.innerHTML = '';
  if ($('#total')) $('#total').textContent = 'NT$ 0';
  if ($('#link_out')) $('#link_out').value = '';
}
function clearInvalidCustomerSelection(message) {
  clearCurrentCartView();

  if ($('#line_search_name')) $('#line_search_name').value = '';
  if ($('#line_user_id')) $('#line_user_id').value = '';
  if ($('#cartmap_info')) $('#cartmap_info').textContent = '';
  if ($('#line_search_info')) $('#line_search_info').textContent = message || '查無會員，已清除目前客人。';

  CURRENT_MEMBER_PHONE = '';

  updateCurrentCustomerInfo();
  syncMainButtons();
  syncBenefitPanel();
}
function resetForNextCustomer(){
  clearCurrentCartView();
  if ($('#line_search_name')) $('#line_search_name').value = '';
  if ($('#line_user_id')) $('#line_user_id').value = '';
  if ($('#line_search_info')) $('#line_search_info').textContent = '';
  if ($('#cartmap_info')) $('#cartmap_info').textContent = '';
  if ($('#sku')) $('#sku').value = '';
  if ($('#qty')) $('#qty').value = '1';
  if ($('#override_price')) $('#override_price').value = '';
  CURRENT_MEMBER_PHONE = '';
  updateCurrentCustomerInfo();
  syncMainButtons();
}

 function resetAfterSendSuccess(){
  clearCurrentCartView();

  if ($('#line_search_name')) $('#line_search_name').value = '';
  if ($('#line_user_id')) $('#line_user_id').value = '';
  if ($('#line_search_info')) $('#line_search_info').textContent = '';
  if ($('#cartmap_info')) $('#cartmap_info').textContent = '';

  if ($('#sku')) $('#sku').value = '';
  if ($('#qty')) $('#qty').value = '1';
  if ($('#override_price')) $('#override_price').value = '';
  CURRENT_MEMBER_PHONE = '';

// ✅ 保留直播主名稱，不清 #streamer
// ✅ OP 開單一律 customer_type = live，畫面不再提供客群選擇

  updateCurrentCustomerInfo();
  syncMainButtons();
  syncBenefitPanel();
}

function switchCustomerSafely(nextLineUserId, nextName){
  const currentUid  = getLineUserId();
  const currentName = getCustomerName();

  const uidChanged =
    currentUid &&
    nextLineUserId &&
    currentUid !== nextLineUserId;

  const nameChangedWithoutUid =
    !currentUid &&
    currentName &&
    nextName &&
    currentName !== nextName;

  if (CART && (uidChanged || nameChangedWithoutUid)) {
    clearCurrentCartView();
    alert(`已切換客人：\n${currentName || currentUid}\n→ ${nextName || nextLineUserId}\n\n已自動清空目前畫面的購物車選擇，請重新建立這位客人的購物車。`);
  }

async function loadCreditList(){
  if (!OP) return;

  const kw = (document.getElementById('creditListKw')?.value || '').trim();

  if (msg) msg.textContent = '讀取購物金清單中...';

  try {

      method:'POST',
      body: JSON.stringify({
        op_key: OP,
        keyword: kw,
        limit: 200
      })
    });

    if (!res || res.ok !== true) {
      if (msg) msg.textContent = '讀取失敗：' + ((res && res.error) || 'unknown');

      msg.textContent = `共 ${res.total || 0} 位會員有可用購物金餘額`;

    if (msg) msg.textContent = '讀取失敗：' + e.message;

  // ====== ★ 客人購物車記憶（只存在這台 OP 裝置的 localStorage） ======
  const CART_MAP_KEY = 'OP_CART_MAP_V1';
  function loadCartMap() {
    try { return JSON.parse(localStorage.getItem(CART_MAP_KEY) || '{}'); } catch(e) { return {}; }
  }
  function saveCartMap(map) {
    try { localStorage.setItem(CART_MAP_KEY, JSON.stringify(map || {})); } catch(e) {}
  }
  function getLineUserId() {
    return ($('#line_user_id') && ($('#line_user_id').value || '').trim()) || '';
  }
  function getCustomerName() {
  // 你目前唯一有「名字輸入」的欄位就是 #line_search_name

}
  function setCartMapInfo(txt) {
    const el = $('#cartmap_info');
    if (el) el.textContent = txt || '';
  }
  function rememberCartForUser(cartToken) {
    const uid = getLineUserId();
    if (!uid || !cartToken) return;
    const map = loadCartMap();
    map[uid] = { cart_token: String(cartToken), updatedAt: Date.now() };
    saveCartMap(map);
    setCartMapInfo(`已記住此客人購物車：${String(cartToken)}`);
  }
  async function loadCartForUser() {
    const uid = getLineUserId();
    if (!uid) return alert('請先貼上/查到客人的 LineUserId');
    const map = loadCartMap();
    const rec = map[uid];
    if (!rec || !rec.cart_token) return alert('這位客人目前沒有被記住的購物車（你可以先建立一台，再發連結）。');
    setCartToken(rec.cart_token);
    setCartMapInfo(`已載入此客人購物車：${rec.cart_token}`);
    await refreshList();
  }
  function clearCartForUser() {
    const uid = getLineUserId();
    if (!uid) return alert('請先貼上/查到客人的 LineUserId');
    const map = loadCartMap();
    delete map[uid];
    saveCartMap(map);
    setCartMapInfo('已清除此客人購物車記錄');
  }
  function showCartHintIfExists() {
    const uid = getLineUserId();
    if (!uid) { setCartMapInfo(''); return; }
    const map = loadCartMap();
    const rec = map[uid];
    if (rec && rec.cart_token) setCartMapInfo(`這位客人上次購物車：${rec.cart_token}`);

function renderSimpleCartList(list) {
  list = Array.isArray(list) ? list : [];

  const ul = $('#items');
  if (!ul) return;

  ul.innerHTML = '';

  let sum = 0;

  list.forEach(it => {
    const sku = String(it.sku || it.SKU || '').trim();
    const name = String(it.name || it.Name || sku || '').trim();
    const qty = Number(it.qty ?? it.Qty ?? 0) || 0;
    const price = Number(it.price ?? it.Price ?? 0) || 0;

    sum += price * qty;

    const li = document.createElement('li');
    li.style.display = 'flex';
    li.style.justifyContent = 'space-between';
    li.style.alignItems = 'center';
    li.style.gap = '10px';

    li.innerHTML = `
  <div style="flex:1; min-width:0;">
    <div style="font-weight:700;">${escHtml(name)}</div>
        <div class="mono muted" style="margin-top:4px;">
      ${escHtml(sku)}　/　${qty} × ${money(price)}
    </div>

    <div class="muted" style="margin-top:6px;">
      單價
      <input
        class="item-price-input"
        data-sku="${escHtml(sku)}"
        data-qty="${qty}"
        value="${price}"
        inputmode="numeric"
      />
    </div>
  </div>

  <div style="display:flex; gap:6px; align-items:center; flex:0 0 auto;">
    <button
      class="ghost btn-qty-minus"
      data-sku="${escHtml(sku)}"
      data-qty="${qty}"
      style="width:42px; min-width:42px; max-width:42px; padding:8px 0;"
    >－</button>

    <span class="mono" style="min-width:28px; text-align:center;">${qty}</span>

    <button
      class="ghost btn-qty-plus"
      data-sku="${escHtml(sku)}"
      data-qty="${qty}"
      style="width:42px; min-width:42px; max-width:42px; padding:8px 0;"
    >＋</button>

      <button
      class="ghost btn-save-price"
      data-sku="${escHtml(sku)}"
      data-qty="${qty}"
      style="width:76px; min-width:76px; max-width:76px; padding:8px 0;"
    >改價</button>

    <button
      class="ghost btn-del-item"
      data-sku="${escHtml(sku)}"
      style="width:76px; min-width:76px; max-width:76px; padding:8px 0;"
    >刪除</button>
  </div>
`;

    ul.appendChild(li);
  });

  ul.querySelectorAll('.btn-qty-minus').forEach(btn => {
    btn.addEventListener('click', async () => {
      const sku = (btn.dataset.sku || '').trim();
      const currentQty = Number(btn.dataset.qty || 0) || 0;
      const nextQty = Math.max(0, currentQty - 1);

      if (!sku) return;

      if (nextQty <= 0 && !confirm(`數量會變 0，確定移除商品：${sku}？`)) {
        return;
      }

      const oldText = btn.textContent;
      btn.disabled = true;
      btn.classList.add('is-busy');
      btn.textContent = '減少中...';

      try {
        await updateSimpleItemQty(sku, nextQty);
      } finally {
        btn.disabled = false;
        btn.classList.remove('is-busy');
        btn.textContent = oldText || '－';
      }
    });
  });

  ul.querySelectorAll('.btn-qty-plus').forEach(btn => {
    btn.addEventListener('click', async () => {
      const sku = (btn.dataset.sku || '').trim();
      const currentQty = Number(btn.dataset.qty || 0) || 0;

      if (!sku) return;

      const oldText = btn.textContent;
      btn.disabled = true;
      btn.classList.add('is-busy');
      btn.textContent = '增加中...';

      try {
        await updateSimpleItemQty(sku, currentQty + 1);
      } finally {
        btn.disabled = false;
        btn.classList.remove('is-busy');
        btn.textContent = oldText || '＋';
      }
    });
  });
  ul.querySelectorAll('.btn-save-price').forEach(btn => {
    btn.addEventListener('click', async () => {
      const sku = (btn.dataset.sku || '').trim();
      const qty = Math.max(1, parseInt(btn.dataset.qty || '1', 10) || 1);

      if (!sku) return;
      if (!OP) return alert('請先登入 OP Key');

      const priceInput = Array.from(ul.querySelectorAll('.item-price-input'))
        .find(input => (input.dataset.sku || '').trim() === sku);

      const price = Math.max(0, parseInt((priceInput?.value || '0').trim(), 10) || 0);

      btn.disabled = true;
      btn.classList.add('is-busy');
      btn.textContent = '改價中...';

      try {
        await updateSimpleItemQty(sku, qty, price);

        btn.classList.remove('is-busy');
        btn.classList.add('is-done');
        btn.textContent = '已改 ✓';

        setTimeout(() => {
          btn.classList.remove('is-done');
          btn.textContent = '改價';
          btn.disabled = false;
        }, 650);
      } catch (e) {
        btn.classList.remove('is-busy');
        btn.textContent = '改價';
        btn.disabled = false;
        alert('改價失敗：' + (e.message || e));
      }
    });
  });
  ul.querySelectorAll('.btn-del-item').forEach(btn => {
    btn.addEventListener('click', async () => {
      const sku = (btn.dataset.sku || '').trim();
      if (!sku) return;
      await removeItemBySku(sku);
    });
  });

  $('#total').textContent = money(sum);
  syncMainButtons();
  updateCurrentCustomerInfo();
}

async function updateSimpleItemQty(sku, nextQty, nextPrice = null) {
  if (!guardCart()) return;
  if (!OP) return alert('請先登入 OP Key');

  sku = String(sku || '').trim();
  nextQty = Math.max(0, parseInt(nextQty, 10) || 0);

  if (!sku) return alert('缺少 SKU');

  const res = await jfetch(API + '/cart/update-qty-self', {
    method: 'POST',
    body: JSON.stringify({
      cart_token: CART,
      sku,
      qty: nextQty,
      op_key: OP,
      ...(nextPrice !== null ? { price: nextPrice } : {})
    })
  });

  if (!res || res.ok !== true) {
    return alert('數量更新失敗：' + ((res && (res.message || res.error)) || 'unknown'));
  }

  renderSimpleCartList(res.items || []);
  $('#sku')?.focus();
}

  if (!guardCart()) return;

  const res = await jfetch(API + '/cart/' + encodeURIComponent(CART));

  if (!res || res.ok !== true) {

  }

  renderSimpleCartList(res.items || []);
}

function buildCheckoutLineUrl() {
  const cartToken = String(CART || '').trim();
  if (!cartToken) return '';

  const liffId = String(window.LIFF_CHECKOUT_ID || LIFF_CHECKOUT_ID || '').trim();

  if (!liffId) {
    const origin = String(window.MURAIN_SITE_ORIGIN || SITE_ORIGIN || 'https://murain.tw').replace(/\/+$/, '');
    return `${origin}/liff-checkout.html?cart_token=${encodeURIComponent(cartToken)}&v=${Date.now()}`;
  }

  return `https://liff.line.me/${liffId}?cart_token=${encodeURIComponent(cartToken)}&v=${Date.now()}`;
}

async function linkCheckout() {
  if (!guardCart()) return;

  const url = buildCheckoutUrl();
  const out = $('#link_out');
  if (out) out.value = url;

  // ✅ 優先用 clipboard
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(url);
      await markCartCopied();
      alert('已複製網頁備用連結');
      return;
    }
  } catch (e) {}

  // fallback：選取 + execCommand
  try {
    if (out) {
      out.focus();
      out.select();
      out.setSelectionRange(0, out.value.length);
    }
    document.execCommand('copy');
    await markCartCopied();
    alert('已複製網頁備用連結');
  } catch (e) {
    alert('複製失敗，請手動長按複製連結');
  }
}

  function renderProductLookupRows(rows) {
  const box = document.getElementById('product_lookup_results');
  const msg = document.getElementById('product_lookup_msg');

  if (!box) return;

  const list = Array.isArray(rows) ? rows : [];

  if (!list.length) {
    box.innerHTML = '';
    if (msg) msg.textContent = '找不到符合的商品';
    return;
  }

  if (msg) msg.textContent = `找到 ${list.length} 筆`;

  box.innerHTML = list.map(it => {
    const sku = escHtml(it.sku || '');
    const name = escHtml(it.name || '');
    const stockQty = Number(it.stock_qty || 0) || 0;
    const price = Number(it.price || 0) || 0;
    const stockLocation = escHtml(it.stock_location || '-');

    return `
      <div style="padding:10px 12px; border:1px solid #eef1f5; border-radius:12px; background:#f9fafb; margin-bottom:8px;">
        <div class="mono" style="font-weight:800;">${sku || '-'}</div>
        <div style="margin-top:4px;">
          ${name || '-'}｜剩餘數量：<b>${stockQty}</b>｜價格：<b>${money(price)}</b>｜庫存位置：<b>${stockLocation}</b>
        </div>
      </div>
    `;
  }).join('');
}

async function searchProductKeyword() {
  if (!OP) return alert('請先登入 OP Key');

  const kw = (document.getElementById('product_lookup_kw')?.value || '').trim();
  const msg = document.getElementById('product_lookup_msg');
  const box = document.getElementById('product_lookup_results');

  if (!kw) {
    if (msg) msg.textContent = '請先輸入關鍵字';
    if (box) box.innerHTML = '';
    return;
  }

  if (msg) msg.textContent = '查詢中...';
  if (box) box.innerHTML = '';

  try {
    const res = await jfetch(API + '/op/products/search-basic', {
      method:'POST',
      body: JSON.stringify({
        op_key: OP,
        keyword: kw
      })
    });

    if (!res || res.ok !== true) {
      if (msg) msg.textContent = '查詢失敗：' + ((res && (res.message || res.error)) || 'unknown');
      return;
    }

    renderProductLookupRows(res.rows || []);
  } catch (e) {
    if (msg) msg.textContent = '查詢失敗：' + e.message;
  }
}
async function searchLineMember() {
  if (!OP) {
    alert('請先登入 OP Key');
    return;
  }

  const q = ($('#line_search_name').value || '').trim();
  if (!q) {
    alert('請先輸入要查的 LINE 名稱或本名');
    return;
  }

  try {
    const res = await jfetch(API + '/op/line-member/search', {
      method: 'POST',
      body: JSON.stringify({
        op_key: OP,
        keyword: q
      })
    });

    if (!res || res.ok !== true) {
      if (res && res.error === 'not_found') {
        alert('找不到相符的會員（名稱要跟 Airtable 上的一模一樣）');
      } else {
        alert('搜尋失敗：' + ((res && res.error) || 'unknown'));
      }
      return;
    }

     if (!res.member && (!Array.isArray(res.rows) || !res.rows.length)) {
      clearInvalidCustomerSelection('查無會員，已清除目前客人與購物車畫面。請重新查詢正確會員。');
      alert('找不到相符的會員。請確認 LINE 名稱 / 本名 / LineUserId 是否正確。');
      return;
    }

    const m = res.member || {};
    const nextUid  = (m.lineUserId || '').trim();
    const nextName = (m.displayName || m.name || q || '').trim();

    switchCustomerSafely(nextUid, nextName);

    $('#line_user_id').value = nextUid;
    $('#line_search_name').value = nextName;

    try { showCartHintIfExists(); } catch(e) {}

    const infoEl = $('#line_search_info');
    if (infoEl) {
      const phonePart = m.phone ? ` / ${m.phone}` : '';
      infoEl.textContent = `已選擇：${nextName}${phonePart}`;
    }

    CURRENT_MEMBER_PHONE = m.phone || '';
updateCurrentCustomerInfo();
syncMainButtons();
syncBenefitPanel();
  } catch (e) {
    console.error(e);
    alert('搜尋失敗：' + e.message);
  }
}
async function verifyLineUserId() {
  if (!OP) return alert('請先登入 OP Key');

  const uid = getLineUserId();
  if (!uid) return alert('請先貼上要驗證的 LineUserId');

  const infoEl = $('#line_search_info');
  if (infoEl) infoEl.textContent = '正在驗證 LineUserId...';

  try {
    const res = await jfetch(API + '/op/line-member/search', {
      method: 'POST',
      body: JSON.stringify({
        op_key: OP,
        keyword: uid
      })
    });

    const rows = Array.isArray(res && res.rows) ? res.rows : [];
    const m = rows.find(x => String(x.lineUserId || '').trim() === uid);

    if (!res || res.ok !== true || !m) {
      clearInvalidCustomerSelection('驗證失敗：找不到這個 LineUserId，已清除目前客人與購物車畫面。');
      alert('驗證失敗：找不到這個 LineUserId');
      return;
    }

    const nextName = String(m.displayName || m.name || '').trim();

    switchCustomerSafely(uid, nextName || uid);

    $('#line_search_name').value = nextName || $('#line_search_name').value || uid;
    CURRENT_MEMBER_PHONE = m.phone || '';

    try { showCartHintIfExists(); } catch(e) {}

    if (infoEl) {
      const phonePart = m.phone ? ` / ${m.phone}` : '';
      infoEl.textContent = `LineUserId 驗證成功：${nextName || uid}${phonePart}`;
    }

    updateCurrentCustomerInfo();
    syncMainButtons();
    syncBenefitPanel();
  } catch (e) {
    if (infoEl) infoEl.textContent = '驗證失敗：' + (e.message || e);
    alert('驗證失敗：' + (e.message || e));
  }
}
// 新增：複製一整段要貼給客人的 LINE 訊息（更穩：先用 clipboard，失敗再 fallback）
async function copyLineMessage() {
  if (!guardCart()) return;

  const url = buildCheckoutLineUrl();
  const totalText = $('#total') ? $('#total').textContent.trim() : '';

  const msgLines = [
    '親愛的寶寶您好，這是您的專屬結帳連結：',
    url,
    '',
    totalText ? `本次結帳金額：${totalText}` : '',
    '請在 10 分鐘內完成填寫與送出，如需調整可以直接回覆此訊息喔💖'
  ].filter(Boolean);

  const msg = msgLines.join('\n');

  const ta = $('#line_msg') || $('#link_out');
  if (ta) ta.value = msg;

  // ✅ 優先：Clipboard API（HTTPS + 新版瀏覽器最穩）
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(msg);
      alert('已複製 LINE 訊息');
      return;
    }
  } catch (e) {}

  // ✅ fallback：選取 + execCommand（LINE 內建瀏覽器/部分手機）
  try {
    if (ta) {
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
    } else {
      // 如果沒有 textarea/input，就臨時建一個
      const tmp = document.createElement('textarea');
      tmp.value = msg;
      tmp.style.position = 'fixed';
      tmp.style.opacity = '0';
      document.body.appendChild(tmp);
      tmp.select();
      tmp.setSelectionRange(0, tmp.value.length);
    }

    const ok = document.execCommand('copy');
    if (!ok) throw new Error('execCommand copy failed');
    alert('已複製 LINE 訊息');
  } catch (e) {
    alert('複製失敗，請手動長按複製訊息');
  }
}

  function escHtml(s){
    return String(s||"").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }
