 function getBiMonthLabel(dateLike){
  const s = String(dateLike || '').trim();
  if (!s) return '';
  const d = new Date(s);
  if (Number.isNaN(d.getTime())) return '';
  const m = d.getMonth() + 1;

  if (m <= 2) return '1-2жңҲ';
  if (m <= 4) return '3-4жңҲ';
  if (m <= 6) return '5-6жңҲ';
  if (m <= 8) return '7-8жңҲ';
  if (m <= 10) return '9-10жңҲ';
  return '11-12жңҲ';
}

function renderConsignAccountingBuckets(){
  const listEl = $('#orderList');

  const buckets = ['1-2жңҲ','3-4жңҲ','5-6жңҲ','7-8жңҲ','9-10жңҲ','11-12жңҲ'];

  const grouped = {};
  buckets.forEach(k => grouped[k] = []);

  (currentConsignAccountingRows || []).forEach(row => {
    const doneAt =
      row.creditDoneAt ||
      row.bankDoneAt ||
      row.doneAt ||
      row.updatedAt ||
      '';
    const label = getBiMonthLabel(doneAt);
    if (label && grouped[label]) grouped[label].push(row);
  });

  listEl.innerHTML = buckets.map(label => {
    const count = grouped[label].length;
    return `
      <div class="order-row" data-bucket="${label}">
        <div class="ord-top">
          <div class="ord-id">${label}</div>
          <div class="ord-right">
            <div class="ord-amount">${count} зӯҶ</div>

    `;
  }).join('');

  $$('#orderList .order-row').forEach(rowEl => {

      $$('#orderList .order-row').forEach(x => x.classList.remove('active'));
      rowEl.classList.add('active');

      const bucket = rowEl.getAttribute('data-bucket') || '';
      currentConsignAccountingBucket = bucket;
      renderConsignAccountingDetail(bucket, grouped[bucket] || []);
    });
  });
}

function fmtDateInput(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getLast30DaysRange(){
  const toDate = new Date();
  const fromDate = new Date();
  fromDate.setDate(fromDate.getDate() - 30);

  return {
    date_from: fmtDateInput(fromDate),
    date_to: fmtDateInput(toDate)
  };
}

function getCurrentDateRange(){
  return {
    date_from: $('#date_from') ? ($('#date_from').value || '') : '',
    date_to: $('#date_to') ? ($('#date_to').value || '') : ''
  };
}

function monthKeyOfRecord(f){
  let month = String(f['иіЈиІЁдҫҝжңҲд»Ҫ'] || '').trim();
  if (!month) {
    const shipAt = String(f.shipped_at || f.ship_at || '').trim();
    if (shipAt) month = shipAt.slice(0, 7);
  }
  return month;
}

function applyLineNameSearch(rows){
  const q = String(LINE_SEARCH_TERM || '').trim().toLowerCase();
  if (!q) return rows || [];

  return (rows || []).filter(rec => {
    const f = rec.fields || rec || {};
    const lineName = String(getLineName(f, parseShippingInfo(f)) || '').trim().toLowerCase();
    return lineName.includes(q);
  });
}

function finalizeOrderRows(rows, emptyText = 'жҹҘз„Ўз¬ҰеҗҲжўқд»¶зҡ„иЁӮе–®гҖӮ', okText = ''){
  currentOrders = applyLineNameSearch(rows || []);
  ORDERS_CACHE = currentOrders.map(rec => rec.fields || rec || {});
  renderOrderList();

  const msgEl = $('#msg');
  if (msgEl) {
    msgEl.textContent = currentOrders.length ? okText : emptyText;
  }

  renderVendorMonthSummary();
}

function renderVendorMonthSummary(){
  const panel = $('#vendor_month_summary');
  const monthEl = $('#vendor_month');
  if (!panel || !monthEl) return;

  const month = String(monthEl.value || '').trim();
  const source = VENDOR_SUMMARY_CACHE || [];
  const map = new Map();

  source.forEach(rec => {
    const f = rec.fields || rec || {};
    const name = String(f['иіЈиІЁдҫҝеҗҚзЁұ'] || '').trim();
    if (!name) return;

    // еҸӘз®—е·Іж”¶ж¬ҫ
    const ps = String(f.pay_status || '').trim().toLowerCase();
    if (ps !== 'paid_ok') return;

    const m = monthKeyOfRecord(f);
    if (month && m !== month) return;

    // ж”№жҲҗеҠ зёҪгҖҢжҮүд»ҳйҮ‘йЎҚгҖҚ
    const a = calcAmounts(f);
    const amount = Number(a.net || 0);

    map.set(name, (map.get(name) || 0) + amount);
  });

  const rows = Array.from(map.entries()).sort((a, b) => b[1] - a[1]);

  if (!rows.length) {
    panel.textContent = month ? `${month} е°ҡз„Ўе·Іж”¶ж¬ҫиіҮж–ҷ` : 'е°ҡз„Ўе·Іж”¶ж¬ҫиіҮж–ҷ';
    return;
  }

  panel.innerHTML = rows
    .map(([name, sum]) => `${name}пјҡ${money(sum)}`)
    .join('<br>');
}

async function applyFullView(mode = 'all', save = true){
  currentPanelMode = 'orders';

await loadVendorSummaryCache();

  const dateRange = getCurrentDateRange();

    saveViewState(mode || 'all', {
      filter: 'all',
      date_from: dateRange.date_from,
      date_to: dateRange.date_to,
      status: statusVal
    });
  }

  await loadOrders('all', dateRange);
 ALL_ORDERS_CACHE = [...(currentOrders || [])];
refreshTopShortcutBadges();

  const hasFee = (f) => {
    if (!f) return false;
    const fee1 = f.shipping_fee;
    const fee2 = f.ship_fee;
    const filled1 = fee1 !== undefined && fee1 !== null && String(fee1) !== '';
    const filled2 = fee2 !== undefined && fee2 !== null && String(fee2) !== '';
    return filled1 || filled2;
  };

  let rows = ALL_ORDERS_CACHE;
  let emptyText = 'жҹҘз„Ўз¬ҰеҗҲжўқд»¶зҡ„иЁӮе–®гҖӮ';
  let okText = '';

  if (mode === 'quick_paid'){
    rows = rows.filter(rec => {
      const f = rec.fields || rec || {};
      return String(f.pay_status || '').toLowerCase() === 'paid_ok' && !hasFee(f);
    });
    emptyText = 'зӣ®еүҚжІ’жңүгҖҢе·Іж”¶ж¬ҫдё”йҒӢиІ»жңӘеЎ«еҜ«гҖҚзҡ„иЁӮе–®гҖӮ';
    okText = 'еғ…йЎҜзӨәгҖҢе·Іж”¶ж¬ҫ(pay_status = paid_ok) дё” йҒӢиІ» TWD жңӘеЎ«еҜ«гҖҚзҡ„иЁӮе–®гҖӮ';
  }

else if (mode === 'remind_today'){
  rows = rows.filter(rec => {
    const f = rec.fields || rec || {};
    return String(f.pay_status || '').toLowerCase() === 'pending';
  });
  emptyText = 'зӣ®еүҚжІ’жңүгҖҢд»ҳж¬ҫзӢҖж…Ӣпјқеҫ…зўәиӘҚгҖҚзҡ„иЁӮе–®гҖӮ';
  okText = 'еғ…йЎҜзӨәгҖҢд»ҳж¬ҫзӢҖж…Ӣпјқеҫ…зўәиӘҚ(pay_status = pending)гҖҚзҡ„иЁӮе–®гҖӮ';
}

  else if (mode === 'pickup_need'){
    rows = rows.filter(rec => {
      const f  = rec.fields || rec || {};
      const ps = String(f.pay_status || '').toLowerCase();
      if (ps === 'failed' || ps === 'cancelled') return false;

      const st = String(f.status || '').toLowerCase();
      const ss = String(f.ship_status || f.shipping_status || '').toLowerCase();
      const shipped = (st === 'shipped') || (ss === 'shipped') || (ss === 'arrived') || (ss === 'picked_up');

      const shipInfo = parseShippingInfo(f) || {};
      const ship = shipInfo.ship || {};
      const is711 = String(ship.type || '').toLowerCase() === '711';

      const pickReg = String(f['еҸ–иІЁзҷ»иЁҳ'] || '').trim();
      const notPicked = (pickReg !== 'е·ІеҸ–иІЁ');

      return shipped && is711 && notPicked;
    });
    emptyText = 'зӣ®еүҚжІ’жңүгҖҢе·ІеҮәиІЁдё”е°ҡжңӘзҷ»иЁҳе·ІеҸ–иІЁгҖҚзҡ„иЁӮе–®гҖӮ';
    okText = `еғ…йЎҜзӨәгҖҢе·ІеҮәиІЁ + 7-11 еҸ–иІЁ + еҸ–иІЁзҷ»иЁҳвү е·ІеҸ–иІЁгҖҚзҡ„иЁӮе–®гҖӮе…ұ ${rows.length} зӯҶгҖӮ`;
  }

  else if (mode === 'status_unshipped_custom'){

async function remindCartRows(rows){
  const targets = (rows || []).filter(x => x && x.cart_token);
  if (!targets.length) {
    alert('зӣ®еүҚжІ’жңүеҸҜжҸҗйҶ’зҡ„иіјзү©и»Ҡ');
    return;
  }

  let ok = 0;
  let skipped = 0;
  let failed = 0;
  const failedMsgs = [];

  for (const row of targets) {
    const token = String(row.cart_token || '').trim();
    const lineId = String(row.line_user_id || '').trim();

    if (!token) continue;

    if (!lineId) {
      skipped++;
      failedMsgs.push(`${row.customer_name || token}пјҡжІ’жңү LINE з¶Ғе®ҡ`);
      continue;
    }

    try {
      const r = await fetch(`${API}/op/cart/send-link`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          op_key: OP_KEY,
          cart_token: token,
          line_user_id: lineId,
          customer_name: row.customer_name || ''
        })
      });

      const j = await r.json().catch(() => ({}));
      if (!r.ok || !j.ok) {
        failed++;
        failedMsgs.push(`${row.customer_name || token}пјҡ${j.error || ('HTTP ' + r.status)}`);
        continue;
      }

      ok++;
    } catch (e) {
      failed++;
      failedMsgs.push(`${row.customer_name || token}пјҡ${e.message || e}`);
    }
  }

  alert(
    `иіјзү©и»ҠжҸҗйҶ’е®ҢжҲҗ\nжҲҗеҠҹ ${ok} зӯҶ / з•ҘйҒҺ ${skipped} зӯҶ / еӨұж•— ${failed} зӯҶ` +
    (failedMsgs.length ? `\n\n${failedMsgs.slice(0, 8).join('\n')}` : '')
  );

  if (VIEW_STATE.mode === 'cart_open' || currentPanelMode === 'cart_open') {
    await loadOpenCartList();
  }
}

async function clearCartRow(row){
  if (!row || !row.cart_token) return;

  const token = String(row.cart_token || '').trim();
  const title = row.customer_name || token;

  if (!confirm(`зўәе®ҡиҰҒжё…з©әиіјзү©и»ҠгҖҢ${title}гҖҚе—Һпјҹ`)) return;

  try {
    const r = await fetch(`${API}/cart/clear`, {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        op_key: OP_KEY,
        cart_token: token
      })
    });

    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.ok) {
      throw new Error(j.error || ('HTTP ' + r.status));
    }

    alert('е·Іжё…з©әиіјзү©и»Ҡ');
    await loadOpenCartList();
  } catch (e) {
    console.error(e);
    alert('жё…з©әиіјзү©и»ҠеӨұж•—пјҡ' + (e.message || e));
  }
}

function calcAmounts(f){

 function hasTailChildInRows(parentOrderId, rows = ALL_ORDERS_CACHE){
  const pid = String(parentOrderId || '').trim();
  if (!pid) return false;

  return (rows || []).some(rec => {
    const f = rec?.fields || rec || {};
    const oid = String(f.order_id || '').trim();
    const parentId = String(f.parent_order_id || '').trim();

    const isTail =
      !!f.is_tail ||
      String(f.order_type || '').toLowerCase() === 'tail' ||
      oid.toUpperCase().startsWith('TL') ||
      !!parentId;

    return isTail && parentId === pid;
  });
}
function isUnshippedOrder(rec){
  const f  = rec?.fields || rec || {};
  const oid = String(f.order_id || "").trim();
  const st = String(f.status || "").toLowerCase();
  const ps = String(f.pay_status || "").toLowerCase();
  const ss = String(f.ship_status || f.shipping_status || "").toLowerCase();
  const parentId = String(f.parent_order_id || "").trim();

  const isTail =
    !!f.is_tail ||
    String(f.order_type || "").toLowerCase() === "tail" ||
    oid.toUpperCase().startsWith("TL") ||
    !!parentId;

 // еҺҹиЁӮе–®еҰӮжһңе·Іиў«еҫҢз«ҜжЁҷиЁҳжңүе°ҫж¬ҫе–®пјҢе°ұдёҚиҰҒеҶҚйЎҜзӨәеңЁеҫ…еҮәиІЁ
const hasTailMarked =
  f.has_tail_order === true ||
  String(f.has_tail_order || "").toLowerCase() === "true" ||
  !!String(f.tail_pending_order_id || "").trim();

// зӣёе®№иҲҠиіҮж–ҷпјҡиӢҘдё»е–®йӮ„жІ’иў«жЁҷиЁҳпјҢжүҚйҖҖеӣһз”ЁеүҚз«Ҝ cache жҺғ TL
if (!isTail && (hasTailMarked || hasTailChildInRows(oid, ALL_ORDERS_CACHE))) return false;

  // е…ҲжҺ’йҷӨгҖҢдҪңе»ў/еҸ–ж¶ҲгҖҚе’ҢгҖҢд»ҳж¬ҫеӨұж•—гҖҚ
  if (st === "cancelled") return false;
  if (ps === "failed" || ps === "cancelled") return false;

  // жҺ’йҷӨе·ІеҮәиІЁйЎһ
  if (st === "shipped") return false;
  if (ss === "shipped" || ss === "arrived" || ss === "picked_up" || ss === "returned") return false;

  // е…¶д»–дёҖеҫӢиҰ–зӮәжңӘеҮәиІЁ
  return true;
}

function toDatetimeLocal(v){
  if(!v) return '';
  const d = new Date(v);
  if(isNaN(d.getTime())) return '';
  const pad = n => String(n).padStart(2,'0');
  return d.getFullYear() + '-' +
    pad(d.getMonth()+1) + '-' +
    pad(d.getDate()) + 'T' +
    pad(d.getHours()) + ':' +
    pad(d.getMinutes());
}

 function safeJsonParse(s, fallback = null){
  try{
    if (!s) return fallback;
    if (typeof s === "object") return s;
    return JSON.parse(String(s));
  }catch(e){
    return fallback;
  }
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}
 function firstNonEmpty(...vals){
  for (const v of vals) {
    const s = String(v ?? '').trim();
    if (s) return s;
  }
  return '';
}

function getLineName(f, shipInfo){
  const lp = (shipInfo?.line_profile || shipInfo?.line || shipInfo?.lineProfile || {}) || {};
  return firstNonEmpty(
    f?.['LINEеҗҚзЁұ'],
    f?.['LINE еҗҚзЁұ'],
    f?.line_name,
    f?.['line_name'],
    lp.displayName,
    lp.display_name,
    lp.name
  );
}

function getTailInfoFromParentFields(f){
  const snap = safeJsonParse(f?.tail_paid_snapshot, null) || {};
  const pick = (a,b,def="") => (String(a||"").trim() ? a : (String(b||"").trim() ? b : def));

  return {
    order_id: pick(f?.tail_order_id, snap?.tail_order_id, ""),
    payment_method: pick(f?.tail_payment_method, snap?.tail_payment_method, ""),
    total_amount: Number(f?.tail_total_amount ?? snap?.tail_total_amount ?? 0) || 0,
    credit_used: Number(f?.tail_credit_used ?? snap?.tail_credit_used ?? 0) || 0,
    net_amount: Number(f?.tail_net_amount ?? snap?.tail_net_amount ?? 0) || 0,
    pay_channel: pick(f?.tail_pay_channel, snap?.tail_pay_channel, ""),
    paid_at: pick(f?.tail_paid_at, snap?.tail_paid_at, ""),

    invoice_no: pick(f?.tail_invoice_no, snap?.invoice?.invoice_no ?? snap?.tail_invoice_no, ""),
    invoice_date: (f?.tail_invoice_date ?? snap?.invoice?.invoice_date ?? snap?.tail_invoice_date ?? ""),
    invoice_random: pick(f?.tail_invoice_random, snap?.invoice?.invoice_random ?? snap?.tail_invoice_random, ""),
    invoice_rtn_code: pick(f?.tail_invoice_rtn_code, snap?.invoice?.invoice_rtn_code ?? snap?.tail_invoice_rtn_code, ""),
    invoice_rtn_msg: pick(f?.tail_invoice_rtn_msg, snap?.invoice?.invoice_rtn_msg ?? snap?.tail_invoice_rtn_msg, ""),
    invoice_issued: (f?.tail_invoice_issued ?? snap?.invoice?.invoice_issued ?? snap?.tail_invoice_issued ?? null),
  };
}

  setBatchActionMode('none');
  return applyFullView(mode || 'all');

// жӣҙж–°дёӢж–№ summary + еҢҜеҮәжҢүйҲ•зӢҖж…Ӣ
function updateSummary(){
  const sumEl         = $('#summary');
  const btnExport     = $('#exportBtn');       // еҸҜиғҪдёҚеӯҳеңЁпјҡе…ҒиЁұзӮә null
  const btnExportShip = $('#btnExportShip');
  const btnExportZero = $('#btnExportZero');
  if (!sumEl) return;

  // жІ’жңүд»»дҪ•иЁӮе–®жҷӮпјҡжё…з©ә summaryпјҢдёүйЎҶеҢҜеҮәжҢүйҲ•йғҪи®ҠзҒ°иүІ
  if (!currentOrders.length){
    sumEl.textContent = '';
    if (btnExport) btnExport.disabled = true;
    if (btnExportShip) btnExportShip.disabled = true;
    if (btnExportZero) btnExportZero.disabled = true;
    return;
  }

  // иЁҲз®—еҗҲиЁҲйҮ‘йЎҚ & еҗ„зӢҖж…ӢзӯҶж•ё
  let sum = 0;
  let countSubmitted = 0, countPaid = 0, countShipped = 0, countCancelled = 0;

  for (const rec of currentOrders){
    const f = rec.fields || rec || {};
    const a = calcAmounts(f);
    sum += a.net;
    const st = f.status || '';
    if (st === 'submitted') countSubmitted++;
    else if (st === 'paid') countPaid++;
    else if (st === 'shipped') countShipped++;
    else if (st === 'cancelled') countCancelled++;
  }

  const sumText = 'NT$ ' + (Number(sum)||0).toLocaleString('zh-TW',{minimumFractionDigits:0});
  sumEl.innerHTML =
    '<span>зӯҶж•ёпјҡ' + currentOrders.length +
    'пјҲе·ІйҖҒеҮә: ' + countSubmitted +
    ' / е·Ід»ҳж¬ҫ: ' + countPaid +
    ' / е·ІеҮәиІЁ: ' + countShipped +
    ' / е·ІеҸ–ж¶Ҳ: ' + countCancelled + 'пјү</span>' +
    '<span>еҗҲиЁҲйҮ‘йЎҚпјҡ' + sumText + '</span>';

  // жңүиЁӮе–®жҷӮпјҡдёүйЎҶеҢҜеҮәжҢүйҲ•йғҪеҸҜд»Ҙз”Ё
  if (btnExport) btnExport.disabled = false;
  if (btnExportShip) btnExportShip.disabled = false;
  if (btnExportZero) btnExportZero.disabled = false;
}

function selectOrder(key){
  if(!key) return;
  const rec = currentOrders.find(x=>{
    if (x.id && String(x.id) === String(key)) return true;

}

function updateVendorStats() {
  const sel    = $('#d_vendor_name');
  const infoEl = $('#d_vendor_stats');
  if (!sel || !infoEl) return;

  const name = String(sel.value || '').trim();
  if (!name) {
    infoEl.textContent = '';
    return;
  }

  // зӣ®еүҚйҖҷзӯҶиЁӮе–®зҡ„ж¬„дҪҚ
  const f = (currentRecord && (currentRecord.fields || currentRecord)) || {};

  // е…Ҳз”Ё Airtable зҡ„гҖҢиіЈиІЁдҫҝжңҲд»ҪгҖҚпјҢжІ’жңүзҡ„и©ұе°ұз”Ё shipped_at / ship_at з®— YYYY-MM
  let month = String(f['иіЈиІЁдҫҝжңҲд»Ҫ'] || '').trim();
  if (!month) {
    const shipAt = String(f.shipped_at || f.ship_at || '').trim();
    if (shipAt) month = shipAt.slice(0, 7);
  }

  if (!month) {
    infoEl.textContent = 'е°ҡжңӘжҠ“еҲ°иіЈиІЁдҫҝжңҲд»Ҫ';
    return;
  }

  const source = ORDERS_CACHE || [];
  let count = 0;
  let sum = 0;

  source.forEach(rec => {
    const x = rec.fields || rec || {};

    if (String(x['иіЈиІЁдҫҝеҗҚзЁұ'] || '').trim() !== name) return;
    if (monthKeyOfRecord(x) !== month) return;

    // еҸӘз®—е·Іж”¶ж¬ҫ
    const ps = String(x.pay_status || '').trim().toLowerCase();
    if (ps !== 'paid_ok') return;

    const a = calcAmounts(x);
    sum += Number(a.net || 0);
    count += 1;
  });

  infoEl.textContent = `${month}пјҢ${name} е·Іж”¶ж¬ҫ ${count} зӯҶпјҢжҮүд»ҳйҮ‘йЎҚеҗҲиЁҲ ${money(sum)}`;
}

const tracking = $('#d_ship_tracking').value.trim();
fields.tracking_no = tracking || '';

  const fee = $('#d_ship_fee').value.trim();

  const y_note   = $('#d_yufu_note');

  if (y_name)   fields.yufu_name    = (y_name.value || '').trim();
  if (y_idno)   fields.yufu_idno    = (y_idno.value || '').trim();
  if (y_phone)  fields.yufu_phone   = (y_phone.value || '').trim();
  if (y_email)  fields.yufu_email   = (y_email.value || '').trim();
  if (y_period) fields.yufu_period  = (y_period.value || '').trim();
  if (y_status) fields.yufu_status  = (y_status.value || '').trim();

  if (y_note)   fields.yufu_note    = (y_note.value || '').trim();

  const f = currentRecord.fields || currentRecord || {};
  const payload = {
    record_id: currentRecord.id || null,
    order_id : f.order_id || null,
    fields
  };

  try{
    const r = await fetch(`${API}/admin/order/update?op_key=${encodeURIComponent(OP_KEY)}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });

    if(!r.ok || !j.ok){
      throw new Error(j.error || 'update_error');
    }

    msgEl.textContent = 'е·Іе„Іеӯҳ вң…';

    if (skipReload) return true;

    const keepF = currentRecord.fields || currentRecord || {};
    const keepKey = keepF.order_id || currentRecord.id || '';

    await reloadCurrentView();
    restoreSelectedOrder(keepKey);
    return true;
  }catch(e){
    console.error(e);
    msgEl.textContent = 'е„ІеӯҳеӨұж•—пјҡ' + (e.message || e);
    return false;
  }
