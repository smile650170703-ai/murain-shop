<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>商品上架後台</title>
  <style>
    body{font-family:sans-serif;max-width:820px;margin:0 auto;padding:20px;background:#faf8f7;color:#4f4544}
    .card{background:#fff;border:1px solid #eee;border-radius:16px;padding:16px;margin-bottom:16px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
    label{font-size:13px;font-weight:700}
    input,select,textarea,button{font:inherit;padding:10px 12px;border:1px solid #ddd;border-radius:12px}
    textarea{min-height:120px;resize:vertical}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .hint{font-size:12px;color:#8b7a76}
    .hidden{display:none}
    .full{grid-column:1 / -1}
  </style>
</head>
<body>
  <h1>官網商品上架</h1>

  <section class="card" id="loginCard">
    <div class="field">
      <label for="opKey">OP 密碼</label>
      <input id="opKey" type="password" placeholder="請輸入 OP 密碼">
    </div>
    <button id="btnLogin" type="button">登入</button>
    <div class="hint" id="loginMsg"></div>
  </section>

  <section class="card hidden" id="editorCard">
    <div class="row">
      <div class="field">
        <label>SKU</label>
        <input id="sku" type="text" readonly>
      </div>
      <div class="field">
        <label>商品來源</label>
        <select id="source">
          <option value="自有">自有</option>
          <option value="寄賣">寄賣</option>
          <option value="預購">預購</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="name">商品名稱</label>
      <input id="name" type="text" placeholder="例如：KIRA DIAMOND QUILT CROSSBODY BAG">
    </div>

    <div class="field">
      <label for="desc">商品描述</label>
      <textarea id="desc" placeholder="輸入商品介紹"></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label for="price">售價</label>
        <input id="price" type="number" min="0" step="1">
      </div>
      <div class="field">
        <label for="listPrice">原價</label>
        <input id="listPrice" type="number" min="0" step="1">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="stockQty">庫存</label>
        <input id="stockQty" type="number" min="0" step="1" value="1">
      </div>
      <div class="field">
        <label for="coverFile">封面圖</label>
        <input id="coverFile" type="file" accept="image/*">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="catCode">大分類</label>
        <select id="catCode"></select>
      </div>
      <div class="field">
        <label for="subCode">子分類</label>
        <select id="subCode"></select>
      </div>
    </div>

    <div class="field">
      <label for="galleryFiles">多圖上傳</label>
      <input id="galleryFiles" type="file" accept="image/*" multiple>
      <div class="hint">可一次選多張，第一張封面圖請另外用上方欄位指定</div>
    </div>

    <div class="actions">
      <button id="btnSaveDraft" type="button">儲存草稿</button>
      <button id="btnPublish" type="button">正式上架</button>
    </div>

    <div class="hint" id="saveMsg"></div>
  </section>
</body>
</html>
