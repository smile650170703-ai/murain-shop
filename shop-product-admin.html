<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <title>XUYUAN｜商品上架後台</title>

  <style>
    :root{
      --bg:#fffaf7;
      --card:#ffffff;
      --text:#5a4744;
      --text-soft:#8b7470;
      --line:rgba(120,90,86,.12);
      --pink:#efcfd3;
      --gold:#b79269;
      --shadow:0 16px 32px rgba(177,136,130,.10);
      --radius-xl:26px;
      --radius-lg:20px;
      --radius-md:14px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:"Noto Sans TC",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(239,207,211,.28), transparent 22%),
        linear-gradient(180deg,#fffaf7 0%,#fffdfb 50%,#fff8f8 100%);
      min-height:100vh;
    }
    .wrap{
      width:min(100% - 32px, 1440px);
      margin:0 auto;
      padding:24px 0 56px;
    }
    .hero{
      margin-bottom:16px;
      padding:18px 16px;
      border-radius:var(--radius-xl);
      background:linear-gradient(135deg, rgba(255,255,255,.95), rgba(255,249,246,.92));
      border:1px solid rgba(120,90,86,.08);
      box-shadow:var(--shadow);
    }
    .hero h1{
      margin:0;
      font-size:26px;
      line-height:1.15;
      letter-spacing:.02em;
    }
    .hero p{
      margin:8px 0 0;
      font-size:13px;
      color:var(--text-soft);
      line-height:1.7;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,252,250,.96));
      border:1px solid rgba(120,90,86,.08);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12, minmax(0,1fr));
      gap:14px;
      align-items:start;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:0;
      grid-column:span 3;
    }
    .field.w2{grid-column:span 2;}
    .field.w3{grid-column:span 3;}
    .field.w4{grid-column:span 4;}
    .field.w5{grid-column:span 5;}
    .field.w6{grid-column:span 6;}
    .field.w8{grid-column:span 8;}
    .field.w12,.field.full{grid-column:1 / -1;}
    .field.compact input,
    .field.compact select{min-height:48px;}

    .readonly-lock{
      background:#f6f3f1 !important;
      color:#7d6a66 !important;
      border-style:dashed !important;
      cursor:not-allowed;
      font-weight:700;
    }

    .editor-shell{
      display:grid;
      grid-template-columns:minmax(0, 1.55fr) minmax(360px, .85fr);
      gap:18px;
      align-items:start;
    }

    .subcard{
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,251,249,.95));
      border:1px solid rgba(120,90,86,.08);
      border-radius:20px;
      padding:16px;
    }

    .results-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border:1px solid rgba(120,90,86,.1);
      border-radius:18px;
      background:#fff;
      box-shadow:0 8px 18px rgba(114,90,86,.04);
    }
    .results-table thead th{
      background:#f8f3f0;
      color:#6a5753;
      font-size:12px;
      font-weight:800;
      letter-spacing:.03em;
      padding:12px 10px;
      text-align:left;
      border-bottom:1px solid rgba(120,90,86,.08);
      white-space:nowrap;
    }
    .results-table tbody td{
      padding:12px 10px;
      border-bottom:1px solid rgba(120,90,86,.08);
      vertical-align:middle;
      font-size:13px;
    }
    .results-table tbody tr:last-child td{border-bottom:none;}
    .results-table .name-cell{font-weight:800;}
    .results-table .stock-strong{font-weight:800;color:#2f6b43;}
    .results-thumb{
      width:56px;
      height:56px;
      object-fit:cover;
      border-radius:12px;
      background:#f7f4f2;
      border:1px solid rgba(120,90,86,.08);
      display:block;
    }
    .sticky-side{position:sticky; top:16px;}

    .preview-panel{
      min-height:220px;
    }
    label{
      font-size:13px;
      font-weight:700;
      color:#5b4744;
      letter-spacing:.02em;
    }
    input, select, textarea, button{
      font:inherit;
    }
    input[type="text"],
    input[type="number"],
    input[type="password"],
    select,
    textarea{
      width:100%;
      border:1px solid rgba(120,90,86,.12);
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:12px 14px;
      outline:none;
    }
    textarea{
      min-height:140px;
      resize:vertical;
      line-height:1.7;
    }
    input[readonly]{
      background:#fbf7f5;
      color:#8b7470;
    }

    .hint{
      font-size:12px;
      color:var(--text-soft);
      line-height:1.7;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:8px;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.04em;
      box-shadow:0 8px 18px rgba(114,90,86,.06);
    }
    .btn-primary{
      background:linear-gradient(135deg,#f4e4e1,#efdbd7);
      color:#5a4643;
    }
    .btn-secondary{
      background:#fff;
      color:#5a4643;
      border:1px solid rgba(120,90,86,.10);
    }
    .btn-dark{
      background:#5a4744;
      color:#fff;
    }
    .btn[disabled]{
      opacity:.45;
      cursor:not-allowed;
    }

    .status{
      margin-top:10px;
      font-size:13px;
      line-height:1.7;
      color:#7c6763;
      min-height:22px;
      white-space:pre-line;
    }

    .thumbs{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      margin-top:10px;
    }
    .thumb-card{
      border:1px solid rgba(120,90,86,.08);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 6px 14px rgba(114,90,86,.04);
    }
    .thumb-card img{
      display:block;
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      background:#f7f4f2;
    }
    .thumb-cap{
      padding:8px 10px;
      font-size:11px;
      color:#8b7470;
      text-align:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(183,146,105,.08);
      color:#9a7a54;
      font-size:11px;
      font-weight:700;
      letter-spacing:.04em;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .hidden{display:none!important;}

    @media (max-width:1100px){
      .editor-shell{grid-template-columns:1fr;}
      .sticky-side{position:static;}
      .field.w2,.field.w3,.field.w4,.field.w5,.field.w6,.field.w8,.field{grid-column:span 6;}
    }

    @media (max-width:767px){
      .wrap{width:min(100% - 16px, 1440px); padding:16px 0 34px;}
      .hero h1{font-size:22px;}
      .grid{grid-template-columns:repeat(1, minmax(0,1fr));}
      .field,.field.w2,.field.w3,.field.w4,.field.w5,.field.w6,.field.w8,.field.w12,.field.full{grid-column:1 / -1;}
      .thumbs{grid-template-columns:repeat(2, minmax(0,1fr));}
      .card,.subcard{padding:14px;}
      .btn{width:100%; justify-content:center;}
      .results-table{display:block; overflow:auto;}
    }

  margin:0 0 18px;
}

.page-tabs-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;

  }

  </style>

  <script>
    const API_BASE = 'https://api.murain.tw';

    const ROUTES = {
      auth: API_BASE + '/op/auth',
      productSearch: API_BASE + '/op/shop/product-search',
      categories: API_BASE + '/op/shop/categories',
      uploadImages: API_BASE + '/op/shop/upload-images',
      saveDraft: API_BASE + '/op/shop/save-draft',
      publish: API_BASE + '/op/shop/publish'
    };

    const state = {
      opKey: '',
      categories: [],
      uploadedImages: [],
      draftRecordId: '',
      selectedProductRecordId: '',
selectedProductData: null,
      sku: ''
    };

    const $ = (id) => document.getElementById(id);

    function setText(id, text){
      const el = $(id);
      if (el) el.textContent = text || '';
    }

    function setStatus(id, text, isError = false){
      const el = $(id);
      if (!el) return;
      el.textContent = text || '';
      el.style.color = isError ? '#b85d6d' : '#7c6763';
    }
async function searchExistingProduct(){
  const keyword = $('searchKeyword').value.trim();
  if (!keyword) {
    setStatus('searchMsg', '請先輸入 SKU 或商品名稱', true);
    return;
  }

  try {
    setStatus('searchMsg', '查詢中...');
    const url = ROUTES.productSearch
      + '?op_key=' + encodeURIComponent(state.opKey)
      + '&keyword=' + encodeURIComponent(keyword);

    const data = await jfetch(url, { method: 'GET' });
    const items = Array.isArray(data.items) ? data.items : [];
    const filtered = items.filter(item => Number(item.stock_qty || 0) > 0);

    renderSearchResults(filtered);
    setStatus('searchMsg', filtered.length ? `共找到 ${filtered.length} 筆有庫存商品` : '查無有庫存商品');
  } catch (err) {
    setStatus('searchMsg', '查詢失敗：' + err.message, true);
  }
}

function renderSearchResults(items){
  const wrap = $('searchResults');
  wrap.innerHTML = '';

  const filtered = (Array.isArray(items) ? items : []).filter(item => Number(item.stock_qty || 0) > 0);

  if (!filtered.length) {
    wrap.innerHTML = '<div class="hint" style="padding:6px 2px 0;">查無有庫存商品</div>';
    return;
  }

  const table = document.createElement('table');
  table.className = 'results-table';
  table.innerHTML = `
    <thead>
      <tr>
        <th style="width:76px;">圖片</th>
        <th>商品名稱</th>
        <th style="width:140px;">SKU</th>
        <th style="width:96px;">庫存</th>
        <th style="width:110px;">來源</th>
        <th style="width:110px;">操作</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector('tbody');

  filtered.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><img class="results-thumb" src="${item.thumb_url || item.image_url || ''}" alt="${item.name || ''}"></td>
      <td>
        <div class="name-cell">${item.name || '-'}</div>
        <div class="hint">可直接帶入來源、庫存、售價、原價與分類</div>
      </td>
      <td>${item.sku || '-'}</td>
      <td><span class="stock-strong">${item.stock_qty || 0}</span></td>
      <td>${item.source || '-'}</td>
      <td><button type="button" class="btn btn-primary">帶入</button></td>
    `;
    tr.querySelector('button').addEventListener('click', () => fillFormFromExisting(item));
    tbody.appendChild(tr);
  });

  wrap.appendChild(table);
}

function fillFormFromExisting(item){
  state.selectedProductRecordId = item.record_id || '';
  state.selectedProductData = item || null;
  state.draftRecordId = item.record_id || '';

  $('sku').value = item.sku || '';
  $('name').value = item.name || '';
  $('aiDesc').value = item.ai_desc || '';
  $('desc').value = item.description || '';
  $('price').value = item.price || '';
  $('listPrice').value = item.list_price || '';
  $('stockQty').value = item.stock_qty || '';
  $('source').value = item.source || '自有';

  if (item.category_code) $('catCode').value = item.category_code;
  renderSubcategoryOptions();
  if (item.subcategory_code) $('subCode').value = item.subcategory_code;

  $('coverFile').value = '';
  $('galleryFiles').value = '';

  state.uploadedImages = [];
  if (item.image_id || item.thumb_url || item.image_url) {
    state.uploadedImages = [{
      image_id: item.image_id || '',
      thumb_url: item.thumb_url || item.image_url || '',
      image_url: item.image_url || item.thumb_url || ''
    }];
  }
  renderImagePreviews();

  $('btnPublish').disabled = !state.draftRecordId;
  setStatus('saveMsg', '已帶入現有商品，現在可補圖片、短說明、完整介紹或直接存草稿。');
}
    async function jfetch(url, options = {}){
      const res = await fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) {
        throw new Error(data?.detail || data?.error || ('HTTP_' + res.status));
      }
      return data;
    }



    async function toBase64(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          const base64 = result.includes(',') ? result.split(',')[1] : result;
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function fileToPayload(file){
      return {
        filename: file.name,
        content_type: file.type || 'application/octet-stream',
        base64: await toBase64(file)
      };
    }

    function renderCategoryOptions(){
      const catSel = $('catCode');
      const subSel = $('subCode');

      catSel.innerHTML = '';
      subSel.innerHTML = '';

      state.categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat.code;
        opt.textContent = cat.name;
        catSel.appendChild(opt);
      });

      renderSubcategoryOptions();
    }

    function renderSubcategoryOptions(){
      const catCode = $('catCode').value;
      const subSel = $('subCode');
      subSel.innerHTML = '';

      const cat = state.categories.find(x => String(x.code) === String(catCode));
      const subs = Array.isArray(cat?.subcategories) ? cat.subcategories : [];

      subs.forEach(sub => {
        const opt = document.createElement('option');
        opt.value = sub.code;
        opt.textContent = sub.name;
        subSel.appendChild(opt);
      });
    }

    function renderImagePreviews(){
      const wrap = $('previewWrap');
      wrap.innerHTML = '';

      if (!state.uploadedImages.length) return;

      state.uploadedImages.forEach((img, idx) => {
        const card = document.createElement('div');
        card.className = 'thumb-card';
        card.innerHTML = `
          <img src="${img.thumb_url || img.image_url || ''}" alt="圖片 ${idx + 1}">
          <div class="thumb-cap">${idx === 0 ? '封面圖' : '多圖 ' + idx}</div>
        `;
        wrap.appendChild(card);
      });
    }

    async function login(){
      const opKey = $('opKey').value.trim();
      if (!opKey) {
        setStatus('loginMsg', '請先輸入 OP 密碼', true);
        return;
      }

      try {
        setStatus('loginMsg', '登入中...');
        await jfetch(ROUTES.auth, {
          method: 'POST',
          body: JSON.stringify({ op_key: opKey })
        });

        state.opKey = opKey;
        sessionStorage.setItem('SHOP_ADMIN_OP_KEY', opKey);

        $('loginCard').classList.add('hidden');
        $('editorCard').classList.remove('hidden');

        await loadCategories();

        setStatus('loginMsg', '');
      } catch (err) {
        setStatus('loginMsg', '登入失敗：' + err.message, true);
      }
    }

    async function loadCategories(){
      try {
        const url = ROUTES.categories + '?op_key=' + encodeURIComponent(state.opKey);
        const data = await jfetch(url, { method: 'GET' });
        state.categories = Array.isArray(data.categories) ? data.categories : [];
        renderCategoryOptions();
      } catch (err) {
        setStatus('saveMsg', '分類讀取失敗：' + err.message, true);
      }
    }

    async function uploadImages(){
      const coverFile = $('coverFile').files[0] || null;
      const galleryFiles = Array.from($('galleryFiles').files || []);

      if (!coverFile && !galleryFiles.length) {
        setStatus('saveMsg', '請先選擇圖片', true);
        return [];
      }

      setStatus('saveMsg', '圖片上傳中...');

      const files = [];
      if (coverFile) files.push(await fileToPayload(coverFile));
      for (const f of galleryFiles) files.push(await fileToPayload(f));

      const data = await jfetch(ROUTES.uploadImages, {
        method: 'POST',
        body: JSON.stringify({
          op_key: state.opKey,
          files
        })
      });

      state.uploadedImages = Array.isArray(data.images) ? data.images : [];
      renderImagePreviews();
      setStatus('saveMsg', '圖片上傳完成，共 ' + state.uploadedImages.length + ' 張');
      return state.uploadedImages;
    }

function buildDraftPayload(){
  const categoryCode = $('catCode').value || '';
  const subCode = $('subCode').value || '';

  const cover = state.uploadedImages[0] || null;
  const gallery = state.uploadedImages.map(x => x.image_id).filter(Boolean);

  return {
    op_key: state.opKey,
    record_id: state.draftRecordId || '',
    sku: $('sku').value.trim(),
    name: $('name').value.trim(),
    ai_desc: $('aiDesc').value.trim(),
    description: $('desc').value.trim(),
    price: Number($('price').value || 0) || 0,
    list_price: Number($('listPrice').value || 0) || 0,
    stock_qty: Number($('stockQty').value || 0) || 0,
    source: $('source').value || '自有',
    category_code: categoryCode,
    subcategory_code: subCode,
    cover_image_id: cover?.image_id || '',
    gallery_image_ids: gallery
  };
}

    function validateDraftPayload(payload){
  if (!payload.sku) return 'SKU 不可空白';
  if (!payload.name) return '請輸入官網商品名稱';
  if (!payload.price) return '售價不可空白';
  if (!payload.category_code) return '請選擇大分類';
  if (!payload.subcategory_code) return '請選擇子分類';
  if (!payload.cover_image_id) return '請先上傳封面圖';
  return '';
}

    async function ensureImagesUploadedIfNeeded(){
  const hasFilesSelected = ($('coverFile').files.length > 0) || ($('galleryFiles').files.length > 0);
  if (hasFilesSelected) {
    await uploadImages();
  }
}

    async function saveDraft(){
      try {
        await ensureImagesUploadedIfNeeded();

        const payload = buildDraftPayload();
        const errMsg = validateDraftPayload(payload);
        if (errMsg) {
          setStatus('saveMsg', errMsg, true);
          return;
        }

        setStatus('saveMsg', '草稿儲存中...');
        const data = await jfetch(ROUTES.saveDraft, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        state.draftRecordId = data.record_id || state.draftRecordId || '';
        $('btnPublish').disabled = !state.draftRecordId;
        setStatus('saveMsg', '草稿已儲存，record_id：' + (state.draftRecordId || '-'));
      } catch (err) {
        setStatus('saveMsg', '草稿儲存失敗：' + err.message, true);
      }
    }

    async function publishNow(){
      try {
        if (!state.draftRecordId) {
          await saveDraft();
          if (!state.draftRecordId) return;
        }

        setStatus('saveMsg', '正式上架中...');
        const data = await jfetch(ROUTES.publish, {
          method: 'POST',
          body: JSON.stringify({
            op_key: state.opKey,
            record_id: state.draftRecordId,
            sku: $('sku').value.trim()
          })
        });

        setStatus(
          'saveMsg',
          '已正式上架：' + (data.sku || $('sku').value.trim()) + '\n上架時間：' + (data.published_at || '-')
        );
      } catch (err) {
        setStatus('saveMsg', '正式上架失敗：' + err.message, true);
      }
    }

    function restoreSession(){
      const saved = sessionStorage.getItem('SHOP_ADMIN_OP_KEY') || '';
      if (saved) $('opKey').value = saved;
    }

    $('btnLogin').addEventListener('click', login);
    $('btnSearchExisting').addEventListener('click', searchExistingProduct);
    $('searchKeyword').addEventListener('keydown', (e) => { if (e.key === 'Enter') searchExistingProduct(); });
    $('btnUploadImages').addEventListener('click', async () => {
      try {
        await uploadImages();
      } catch (err) {
        setStatus('saveMsg', '圖片上傳失敗：' + err.message, true);
      }
    });
    $('btnSaveDraft').addEventListener('click', saveDraft);
    $('btnPublish').addEventListener('click', publishNow);
    $('catCode').addEventListener('change', renderSubcategoryOptions);

    restoreSession();
  </script>
</body>
</html>
