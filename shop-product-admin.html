<head>

  <style>
    :root{
      --bg:#fffaf7;
      --card:#ffffff;
      --text:#5a4744;
      --text-soft:#8b7470;
      --line:rgba(120,90,86,.12);
      --pink:#efcfd3;
      --gold:#b79269;
      --shadow:0 16px 32px rgba(177,136,130,.10);
      --radius-xl:26px;
      --radius-lg:20px;
      --radius-md:14px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{
      margin:0;
      font-family:"Noto Sans TC",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(239,207,211,.28), transparent 22%),
        linear-gradient(180deg,#fffaf7 0%,#fffdfb 50%,#fff8f8 100%);
      min-height:100vh;
    }
    .wrap{
      width:min(100% - 20px, 920px);
      margin:0 auto;
      padding:20px 0 48px;
    }
    .hero{
      margin-bottom:16px;
      padding:18px 16px;
      border-radius:var(--radius-xl);
      background:linear-gradient(135deg, rgba(255,255,255,.95), rgba(255,249,246,.92));
      border:1px solid rgba(120,90,86,.08);
      box-shadow:var(--shadow);
    }
    .hero h1{
      margin:0;
      font-size:26px;
      line-height:1.15;
      letter-spacing:.02em;
    }
    .hero p{
      margin:8px 0 0;
      font-size:13px;
      color:var(--text-soft);
      line-height:1.7;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,252,250,.96));
      border:1px solid rgba(120,90,86,.08);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-bottom:12px;
    }
    .field.full{grid-column:1 / -1;}
    label{
      font-size:13px;
      font-weight:700;
      color:#5b4744;
      letter-spacing:.02em;
    }
    input, select, textarea, button{
      font:inherit;
    }
    input[type="text"],
    input[type="number"],
    input[type="password"],
    select,
    textarea{
      width:100%;
      border:1px solid rgba(120,90,86,.12);
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:12px 14px;
      outline:none;
    }
    textarea{
      min-height:140px;
      resize:vertical;
      line-height:1.7;
    }
    input[readonly]{
      background:#fbf7f5;
      color:#8b7470;
    }

    .hint{
      font-size:12px;
      color:var(--text-soft);
      line-height:1.7;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:8px;
    }
    .btn{
      border:none;
      border-radius:999px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:.04em;
      box-shadow:0 8px 18px rgba(114,90,86,.06);
    }
    .btn-primary{
      background:linear-gradient(135deg,#f4e4e1,#efdbd7);
      color:#5a4643;
    }
    .btn-secondary{
      background:#fff;
      color:#5a4643;
      border:1px solid rgba(120,90,86,.10);
    }
    .btn-dark{
      background:#5a4744;
      color:#fff;
    }
    .btn[disabled]{
      opacity:.45;
      cursor:not-allowed;
    }

    .status{
      margin-top:10px;
      font-size:13px;
      line-height:1.7;
      color:#7c6763;
      min-height:22px;
      white-space:pre-line;
    }

    .thumbs{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:10px;
      margin-top:10px;
    }
    .thumb-card{
      border:1px solid rgba(120,90,86,.08);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 6px 14px rgba(114,90,86,.04);
    }
    .thumb-card img{
      display:block;
      width:100%;
      aspect-ratio:1/1;
      object-fit:cover;
      background:#f7f4f2;
    }
    .thumb-cap{
      padding:8px 10px;
      font-size:11px;
      color:#8b7470;
      text-align:center;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      padding:0 10px;
      border-radius:999px;
      background:rgba(183,146,105,.08);
      color:#9a7a54;
      font-size:11px;
      font-weight:700;
      letter-spacing:.04em;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .hidden{display:none!important;}

    @media (max-width:767px){
      .wrap{width:min(100% - 16px, 920px); padding:16px 0 34px;}
      .hero h1{font-size:22px;}
      .grid{grid-template-columns:1fr;}
      .thumbs{grid-template-columns:repeat(2, minmax(0,1fr));}
      .card{padding:14px;}
      .btn{width:100%; justify-content:center;}
    }
    .page-tabs{
  margin:0 0 18px;
}

.page-tabs-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px 14px;
  border-radius:18px;
  background:#020617;
  border:1px solid rgba(148,163,184,.28);
  box-shadow:0 10px 30px rgba(15,23,42,.12);
}

.page-tab{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:0 18px;
  border-radius:999px;
  text-decoration:none;
  font-size:14px;
  font-weight:800;
  letter-spacing:.01em;
  background:rgba(15,23,42,.92);
  color:#e2e8f0;
  border:1px solid rgba(148,163,184,.55);
  transition:.18s ease;
}

.page-tab:hover{
  transform:translateY(-1px);
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.18);
}

.page-tab.is-active{
  background:#22d3ee;
  color:#0f172a;
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.32);
}

@media (max-width:900px){
  .page-tabs-bar{
    gap:8px;
    padding:10px;
  }
  .page-tab{
    min-height:40px;
    padding:0 14px;
    font-size:13px;
  }
}

    <section class="hero">
      <h1>官網商品上架後台</h1>
    </section>

    <section class="card" id="loginCard">
      <div class="topbar">
        <div>
          <div class="pill">STEP 1</div>
        </div>
      </div>

      <div class="field">
        <label for="opKey">OP 密碼</label>
        <input id="opKey" type="password" placeholder="請輸入 OP 密碼">
      </div>

      <div class="actions">
        <button class="btn btn-dark" id="btnLogin" type="button">登入後台</button>
      </div>

      <div class="status" id="loginMsg"></div>
    </section>

    <section class="card hidden" id="editorCard">
      <div class="topbar">
        <div class="pill">STEP 2</div>
        <div class="hint">先存草稿，再正式上架</div>
      </div>

      <div class="card" style="box-shadow:none;border-style:dashed;margin-bottom:14px;">
  <div class="topbar">
    <div class="pill">STEP 2A</div>
    <div class="hint">先搜尋現有已入庫商品，再帶入下方表單</div>
  </div>

  <div class="grid">
    <div class="field full">
      <label for="searchKeyword">搜尋現有商品</label>
      <input id="searchKeyword" type="text" placeholder="輸入 SKU / 商品名稱，例如 C000123 / KIRA / TORY BURCH">
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-secondary" id="btnSearchExisting" type="button">搜尋現有商品</button>
  </div>

  <div class="status" id="searchMsg"></div>
  <div id="searchResults" class="thumbs" style="grid-template-columns:1fr;"></div>
</div>

      <div class="grid">
        <div class="field">
          <label for="sku">SKU</label>
          <input id="sku" type="text" readonly>
        </div>

        <div class="field">
          <label for="source">商品來源</label>
          <select id="source">
            <option value="自有">自有</option>
            <option value="寄賣">寄賣</option>
            <option value="預購">預購</option>
          </select>
        </div>

        <div class="field full">
          <label for="name">商品名稱</label>
          <input id="name" type="text" placeholder="例如：KIRA DIAMOND QUILT CROSSBODY BAG">
        </div>

        <div class="field full">
          <label for="desc">商品描述</label>
          <textarea id="desc" placeholder="輸入商品介紹、尺寸、材質、顏色、重點整理"></textarea>
        </div>

        <div class="field">
          <label for="price">售價</label>
          <input id="price" type="number" min="0" step="1" placeholder="16500">
        </div>

        <div class="field">
          <label for="listPrice">原價</label>
          <input id="listPrice" type="number" min="0" step="1" placeholder="18800">
        </div>

        <div class="field">
          <label for="stockQty">目前庫存</label>
<input id="stockQty" type="text" readonly placeholder="請先搜尋並帶入商品">
        </div>

        <div class="field">
          <label for="catCode">大分類</label>
          <select id="catCode"></select>
        </div>

        <div class="field">
          <label for="subCode">子分類</label>
          <select id="subCode"></select>
        </div>

        <div class="field">
          <label for="coverFile">封面圖</label>
          <input id="coverFile" type="file" accept="image/*">
        </div>

        <div class="field full">
          <label for="galleryFiles">多圖上傳</label>
          <input id="galleryFiles" type="file" accept="image/*" multiple>
          <div class="hint">可一次選多張。封面圖請另外用上方封面欄位指定。</div>
        </div>
      </div>

      <div class="thumbs" id="previewWrap"></div>

      <div class="actions">
        <button class="btn btn-secondary" id="btnUploadImages" type="button">先上傳圖片</button>
        <button class="btn btn-primary" id="btnSaveDraft" type="button">儲存草稿</button>
        <button class="btn btn-dark" id="btnPublish" type="button" disabled>正式上架</button>

      <div class="status" id="saveMsg"></div>

  <script>
    const API_BASE = 'https://api.murain.tw';

    const ROUTES = {
      auth: API_BASE + '/op/auth',
      productSearch: API_BASE + '/op/shop/product-search',
      categories: API_BASE + '/op/shop/categories',
      uploadImages: API_BASE + '/op/shop/upload-images',
      saveDraft: API_BASE + '/op/shop/save-draft',
      publish: API_BASE + '/op/shop/publish'
    };

    const state = {
      opKey: '',
      categories: [],
      uploadedImages: [],
      draftRecordId: '',
      selectedProductRecordId: '',
selectedProductData: null,
      sku: ''
    };

    const $ = (id) => document.getElementById(id);

    function setText(id, text){
      const el = $(id);
      if (el) el.textContent = text || '';
    }

    function setStatus(id, text, isError = false){
      const el = $(id);
      if (!el) return;
      el.textContent = text || '';
      el.style.color = isError ? '#b85d6d' : '#7c6763';
    }
async function searchExistingProduct(){
  const keyword = $('searchKeyword').value.trim();
  if (!keyword) {
    setStatus('searchMsg', '請先輸入 SKU 或商品名稱', true);
    return;
  }

  try {
    setStatus('searchMsg', '查詢中...');
    const url = ROUTES.productSearch
      + '?op_key=' + encodeURIComponent(state.opKey)
      + '&keyword=' + encodeURIComponent(keyword);

    const data = await jfetch(url, { method: 'GET' });
    const items = Array.isArray(data.items) ? data.items : [];

    renderSearchResults(items);
    setStatus('searchMsg', items.length ? `共找到 ${items.length} 筆` : '查無商品');
  } catch (err) {
    setStatus('searchMsg', '查詢失敗：' + err.message, true);
  }
}

function renderSearchResults(items){
  const wrap = $('searchResults');
  wrap.innerHTML = '';

  if (!items.length) return;

  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'thumb-card';
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:center;padding:10px;">
        <img src="${item.thumb_url || item.image_url || ''}" alt="${item.name}" style="width:72px;height:72px;object-fit:cover;border-radius:12px;background:#f7f4f2;">
        <div>
          <div style="font-weight:800;">${item.name || '-'}</div>
          <div class="hint">SKU：${item.sku || '-'}｜庫存：${item.stock_qty || 0}｜來源：${item.source || '-'}</div>
        </div>
        <button type="button" class="btn btn-primary">帶入</button>
      </div>
    `;
    el.querySelector('button').addEventListener('click', () => fillFormFromExisting(item));
    wrap.appendChild(el);
  });
}

function fillFormFromExisting(item){
  state.selectedProductRecordId = item.record_id || '';
  state.selectedProductData = item || null;
  state.draftRecordId = item.record_id || '';

  $('sku').value = item.sku || '';
  $('name').value = item.name || '';
  $('desc').value = item.description || '';
  $('price').value = item.price || '';
  $('listPrice').value = item.list_price || '';
  $('stockQty').value = item.stock_qty || '';
  $('source').value = item.source || '自有';

  if (item.category_code) $('catCode').value = item.category_code;
  renderSubcategoryOptions();
  if (item.subcategory_code) $('subCode').value = item.subcategory_code;

  $('coverFile').value = '';
  $('galleryFiles').value = '';

  state.uploadedImages = [];
  if (item.image_id || item.thumb_url || item.image_url) {
    state.uploadedImages = [{
      image_id: item.image_id || '',
      thumb_url: item.thumb_url || item.image_url || '',
      image_url: item.image_url || item.thumb_url || ''
    }];
  }
  renderImagePreviews();

  $('btnPublish').disabled = !state.draftRecordId;
  setStatus('saveMsg', '已帶入現有商品，現在可補圖片、描述或直接存草稿。');
}
    async function jfetch(url, options = {}){
      const res = await fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data?.ok === false) {
        throw new Error(data?.detail || data?.error || ('HTTP_' + res.status));
      }
      return data;
    }



    async function toBase64(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          const base64 = result.includes(',') ? result.split(',')[1] : result;
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function fileToPayload(file){
      return {
        filename: file.name,
        content_type: file.type || 'application/octet-stream',
        base64: await toBase64(file)
      };
    }

    function renderCategoryOptions(){
      const catSel = $('catCode');
      const subSel = $('subCode');

      catSel.innerHTML = '';
      subSel.innerHTML = '';

      state.categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat.code;
        opt.textContent = cat.name;
        catSel.appendChild(opt);
      });

      renderSubcategoryOptions();
    }

    function renderSubcategoryOptions(){
      const catCode = $('catCode').value;
      const subSel = $('subCode');
      subSel.innerHTML = '';

      const cat = state.categories.find(x => String(x.code) === String(catCode));
      const subs = Array.isArray(cat?.subcategories) ? cat.subcategories : [];

      subs.forEach(sub => {
        const opt = document.createElement('option');
        opt.value = sub.code;
        opt.textContent = sub.name;
        subSel.appendChild(opt);
      });
    }

    function renderImagePreviews(){
      const wrap = $('previewWrap');
      wrap.innerHTML = '';

      if (!state.uploadedImages.length) return;

      state.uploadedImages.forEach((img, idx) => {
        const card = document.createElement('div');
        card.className = 'thumb-card';
        card.innerHTML = `
          <img src="${img.thumb_url || img.image_url || ''}" alt="圖片 ${idx + 1}">
          <div class="thumb-cap">${idx === 0 ? '封面圖' : '多圖 ' + idx}</div>
        `;
        wrap.appendChild(card);
      });
    }

    async function login(){
      const opKey = $('opKey').value.trim();
      if (!opKey) {
        setStatus('loginMsg', '請先輸入 OP 密碼', true);
        return;
      }

      try {
        setStatus('loginMsg', '登入中...');
        await jfetch(ROUTES.auth, {
          method: 'POST',
          body: JSON.stringify({ op_key: opKey })
        });

        state.opKey = opKey;
        sessionStorage.setItem('SHOP_ADMIN_OP_KEY', opKey);

        $('loginCard').classList.add('hidden');
        $('editorCard').classList.remove('hidden');

        await loadCategories();

        setStatus('loginMsg', '');
      } catch (err) {
        setStatus('loginMsg', '登入失敗：' + err.message, true);
      }
    }

    async function loadCategories(){
      try {
        const url = ROUTES.categories + '?op_key=' + encodeURIComponent(state.opKey);
        const data = await jfetch(url, { method: 'GET' });
        state.categories = Array.isArray(data.categories) ? data.categories : [];
        renderCategoryOptions();
      } catch (err) {
        setStatus('saveMsg', '分類讀取失敗：' + err.message, true);
      }
    }

    async function uploadImages(){
      const coverFile = $('coverFile').files[0] || null;
      const galleryFiles = Array.from($('galleryFiles').files || []);

      if (!coverFile && !galleryFiles.length) {
        setStatus('saveMsg', '請先選擇圖片', true);
        return [];
      }

      setStatus('saveMsg', '圖片上傳中...');

      const files = [];
      if (coverFile) files.push(await fileToPayload(coverFile));
      for (const f of galleryFiles) files.push(await fileToPayload(f));

      const data = await jfetch(ROUTES.uploadImages, {
        method: 'POST',
        body: JSON.stringify({
          op_key: state.opKey,
          files
        })
      });

      state.uploadedImages = Array.isArray(data.images) ? data.images : [];
      renderImagePreviews();
      setStatus('saveMsg', '圖片上傳完成，共 ' + state.uploadedImages.length + ' 張');
      return state.uploadedImages;
    }

    function buildDraftPayload(){
      const categoryCode = $('catCode').value || '';
      const subCode = $('subCode').value || '';

      const cover = state.uploadedImages[0] || null;
      const gallery = state.uploadedImages.map(x => x.image_id).filter(Boolean);

      return {
        op_key: state.opKey,
        record_id: state.draftRecordId || '',
        sku: $('sku').value.trim(),
        name: $('name').value.trim(),
        description: $('desc').value.trim(),
        price: Number($('price').value || 0) || 0,
        list_price: Number($('listPrice').value || 0) || 0,
        stock_qty: Number($('stockQty').value || 0) || 0,
        source: $('source').value || '自有',
        category_code: categoryCode,
        subcategory_code: subCode,
        cover_image_id: cover?.image_id || '',
        gallery_image_ids: gallery
      };
    }

    function validateDraftPayload(payload){
      if (!payload.sku) return 'SKU 不可空白';
      if (!payload.name) return '請輸入商品名稱';
      if (!payload.price) return '請輸入售價';
      if (!payload.category_code) return '請選擇大分類';
      if (!payload.subcategory_code) return '請選擇子分類';
      if (!payload.cover_image_id) return '請先上傳封面圖';
      return '';
    }

    async function ensureImagesUploadedIfNeeded(){
  const hasFilesSelected = ($('coverFile').files.length > 0) || ($('galleryFiles').files.length > 0);
  if (hasFilesSelected) {
    await uploadImages();
  }
}

    async function saveDraft(){
      try {
        await ensureImagesUploadedIfNeeded();

        const payload = buildDraftPayload();
        const errMsg = validateDraftPayload(payload);
        if (errMsg) {
          setStatus('saveMsg', errMsg, true);
          return;
        }

        setStatus('saveMsg', '草稿儲存中...');
        const data = await jfetch(ROUTES.saveDraft, {
          method: 'POST',
          body: JSON.stringify(payload)
        });

        state.draftRecordId = data.record_id || state.draftRecordId || '';
        $('btnPublish').disabled = !state.draftRecordId;
        setStatus('saveMsg', '草稿已儲存，record_id：' + (state.draftRecordId || '-'));
      } catch (err) {
        setStatus('saveMsg', '草稿儲存失敗：' + err.message, true);
      }
    }

    async function publishNow(){
      try {
        if (!state.draftRecordId) {
          await saveDraft();
          if (!state.draftRecordId) return;
        }

        setStatus('saveMsg', '正式上架中...');
        const data = await jfetch(ROUTES.publish, {
          method: 'POST',
          body: JSON.stringify({
            op_key: state.opKey,
            record_id: state.draftRecordId,
            sku: $('sku').value.trim()
          })
        });

        setStatus(
          'saveMsg',
          '已正式上架：' + (data.sku || $('sku').value.trim()) + '\n上架時間：' + (data.published_at || '-')
        );
      } catch (err) {
        setStatus('saveMsg', '正式上架失敗：' + err.message, true);
      }
    }

    function restoreSession(){
      const saved = sessionStorage.getItem('SHOP_ADMIN_OP_KEY') || '';
      if (saved) $('opKey').value = saved;
    }

    $('btnLogin').addEventListener('click', login);
    $('btnSearchExisting').addEventListener('click', searchExistingProduct);
    $('btnUploadImages').addEventListener('click', async () => {
      try {
        await uploadImages();
      } catch (err) {
        setStatus('saveMsg', '圖片上傳失敗：' + err.message, true);
      }
    });
    $('btnSaveDraft').addEventListener('click', saveDraft);
    $('btnPublish').addEventListener('click', publishNow);
    $('catCode').addEventListener('change', renderSubcategoryOptions);

    restoreSession();
  </script>
</body>
</html>
