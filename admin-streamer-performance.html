<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>直播主業績表</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",Roboto,sans-serif;background:#020617;color:#e5e7eb}
  .wrap{max-width:1280px;margin:0 auto;padding:16px}h1{margin:0 0 8px;font-size:24px;font-weight:900}.muted{font-size:12px;color:#94a3b8;line-height:1.6}
  .page-tabs{margin:14px 0 18px}.page-tabs-bar{display:flex;flex-wrap:wrap;gap:10px;padding:12px 14px;border-radius:18px;background:#020617;border:1px solid rgba(148,163,184,.28);box-shadow:0 10px 30px rgba(15,23,42,.12)}
  .page-tab{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 16px;border-radius:999px;text-decoration:none;font-size:13px;font-weight:800;background:rgba(15,23,42,.92);color:#e2e8f0;border:1px solid rgba(148,163,184,.55)}.page-tab.is-active{background:#22d3ee;color:#0f172a;border-color:#22d3ee}
  .card{background:rgba(15,23,42,.95);border:1px solid rgba(148,163,184,.28);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 14px 36px rgba(0,0,0,.18)}
  .toolbar{display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr auto auto;gap:10px;align-items:end}@media(max-width:980px){.toolbar{grid-template-columns:1fr 1fr}.toolbar button{width:100%}}@media(max-width:620px){.toolbar{grid-template-columns:1fr}}
  label{display:block;font-size:12px;color:#cbd5e1;margin:0 0 6px;font-weight:700}input,select,button{width:100%;min-height:40px;border-radius:12px;border:1px solid rgba(148,163,184,.55);background:#020617;color:#e5e7eb;padding:8px 10px;font-size:13px}input:focus,select:focus{outline:2px solid #38bdf8;outline-offset:1px}button{border:none;background:#22d3ee;color:#0f172a;font-weight:900;cursor:pointer}button.secondary{background:transparent;color:#e5e7eb;border:1px solid rgba(148,163,184,.55)}button:disabled{opacity:.5;cursor:not-allowed}.status{margin-top:8px;font-size:12px;color:#94a3b8}.danger{color:#fca5a5}.ok{color:#86efac}
  .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}@media(max-width:820px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:520px){.stats{grid-template-columns:1fr}}.stat{padding:14px;border-radius:16px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.65)}.stat .t{font-size:12px;color:#94a3b8;font-weight:800}.stat .v{margin-top:6px;font-size:22px;font-weight:950;letter-spacing:.01em}.stat.negative .v{color:#fca5a5}
  .split{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,.9fr);gap:12px;align-items:start}@media(max-width:980px){.split{grid-template-columns:1fr}}
  table{width:100%;border-collapse:separate;border-spacing:0 7px;font-size:13px}th{text-align:left;color:#94a3b8;font-size:12px;font-weight:800;padding:0 10px 4px;white-space:nowrap}td{background:rgba(2,6,23,.75);border-top:1px solid rgba(148,163,184,.22);border-bottom:1px solid rgba(148,163,184,.22);padding:10px;vertical-align:middle}td:first-child{border-left:1px solid rgba(148,163,184,.22);border-radius:12px 0 0 12px}td:last-child{border-right:1px solid rgba(148,163,184,.22);border-radius:0 12px 12px 0}.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .row-btn{width:auto;min-height:30px;padding:5px 10px;font-size:12px;border-radius:999px;background:transparent;color:#bae6fd;border:1px solid rgba(56,189,248,.45)}.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;border:1px solid rgba(148,163,184,.35);color:#cbd5e1;font-size:12px;margin:2px 4px 2px 0}.detail-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}.detail-title{font-size:15px;font-weight:950}.detail-list{max-height:620px;overflow:auto;padding-right:4px}.detail-item{border:1px solid rgba(148,163,184,.22);background:rgba(2,6,23,.72);border-radius:14px;padding:12px;margin-bottom:8px}.detail-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;font-size:13px;font-weight:900}.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}@media(max-width:620px){.detail-grid{grid-template-columns:1fr}}.mini{background:rgba(15,23,42,.7);border:1px solid rgba(148,163,184,.18);border-radius:12px;padding:8px}.mini .k{font-size:11px;color:#94a3b8}.mini .v{font-size:13px;font-weight:900;margin-top:4px}.empty{padding:18px;text-align:center;color:#94a3b8;border:1px dashed rgba(148,163,184,.35);border-radius:16px}
</style>
<script>window.API_BASE = window.API_BASE || "https://api.murain.tw";</script>
</head>
<body>
<div class="wrap">
  <h1>直播主業績表</h1>
  <div class="muted">資料來源：Orders 表的「直播主結算單」View。請先在 Airtable 做好：直播主業績月份、直播主總業績、直播主直播業績、直播主取消淨利。</div>
  <div class="page-tabs"><div class="page-tabs-bar">
    <a class="page-tab" href="op.html" target="_blank" rel="noopener noreferrer">直播主開單</a>
    <a class="page-tab" href="admin.html" target="_blank" rel="noopener noreferrer">訂單後台</a>
    <a class="page-tab is-active" href="admin-streamer-performance.html">直播主業績</a>
    <a class="page-tab" href="admin-cart-open.html" target="_blank" rel="noopener noreferrer">未結單購物車</a>
    <a class="page-tab" href="stock.html" target="_blank" rel="noopener noreferrer">庫存查詢</a>
    <a class="page-tab" href="/company-files/company-index.html" target="_blank" rel="noopener noreferrer">公司檔案管理</a>
    <a class="page-tab is-active" href="admin-streamer-performance.html">直播主業績</a>
  </div></div>
  <div class="card"><div class="toolbar">
    <div><label>Admin / OP Key</label><input id="opKey" type="password" placeholder="輸入後台密碼" autocomplete="current-password"></div>
    <div><label>月份</label><select id="monthFilter"><option value="">全部月份</option></select></div>
    <div><label>直播主</label><select id="streamerFilter"><option value="">全部直播主</option></select></div>
    <div><label>搜尋訂單</label><input id="kw" placeholder="訂單編號 / 直播主 / 月份"></div>
    <button id="btnLoad">載入資料</button><button id="btnExport" class="secondary">匯出 CSV</button>
  </div><div id="status" class="status">尚未載入。</div></div>
  <div class="card"><div class="stats">
    <div class="stat"><div class="t">直播主總業績</div><div class="v" id="sumTotal">NT$ 0</div></div>
    <div class="stat"><div class="t">直播主直播業績</div><div class="v" id="sumLive">NT$ 0</div></div>
    <div class="stat negative"><div class="t">直播主退貨／取消金額</div><div class="v" id="sumCancel">NT$ 0</div></div>
    <div class="stat"><div class="t">訂單筆數</div><div class="v" id="sumCount">0</div></div>
  </div></div>
  <div class="split">
    <div class="card"><div class="detail-head"><div><div class="detail-title">月份 × 直播主彙總</div><div class="muted">點「明細」可查看該直播主該月份訂單。</div></div></div>
      <div style="overflow:auto;"><table><thead><tr><th>直播主月份</th><th>直播主</th><th class="num">直播主總業績</th><th class="num">直播主直播業績</th><th class="num">直播主退貨金額</th><th class="num">筆數</th><th></th></tr></thead><tbody id="summaryBody"><tr><td colspan="7"><div class="empty">尚未載入資料</div></td></tr></tbody></table></div>
    </div>
    <div class="card"><div class="detail-head"><div><div class="detail-title" id="detailTitle">訂單明細</div><div class="muted" id="detailSub">請先選擇左側某一列。</div></div><button id="btnClearDetail" class="row-btn">清除</button></div><div id="detailList" class="detail-list"><div class="empty">尚未選擇彙總列</div></div></div>
  </div>
</div>
<script>
const API = window.API_BASE || "https://api.murain.tw";const VIEW_KIND="streamer";let rawRows=[],normalizedRows=[],summaryRows=[],currentDetailKey="";const $=s=>document.querySelector(s);
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function text(v){if(Array.isArray(v))return v.map(x=>x==null?"":typeof x==="object"?(x.name||x.value||x.id||x.url||""):String(x)).filter(Boolean).join(" / ");if(v==null)return"";if(typeof v==="object")return v.name||v.value||v.id||v.url||"";return String(v)}
function pick(f,names){for(const name of names){if(Object.prototype.hasOwnProperty.call(f,name)){const v=f[name],t=text(v).trim();if(t!=="")return v;if(typeof v==="number")return v}}return""}
function num(v){if(Array.isArray(v))v=v[0];if(v&&typeof v==="object")v=v.value??v.name??"";if(typeof v==="number")return Number.isFinite(v)?v:0;const s=String(v??"").replace(/,/g,"").replace(/NT\$/gi,"").replace(/[^\d.-]/g,"").trim();if(!s)return 0;const n=Number(s);return Number.isFinite(n)?n:0}
function money(n){const v=Number(n||0);return (v<0?"-":"")+"NT$ "+Math.abs(Math.round(v)).toLocaleString("zh-TW")}
function normalizePayload(j){const data=Array.isArray(j?.records)?j.records:Array.isArray(j?.rows)?j.rows:Array.isArray(j?.data)?j.data:Array.isArray(j)?j:[];return data.map(r=>r&&r.fields?{id:r.id||"",fields:r.fields}:{id:r?.id||"",fields:r||{}})}
function normalizeRow(rec){const f=rec.fields||{};const month=text(pick(f,["直播主業績月份","直播主主業績月份","業績月份","月份"])).trim();const streamer=text(pick(f,["streamer_name","直播主","主播","live_host","streamer"])).trim();const orderId=text(pick(f,["order_id","訂單編號","Order ID"])).trim();const shippedAt=text(pick(f,["出貨時間_台灣","出貨完成","出貨時間"])).trim();const cancelDone=text(pick(f,["取消完成","取消時間","取消完成月份"])).trim();const total=num(pick(f,["直播主總業績","直播主業績金額","總業績"]));const live=num(pick(f,["直播主直播業績","直播主正常淨利","直播業績"]));const cancel=num(pick(f,["直播主取消淨利","直播主退貨金額","退貨金額","取消淨利"]));return{id:rec.id||orderId,month,streamer,orderId,shippedAt,cancelDone,total,live,cancel,raw:f}}
function loadSavedKey(){const k=localStorage.getItem("murain_admin_key")||"";$("#opKey").value=k}function saveKey(){const k=$("#opKey").value.trim();if(k)localStorage.setItem("murain_admin_key",k)}function setStatus(msg,isErr=false){const el=$("#status");el.textContent=msg;el.className="status "+(isErr?"danger":"")}
async function loadData(){const key=$("#opKey").value.trim();if(!key){alert("請先輸入 Admin / OP Key");return}saveKey();$("#btnLoad").disabled=true;setStatus("讀取中…");try{const url=`${API}/admin/export-view?key=${encodeURIComponent(key)}&kind=${encodeURIComponent(VIEW_KIND)}&format=json`;const r=await fetch(url,{method:"GET",cache:"no-store"});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j?.message||j?.error||"讀取失敗 HTTP "+r.status);rawRows=normalizePayload(j);normalizedRows=rawRows.map(normalizeRow).filter(x=>x.month||x.streamer||x.orderId);const hasNeeded=normalizedRows.some(x=>x.month||x.streamer||x.total||x.live||x.cancel);if(!hasNeeded){setStatus("有讀到資料，但找不到直播主業績欄位。請確認後端 streamer 匯出欄位已包含：直播主業績月份、streamer_name、直播主總業績、直播主直播業績、直播主取消淨利。",true)}else{setStatus(`已載入 ${normalizedRows.length} 筆明細。`)}buildFilters();render()}catch(e){console.error(e);setStatus("讀取失敗："+(e.message||e),true);alert("讀取失敗："+(e.message||e))}finally{$("#btnLoad").disabled=false}}
function buildFilters(){const months=Array.from(new Set(normalizedRows.map(x=>x.month).filter(Boolean))).sort().reverse();const streamers=Array.from(new Set(normalizedRows.map(x=>x.streamer).filter(Boolean))).sort((a,b)=>a.localeCompare(b,"zh-Hant"));const mf=$("#monthFilter"),sf=$("#streamerFilter"),oldM=mf.value,oldS=sf.value;mf.innerHTML=`<option value="">全部月份</option>`+months.map(m=>`<option value="${esc(m)}">${esc(m)}</option>`).join("");sf.innerHTML=`<option value="">全部直播主</option>`+streamers.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join("");if(months.includes(oldM))mf.value=oldM;if(streamers.includes(oldS))sf.value=oldS}
function getFilteredRows(){const m=$("#monthFilter").value,s=$("#streamerFilter").value,kw=$("#kw").value.trim().toLowerCase();return normalizedRows.filter(r=>{if(m&&r.month!==m)return false;if(s&&r.streamer!==s)return false;if(kw){const bag=`${r.orderId} ${r.month} ${r.streamer} ${r.shippedAt} ${r.cancelDone}`.toLowerCase();if(!bag.includes(kw))return false}return true})}
function summarize(rows){const map=new Map();for(const r of rows){const key=`${r.month||"(未填月份)"}__${r.streamer||"(未填直播主)"}`;if(!map.has(key))map.set(key,{key,month:r.month||"(未填月份)",streamer:r.streamer||"(未填直播主)",total:0,live:0,cancel:0,count:0});const g=map.get(key);g.total+=r.total;g.live+=r.live;g.cancel+=r.cancel;g.count+=1}return Array.from(map.values()).sort((a,b)=>{const m=String(b.month).localeCompare(String(a.month),"zh-Hant");if(m)return m;return String(a.streamer).localeCompare(String(b.streamer),"zh-Hant")})}
function render(){const rows=getFilteredRows();summaryRows=summarize(rows);const total=rows.reduce((s,r)=>s+r.total,0),live=rows.reduce((s,r)=>s+r.live,0),cancel=rows.reduce((s,r)=>s+r.cancel,0);$("#sumTotal").textContent=money(total);$("#sumLive").textContent=money(live);$("#sumCancel").textContent=money(cancel);$("#sumCount").textContent=String(rows.length);const body=$("#summaryBody");if(!summaryRows.length){body.innerHTML=`<tr><td colspan="7"><div class="empty">沒有符合條件的資料</div></td></tr>`;renderDetail("");return}body.innerHTML=summaryRows.map(g=>`<tr><td>${esc(g.month)}</td><td><b>${esc(g.streamer)}</b></td><td class="num"><b>${money(g.total)}</b></td><td class="num">${money(g.live)}</td><td class="num">${money(g.cancel)}</td><td class="num">${g.count}</td><td class="num"><button class="row-btn" data-key="${esc(g.key)}">明細</button></td></tr>`).join("");body.querySelectorAll("[data-key]").forEach(btn=>btn.addEventListener("click",()=>renderDetail(btn.dataset.key||"")));if(currentDetailKey)renderDetail(currentDetailKey)}
function renderDetail(key){currentDetailKey=key||"";const list=$("#detailList"),title=$("#detailTitle"),sub=$("#detailSub");if(!key){title.textContent="訂單明細";sub.textContent="請先選擇左側某一列。";list.innerHTML=`<div class="empty">尚未選擇彙總列</div>`;return}const g=summaryRows.find(x=>x.key===key);if(!g){title.textContent="訂單明細";sub.textContent="目前篩選條件下找不到這組資料。";list.innerHTML=`<div class="empty">沒有明細</div>`;return}const rows=getFilteredRows().filter(r=>(r.month||"(未填月份)")===g.month&&(r.streamer||"(未填直播主)")===g.streamer);title.textContent=`${g.month}｜${g.streamer}`;sub.textContent=`共 ${rows.length} 筆，總業績 ${money(g.total)}`;if(!rows.length){list.innerHTML=`<div class="empty">沒有明細</div>`;return}list.innerHTML=rows.map(r=>`<div class="detail-item"><div class="detail-top"><div>${esc(r.orderId||"(未填訂單編號)")}</div><div>${money(r.total)}</div></div><div style="margin-top:6px">${r.shippedAt?`<span class="pill">出貨：${esc(r.shippedAt)}</span>`:""}${r.cancelDone?`<span class="pill">取消：${esc(r.cancelDone)}</span>`:""}<span class="pill">直播主：${esc(r.streamer||"-")}</span></div><div class="detail-grid"><div class="mini"><div class="k">直播主總業績</div><div class="v">${money(r.total)}</div></div><div class="mini"><div class="k">直播主直播業績</div><div class="v">${money(r.live)}</div></div><div class="mini"><div class="k">直播主退貨金額</div><div class="v">${money(r.cancel)}</div></div></div></div>`).join("")}
function exportCsv(){const rows=summaryRows.length?summaryRows:summarize(getFilteredRows());const lines=[["直播主月份","直播主","直播主總業績","直播主直播業績","直播主退貨金額","筆數"],...rows.map(r=>[r.month,r.streamer,Math.round(r.total),Math.round(r.live),Math.round(r.cancel),r.count])];const csv="\ufeff"+lines.map(cols=>cols.map(v=>`"${String(v??"").replace(/"/g,'""')}"`).join(",")).join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="直播主業績表.csv";document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href)}
$("#btnLoad").addEventListener("click",loadData);$("#btnExport").addEventListener("click",exportCsv);$("#monthFilter").addEventListener("change",render);$("#streamerFilter").addEventListener("change",render);$("#kw").addEventListener("input",render);$("#btnClearDetail").addEventListener("click",()=>renderDetail(""));loadSavedKey();
</script>
</body>
</html>
