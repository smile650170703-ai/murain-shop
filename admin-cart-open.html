<script>
const API = (window.API_BASE || 'https://api.murain.tw').replace(/\/$/,'');
const STORAGE_KEY = 'MURAIN_ADMIN_OP_KEY';

let OP_KEY = localStorage.getItem(STORAGE_KEY) || '';
let currentCartRows = [];
let currentCartRecord = null;
let CART_EDITING_SKU = '';
 

const $  = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

function fmtAdminDateTime(v) {
  if (!v) return '';
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return '';
  return d.toLocaleString('zh-TW', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    hour12: false
  });
}

function displayCartStatus(st) {
  const s = String(st || '').trim().toLowerCase();

  if (s === 'open') return '未結單';
  if (s === 'pending') return '未完成';
  if (s === 'sent') return '已發購物車卡';
  if (s === 'checked_out') return '已結帳';
  if (s === 'completed') return '已完成';
  if (s === 'cancelled' || s === 'canceled') return '已取消';

  return st || '-';
}
function isWebCartRow(row) {
  const type = String(row?.customer_type || '').trim().toLowerCase();
  return ['web', 'shop', 'official', 'site', '官網'].includes(type);
}

function displayCartClearReason(reason) {
  const s = String(reason || '').trim();

  if (s === 'WEB_UNFINISHED_CART_36H') return '官網36小時未結單自動清空';
  if (s === 'WEB_UNFINISHED_CART_36H_NO_LINE') return '官網36小時未結單自動清空（無 LINE ID）';

  if (s === 'UNFINISHED_CART_36H') return '36小時未結單自動清空';
  if (s === 'UNFINISHED_CART_36H_NO_LINE') return '36小時未結單自動清空（無 LINE ID）';

  if (s === 'UNFINISHED_CART_72H') return '舊規則：72小時未結單自動清空';
  if (s === 'UNFINISHED_CART_72H_NO_LINE') return '舊規則：72小時未結單自動清空（無 LINE ID）';

  return s || '-';
}

function displayCartReminderStatus(row) {
  const isWeb = isWebCartRow(row);
  const lastStatus = String(row?.cart_remind_last_status || '').trim();
  const lastError = String(row?.cart_remind_last_error || '').trim();
  const autoStatus = String(row?.cart_auto_last_status || '').trim();
  const autoReason = String(row?.cart_auto_last_reason || '').trim();

  if (lastStatus === 'failed' || autoStatus.includes('failed')) {
    return `❌ 發送失敗${lastError || autoReason ? `：${lastError || autoReason}` : ''}`;
  }

  if (row?.cart_remind_2_sent_at) {
    return '✅ 已發第 2 次提醒（直播36H最後提醒）';
  }

  if (row?.cart_remind_1_sent_at) {
    return isWeb
      ? '✅ 已發第 1 次提醒（官網12H）'
      : '✅ 已發第 1 次提醒（直播24H）';
  }

  if (!String(row?.line_user_id || '').trim()) {
    return isWeb

 function rawCartStatus(row = {}) {
  return String(row.status || row.cart_status || 'open').trim().toLowerCase();

function cartEditBlockReason(row = {}) {
  const st = rawCartStatus(row);
  const checkedOut =
    row.checked_out === true ||
    String(row.checked_out || '').trim().toLowerCase() === 'true';

  const orderId = String(row.checked_out_order_id || '').trim();
  const payStatus = String(row.pay_status || row.payment_status || '').trim().toLowerCase();
  const orderStatus = String(row.order_status || '').trim().toLowerCase();

  if (st !== 'open') {
    if (st === 'checking_out') return '正在送出訂單中，暫時不能修改';
    if (st === 'submitted') return orderId ? `已送出訂單 ${orderId}，不能直接修改` : '已送出訂單，不能直接修改';
    if (st === 'paid') return '已付款，不能修改購物車';
    if (st === 'cancelled' || st === 'canceled') return '已取消，不能修改';
    return `狀態為 ${displayCartStatus(st)}，不能修改`;
  }

  if (checkedOut || orderId) {
    if (payStatus && payStatus !== 'paid_ok' && payStatus !== 'paid') {
      return `已有未完成付款訂單 ${orderId || ''}，需由客人取消後才可修改`;
    }

    if (orderStatus === 'paid' || payStatus === 'paid_ok' || payStatus === 'paid') {
      return `訂單 ${orderId || ''} 已付款，不能修改`;
    }

    return orderId ? `已綁定訂單 ${orderId}，不能直接修改` : '已送出結帳，不能直接修改';
  }

  return '';
}

function buildAdminCheckoutLineUrl(row = {}) {
  const token = String(row.cart_token || '').trim();

  if (liffId) {

async function copyTextToClipboard(text) {
  const value = String(text || '').trim();
  if (!value) throw new Error('沒有可複製的連結');

  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(value);
    return true;
  }

  const ta = document.createElement('textarea');
  ta.value = value;
  ta.setAttribute('readonly', 'readonly');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();

  const ok = document.execCommand('copy');
  document.body.removeChild(ta);

  if (!ok) throw new Error('瀏覽器不允許自動複製，請手動複製');
  return true;
}

async function adminAddOrUpdateCartItem() {
  if (!currentCartRecord || !currentCartRecord.cart_token) {
    showDetailMsg('請先選一台購物車', 'error');
    return;
  }

  if (!canEditCart(currentCartRecord)) {
    showDetailMsg('此購物車不是 open，不能修改商品。', 'error');
    return;
  }

  const token = String(currentCartRecord.cart_token || '').trim();
  const sku = String(document.getElementById('editSku')?.value || '').trim();
  const qty = Math.max(1, parseInt(document.getElementById('editQty')?.value || '1', 10) || 1);
  const priceRaw = String(document.getElementById('editPrice')?.value || '').trim();

  if (!sku) {
    showDetailMsg('請輸入條碼 / SKU', 'error');
    return;
  }

  const existingSkuInCart = Array.from(document.querySelectorAll('#cartEditItemsPanel .btnCartEditItem'))
    .some(btn => String(btn.dataset.sku || '').trim() === sku);

  const willUpdateExisting = !!CART_EDITING_SKU || existingSkuInCart;

  const btn = document.getElementById('btnCartAddOrUpdate');
  setButtonBusy(btn, true, willUpdateExisting ? '儲存中，請稍候…' : '新增中，請稍候…');
  showDetailMsg(willUpdateExisting ? '正在儲存修改，數量會改成最終數量…' : '正在新增商品…');

  let saveResult = null;

   try {
    const updateSku = CART_EDITING_SKU || (existingSkuInCart ? sku : '');

    if (updateSku) {
      const payload = {
        cart_token: token,
        sku: updateSku,
        qty,
        op_key: OP_KEY
      };

      if (priceRaw !== '') {
        payload.price = Math.max(0, parseInt(priceRaw, 10) || 0);
      }

      saveResult = await postCartEdit('/cart/update-qty-self', payload);
    } else {
      const payload = {
        cart_token: token,
        sku,
        qty,
        op_key: OP_KEY,
        customer_type: 'live'
      };

      if (priceRaw !== '') {
        payload.price = Math.max(0, parseInt(priceRaw, 10) || 0);
      }

      saveResult = await postCartEdit('/cart/add', payload);
    }

    CART_EDITING_SKU = '';

    const updatedByResult = applyCartItemsResult(saveResult);

    if (!updatedByResult) {
      await renderCartDetail(currentCartRecord);
    }
    showDetailMsg(
      willUpdateExisting
        ? '已儲存購物車商品：數量已改成最終數量，不是往上加。'
        : '已新增購物車商品。',
      'ok'
    );

  } catch (e) {
    showDetailMsg('更新失敗：' + (e.message || e), 'error');
  } finally {
    setButtonBusy(btn, false);
  }
}

            <div class="ord-amount">${itemCount ? `${itemCount} 件` : '-'}</div>
          </div>
        </div>

        <div class="ord-sub">
          ${lineId ? `LINE ID：${escapeHtml(lineId)}` : '⚠ 無 LINE ID'}
          ${orderId ? ` ／ 訂單：${escapeHtml(orderId)}` : ''}
        </div>

        <div class="badges">
          <span class="badge ${canEditCart(row) ? 'green' : 'red'}">
            ${escapeHtml(displayCartMainStatus(row))}
          </span>

          <span class="badge blue">來源：${escapeHtml(sourceText)}</span>

          ${row.streamer_name
            ? `<span class="badge blue">直播主：${escapeHtml(row.streamer_name)}</span>`
            : (sourceText === '直播主' ? '<span class="badge red">未填直播主</span>' : '')
          }

          ${lineId ? '<span class="badge green">有 LINE ID</span>' : '<span class="badge red">無 LINE ID</span>'}
          ${row.link_sent_at ? '<span class="badge green">已發購物車卡</span>' : '<span class="badge yellow">尚未發卡</span>'}
          ${row.link_copied_at ? '<span class="badge blue">已複製連結</span>' : ''}
          ${payText ? `<span class="badge yellow">${escapeHtml(payText)}</span>` : ''}
          ${displayCartReminderBadges(row)}
        </div>

        ${blockReason ? `<div class="ord-sub" style="color:#fecaca;">不可修改原因：${escapeHtml(blockReason)}</div>` : ''}

        <div class="ord-sub">
          建立：${escapeHtml(fmtAdminDateTime(row.created_at) || '-')}
          ／ 更新：${escapeHtml(fmtAdminDateTime(row.updated_at) || '-')}
          ${row.link_sent_at ? ` ／ 發卡：${escapeHtml(fmtAdminDateTime(row.link_sent_at) || '-')}` : ''}
        </div>
      </div>
    `;
  }).join('');

  $$('#orderList .order-row').forEach(rowEl => {
    rowEl.addEventListener('click', () => {
      $$('#orderList .order-row').forEach(x => x.classList.remove('active'));
      rowEl.classList.add('active');

      const idx = Number(rowEl.getAttribute('data-idx'));
      const row = currentCartRows[idx];

      if (row) renderCartDetail(row);
    });
  });

  if (activeToken) {
    const activeIdx = currentCartRows.findIndex(x =>
      String(x.cart_token || '').trim() === activeToken
    );

    if (activeIdx >= 0) {
      const activeEl = document.querySelector(`#orderList .order-row[data-idx="${activeIdx}"]`);
      if (activeEl) activeEl.classList.add('active');
      currentCartRecord = currentCartRows[activeIdx];
    }
  } else if (detailEl) {
    detailEl.innerHTML = '<div class="muted">請從左邊點選一台購物車</div>';
  }
}

async function renderCartDetail(row) {
  currentCartRecord = row;

  const dEl = $('#orderDetail');
  if (!dEl) return;

  let itemText = row.items_text || '';
 let detailItems = [];

  dEl.innerHTML = '<div class="muted">購物車明細載入中…</div>';

  try {
    const token = String(row.cart_token || '').trim();

    if (token) {
      const params = new URLSearchParams();
      params.set('op_key', OP_KEY);
      params.set('cart_token', token);

      const [briefRes, itemsRes] = await Promise.all([
        fetch(`${API}/admin/cart/brief?` + params.toString()),
        fetch(`${API}/admin/cart/items?` + params.toString())
      ]);

      const briefJson = await briefRes.json().catch(() => ({}));
      const itemsJson = await itemsRes.json().catch(() => ({}));

      if (briefRes.ok && briefJson.ok && briefJson.cart) {
        row.status = briefJson.cart.status || row.status || 'open';
        row.checked_out = briefJson.cart.checked_out === true;
        row.checked_out_order_id = briefJson.cart.checked_out_order_id || '';
      }

      if (itemsRes.ok && itemsJson.ok && Array.isArray(itemsJson.items)) {
        detailItems = itemsJson.items.map(normalizeAdminCartItem);

        itemText = detailItems.map(it => {
          return `${it.name || it.sku}${it.qty > 0 ? ` × ${it.qty}` : ''}`;
        }).filter(Boolean).join('\n');
      }
    }
  } catch (e) {
    console.warn('load cart items failed', e);
  }

  const blockReason = cartEditBlockReason(row);
  const lineId = String(row.line_user_id || '').trim();
  const orderId = String(row.checked_out_order_id || '').trim();

  dEl.innerHTML = `
    <div class="section-title">購物車明細</div>

    <div class="row mt-2">
      <div>
        <label>LINE名稱</label>
        <div class="ro-field">${escapeHtml(row.customer_name || '-')}</div>
      </div>
      <div>
        <label>目前狀態</label>
        <div class="ro-field">${escapeHtml(displayCartMainStatus(row))}</div>
      </div>
    </div>

    <div class="row mt-2">
      <div>
        <label>LINE userId</label>
        <div class="ro-field">${escapeHtml(lineId || '無 LINE ID')}</div>
      </div>
      <div>
        <label>購物車來源</label>
        <div class="ro-field">${escapeHtml(displayCartSource(row))}</div>
      </div>
    </div>

    <div class="row mt-2">
      <div>
        <label>綁定訂單</label>
        <div class="ro-field">${escapeHtml(orderId || '-')}</div>
      </div>
      <div>
        <label>可否修改</label>
        <div class="ro-field">${escapeHtml(canEditCart(row) ? '可以修改商品 / 清空購物車' : '不可修改')}</div>
      </div>
    </div>

    ${blockReason ? `
      <div class="mt-2">
        <label>不可修改原因</label>
        <div class="ro-field" style="height:auto;min-height:44px;align-items:flex-start;padding-top:10px;white-space:pre-wrap;color:#fecaca;">${escapeHtml(blockReason)}</div>
      </div>
    ` : ''}

    <div class="row mt-2">
      <div>
        <label>已發購物車卡時間</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.link_sent_at) || '-')}</div>
      </div>
      <div>
        <label>最後複製連結時間</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.link_copied_at) || '-')}</div>
      </div>
    </div>

    <div class="mt-2">
      <label>排程檢查結果</label>
 <div class="ro-field" style="height:auto;min-height:60px;align-items:flex-start;padding-top:10px;white-space:pre-wrap;">${escapeHtml(displayCartAutoStatus(row))}</div>
    </div>

    <div class="row mt-2">
      <div>
        <label>建立時間</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.created_at) || '-')}</div>
      </div>
      <div>
        <label>最後更新</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.updated_at) || '-')}</div>
      </div>
    </div>

    <label class="mt-2">商品明細</label>
<div id="cartItemsTextBox" class="ro-field" style="height:auto;min-height:88px;align-items:flex-start;padding-top:10px;white-space:pre-wrap;">${escapeHtml(itemText || '-')}</div>
    ${canEditCart(row) ? `
      <div class="mt-3" style="padding:10px;border:1px solid rgba(148,163,184,.35);border-radius:14px;background:rgba(2,6,23,.55);">
        <div class="section-title">購物車商品管理</div>

        <div class="row mt-2">
          <div>
            <label>條碼 / SKU</label>
            <input id="editSku" class="mono" placeholder="輸入條碼 / SKU" />
          </div>
          <div>
            <label>數量</label>
            <input id="editQty" type="number" min="1" value="1" />
          </div>
        </div>

        <div class="row mt-2">
          <div>
            <label>改價格</label>
            <input id="editPrice" type="number" min="0" placeholder="不改價可留空" />
          </div>
          <div style="align-self:end;">
            <button class="btn-primary" id="btnCartAddOrUpdate" type="button">新增 / 儲存修改</button>
          </div>
        </div>

        <div class="mt-3" id="cartEditItemsPanel"></div>
      </div>
    ` : `
      <div class="mt-3" style="padding:10px;border:1px solid rgba(248,113,113,.45);border-radius:14px;background:rgba(127,29,29,.18);color:#fecaca;white-space:pre-wrap;">
        此購物車目前不能修改。
        ${escapeHtml(blockReason || '只有 open 且尚未送出訂單的購物車可以新增、刪除或改價。')}
      </div>
      <div class="mt-3" id="cartEditItemsPanel"></div>
    `}
<div class="mt-3" style="display:flex;gap:8px;flex-wrap:wrap;">
  ${canEditCart(row) ? `<button class="btn-secondary" id="btnCartClearSingle" type="button">🧹 清空此購物車</button>` : ''}
</div>

<div class="muted mt-2" style="color:#facc15;white-space:pre-wrap;">
  此頁只用來修改尚未送出的購物車商品。
  修改完成後，請回「直播主開單」確認客人與購物車狀態後再發送結帳卡。
</div>

    <div class="muted mt-3" id="detailMsg"></div>
  `;
  renderAdminCartEditPanel(detailItems, canEditCart(row));

  $('#btnCartAddOrUpdate')?.addEventListener('click', adminAddOrUpdateCartItem);

  bindAdminCartItemButtons(dEl);
  $('#btnCartClearSingle')?.addEventListener('click', async e => {
    const btn = e.currentTarget;
    setButtonBusy(btn, true, '清空中…');

    try {
      await clearCartRow(row);
    } finally {
      setButtonBusy(btn, false);
    }
  });
}

async function remindCartRows(rows) {
  const targets = (rows || []).filter(x => x && x.cart_token);

  if (!targets.length) {
    showDetailMsg('目前沒有可提醒的購物車', 'error');
    return { ok: 0, skipped: 0, failed: 0 };
  }

  let ok = 0;
  let skipped = 0;
  let failed = 0;
  const failedMsgs = [];

  for (const row of targets) {
    const token = String(row.cart_token || '').trim();
    const lineId = String(row.line_user_id || '').trim();
    const title = row.customer_name || token;

    if (!token) continue;

    if (!lineId) {
      skipped++;
      failedMsgs.push(`${title}：沒有 LINE 綁定`);
      continue;
    }

    try {
      const r = await fetch(`${API}/op/cart/send-link`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          op_key: OP_KEY,
          cart_token: token,
          line_user_id: lineId,
          customer_name: row.customer_name || '',
          streamer_name: row.streamer_name || ''
        })
      });

      const j = await r.json().catch(() => ({}));

      if (!r.ok || !j.ok) {
        failed++;
        failedMsgs.push(`${title}：${j.message || j.error || ('HTTP ' + r.status)}`);
        continue;
      }

      ok++;
      row.link_sent_at = new Date().toISOString();

    } catch (e) {
      failed++;
      failedMsgs.push(`${title}：${e.message || e}`);
    }
  }

  const msg =
    `購物車卡發送完成\n成功 ${ok} 筆 / 略過 ${skipped} 筆 / 失敗 ${failed} 筆` +
    (failedMsgs.length ? `\n\n${failedMsgs.slice(0, 8).join('\n')}` : '');

  showDetailMsg(msg, failed > 0 || skipped > 0 ? 'error' : 'ok');

  try { renderCartList(); } catch(e) {}

  return { ok, skipped, failed, failedMsgs };
}

async function clearCartRow(row) {
  if (!row || !row.cart_token) return;

  if (!canEditCart(row)) {
    showDetailMsg('此購物車不是 open，不能清空。', 'error');
    return;
  }

  const token = String(row.cart_token || '').trim();
  const title = row.customer_name || token;

  if (!confirm(`確定要清空購物車「${title}」嗎？`)) return;

  try {
    const r = await fetch(`${API}/cart/clear`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        op_key: OP_KEY,
        cart_token: token
      })
    });

    const j = await r.json().catch(() => ({}));

    if (!r.ok || !j.ok) {
      throw new Error(j.message || j.error || ('HTTP ' + r.status));
    }

    alert('已清空購物車');
    await loadOpenCartList();

  } catch (e) {
    console.error(e);
    alert('清空購物車失敗：' + (e.message || e));
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  setupCartOpenPageChrome();
  await loadOpenCartList();
});
</script>
