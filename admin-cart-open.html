<script>
const API = (window.API_BASE || 'https://api.murain.tw').replace(/\/$/,'');
const STORAGE_KEY = 'MURAIN_ADMIN_OP_KEY';

let OP_KEY = localStorage.getItem(STORAGE_KEY) || '';
let currentCartRows = [];
let currentCartRecord = null;

const $  = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

function fmtAdminDateTime(v) {
  if (!v) return '';
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return '';
  return d.toLocaleString('zh-TW', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    hour12: false
  });
}

function displayCartStatus(st) {
  const s = String(st || '').trim().toLowerCase();

  if (s === 'open') return '未結單';
  if (s === 'pending') return '未完成';
  if (s === 'sent') return '已發購物車卡';
  if (s === 'checked_out') return '已結帳';
  if (s === 'completed') return '已完成';
  if (s === 'cancelled' || s === 'canceled') return '已取消';

  return st || '-';
}
function displayCartClearReason(reason) {
  const s = String(reason || '').trim();

  if (s === 'UNFINISHED_CART_36H') return '36小時未結單自動清空';
  if (s === 'UNFINISHED_CART_36H_NO_LINE') return '36小時未結單自動清空（無 LINE ID）';

  // 舊資料保留顯示，避免以前的紀錄看不懂
  if (s === 'UNFINISHED_CART_72H') return '舊規則：72小時未結單自動清空';
  if (s === 'UNFINISHED_CART_72H_NO_LINE') return '舊規則：72小時未結單自動清空（無 LINE ID）';

  return s || '-';
}
 function displayCartAutoStatus(row) {
  const status = String(row?.cart_auto_last_status || "").trim();
  const reason = String(row?.cart_auto_last_reason || "").trim();
  const checkedAt = fmtAdminDateTime(row?.cart_auto_last_checked_at) || "";

  const labelMap = {
    waiting_12h: "等待 12 小時",
    waiting_36h: "等待 36 小時清空",
    no_line_waiting_36h: "無 LINE ID，等待 36 小時清空",
    remind_success: "自動提醒成功",
    remind_failed: "自動提醒失敗",
    cleared_36h: "36 小時已清空",
    cleared_36h_no_line: "36 小時已清空（無 LINE ID）",
    skip_not_open: "已非未結單",
    skip_no_base_time: "缺少時間資料",
    skip_before_rule_start: "早於規則開始時間",
    skip_no_items: "沒有商品",
    skip_active_order: "已有有效訂單",
    check_error: "排程檢查錯誤"
  };

  const label = labelMap[status] || status || "尚未檢查";
  return `${label}${checkedAt ? `｜${checkedAt}` : ""}${reason ? `\n${reason}` : ""}`;
}
function setButtonBusy(btn, busy, busyText = '處理中…') {
  if (!btn) return;

  if (busy) {
    btn.dataset.originalText = btn.textContent || '';
    btn.disabled = true;
    btn.textContent = busyText;
    btn.style.opacity = '.65';
    btn.style.pointerEvents = 'none';
  } else {
    btn.disabled = false;
    btn.textContent = btn.dataset.originalText || btn.textContent || '';
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
  }
}
function showDetailMsg(text, type = 'info') {
  const el = $('#detailMsg');

  if (!el) {
    if (text) alert(text);
    return;
  }

  el.className = type === 'error' ? 'error mt-3' : 'muted mt-3';
  el.style.whiteSpace = 'pre-wrap';
  el.style.color = type === 'ok' ? '#bbf7d0' : (type === 'error' ? '#fecaca' : '#94a3b8');
  el.textContent = text || '';
}
function setupCartOpenPageChrome() {
  document.body.classList.add('is-cart-open-page');
  document.title = '未結單購物車｜訂單後台';

  const h1 = document.querySelector('h1');
  if (h1) h1.textContent = '未結單購物車';

  document.querySelectorAll('.admin-sub-tabs [data-admin-file]').forEach(a => {
    a.classList.toggle('active', a.dataset.adminFile === 'admin-cart-open.html');
  });
}

function updateCurrentSubTabCount(count) {
  const btn = document.querySelector('.admin-sub-tabs [data-admin-file="admin-cart-open.html"]');
  if (!btn) return;

  let badge = btn.querySelector('.count-badge');

  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'count-badge';
    badge.style.display = 'none';
    btn.appendChild(badge);
  }

  const n = Number(count || 0);
  badge.textContent = String(n);
  badge.style.display = n > 0 ? 'inline-flex' : 'none';
}

async function ensureOpKey() {
  while (!OP_KEY) {
    const k = prompt('請輸入管理密碼 (OP_KEY)');

    if (!k) {
      alert('沒有密碼就無法進入後台喔');
      continue;
    }

    try {
      const r = await fetch(`${API}/op/auth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ op_key: k })
      });

      const j = await r.json().catch(() => ({}));

      if (!r.ok || !j.ok) {
        alert('密碼錯誤，請再試一次');
        continue;
      }

      OP_KEY = k;
      localStorage.setItem(STORAGE_KEY, OP_KEY);
      break;
    } catch (e) {
      console.error(e);
      alert('驗證失敗，請稍後再試');
    }
  }
}

async function loadOpenCartList() {
  currentCartRecord = null;

  const listEl = $('#orderList');
  const detailEl = $('#orderDetail');

  if (listEl) listEl.innerHTML = '<div class="muted">未結單購物車載入中…</div>';
  if (detailEl) detailEl.innerHTML = '<div class="muted">請從左邊點選一台購物車</div>';

  try {
    await ensureOpKey();

    const params = new URLSearchParams();
    params.set('op_key', OP_KEY);
   params.set('limit', '120');

    const r = await fetch(`${API}/admin/cart/pending-list?${params.toString()}`);
    const j = await r.json().catch(() => ({}));

    if (!r.ok || !j.ok) {
      throw new Error(j.error || 'cart_pending_list_failed');
    }

currentCartRows = Array.isArray(j.carts) ? j.carts : [];

currentCartRows.sort((a, b) => {
  const ta =
    Date.parse(a.created_at || '') ||
    Date.parse(a.updated_at || '') ||
    0;

  const tb =
    Date.parse(b.created_at || '') ||
    Date.parse(b.updated_at || '') ||
    0;

  return ta - tb; // 建立時間舊到新
});

updateCurrentSubTabCount(currentCartRows.length);
renderCartList();

  } catch (e) {
    console.error(e);
    currentCartRows = [];

    if (listEl) {
      listEl.innerHTML = '<div class="error">未結單購物車載入失敗：' + escapeHtml(e.message || e) + '</div>';
    }

    if (detailEl) {
      detailEl.innerHTML = '<div class="muted">請稍後再試</div>';
    }
  }
}

function renderCartList() {
  const listEl = $('#orderList');
  const detailEl = $('#orderDetail');

  if (!listEl) return;

  if (!currentCartRows.length) {
    listEl.innerHTML = '<div class="muted">目前沒有未完成結單購物車。</div>';

    if (detailEl) {
      detailEl.innerHTML = '<div class="muted">目前沒有資料</div>';
    }

    return;
  }

  listEl.innerHTML = currentCartRows.map((row, idx) => {
    const title = row.customer_name || '未命名購物車';

    return `
      <div class="order-row" data-idx="${idx}">
        <div class="ord-top">
          <div class="ord-id">🛒 ${escapeHtml(title)}</div>
        </div>

        ${row.items_text ? `<div class="ord-sub">${escapeHtml(row.items_text)}</div>` : ''}

        <div class="badges">
          <span class="badge">${escapeHtml(displayCartStatus(row.status || 'open'))}</span>
          ${row.streamer_name ? `<span class="badge blue">直播主：${escapeHtml(row.streamer_name)}</span>` : '<span class="badge red">未填直播主</span>'}
          ${row.link_sent_at ? '<span class="badge green">已發購物車卡</span>' : ''}
          ${row.link_copied_at ? '<span class="badge blue">已複製連結</span>' : ''}
          ${row.cart_remind_1_sent_at ? '<span class="badge yellow">12H提醒已發</span>' : ''}
          ${row.cart_auto_cleared_at ? '<span class="badge red">36H已清空</span>' : ''}
        </div>

        <div class="ord-sub">
          建立：${escapeHtml(fmtAdminDateTime(row.created_at) || '-')}
          ／ 更新：${escapeHtml(fmtAdminDateTime(row.updated_at) || '-')}
        </div>
      </div>
    `;
  }).join('');

  $$('#orderList .order-row').forEach(rowEl => {
    rowEl.addEventListener('click', () => {
      $$('#orderList .order-row').forEach(x => x.classList.remove('active'));
      rowEl.classList.add('active');

      const idx = Number(rowEl.getAttribute('data-idx'));
      const row = currentCartRows[idx];

      if (row) renderCartDetail(row);
    });
  });

  if (detailEl) {
    detailEl.innerHTML = '<div class="muted">請從左邊點選一台購物車</div>';
  }
}

  dEl.innerHTML = '<div class="muted">購物車明細載入中…</div>';

  try {
    const token = String(row.cart_token || '').trim();

    if (token) {
      const params = new URLSearchParams();
params.set('op_key', OP_KEY);
params.set('cart_token', token);

const r = await fetch(`${API}/admin/cart/items?${params.toString()}`);
const j = await r.json().catch(() => ({}));

if (r.ok && j.ok && Array.isArray(j.items)) {
  itemText = j.items.map(it => {

}

      <div>
        <label>狀態</label>

      </div>
    </div>

    <div class="row mt-2">
      <div>
        <label>已發購物車卡時間</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.link_sent_at) || '-')}</div>
      </div>
      <div>
        <label>最後複製連結時間</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.link_copied_at) || '-')}</div>
      </div>
    </div>

    <div class="row mt-2">
      <div>
        <label>12 小時提醒時間</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.cart_remind_1_sent_at) || '-')}</div>
      </div>
      <div>

          row.cart_remind_1_sent_at
            ? '✅ 已成功發送'

    <div class="mt-2">

        ${escapeHtml(displayCartAutoStatus(row))}
      </div>
    </div>
    <div class="row mt-2">
      <div>
        <label>建立時間</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.created_at) || '-')}</div>
      </div>
      <div>
        <label>最後更新</label>
        <div class="ro-field">${escapeHtml(fmtAdminDateTime(row.updated_at) || '-')}</div>

    <label class="mt-2">商品明細</label>

    const btn = e.currentTarget;

async function remindCartRows(rows) {
  const targets = (rows || []).filter(x => x && x.cart_token);

  if (!targets.length) {
    showDetailMsg('目前沒有可提醒的購物車', 'error');
    return { ok: 0, skipped: 0, failed: 0 };
  }

  let ok = 0;
  let skipped = 0;
  let failed = 0;
  const failedMsgs = [];

  for (const row of targets) {
    const token = String(row.cart_token || '').trim();
    const lineId = String(row.line_user_id || '').trim();
    const title = row.customer_name || token;

    if (!token) continue;

    if (!lineId) {
      skipped++;
      failedMsgs.push(`${title}：沒有 LINE 綁定`);
      continue;
    }

    try {
      const r = await fetch(`${API}/op/cart/send-link`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          op_key: OP_KEY,
          cart_token: token,
          line_user_id: lineId,
          customer_name: row.customer_name || '',
          streamer_name: row.streamer_name || ''
        })
      });

      const j = await r.json().catch(() => ({}));

      if (!r.ok || !j.ok) {
        failed++;
        failedMsgs.push(`${title}：${j.message || j.error || ('HTTP ' + r.status)}`);
        continue;
      }

      ok++;
      row.link_sent_at = new Date().toISOString();

    } catch (e) {
      failed++;
      failedMsgs.push(`${title}：${e.message || e}`);
    }
  }

  const msg =
    `購物車卡發送完成\n成功 ${ok} 筆 / 略過 ${skipped} 筆 / 失敗 ${failed} 筆` +
    (failedMsgs.length ? `\n\n${failedMsgs.slice(0, 8).join('\n')}` : '');

  showDetailMsg(msg, failed > 0 || skipped > 0 ? 'error' : 'ok');

  return { ok, skipped, failed, failedMsgs };
}

async function clearCartRow(row) {
  if (!row || !row.cart_token) return;

  const token = String(row.cart_token || '').trim();
  const title = row.customer_name || token;

  if (!confirm(`確定要清空購物車「${title}」嗎？`)) return;

  try {
    const r = await fetch(`${API}/cart/clear`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        op_key: OP_KEY,
        cart_token: token
      })
    });

    const j = await r.json().catch(() => ({}));

    if (!r.ok || !j.ok) {
      throw new Error(j.error || ('HTTP ' + r.status));
    }

    alert('已清空購物車');
    await loadOpenCartList();

  } catch (e) {
    console.error(e);
    alert('清空購物車失敗：' + (e.message || e));
  }
}

document.addEventListener('DOMContentLoaded', async () => {
  setupCartOpenPageChrome();
  await loadOpenCartList();
});
