<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>中租請款｜訂單後台</title>

<style>
  *{
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Roboto,sans-serif;
  }

  body{
    margin:0;
    background:#020617;
    color:#e2e8f0;
  }

  .wrap{
    max-width:1200px;
    margin:0 auto;
    padding:16px;
  }

  h1{
    margin:0 0 12px;
    font-size:24px;
  }

  .page-tabs{
    margin:0 0 18px;
  }

  .page-tabs-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:12px 14px;
    border-radius:18px;
    background:#020617;
    border:1px solid rgba(148,163,184,.28);
    box-shadow:0 10px 30px rgba(15,23,42,.12);
  }

  .page-tab,
  .filter-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:40px;
    padding:0 16px;
    border-radius:999px;
    text-decoration:none;
    font-size:14px;
    font-weight:800;
    background:rgba(15,23,42,.92);
    color:#e2e8f0;
    border:1px solid rgba(148,163,184,.55);
    transition:.18s ease;
  }

  .page-tab{
    min-height:44px;
    padding:0 18px;
  }

  .page-tab:hover,
  .filter-btn:hover{
    transform:translateY(-1px);
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.18);
  }

  .page-tab.is-active,
  .filter-btn.active{
    background:#22d3ee;
    color:#0f172a;
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.32);
  }

  .admin-sub-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:18px;
  }

  .empty-card{
    border:1px solid rgba(148,163,184,.3);
    background:rgba(15,23,42,.95);
    border-radius:18px;
    padding:28px;
    min-height:180px;
  }

  .empty-title{
    font-size:18px;
    font-weight:900;
    margin-bottom:8px;
  }

  .empty-text{
    color:#94a3b8;
    font-size:14px;
  }

  @media (max-width:900px){
    .wrap{
      padding:12px;
    }

    .page-tabs-bar{
      gap:8px;
      padding:10px;
    }

    .page-tab,
    .filter-btn{
      min-height:38px;
      padding:0 13px;
      font-size:13px;
    }
  }
</style>
</head>

<body>
<div class="wrap">
  <h1>訂單後台</h1>

  <div class="page-tabs">
    <div class="page-tabs-bar">
      <a class="page-tab" href="op.html">直播主開單</a>
      <a class="page-tab is-active" href="admin.html">訂單後台</a>
      <a class="page-tab" href="stock-in.html">入庫</a>
      <a class="page-tab" href="op/preorder-order.html">預購</a>
      <a class="page-tab" href="/shop-product-admin">上架官網</a>
      <a class="page-tab" href="stock.html">庫存</a>
      <a class="page-tab" href="/procurement-center/procurement-index.html">進貨</a>
      <a class="page-tab" href="/company-files/company-index.html">公司檔案管理</a>
      <a class="page-tab" href="/admin-streamer-performance.html" target="_blank" rel="noopener noreferrer">直播主業績</a>
    </div>
  </div>

  <div class="admin-sub-tabs">
    <a class="filter-btn" href="admin-all.html">全部訂單</a>
    <a class="filter-btn" href="admin-cart-open.html">🛒 未結單購物車</a>
    <a class="filter-btn" href="admin-ship.html">⭐待出貨訂單</a>
    <a class="filter-btn" href="admin-bank.html">匯款待確認</a>
    <a class="filter-btn" href="admin-pickup.html">賣貨便登記</a>
    <a class="filter-btn" href="admin-deposit.html">已收定金未出貨</a>
    <a class="filter-btn" href="admin-cashinst.html">現金分期未收齊</a>
    <a class="filter-btn" href="admin-cancelled.html">已取消／棄標</a>
    <a class="filter-btn" href="admin-consign.html">寄賣</a>
    <a class="filter-btn" href="admin-trade.html">一時貿易</a>
    <a class="filter-btn" href="admin-benefit-review.html">💰 審核購物金</a>
    <a class="filter-btn" href="admin-credit-error.html">⚠️ 購物金異常</a>
    <a class="filter-btn active" href="admin-chailease.html">中租請款</a>
  </div>

  <div class="empty-card">
    <div class="empty-title">中租請款</div>
    <div class="empty-text">暫無內容</div>
  </div>
</div>
</body>
</html>
