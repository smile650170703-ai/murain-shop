<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>XUYUAN｜預購後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <script src="/config.js?v=20260627-auth-fix"></script>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Roboto}
  body{margin:0;background:#020617;color:#e2e8f0}
  .wrap{max-width:1200px;margin:0 auto;padding:16px}

  .hidden{display:none !important;}

  /* ===== 共用後台主頁籤 ===== */
  .page-tabs{
    max-width:1200px;
    margin:0 auto 18px;
    padding:0 16px;
  }

  .page-tabs-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:12px 14px;
    border-radius:18px;
    background:#020617;
    border:1px solid rgba(148,163,184,.28);
    box-shadow:0 10px 30px rgba(15,23,42,.12);
  }

  .page-tab{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:44px;
    padding:0 18px;
    border-radius:999px;
    text-decoration:none;
    font-size:14px;
    font-weight:800;
    letter-spacing:.01em;
    background:rgba(15,23,42,.92);
    color:#e2e8f0;
    border:1px solid rgba(148,163,184,.55);
    transition:.18s ease;
    white-space:nowrap;
  }

  .page-tab:hover{
    transform:translateY(-1px);
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.18);
  }

  .page-tab.is-active{
    background:#22d3ee;
    color:#0f172a;
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.32);
  }

  /* ===== 訂單後台第二排按鈕 ===== */
  .filter-group.admin-sub-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin:10px 0 0;
  }

  .filter-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    min-height:36px;
    padding:7px 12px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.7);
    background:rgba(15,23,42,.9);
    color:#e5e7eb;
    text-decoration:none;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    white-space:nowrap;
  }

  .filter-btn.active,
  .filter-btn:hover{
    background:#22d3ee;
    color:#0f172a;
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.35);
  }

  .btn-badge-wrap{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }

  .count-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:18px;
    height:18px;
    padding:0 6px;
    border-radius:999px;
    background:#ef4444;
    color:#fff;
    font-size:11px;
    line-height:1;
    font-weight:700;
  }

  .card{
    background:rgba(15,23,42,.95);
    border-radius:16px;
    border:1px solid rgba(148,163,184,.3);
    padding:10px;
    min-height:120px;
    margin-bottom:12px;
  }

  .row{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:8px;
    align-items:end;
  }

  .col-2{grid-column:span 2}
  .col-3{grid-column:span 3}
  .col-4{grid-column:span 4}
  .col-5{grid-column:span 5}
  .col-6{grid-column:span 6}
  .col-7{grid-column:span 7}
  .col-8{grid-column:span 8}
  .col-12{grid-column:span 12}

  label{
    display:block;
    font-size:12px;
    margin:6px 0 3px;
    color:#cbd5f5;
  }

  input,
  select,
  textarea{
    width:100%;
    min-height:40px;
    padding:8px 9px;
    border-radius:10px;
    border:1px solid rgba(148,163,184,.6);
    background:#020617;
    color:#e2e8f0;
    font-size:13px;
    outline:none;
  }

  textarea{
    min-height:70px;
    resize:vertical;
    line-height:1.45;
  }

  input:focus,
  select:focus,
  textarea:focus{
    outline:2px solid #38bdf8;
    outline-offset:1px;
    border-color:#38bdf8;
  }

  button{
    min-height:40px;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.7);
    background:#22d3ee;
    color:#0f172a;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
  }

  button.ghost{
    background:transparent;
    color:#e5e7eb;
    border:1px solid rgba(148,163,184,.7);
  }

  button.warn{
    background:rgba(234,179,8,.15);
    color:#facc15;
    border:1px solid rgba(234,179,8,.55);
  }

  button.danger{
    background:rgba(220,38,38,.2);
    color:#fecaca;
    border:1px solid rgba(249,115,115,.65);
  }

  button.ok{
    background:rgba(22,163,74,.2);
    color:#bbf7d0;
    border:1px solid rgba(34,197,94,.55);
  }

  button:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  .status-line{
    display:block;
    width:100%;
    margin-top:10px;
    margin-bottom:4px;
    color:#93c5fd;
    font-size:12px;
    font-weight:400;
    min-height:18px;
    line-height:1.5;
  }

  .status-line.ok{
    color:#bbf7d0;
    font-weight:700;
  }

  .status-line.err{
    color:#fecaca;
    font-weight:700;
  }

  .grid{
    display:grid;
    grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);
    gap:12px;
    align-items:start;
  }

  .list{
    max-height:calc(100vh - 260px);
    overflow:auto;
  }

  .item{
    padding:8px 10px;
    border-radius:12px;
    cursor:pointer;
    border:1px solid transparent;
    margin-bottom:6px;
    background:rgba(15,23,42,.95);
  }

  .item:hover{
    border-color:rgba(148,163,184,.8);
    background:rgba(15,23,42,1);
  }

  .item.active{
    border-color:#22d3ee;
    background:rgba(15,23,42,1);
    box-shadow:0 8px 20px rgba(34,211,238,.25);
  }

  .item-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    font-size:13px;
  }

  .po{
    color:#e5e7eb;
    font-weight:700;
    word-break:break-all;
  }

  .date{
    color:#94a3b8;
    font-size:12px;
    margin-top:3px;
  }

  .meta{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:4px 8px;
    margin-top:6px;
    font-size:12px;
    color:#94a3b8;
    line-height:1.45;
  }

  .meta b{
    color:#e2e8f0;
    font-weight:700;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:24px;
    padding:2px 7px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.7);
    background:rgba(15,23,42,1);
    color:#cbd5f5;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
  }

  .badge.ok{
    border-color:#22c55e;
    color:#bbf7d0;
    background:rgba(22,163,74,.2);
  }

  .badge.bad{
    border-color:#f97373;
    color:#fecaca;
    background:rgba(220,38,38,.2);
  }

  .badge.wait{
    border-color:#eab308;
    color:#facc15;
    background:rgba(234,179,8,.15);
  }

  .empty{
    padding:32px 12px;
    text-align:center;
    color:#94a3b8;
    border:1px dashed rgba(148,163,184,.38);
    border-radius:14px;
    background:rgba(2,6,23,.45);
    font-size:13px;
  }

  .detail-title{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
  }

  .detail-title h2{
    margin:0;
    color:#e5e7eb;
    font-size:18px;
    line-height:1.3;
    word-break:break-all;
  }

  .detail-sub{
    color:#94a3b8;
    font-size:12px;
    margin-top:4px;
    line-height:1.5;
  }

  .quick-actions{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }

  .quick-actions button{
    flex:1 1 130px;
  }

  .kv{
    display:grid;
    grid-template-columns:120px minmax(0,1fr);
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid rgba(148,163,184,.18);
    font-size:13px;
    line-height:1.5;
  }

  .kv .k{
    color:#94a3b8;
    font-weight:700;
  }

  .kv .v{
    color:#e2e8f0;
    word-break:break-word;
  }

  .small-note{
    margin-top:10px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(255,255,255,.025);
    border:1px solid rgba(148,163,184,.24);
    color:#94a3b8;
    font-size:12px;
    line-height:1.6;
  }

  .footer-actions{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .footer-actions button{
    margin-top:0;
  }

  hr{
    border-color:rgba(148,163,184,.24) !important;
  }

  @media (max-width:900px){
    .page-tabs{
      padding:0 10px;
    }

    .page-tabs-bar{
      gap:8px;
      padding:10px;
    }

    .page-tab{
      min-height:40px;
      padding:0 14px;
      font-size:13px;
    }

    .grid{
      grid-template-columns:1fr;
    }

    .list{
      max-height:none;
    }

    .row{
      grid-template-columns:1fr;
    }

    .col-2,
    .col-3,
    .col-4,
    .col-5,
    .col-6,
    .col-7,
    .col-8,
    .col-12{
      grid-column:span 1;
    }

    .meta{
      grid-template-columns:1fr;
    }
  }

  /* ===== 預購後台：精簡搜尋區 ===== */
.search-card{
  min-height:0 !important;
  padding:8px 10px !important;
  margin-bottom:10px !important;
}

.search-card .row{
  gap:6px !important;
}

.search-card label{
  margin:0 0 2px !important;
  font-size:11px !important;
}

.search-card input,
.search-card select,
.search-card button{
  min-height:34px !important;
  padding:6px 9px !important;
  font-size:12px !important;
  border-radius:10px !important;
}

.search-card .status-line{
  margin-top:5px !important;
  margin-bottom:0 !important;
  min-height:14px !important;
  font-size:11px !important;
}

.item-actions{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:8px;
}

.item-actions button{
  min-height:28px;
  padding:4px 9px;
  font-size:11px;
  border-radius:999px;
}

.status-boxes{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin:10px 0;
}

.status-box{
  border:1px solid rgba(148,163,184,.28);
  background:rgba(2,6,23,.45);
  border-radius:12px;
  padding:8px 10px;
}

.status-box small{
  display:block;
  color:#94a3b8;
  font-size:11px;
  margin-bottom:4px;
}

.status-box b{
  color:#e2e8f0;
  font-size:13px;
}

@media (max-width:900px){
  .status-boxes{
    grid-template-columns:1fr;
  }
}
  /* ===== 預購後台：兩個小分類 + 清單狀態化 ===== */
.preorder-mode-tabs{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:0 0 10px;
}

.preorder-mode-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  min-height:34px;
  padding:6px 14px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.65);
  background:rgba(15,23,42,.92);
  color:#e5e7eb;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}

.preorder-mode-btn.active{
  background:#22d3ee;
  color:#0f172a;
  border-color:#22d3ee;
  box-shadow:0 8px 18px rgba(34,211,238,.28);
}

.preorder-mode-count{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:20px;
  height:20px;
  padding:0 6px;
  border-radius:999px;
  background:rgba(255,255,255,.14);
  color:inherit;
  font-size:11px;
  font-weight:900;
}

.item-statuses{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:8px;
}

.item-statuses .badge{
  min-height:22px;
  font-size:10.5px;
  padding:2px 7px;
}

.item .meta{
  margin-top:7px;
}

.item .meta div{
  min-width:0;
}

.item .meta b{
  word-break:break-word;
}

.quick-actions{
  padding:8px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,.22);
  background:rgba(2,6,23,.32);
}

.quick-actions:empty{
  display:none;
}
  /* ===== 預購後台：正式精簡操作版 ===== */
.preorder-mini-toolbar{
  min-height:0 !important;
  padding:8px 10px !important;
}

.preorder-toolbar-row{
  display:flex;
  align-items:center;
  gap:10px;
}

.preorder-toolbar-row #btnLoad{
  min-width:150px;
}

.preorder-toolbar-row .status-line{
  margin:0 !important;
  min-height:auto !important;
}

.item-statuses{
  display:none !important;
}

.status-boxes{
  display:none !important;
}

.quick-actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:10px 0 12px;
  padding:8px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,.22);
  background:rgba(2,6,23,.32);
}

.quick-actions button{
  flex:1 1 150px;
}

.arrival-workbox{
  margin-top:12px;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,.24);
  background:rgba(2,6,23,.34);
}

.arrival-workbox .row{
  align-items:end;
}

.arrival-summary{
  margin-top:8px;
  padding:9px 10px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.2);
  background:rgba(15,23,42,.65);
  color:#cbd5e1;
  font-size:12px;
  line-height:1.6;
}

.arrival-summary b{
  color:#e2e8f0;
}

.kv.deposit-row{
  border-color:rgba(34,197,94,.22);
}

@media (max-width:900px){
  .preorder-toolbar-row{
    align-items:stretch;
    flex-direction:column;
  }

  .preorder-toolbar-row #btnLoad{
    width:100%;
  }
}
  /* ===== 預購後台：到貨批次操作 ===== */
.batch-arrival-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin:0 0 10px;
  padding:8px 10px;
  border-radius:14px;
  border:1px solid rgba(148,163,184,.28);
  background:rgba(15,23,42,.88);
}

.batch-arrival-left{
  display:flex;
  align-items:center;
  gap:10px;
  color:#cbd5e1;
  font-size:12px;
  font-weight:800;
}

.batch-arrival-bar button{
  min-height:34px;
  padding:6px 14px;
  font-size:12px;
}

.select-mini{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin:0;
  color:#cbd5e1;
  font-size:12px;
  font-weight:800;
  cursor:pointer;
}

.select-mini input{
  width:auto;
  min-height:auto;
  margin:0;
}

.item-select-line{
  display:flex;
  align-items:center;
  gap:6px;
  margin-right:6px;
}

@media (max-width:900px){
  .batch-arrival-bar{
    align-items:stretch;
    flex-direction:column;
  }

  .batch-arrival-left{
    justify-content:space-between;
  }
}

  /* ===== 預購後台：LINE 搜尋 / 按鈕大小 / 定金提示 ===== */
.preorder-top-tools{
  display:flex;
  justify-content:flex-end;
  align-items:flex-end;
  gap:10px;
  margin:0 0 10px;
}

.preorder-line-search{
  width:240px;
}

.preorder-line-search label{
  margin:0 0 4px;
  font-size:12px;
  color:#cbd5f5;
}

.preorder-line-search-row{
  display:flex;
  gap:6px;
}

.preorder-line-search-row input{
  min-height:34px;
  font-size:12px;
  border-radius:10px;
}

.preorder-line-search-row button{
  min-height:34px;
  padding:5px 10px;
  font-size:12px;
  white-space:nowrap;
}

.preorder-mode-btn{
  min-height:36px !important;
  padding:7px 12px !important;
  font-size:13px !important;
  font-weight:800 !important;
}

.preorder-mode-count{
  height:18px !important;
  min-width:18px !important;
  font-size:11px !important;
}

.deposit-mini-red{
  display:inline-flex;
  margin-left:8px;
  color:#fecaca;
  font-size:12px;
  font-weight:900;
  white-space:nowrap;
}

#arrivalBatchBar:empty{
  display:none !important;
}

@media (max-width:900px){
  .preorder-top-tools{
    justify-content:stretch;
  }

  .preorder-line-search{
    width:100%;
  }
}
</style>
</head>

  <div class="wrap">

    <section class="card" id="loginCard">
      <h2 style="margin:0 0 10px;font-size:20px;">後台登入</h2>
      <div class="row">
        <div class="col-8">
          <label for="opKeyInput">統一密碼 / 主管密碼</label>
          <input id="opKeyInput" type="password" placeholder="輸入統一密碼或主管密碼">
        </div>
        <div class="col-4">
          <button id="btnLogin" type="button">登入</button>
        </div>
      </div>
      <div class="status-line" id="loginMsg"></div>
    </section>

<section id="app" class="hidden">
<div class="hidden" aria-hidden="true">
  <input id="dateFrom" type="hidden" value="">
  <input id="dateTo" type="hidden" value="">

  <select id="statusFilter">
    <option value="">全部狀態</option>
    <option>等待到貨</option>
    <option>已到貨待通知</option>
    <option>已通知</option>
    <option>已取消</option>
    <option>已完成</option>
  </select>

  <button id="btnLoad" type="button">重新載入預購清單</button>
  <button id="btnClearDate" type="button">清除日期</button>
  <div class="status-line" id="listMsg"></div>
</div>

<div class="preorder-top-tools">
  <div class="preorder-line-search">
    <label for="keywordInput">LINE 名稱搜尋</label>
    <div class="preorder-line-search-row">
      <input id="keywordInput" placeholder="輸入 LINE 名稱">
      <button id="btnSearch" type="button">搜尋</button>
      <button class="ghost" id="btnClear" type="button">清除</button>
    </div>
  </div>
</div>

      <section class="preorder-mode-tabs" id="preorderModeTabs">
        <button class="preorder-mode-btn active" type="button" data-mode="deposit_pending">
          預購待付款定金
          <span class="preorder-mode-count" id="cntDepositPending">0</span>
        </button>

        <button class="preorder-mode-btn" type="button" data-mode="ready">
          已確認定金 / 免定金
          <span class="preorder-mode-count" id="cntReady">0</span>
        </button>

        <button class="preorder-mode-btn" type="button" data-mode="arrived">
          已到貨待發結帳卡
          <span class="preorder-mode-count" id="cntArrived">0</span>
        </button>

        <button class="preorder-mode-btn" type="button" data-mode="sent">
          已發結帳卡
          <span class="preorder-mode-count" id="cntSent">0</span>
        </button>

        <button class="preorder-mode-btn" type="button" data-mode="completed">
          完成
          <span class="preorder-mode-count" id="cntCompleted">0</span>
        </button>
      </section>

      <div class="hidden" id="arrivalBatchBar" aria-hidden="true"></div>

      <div class="grid">
        <section class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;">
            <b>預購清單</b>
            <span class="badge" id="countBadge">0 筆</span>
          </div>
          <div class="list" id="preorderList"></div>
        </section>

        <section class="card" id="detailCard">
          <div class="empty">請先從左側選擇一筆預購登記</div>
        </section>
      </div>
    </section>
  </div>

<script>
(function(){
  const API = String(window.API_BASE || "https://api.murain.tw").replace(/\/+$/,"");
  const KEY_STORAGE = "MURAIN_ADMIN_OP_KEY";

  const $ = (id) => document.getElementById(id);

  function getSharedAdminKey(){
    try {
      if (window.MURAIN_AUTH && typeof window.MURAIN_AUTH.getKey === "function") {
        const k = window.MURAIN_AUTH.getKey("admin");
        if (k) return String(k || "").trim();
      }
    } catch(e) {}

    try {
      const auth = window.MURAIN_AUTH && typeof window.MURAIN_AUTH.get === "function"
        ? window.MURAIN_AUTH.get()
        : null;

      if (auth && auth.key && String(auth.role || "").toLowerCase() === "admin") {
        return String(auth.key || "").trim();
      }
    } catch(e) {}

    try {
      const raw = localStorage.getItem("MURAIN_BACKOFFICE_AUTH_V1") || "";
      const auth = raw ? JSON.parse(raw) : null;

      if (auth && auth.key && String(auth.role || "").toLowerCase() === "admin") {
        return String(auth.key || "").trim();
      }
    } catch(e) {}

    try {
      return String(
        localStorage.getItem(KEY_STORAGE) ||
        localStorage.getItem("MURAIN_ADMIN_OP_KEY") ||
        localStorage.getItem("stock_op") ||
        ""
      ).trim();
    } catch(e) {
      return "";
    }
  }

  const loginCard = $("loginCard");
  const app = $("app");
  const opKeyInput = $("opKeyInput");
  const loginMsg = $("loginMsg");
  const btnLogin = $("btnLogin");
  const btnLogout = $("btnLogout");

const dateFrom = $("dateFrom");
const dateTo = $("dateTo");
const statusFilter = $("statusFilter");
const keywordInput = $("keywordInput");
const btnLoad = $("btnLoad");
const btnSearch = $("btnSearch");
const btnClearDate = $("btnClearDate");
const btnClear = $("btnClear");
const listMsg = $("listMsg");
const preorderList = $("preorderList");
const detailCard = $("detailCard");
const countBadge = $("countBadge");
const preorderModeTabs = $("preorderModeTabs");
const cntDepositPending = $("cntDepositPending");
const cntReady = $("cntReady");
const cntArrived = $("cntArrived");
const cntSent = $("cntSent");
const cntCompleted = $("cntCompleted");

const arrivalBatchBar = $("arrivalBatchBar");
const chkSelectAllArrived = $("chkSelectAllArrived");
const selectedArrivalCount = $("selectedArrivalCount");
const btnBatchSendArrival = $("btnBatchSendArrival");

let OP = "";
let items = [];
let selected = null;
let currentMode = "deposit_pending";
let selectedArrivalIds = new Set();

  function saveKey(v){
    OP = String(v || "").trim();
    if (OP) {
      localStorage.setItem(KEY_STORAGE, OP);
      localStorage.setItem("MURAIN_ADMIN_OP_KEY", OP);
    }
  }

  function loadKey(){
    OP = getSharedAdminKey();
    if (OP) opKeyInput.value = OP;
  }

  function money(n){
    const v = Math.round(Number(n || 0) || 0);
    return "NT$ " + v.toLocaleString("zh-TW");
  }

    function amountFromSpecText(text){
    const s = String(text || "");
    const m = s.match(/NT\$?\s*([\d,]+)/i);
    if (!m) return 0;

    const n = Number(String(m[1] || "").replace(/,/g, ""));
    return Number.isFinite(n) ? Math.round(n) : 0;
  }

  function preorderTotalAmount(it){
    return Math.round(
      Number(it?.arrived_price || 0) ||
      amountFromSpecText(it?.product_spec || "") ||
      0
    );
  }

    function preorderQtyText(it){
    const qty = Number(it?.qty || 0) || 1;
    return String(qty) + " 組";
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function ymd(v){
    if (!v) return "";
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v || "");
    return d.getFullYear() + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + String(d.getDate()).padStart(2,"0");
  }

  function badgeClass(status){
    const s = String(status || "");
    if (s.includes("完成") || s.includes("已通知")) return "ok";
    if (s.includes("取消")) return "bad";
    return "wait";
  }

    function needDeposit(it){
    return Number(it && it.deposit_amount || 0) > 0;
  }

  function isDepositConfirmed(it){
    return String(it && it.payment_status || "") === "已確認定金" || !needDeposit(it);
  }

  function isFinalPo(it){
    const s = String(it && it.preorder_status || "");
    return s === "已取消" || s === "已完成";
  }

  function hasCheckoutCart(it){
    return !!String(it && (
      it.checkout_cart_token ||
      it.cart_token ||
      it["結帳購物車Token"] ||
      ""
    )).trim();
  }

  function isCompletedPo(it){
    const oid = String(it && it.official_order_id || "").trim();

    // 完成 = 客人已經從預購到貨購物車送出正式訂單
    return !!oid;
  }

  function isSentCheckout(it){
    const s = String(it && it.preorder_status || "");
    const arrival = String(it && it.arrival_notify_status || "");

    return (
      s === "已通知" ||
      arrival === "已發送到貨結帳通知" ||
      hasCheckoutCart(it)
    );
  }

  function isArrivedWaitingSend(it){
    const s = String(it && it.preorder_status || "");
    const arrival = String(it && it.arrival_notify_status || "");

    if (isCompletedPo(it)) return false;
    if (isSentCheckout(it)) return false;

    return (
      s === "已到貨待通知" ||
      arrival === "已到貨待通知" ||
      it?.arrived_can_checkout === true ||
      !!String(it?.arrived_product_record_id || "").trim()
    );
  }

  function preorderModeOf(it){
    const s = String(it && it.preorder_status || "");

    if (s === "已取消") return "cancelled";
    if (isCompletedPo(it)) return "completed";
    if (isSentCheckout(it)) return "sent";

    if (needDeposit(it) && String(it.payment_status || "") !== "已確認定金") {
      return "deposit_pending";
    }

    if (isArrivedWaitingSend(it)) {
      return "arrived";
    }

    return "ready";
  }

  function visibleItems(){
    return items.filter(it => preorderModeOf(it) === currentMode);
  }

  function updateBatchToolbar(){
    selectedArrivalIds.clear();

    if (arrivalBatchBar) {
      arrivalBatchBar.classList.add("hidden");
    }
  }
  
  function refreshModeCounts(){
    const depositPending = items.filter(it => preorderModeOf(it) === "deposit_pending").length;
    const ready = items.filter(it => preorderModeOf(it) === "ready").length;
    const arrived = items.filter(it => preorderModeOf(it) === "arrived").length;
    const sent = items.filter(it => preorderModeOf(it) === "sent").length;
    const completed = items.filter(it => preorderModeOf(it) === "completed").length;

    if (cntDepositPending) cntDepositPending.textContent = String(depositPending);
    if (cntReady) cntReady.textContent = String(ready);
    if (cntArrived) cntArrived.textContent = String(arrived);
    if (cntSent) cntSent.textContent = String(sent);
    if (cntCompleted) cntCompleted.textContent = String(completed);

    if (preorderModeTabs) {
      preorderModeTabs.querySelectorAll("[data-mode]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === currentMode);
      });
    }

    updateBatchToolbar();
  }

  function actionButtonsHtml(it){
    const id = esc(it.id || "");
    const pay = String(it.payment_status || "");
    const mode = preorderModeOf(it);

    const btns = [];

    if (mode === "deposit_pending" && needDeposit(it) && pay !== "已確認定金") {
      btns.push(`<button class="ok" type="button" data-po-action="confirmDeposit" data-id="${id}">確認定金</button>`);
      btns.push(`<button class="danger" type="button" data-po-action="cancel" data-id="${id}">取消預購</button>`);
      return btns.join("");
    }

    if (mode === "arrived") {
      btns.push(`<button class="warn" type="button" data-po-action="sendArrival" data-id="${id}">通知到貨＋發結帳卡</button>`);
      btns.push(`<button class="danger" type="button" data-po-action="cancel" data-id="${id}">取消預購</button>`);
      return btns.join("");
    }

    if (mode === "sent") {
      return "";
    }

    if (mode === "ready") {
      btns.push(`<button class="danger" type="button" data-po-action="cancel" data-id="${id}">取消預購</button>`);
      return btns.join("");
    }

    return btns.join("");
  }

  async function api(path, payload){
    const r = await fetch(API + path, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      credentials:"include",
      body:JSON.stringify(payload || {})
    });

    const text = await r.text();
    let j = {};
    try { j = JSON.parse(text); } catch(e){}

    if (!r.ok || !j.ok) {
      throw new Error(j.message || j.error || text.slice(0,200) || "API 失敗");
    }

    return j;
  }

    async function autoRefreshArrivalState(){
    const candidates = items.filter(it => {
      const mode = preorderModeOf(it);
      if (mode !== "ready") return false;

      const code = String(it.product_code || "").trim();
      if (!code) return false;

      if (needDeposit(it) && String(it.payment_status || "") !== "已確認定金") {
        return false;
      }

      return true;
    });

    if (!candidates.length) return;

    let changed = 0;

    for (const it of candidates) {
      const sku = String(it.product_code || "").trim();

      try {
        const res = await api("/op/preorders/sku-info", {
          op_key: OP,
          sku
        });

        const p = res.product || {};

        const patch = {
          preorder_status: "已到貨待通知",
          payment_status: it.payment_status || "不需定金",
          arrival_notify_status: "已到貨待通知",
          internal_note: it.internal_note || "",

          arrived_sku: p.sku || sku,
          arrived_product_name: p.name || it.product_name || "",
          arrived_product_record_id: p.record_id || "",
          arrived_qty: it.arrived_qty || it.qty || 1,
          arrived_price: it.arrived_price || preorderTotalAmount(it),
          arrived_can_checkout: true,

          checkout_url: it.checkout_url || "",
          checkout_cart_token: it.checkout_cart_token || ""
        };

        await api("/op/preorders/update", {
          op_key: OP,
          record_id: it.id,
          ...patch
        });

        Object.assign(it, {
          preorder_status: patch.preorder_status,
          arrival_notify_status: patch.arrival_notify_status,
          arrived_sku: patch.arrived_sku,
          arrived_product_name: patch.arrived_product_name,
          arrived_product_record_id: patch.arrived_product_record_id,
          arrived_qty: patch.arrived_qty,
          arrived_price: patch.arrived_price,
          arrived_can_checkout: true
        });

        changed++;
      } catch(e) {
        // 尚未入庫就略過，不顯示錯誤，避免一進頁面整頁紅字
      }
    }

    if (changed && listMsg) {
      listMsg.textContent = `已自動更新 ${changed} 筆到貨資料`;
      listMsg.className = "status-line ok";
    }
  }

function showApp(){
  loginCard.classList.add("hidden");
  app.classList.remove("hidden");
  if (btnLogout) btnLogout.style.display = "";
}

function showLogin(){
  app.classList.add("hidden");
  loginCard.classList.remove("hidden");
  if (btnLogout) btnLogout.style.display = "none";
}

  async function loadList(){
    if (!OP) {
      listMsg.textContent = "請先登入";
      listMsg.className = "status-line err";
      showLogin();
      return;
    }

    listMsg.textContent = "讀取預購清單中…";
    listMsg.className = "status-line";
    preorderList.innerHTML = "";
    detailCard.innerHTML = '<div class="empty">請先從左側選擇一筆預購登記</div>';
    selected = null;

    try {
const res = await api("/op/preorders/list", {
  op_key: OP,
  date_from: dateFrom ? dateFrom.value : "",
  date_to: dateTo ? dateTo.value : "",
  status: statusFilter.value,
  q: keywordInput.value
});

      items = Array.isArray(res.items) ? res.items : [];
      await autoRefreshArrivalState();
      refreshModeCounts();
      renderList();

      listMsg.textContent = items.length ? "已載入預購清單" : "目前沒有符合條件的預購資料";
      listMsg.className = "status-line ok";
    } catch (e) {
      listMsg.textContent = "載入失敗：" + (e.message || e);
      listMsg.className = "status-line err";

      if (String(e.message || "").includes("bad_op_key") || String(e.message || "").includes("forbidden")) {
        localStorage.removeItem(KEY_STORAGE);
        OP = "";
        showLogin();
      }
    }
  }

  function renderList(){
    refreshModeCounts();

    const viewItems = visibleItems();

    countBadge.textContent = viewItems.length + " 筆";
    preorderList.innerHTML = "";

    if (!viewItems.length) {
      preorderList.innerHTML = '<div class="empty">此分類目前沒有預購資料</div>';
      return;
    }

    viewItems.forEach((it) => {
      const node = document.createElement("div");
      const selectable = false;
      const checked = selectedArrivalIds.has(String(it.id || "")) ? "checked" : "";

      node.className = "item" + (selected && selected.id === it.id ? " active" : "");
      node.innerHTML = `
        <div class="item-head">
          <div style="display:flex;align-items:flex-start;gap:8px;">
            ${selectable ? `
              <label class="item-select-line" title="勾選批次發送">
                <input type="checkbox" data-po-select data-id="${esc(it.id || "")}" ${checked}>
              </label>
            ` : ""}
            <div>
              <div class="po">
                ${esc(it.preorder_id || it.id || "—")}｜${esc(it.line_name || it.customer_name || "—")}
                ${
                  currentMode === "deposit_pending" && Number(it.deposit_amount || 0) > 0
                    ? `<span class="deposit-mini-red">應付定金 ${esc(money(it.deposit_amount || 0))}</span>`
                    : ""
                }
              </div>
              <div class="date">${esc(ymd(it.created_at) || "—")}</div>
            </div>
          </div>
          <span class="badge ${badgeClass(it.preorder_status)}">${esc(it.preorder_status || "等待到貨")}</span>
        </div>

              <div class="meta">
          <div>客人：<b>${esc(it.customer_name || "—")}</b></div>
          <div>電話：<b>${esc(it.phone || "—")}</b></div>
          <div>編號：<b>${esc(it.product_code || "—")}</b></div>
          <div>商品：<b>${esc(it.product_name || "—")}</b></div>
          <div>數量：<b>${esc(it.qty || 1)}</b></div>
        </div>
      `;

      node.addEventListener("click", (e) => {
        const chk = e.target.closest("[data-po-select]");
        if (chk) {
          const id = String(chk.dataset.id || "").trim();

          if (chk.checked) selectedArrivalIds.add(id);
          else selectedArrivalIds.delete(id);

          updateBatchToolbar();
          return;
        }

        selected = it;
        renderList();
        renderDetail(it);
      });

      preorderList.appendChild(node);
    });

    updateBatchToolbar();
  }

  function val(v){ return String(v == null ? "" : v); }

  function renderDetail(it){
    const canCheckoutChecked = it.arrived_can_checkout ? "checked" : "";

    detailCard.innerHTML = `
      <div class="detail-title">
        <div>
          <h2>${esc(it.preorder_id || it.id)}</h2>
          <div class="detail-sub">
            ${esc(it.preorder_id || it.id || "—")}｜${esc(it.line_name || it.customer_name || "—")}
            <br>
            電話：${esc(it.phone || "—")}
          </div>
        </div>
        <span class="badge ${badgeClass(it.preorder_status)}">${esc(it.preorder_status || "等待到貨")}</span>
      </div>

           <div class="quick-actions">
        ${actionButtonsHtml(it)}
      </div>

      <div class="kv"><div class="k">預購商品編號</div><div class="v">${esc(it.product_code || "—")}</div></div>
      <div class="kv"><div class="k">商品</div><div class="v">${esc(it.product_name || "—")}</div></div>
      <div class="kv"><div class="k">預購明細</div><div class="v">${esc(it.product_spec || "—")}</div></div>

      ${Number(it.deposit_amount || 0) > 0 ? `
        <div class="kv deposit-row">
          <div class="k">${String(it.payment_status || "") === "已確認定金" ? "已確認定金" : "應付定金金額"}</div>
          <div class="v">${esc(money(it.deposit_amount || 0))}</div>
        </div>
      ` : ""}

      <hr style="border:0;border-top:1px solid rgba(148,163,184,.18);margin:14px 0;">

      <input type="hidden" id="fPreStatus" value="${esc(it.preorder_status || "等待到貨")}">
      <input type="hidden" id="fPayStatus" value="${esc(it.payment_status || "不需定金")}">
      <input type="hidden" id="fArrivalStatus" value="${esc(it.arrival_notify_status || "未到貨")}">
      <input type="hidden" id="fCanCheckout" value="${it.arrived_can_checkout ? "1" : "0"}">

      <input id="fArrivedName" type="hidden" value="${esc(val(it.arrived_product_name || it.product_name))}">
      <input id="fArrivedRecordId" type="hidden" value="${esc(val(it.arrived_product_record_id))}">
      <input id="fArrivedQty" type="hidden" value="${esc(val(it.arrived_qty || it.qty || 1))}">
      <input id="fArrivedPrice" type="hidden" value="${esc(val(preorderTotalAmount(it)))}">
      <input id="fCheckoutUrl" type="hidden" value="${esc(val(it.checkout_url))}">
      <input id="fCartToken" type="hidden" value="${esc(val(it.checkout_cart_token))}">
      <input id="fInternalNote" type="hidden" value="${esc(val(it.internal_note))}">

      <input id="fSku" type="hidden" value="${esc(val(it.arrived_sku || it.product_code))}">

      ${
        preorderModeOf(it) !== "deposit_pending"
          ? `
            <div class="arrival-workbox">
              <div class="arrival-summary" id="arrivedSkuSummary">
                正在檢查是否已到貨…
              </div>
            </div>
          `
          : ""
      }

      <div class="status-line" id="detailMsg"></div>
    `;

    if (preorderModeOf(it) !== "deposit_pending") {
      lookupSkuInfo();
    } else {
      detailMsg("", "");
    }
  }

  function optionHtml(list, current){
    return list.map(x => `<option value="${esc(x)}" ${x === current ? "selected" : ""}>${esc(x)}</option>`).join("");
  }

  function detailMsg(text, cls){
    const el = $("detailMsg");
    if (!el) return;
    el.textContent = text || "";
    el.className = "status-line" + (cls ? " " + cls : "");
  }

    function selectedById(id){
    return items.find(x => String(x.id || "") === String(id || "")) || selected;
  }

  async function runPoAction(action, it){
    if (!it || !it.id) return;

    if (action === "confirmDeposit") {
      await quickPatch(it.id, { payment_status:"已確認定金" });
      currentMode = "ready";
      renderList();
      return;
    }

    if (action === "save") {
      selected = it;
      await saveDetail(it.id);
      return;
    }

    if (action === "sendArrival") {
      selected = it;
      await sendArrivalCheckout(it.id);
      return;
    }

    if (action === "cancel") {
      if (!confirm("確定要取消這筆預購？")) return;
      await quickPatch(it.id, { preorder_status:"已取消", payment_status:"已取消" });
      return;
    }

    if (action === "done") {
      await quickPatch(it.id, { preorder_status:"已完成" });
    }
  }

  async function lookupSkuInfo(){
    const sku = String($("fSku")?.value || "").trim();
    const summary = $("arrivedSkuSummary");

    if (!sku) {
      if (summary) {
        summary.innerHTML = "尚無預購商品編號，無法檢查到貨。";
      }
      detailMsg("尚無預購商品編號，無法檢查到貨", "err");
      return false;
    }

    try {
      if (summary) {
        summary.innerHTML = `檢查中：<b>${esc(sku)}</b>`;
      }

      detailMsg("檢查是否已入庫中…");

      const res = await api("/op/preorders/sku-info", {
        op_key: OP,
        sku
      });

      const p = res.product || {};

      if ($("fArrivedName") && p.name) $("fArrivedName").value = p.name;
      if ($("fArrivedRecordId") && p.record_id) $("fArrivedRecordId").value = p.record_id;

      if ($("fPreStatus")) $("fPreStatus").value = "已到貨待通知";
      if ($("fArrivalStatus")) $("fArrivalStatus").value = "已到貨待通知";
      if ($("fCanCheckout")) $("fCanCheckout").value = "1";

      if (summary) {
        summary.innerHTML = [
          `✅ 已到貨`,
          `SKU：<b>${esc(p.sku || sku)}</b>`,
          p.name ? `商品：<b>${esc(p.name)}</b>` : "",
          p.stock_qty !== undefined ? `庫存：<b>${esc(p.stock_qty)}</b>` : ""
        ].filter(Boolean).join("｜");
      }

      detailMsg("", "");
      return true;
    } catch(e) {
      if ($("fPreStatus")) $("fPreStatus").value = "等待到貨";
      if ($("fArrivalStatus")) $("fArrivalStatus").value = "未到貨";
      if ($("fCanCheckout")) $("fCanCheckout").value = "0";

      if (summary) {
        summary.innerHTML = `尚未到貨：正式庫存 Products 尚未找到 SKU <b>${esc(sku)}</b>`;
      }

      detailMsg("尚未到貨，請先用同編號 SKU 正式入庫", "err");
      return false;
    }
  }

  async function sendArrivalCheckout(recordId){
    if (!recordId) return;

       const sku = String($("fSku")?.value || "").trim();

    if (!sku) {
      detailMsg("尚無預購商品編號，無法發送到貨結帳卡", "err");
      return;
    }

    const arrivedOk = await lookupSkuInfo();

    if (!arrivedOk) {
      detailMsg("尚未到貨，請先用同編號 SKU 正式入庫後再發送", "err");
      return;
    }

    const it = selectedById(recordId);
    const depositAmount = Number(it?.deposit_amount || 0) || 0;
    const payStatus = String(it?.payment_status || "");

    if (depositAmount > 0 && payStatus !== "已確認定金") {
      detailMsg("此預購有定金，請先按「確認定金」後再發到貨 LINE", "err");
      return;
    }

    if (!confirm("確定要建立到貨結帳購物車，並發送 LINE 到貨結帳卡片給客人嗎？")) {
      return;
    }

    try {
      if ($("fPreStatus")) $("fPreStatus").value = "已到貨待通知";
      if ($("fArrivalStatus")) $("fArrivalStatus").value = "已到貨待通知";
      if ($("fCanCheckout")) $("fCanCheckout").value = "1";

      detailMsg("建立購物車並發送 LINE 中…");

      const res = await api("/op/preorders/send-arrival-checkout", {
        op_key: OP,
        record_id: recordId,

        arrived_sku: $("fSku")?.value || "",
        arrived_product_name: $("fArrivedName")?.value || "",
        arrived_product_record_id: $("fArrivedRecordId")?.value || "",
        arrived_qty: $("fArrivedQty")?.value || "",
        arrived_price: $("fArrivedPrice")?.value || ""
      });

      detailMsg("已通知到貨，並已發送預購到貨結帳卡。", "ok");
      await loadList();
    } catch(e) {
      detailMsg("發送失敗：" + (e.message || e), "err");
    }
  }

  async function autoSendArrivedModeItems(){
    if (currentMode !== "arrived") return;

    const targets = visibleItems().filter(it => {
      if (!it || !it.id) return false;

      const hasToken = String(
        it.checkout_cart_token ||
        it.cart_token ||
        it["結帳購物車Token"] ||
        ""
      ).trim();

      if (hasToken) return false;

      return preorderModeOf(it) === "arrived";
    });

    if (!targets.length) return;

    if (!confirm(`目前有 ${targets.length} 筆已到貨預購單，是否依序發送到貨結帳卡？\n\n已發送過的訂單不會重複發送。`)) {
      return;
    }

    let okCount = 0;
    let failCount = 0;

    for (const it of targets) {
      try {
        const sku = String(it.arrived_sku || it.product_code || "").trim();

        if (!sku) {
          failCount++;
          continue;
        }

        await api("/op/preorders/send-arrival-checkout", {
          op_key: OP,
          record_id: it.id,

          arrived_sku: sku,
          arrived_product_name: it.arrived_product_name || it.product_name || "",
          arrived_product_record_id: it.arrived_product_record_id || "",
          arrived_qty: it.arrived_qty || it.qty || 1,
          arrived_price: it.arrived_price || preorderTotalAmount(it)
        });

        okCount++;
      } catch(e) {
        failCount++;
        console.log("autoSendArrivedModeItems failed", it?.preorder_id || it?.id, e?.message || e);
      }
    }

    selectedArrivalIds.clear();
    selected = null;
    detailCard.innerHTML = '<div class="empty">請先從左側選擇一筆預購登記</div>';

    await loadList();

    alert(`到貨結帳卡發送完成\n成功：${okCount} 筆\n失敗：${failCount} 筆`);
  }

  async function quickPatch(recordId, patch){
    try {
      detailMsg("更新中…");
      await api("/op/preorders/update", {
        op_key: OP,
        record_id: recordId,
        ...patch
      });
      detailMsg("已更新", "ok");
      await loadList();
    } catch(e) {
      detailMsg("更新失敗：" + (e.message || e), "err");
    }
  }

  async function saveDetail(recordId){
    if (!recordId) return;

    const payload = {
      op_key: OP,
      record_id: recordId,
      preorder_status: $("fPreStatus") ? $("fPreStatus").value : "",
      payment_status: $("fPayStatus") ? $("fPayStatus").value : "",
      arrival_notify_status: $("fArrivalStatus") ? $("fArrivalStatus").value : "",
      internal_note: $("fInternalNote").value,

      arrived_sku: $("fSku").value,
      arrived_product_name: $("fArrivedName").value,
      arrived_product_record_id: $("fArrivedRecordId").value,
      arrived_qty: $("fArrivedQty").value,
      arrived_price: $("fArrivedPrice").value,
      arrived_can_checkout: $("fCanCheckout") ? ($("fCanCheckout").value === "1") : false,

      checkout_url: $("fCheckoutUrl").value,
      checkout_cart_token: $("fCartToken").value
    };

    try {
      detailMsg("儲存中…");
      await api("/op/preorders/update", payload);
      items = items.map(x => {
        if (String(x.id || "") !== String(recordId || "")) return x;

        return {
          ...x,
          preorder_status: payload.preorder_status,
          payment_status: payload.payment_status,
          arrival_notify_status: payload.arrival_notify_status,
          internal_note: payload.internal_note,

          arrived_sku: payload.arrived_sku,
          arrived_product_name: payload.arrived_product_name,
          arrived_product_record_id: payload.arrived_product_record_id,
          arrived_qty: payload.arrived_qty,
          arrived_price: payload.arrived_price,
          arrived_can_checkout: payload.arrived_can_checkout,

          checkout_url: payload.checkout_url,
          checkout_cart_token: payload.checkout_cart_token
        };
      });

      selected = items.find(x => String(x.id || "") === String(recordId || "")) || selected;

      renderList();
      if (selected) renderDetail(selected);

      detailMsg("已儲存預購資料", "ok");
    } catch(e) {
      detailMsg("儲存失敗：" + (e.message || e), "err");
    }
  }

    if (preorderModeTabs) {
    preorderModeTabs.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-mode]");
      if (!btn) return;

      currentMode = btn.dataset.mode || "deposit_pending";
      selected = null;
      selectedArrivalIds.clear();
      detailCard.innerHTML = '<div class="empty">請先從左側選擇一筆預購登記</div>';
      renderList();

      if (currentMode === "arrived") {
        autoSendArrivedModeItems();
      }
    });
  }

  // 已到貨待發結帳卡：改為點分類時自動依序發送，不再使用全選 / 批次按鈕。
  
    preorderList.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-po-action]");
    if (!btn) return;

    e.preventDefault();
    e.stopPropagation();

    const action = btn.dataset.poAction || "";
    const id = btn.dataset.id || "";
    const it = selectedById(id);

    runPoAction(action, it);
  });

  detailCard.addEventListener("click", (e) => {
    const btn = e.target.closest("[data-po-action]");
    if (!btn) return;

    e.preventDefault();
    e.stopPropagation();

    const action = btn.dataset.poAction || "";
    const id = btn.dataset.id || "";
    const it = selectedById(id);

    runPoAction(action, it);
  });

  btnLogin.addEventListener("click", () => {
    const k = opKeyInput.value.trim();
    if (!k) {
      loginMsg.textContent = "請輸入密碼";
      loginMsg.className = "status-line err";
      return;
    }

    saveKey(k);
    loginMsg.textContent = "";
    showApp();
    loadList();
  });

if (btnLogout) {
  btnLogout.addEventListener("click", () => {
    localStorage.removeItem(KEY_STORAGE);
    localStorage.removeItem("MURAIN_ADMIN_OP_KEY");
    localStorage.removeItem("MURAIN_BACKOFFICE_AUTH_V1");
    OP = "";
    opKeyInput.value = "";
    showLogin();
  });
}

btnLoad.addEventListener("click", loadList);

if (btnSearch) {
  btnSearch.addEventListener("click", loadList);
}

if (btnClearDate) {
  btnClearDate.addEventListener("click", () => {
    if (dateFrom) dateFrom.value = "";
    if (dateTo) dateTo.value = "";
    loadList();
  });
}

btnClear.addEventListener("click", () => {
  keywordInput.value = "";
  loadList();
});

keywordInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") loadList();
});

  loadKey();
  if (OP) {
    showApp();
    loadList();
  } else {
    showLogin();
  }
})();
</script>
