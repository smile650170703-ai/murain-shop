<!doctype html>

<head>

  <title>XUYUAN｜預購後台</title>

<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Roboto}
  body{margin:0;background:#020617;color:#e2e8f0}
  .wrap{max-width:1200px;margin:0 auto;padding:16px}

  .hidden{display:none !important;}

  /* ===== 共用後台主頁籤 ===== */
  .page-tabs{
    max-width:1200px;
    margin:0 auto 18px;
    padding:0 16px;
  }

  .page-tabs-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:12px 14px;
    border-radius:18px;
    background:#020617;
    border:1px solid rgba(148,163,184,.28);
    box-shadow:0 10px 30px rgba(15,23,42,.12);
  }

  .page-tab{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:44px;
    padding:0 18px;
    border-radius:999px;
    text-decoration:none;
    font-size:14px;
    font-weight:800;
    letter-spacing:.01em;
    background:rgba(15,23,42,.92);
    color:#e2e8f0;
    border:1px solid rgba(148,163,184,.55);
    transition:.18s ease;
    white-space:nowrap;
  }

  .page-tab:hover{
    transform:translateY(-1px);
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.18);
  }

  .page-tab.is-active{
    background:#22d3ee;
    color:#0f172a;
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.32);
  }

  /* ===== 訂單後台第二排按鈕 ===== */
  .filter-group.admin-sub-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin:10px 0 0;
  }

  .filter-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    min-height:36px;
    padding:7px 12px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.7);
    background:rgba(15,23,42,.9);
    color:#e5e7eb;
    text-decoration:none;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    white-space:nowrap;
  }

  .filter-btn.active,
  .filter-btn:hover{
    background:#22d3ee;
    color:#0f172a;
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.35);
  }

  .btn-badge-wrap{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }

  .count-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:18px;
    height:18px;
    padding:0 6px;
    border-radius:999px;
    background:#ef4444;
    color:#fff;
    font-size:11px;
    line-height:1;
    font-weight:700;
  }

  .card{
    background:rgba(15,23,42,.95);
    border-radius:16px;
    border:1px solid rgba(148,163,184,.3);
    padding:10px;
    min-height:120px;
    margin-bottom:12px;
  }

  .row{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:8px;
    align-items:end;
  }

  .col-2{grid-column:span 2}
  .col-3{grid-column:span 3}
  .col-4{grid-column:span 4}
  .col-5{grid-column:span 5}
  .col-6{grid-column:span 6}
  .col-7{grid-column:span 7}
  .col-8{grid-column:span 8}
  .col-12{grid-column:span 12}

  label{
    display:block;
    font-size:12px;
    margin:6px 0 3px;
    color:#cbd5f5;
  }

  input,
  select,
  textarea{
    width:100%;
    min-height:40px;
    padding:8px 9px;
    border-radius:10px;
    border:1px solid rgba(148,163,184,.6);
    background:#020617;
    color:#e2e8f0;
    font-size:13px;
    outline:none;
  }

  textarea{
    min-height:70px;
    resize:vertical;
    line-height:1.45;
  }

  input:focus,
  select:focus,
  textarea:focus{
    outline:2px solid #38bdf8;
    outline-offset:1px;
    border-color:#38bdf8;
  }

  button{
    min-height:40px;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.7);
    background:#22d3ee;
    color:#0f172a;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
  }

  button.ghost{
    background:transparent;
    color:#e5e7eb;
    border:1px solid rgba(148,163,184,.7);
  }

  button.warn{
    background:rgba(234,179,8,.15);
    color:#facc15;
    border:1px solid rgba(234,179,8,.55);
  }

  button.danger{
    background:rgba(220,38,38,.2);
    color:#fecaca;
    border:1px solid rgba(249,115,115,.65);
  }

  button.ok{
    background:rgba(22,163,74,.2);
    color:#bbf7d0;
    border:1px solid rgba(34,197,94,.55);
  }

  button:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  .status-line{
    display:block;
    width:100%;
    margin-top:10px;
    margin-bottom:4px;
    color:#93c5fd;
    font-size:12px;
    font-weight:400;
    min-height:18px;
    line-height:1.5;
  }

  .status-line.ok{
    color:#bbf7d0;
    font-weight:700;
  }

  .status-line.err{
    color:#fecaca;
    font-weight:700;
  }

  .grid{
    display:grid;
    grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);
    gap:12px;
    align-items:start;
  }

  .list{
    max-height:calc(100vh - 260px);

  }

  .item{

    margin-bottom:6px;

  .item:hover{

  }

  .item.active{

  }

  .item-head{

    justify-content:space-between;
    gap:8px;
    font-size:13px;
  }

  .po{

    font-weight:700;
    word-break:break-all;
  }

  .date{
    color:#94a3b8;
    font-size:12px;
    margin-top:3px;
  }

  .meta{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:4px 8px;
    margin-top:6px;
    font-size:12px;
    color:#94a3b8;
    line-height:1.45;
  }

  .meta b{
    color:#e2e8f0;
    font-weight:700;
  }

  .badge{

    font-size:11px;
    font-weight:700;
    white-space:nowrap;
  }

  .badge.ok{

    color:#bbf7d0;
    background:rgba(22,163,74,.2);
  }

  .badge.bad{
    border-color:#f97373;
    color:#fecaca;
    background:rgba(220,38,38,.2);
  }

  .badge.wait{
    border-color:#eab308;
    color:#facc15;

  }

    line-height:1.3;
    word-break:break-all;
  }

  .detail-sub{

    font-size:12px;
    margin-top:4px;
    line-height:1.5;
  }

  .quick-actions{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }

  .quick-actions button{
    flex:1 1 130px;
  }

  .kv{
    display:grid;
    grid-template-columns:120px minmax(0,1fr);
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid rgba(148,163,184,.18);
    font-size:13px;
    line-height:1.5;
  }

  .kv .k{
    color:#94a3b8;
    font-weight:700;
  }

  .kv .v{
    color:#e2e8f0;
    word-break:break-word;
  }

  .small-note{
    margin-top:10px;

    background:rgba(255,255,255,.025);
    border:1px solid rgba(148,163,184,.24);
    color:#94a3b8;
    font-size:12px;
    line-height:1.6;
  }

  .footer-actions{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .footer-actions button{
    margin-top:0;
  }

  hr{
    border-color:rgba(148,163,184,.24) !important;
  }

  @media (max-width:900px){
    .page-tabs{
      padding:0 10px;
    }

    .page-tabs-bar{
      gap:8px;
      padding:10px;
    }

    .page-tab{
      min-height:40px;
      padding:0 14px;
      font-size:13px;
    }

    .grid{
      grid-template-columns:1fr;
    }

    .list{
      max-height:none;
    }

    .row{
      grid-template-columns:1fr;
    }

    .col-2,
    .col-3,
    .col-4,
    .col-5,
    .col-6,
    .col-7,
    .col-8,
    .col-12{
      grid-column:span 1;
    }

    .meta{
      grid-template-columns:1fr;
    }
  }

  /* ===== 預購後台：精簡搜尋區 ===== */
.search-card{
  min-height:0 !important;
  padding:8px 10px !important;
  margin-bottom:10px !important;
}

.search-card .row{
  gap:6px !important;
}

.search-card label{

.search-card input,
.search-card select,

}

.search-card .status-line{
  margin-top:5px !important;
  margin-bottom:0 !important;
  min-height:14px !important;
  font-size:11px !important;
}

.item-actions{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-top:8px;
}

.item-actions button{
  min-height:28px;
  padding:4px 9px;
  font-size:11px;
  border-radius:999px;
}

.status-boxes{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:8px;
  margin:10px 0;
}

.status-box{
  border:1px solid rgba(148,163,184,.28);
  background:rgba(2,6,23,.45);
  border-radius:12px;
  padding:8px 10px;
}

.status-box small{
  display:block;
  color:#94a3b8;
  font-size:11px;
  margin-bottom:4px;
}

.status-box b{
  color:#e2e8f0;
  font-size:13px;
}

@media (max-width:900px){
  .status-boxes{
    grid-template-columns:1fr;
  }
}
</style>

<script>
(function(){
  const API = String(window.API_BASE || "https://api.murain.tw").replace(/\/+$/,"");
  const KEY_STORAGE = "MURAIN_ADMIN_OP_KEY";

  const $ = (id) => document.getElementById(id);

  function getSharedAdminKey(){
    try {
      if (window.MURAIN_AUTH && typeof window.MURAIN_AUTH.getKey === "function") {
        const k = window.MURAIN_AUTH.getKey("admin");
        if (k) return String(k || "").trim();
      }
    } catch(e) {}

    try {
      const auth = window.MURAIN_AUTH && typeof window.MURAIN_AUTH.get === "function"
        ? window.MURAIN_AUTH.get()
        : null;

      if (auth && auth.key && String(auth.role || "").toLowerCase() === "admin") {
        return String(auth.key || "").trim();
      }
    } catch(e) {}

    try {
      const raw = localStorage.getItem("MURAIN_BACKOFFICE_AUTH_V1") || "";
      const auth = raw ? JSON.parse(raw) : null;

      if (auth && auth.key && String(auth.role || "").toLowerCase() === "admin") {
        return String(auth.key || "").trim();
      }
    } catch(e) {}

    try {
      return String(
        localStorage.getItem(KEY_STORAGE) ||
        localStorage.getItem("MURAIN_ADMIN_OP_KEY") ||
        localStorage.getItem("stock_op") ||
        ""
      ).trim();
    } catch(e) {
      return "";
    }
  }

  const loginCard = $("loginCard");
  const app = $("app");
  const opKeyInput = $("opKeyInput");
  const loginMsg = $("loginMsg");
  const btnLogin = $("btnLogin");
  const btnLogout = $("btnLogout");

const dateFrom = $("dateFrom");
const dateTo = $("dateTo");
const statusFilter = $("statusFilter");
const keywordInput = $("keywordInput");
const btnLoad = $("btnLoad");
const btnSearch = $("btnSearch");
const btnClearDate = $("btnClearDate");
const btnClear = $("btnClear");
  const listMsg = $("listMsg");
  const preorderList = $("preorderList");
  const detailCard = $("detailCard");
  const countBadge = $("countBadge");

  let OP = "";
  let items = [];
  let selected = null;

  function saveKey(v){
    OP = String(v || "").trim();
    if (OP) {
      localStorage.setItem(KEY_STORAGE, OP);
      localStorage.setItem("MURAIN_ADMIN_OP_KEY", OP);
    }
  }

  function loadKey(){
    OP = getSharedAdminKey();
    if (OP) opKeyInput.value = OP;
  }

  function money(n){
    const v = Math.round(Number(n || 0) || 0);
    return "NT$ " + v.toLocaleString("zh-TW");
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function ymd(v){
    if (!v) return "";
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v || "");
    return d.getFullYear() + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + String(d.getDate()).padStart(2,"0");
  }

  function badgeClass(status){
    const s = String(status || "");
    if (s.includes("完成") || s.includes("已通知")) return "ok";
    if (s.includes("取消")) return "bad";
    return "wait";
  }

    function needDeposit(it){
    return Number(it && it.deposit_amount || 0) > 0;
  }

  function isDepositConfirmed(it){
    return String(it && it.payment_status || "") === "已確認定金" || !needDeposit(it);
  }

  function isFinalPo(it){
    const s = String(it && it.preorder_status || "");
    return s === "已取消" || s === "已完成";
  }

  function actionButtonsHtml(it){
    const id = esc(it.id || "");
    const s = String(it.preorder_status || "等待到貨");
    const arrival = String(it.arrival_notify_status || "未到貨");
    const pay = String(it.payment_status || "");

    const btns = [];

    if (needDeposit(it) && pay !== "已確認定金" && !isFinalPo(it)) {
      btns.push(`<button class="ok" type="button" data-po-action="confirmDeposit" data-id="${id}">確認定金</button>`);
    }

    if (s !== "已到貨待通知" && s !== "已通知" && !isFinalPo(it)) {
      btns.push(`<button class="warn" type="button" data-po-action="markArrived" data-id="${id}">標記已到貨</button>`);
    }

    if ((s === "已到貨待通知" || arrival === "已到貨待通知") && !isFinalPo(it)) {
      btns.push(`<button type="button" data-po-action="sendArrival" data-id="${id}">發到貨 LINE</button>`);
    }

    if (!isFinalPo(it)) {
      btns.push(`<button class="danger" type="button" data-po-action="cancel" data-id="${id}">取消預購</button>`);
    }

    if (s === "已通知" || arrival === "已發送到貨結帳通知") {
      btns.push(`<button class="ghost" type="button" data-po-action="done" data-id="${id}">標記完成</button>`);
    }

    return btns.join("");
  }

  async function api(path, payload){
    const r = await fetch(API + path, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      credentials:"include",
      body:JSON.stringify(payload || {})
    });

    const text = await r.text();
    let j = {};
    try { j = JSON.parse(text); } catch(e){}

    if (!r.ok || !j.ok) {
      throw new Error(j.message || j.error || text.slice(0,200) || "API 失敗");
    }

    return j;
  }

  async function loadList(){

      listMsg.textContent = "請先登入";
      listMsg.className = "status-line err";
      showLogin();
      return;
    }

    listMsg.textContent = "讀取預購清單中…";
    listMsg.className = "status-line";
    preorderList.innerHTML = "";
    detailCard.innerHTML = '<div class="empty">請先從左側選擇一筆預購登記</div>';
    selected = null;

    try {
const res = await api("/op/preorders/list", {
  op_key: OP,
  date_from: dateFrom ? dateFrom.value : "",
  date_to: dateTo ? dateTo.value : "",
  status: statusFilter.value,
  q: keywordInput.value
});

        OP = "";
        showLogin();
      }
    }
  }

      node.className = "item" + (selected && selected.id === it.id ? " active" : "");

        </div>

          <div>電話：<b>${esc(it.phone || "—")}</b></div>
          <div>編號：<b>${esc(it.product_code || "—")}</b></div>
          <div>商品：<b>${esc(it.product_name || "—")}</b></div>
          <div>數量：<b>${esc(it.qty || 1)}</b></div>
          <div>付款：<b>${esc(it.payment_status || "—")}</b></div>
          <div>到貨：<b>${esc(it.arrival_notify_status || "未到貨")}</b></div>

          <input id="fCheckoutUrl" value="${esc(val(it.checkout_url))}" placeholder="下一階段自動產生">

          <label for="fCartToken">結帳購物車 Token</label>

      <div class="footer-actions">
        <button id="btnSave" type="button">儲存預購資料</button>

    $("btnSave").addEventListener("click", () => saveDetail(it.id));
    $("btnCopyPo").addEventListener("click", async () => {
      const text = it.preorder_id || "";
      try {
        await navigator.clipboard.writeText(text);
        detailMsg("已複製：" + text, "ok");
      } catch(e) {
        detailMsg("複製失敗，請手動複製", "err");
      }

    if ($("fSku")) {
      $("fSku").addEventListener("blur", lookupSkuInfo);

  function optionHtml(list, current){
    return list.map(x => `<option value="${esc(x)}" ${x === current ? "selected" : ""}>${esc(x)}</option>`).join("");
  }

  function detailMsg(text, cls){
    const el = $("detailMsg");
    if (!el) return;
    el.textContent = text || "";
    el.className = "status-line" + (cls ? " " + cls : "");
  }

    function selectedById(id){
    return items.find(x => String(x.id || "") === String(id || "")) || selected;
  }

  async function runPoAction(action, it){
    if (!it || !it.id) return;

    if (action === "confirmDeposit") {
      await quickPatch(it.id, { payment_status:"已確認定金" });
      return;
    }

    if (action === "markArrived") {
      selected = it;
      renderDetail(it);

      if ($("fPreStatus")) $("fPreStatus").value = "已到貨待通知";
      if ($("fArrivalStatus")) $("fArrivalStatus").value = "已到貨待通知";
      if ($("fCanCheckout")) $("fCanCheckout").value = "1";

      await saveDetail(it.id);
      return;
    }

    if (action === "sendArrival") {
      selected = it;
      renderDetail(it);
      await sendArrivalCheckout(it.id);
      return;
    }

    if (action === "cancel") {
      if (!confirm("確定要取消這筆預購？")) return;
      await quickPatch(it.id, { preorder_status:"已取消", payment_status:"已取消" });
      return;
    }

    if (action === "done") {
      await quickPatch(it.id, { preorder_status:"已完成" });
    }
  }

  async function lookupSkuInfo(){
    const sku = String($("fSku")?.value || "").trim();
    if (!sku) return;

    try {
      detailMsg("查詢 SKU 中…");

      const res = await api("/op/preorders/sku-info", {
        op_key: OP,
        sku
      });

      const p = res.product || {};

      if ($("fArrivedName") && p.name) $("fArrivedName").value = p.name;
      if ($("fArrivedRecordId") && p.record_id) $("fArrivedRecordId").value = p.record_id;

      if ($("fArrivedPrice") && !String($("fArrivedPrice").value || "").trim() && p.price) {
        $("fArrivedPrice").value = p.price;
      }

      detailMsg("已帶入到貨商品資料", "ok");
    } catch(e) {
      detailMsg("SKU 查詢失敗：" + (e.message || e), "err");
    }
  }

  async function sendArrivalCheckout(recordId){
    if (!recordId) return;

    const sku = String($("fSku")?.value || "").trim();

    if (!sku) {
      detailMsg("請先輸入到貨商品 SKU", "err");
      $("fSku")?.focus();
      return;
    }

    const it = selectedById(recordId);
    const depositAmount = Number(it?.deposit_amount || 0) || 0;
    const payStatus = String(it?.payment_status || "");

    if (depositAmount > 0 && payStatus !== "已確認定金") {
      detailMsg("此預購有定金，請先按「確認定金」後再發到貨 LINE", "err");
      return;
    }

    if (!confirm("確定要建立到貨結帳購物車，並發送 LINE 到貨結帳卡片給客人嗎？")) {
      return;
    }

    try {
      detailMsg("建立購物車並發送 LINE 中…");

      const res = await api("/op/preorders/send-arrival-checkout", {
        op_key: OP,
        record_id: recordId,

        arrived_sku: $("fSku")?.value || "",
        arrived_product_name: $("fArrivedName")?.value || "",
        arrived_product_record_id: $("fArrivedRecordId")?.value || "",
        arrived_qty: $("fArrivedQty")?.value || "",
        arrived_price: $("fArrivedPrice")?.value || ""
      });

      detailMsg("已發送到貨結帳 LINE，購物車：" + (res.cart_token || ""), "ok");
      await loadList();
    } catch(e) {
      detailMsg("發送失敗：" + (e.message || e), "err");
    }
  }

  async function quickPatch(recordId, patch){
    try {
      detailMsg("更新中…");
      await api("/op/preorders/update", {
        op_key: OP,
        record_id: recordId,
        ...patch
      });
      detailMsg("已更新", "ok");
      await loadList();
    } catch(e) {
      detailMsg("更新失敗：" + (e.message || e), "err");
    }
  }

  async function saveDetail(recordId){
    if (!recordId) return;

    const payload = {
      op_key: OP,
      record_id: recordId,
      preorder_status: $("fPreStatus") ? $("fPreStatus").value : "",
      payment_status: $("fPayStatus") ? $("fPayStatus").value : "",
      arrival_notify_status: $("fArrivalStatus") ? $("fArrivalStatus").value : "",
      internal_note: $("fInternalNote").value,

      arrived_sku: $("fSku").value,
      arrived_product_name: $("fArrivedName").value,
      arrived_product_record_id: $("fArrivedRecordId").value,
      arrived_qty: $("fArrivedQty").value,
      arrived_price: $("fArrivedPrice").value,
      arrived_can_checkout: $("fCanCheckout") ? ($("fCanCheckout").value === "1") : false,

      checkout_url: $("fCheckoutUrl").value,
      checkout_cart_token: $("fCartToken").value
    };

    try {
      detailMsg("儲存中…");
      await api("/op/preorders/update", payload);
      detailMsg("已儲存預購資料", "ok");
      await loadList();
    } catch(e) {
      detailMsg("儲存失敗：" + (e.message || e), "err");
    }
  }

    preorderList.addEventListener("click", (e) => {

    e.stopPropagation();

    e.stopPropagation();

    const action = btn.dataset.poAction || "";

    runPoAction(action, it);
  });

    const k = opKeyInput.value.trim();

      loginMsg.textContent = "請輸入密碼";

    loadList();

if (btnLogout) {

    localStorage.removeItem(KEY_STORAGE);

    localStorage.removeItem("MURAIN_BACKOFFICE_AUTH_V1");

}
