<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>XUYUAN｜預購後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <script src="/config.js?v=20260627-auth-fix"></script>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Roboto}
  body{margin:0;background:#020617;color:#e2e8f0}
  .wrap{max-width:1200px;margin:0 auto;padding:16px}

  .hidden{display:none !important;}

  /* ===== 共用後台主頁籤 ===== */
  .page-tabs{
    max-width:1200px;
    margin:0 auto 18px;
    padding:0 16px;
  }

  .page-tabs-bar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    padding:12px 14px;
    border-radius:18px;
    background:#020617;
    border:1px solid rgba(148,163,184,.28);
    box-shadow:0 10px 30px rgba(15,23,42,.12);
  }

  .page-tab{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:44px;
    padding:0 18px;
    border-radius:999px;
    text-decoration:none;
    font-size:14px;
    font-weight:800;
    letter-spacing:.01em;
    background:rgba(15,23,42,.92);
    color:#e2e8f0;
    border:1px solid rgba(148,163,184,.55);
    transition:.18s ease;
    white-space:nowrap;
  }

  .page-tab:hover{
    transform:translateY(-1px);
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.18);
  }

  .page-tab.is-active{
    background:#22d3ee;
    color:#0f172a;
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.32);
  }

  /* ===== 訂單後台第二排按鈕 ===== */
  .filter-group.admin-sub-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin:10px 0 0;
  }

  .filter-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    min-height:36px;
    padding:7px 12px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.7);
    background:rgba(15,23,42,.9);
    color:#e5e7eb;
    text-decoration:none;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    white-space:nowrap;
  }

  .filter-btn.active,
  .filter-btn:hover{
    background:#22d3ee;
    color:#0f172a;
    border-color:#22d3ee;
    box-shadow:0 8px 20px rgba(34,211,238,.35);
  }

  .btn-badge-wrap{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }

  .count-badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-width:18px;
    height:18px;
    padding:0 6px;
    border-radius:999px;
    background:#ef4444;
    color:#fff;
    font-size:11px;
    line-height:1;
    font-weight:700;
  }

  .card{
    background:rgba(15,23,42,.95);
    border-radius:16px;
    border:1px solid rgba(148,163,184,.3);
    padding:10px;
    min-height:120px;
    margin-bottom:12px;
  }

  .row{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:8px;
    align-items:end;
  }

  .col-2{grid-column:span 2}
  .col-3{grid-column:span 3}
  .col-4{grid-column:span 4}
  .col-5{grid-column:span 5}
  .col-6{grid-column:span 6}
  .col-7{grid-column:span 7}
  .col-8{grid-column:span 8}
  .col-12{grid-column:span 12}

  label{
    display:block;
    font-size:12px;
    margin:6px 0 3px;
    color:#cbd5f5;
  }

  input,
  select,
  textarea{
    width:100%;
    min-height:40px;
    padding:8px 9px;
    border-radius:10px;
    border:1px solid rgba(148,163,184,.6);
    background:#020617;
    color:#e2e8f0;
    font-size:13px;
    outline:none;
  }

  textarea{
    min-height:70px;
    resize:vertical;
    line-height:1.45;
  }

  input:focus,
  select:focus,
  textarea:focus{
    outline:2px solid #38bdf8;
    outline-offset:1px;
    border-color:#38bdf8;
  }

  button{
    min-height:40px;
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.7);
    background:#22d3ee;
    color:#0f172a;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
  }

  button.ghost{
    background:transparent;
    color:#e5e7eb;
    border:1px solid rgba(148,163,184,.7);
  }

  button.warn{
    background:rgba(234,179,8,.15);
    color:#facc15;
    border:1px solid rgba(234,179,8,.55);
  }

  button.danger{
    background:rgba(220,38,38,.2);
    color:#fecaca;
    border:1px solid rgba(249,115,115,.65);
  }

  button.ok{
    background:rgba(22,163,74,.2);
    color:#bbf7d0;
    border:1px solid rgba(34,197,94,.55);
  }

  button:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  .status-line{
    display:block;
    width:100%;
    margin-top:10px;
    margin-bottom:4px;
    color:#93c5fd;
    font-size:12px;
    font-weight:400;
    min-height:18px;
    line-height:1.5;
  }

  .status-line.ok{
    color:#bbf7d0;
    font-weight:700;
  }

  .status-line.err{
    color:#fecaca;
    font-weight:700;
  }

  .grid{
    display:grid;
    grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);
    gap:12px;
    align-items:start;
  }

  .list{
    max-height:calc(100vh - 260px);
    overflow:auto;
  }

  .item{
    padding:8px 10px;
    border-radius:12px;
    cursor:pointer;
    border:1px solid transparent;
    margin-bottom:6px;
    background:rgba(15,23,42,.95);
  }

  .item:hover{
    border-color:rgba(148,163,184,.8);
    background:rgba(15,23,42,1);
  }

  .item.active{
    border-color:#22d3ee;
    background:rgba(15,23,42,1);
    box-shadow:0 8px 20px rgba(34,211,238,.25);
  }

  .item-head{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    font-size:13px;
  }

  .po{
    color:#e5e7eb;
    font-weight:700;
    word-break:break-all;
  }

  .date{
    color:#94a3b8;
    font-size:12px;
    margin-top:3px;
  }

  .meta{
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:4px 8px;
    margin-top:6px;
    font-size:12px;
    color:#94a3b8;
    line-height:1.45;
  }

  .meta b{
    color:#e2e8f0;
    font-weight:700;
  }

  .badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:24px;
    padding:2px 7px;
    border-radius:999px;
    border:1px solid rgba(148,163,184,.7);
    background:rgba(15,23,42,1);
    color:#cbd5f5;
    font-size:11px;
    font-weight:700;
    white-space:nowrap;
  }

  .badge.ok{
    border-color:#22c55e;
    color:#bbf7d0;
    background:rgba(22,163,74,.2);
  }

  .badge.bad{
    border-color:#f97373;
    color:#fecaca;
    background:rgba(220,38,38,.2);
  }

  .badge.wait{
    border-color:#eab308;
    color:#facc15;
    background:rgba(234,179,8,.15);
  }

  .empty{
    padding:32px 12px;
    text-align:center;
    color:#94a3b8;
    border:1px dashed rgba(148,163,184,.38);
    border-radius:14px;
    background:rgba(2,6,23,.45);
    font-size:13px;
  }

  .detail-title{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom:8px;
  }

  .detail-title h2{
    margin:0;
    color:#e5e7eb;
    font-size:18px;
    line-height:1.3;
    word-break:break-all;
  }

  .detail-sub{
    color:#94a3b8;
    font-size:12px;
    margin-top:4px;
    line-height:1.5;
  }

  .quick-actions{
    margin-top:8px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }

  .quick-actions button{
    flex:1 1 130px;
  }

  .kv{
    display:grid;
    grid-template-columns:120px minmax(0,1fr);
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid rgba(148,163,184,.18);
    font-size:13px;
    line-height:1.5;
  }

  .kv .k{
    color:#94a3b8;
    font-weight:700;
  }

  .kv .v{
    color:#e2e8f0;
    word-break:break-word;
  }

  .small-note{
    margin-top:10px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(255,255,255,.025);
    border:1px solid rgba(148,163,184,.24);
    color:#94a3b8;
    font-size:12px;
    line-height:1.6;
  }

  .footer-actions{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .footer-actions button{
    margin-top:0;
  }

  hr{
    border-color:rgba(148,163,184,.24) !important;
  }

  @media (max-width:900px){
    .page-tabs{
      padding:0 10px;
    }

    .page-tabs-bar{
      gap:8px;
      padding:10px;
    }

    .page-tab{
      min-height:40px;
      padding:0 14px;
      font-size:13px;
    }

    .grid{
      grid-template-columns:1fr;
    }

    .list{
      max-height:none;
    }

    .row{
      grid-template-columns:1fr;
    }

    .col-2,
    .col-3,
    .col-4,
    .col-5,
    .col-6,
    .col-7,
    .col-8,
    .col-12{
      grid-column:span 1;
    }

    .meta{
      grid-template-columns:1fr;
    }
  }
</style>
</head>

  <div class="wrap">

    <section class="card" id="loginCard">
      <h2 style="margin:0 0 10px;font-size:20px;">後台登入</h2>
      <div class="row">
        <div class="col-8">
          <label for="opKeyInput">統一密碼 / 主管密碼</label>
          <input id="opKeyInput" type="password" placeholder="輸入統一密碼或主管密碼">
        </div>
        <div class="col-4">
          <button id="btnLogin" type="button">登入</button>
        </div>
      </div>
      <div class="status-line" id="loginMsg"></div>
    </section>

    <section id="app" class="hidden">
      <section class="card">
        <div class="row">
          <div class="col-3">
            <label for="statusFilter">預購狀態</label>
            <select id="statusFilter">
              <option value="">全部狀態</option>
              <option>等待到貨</option>
              <option>已到貨待通知</option>
              <option>已通知</option>
              <option>已取消</option>
              <option>已完成</option>
            </select>
          </div>
          <div class="col-5">
            <label for="keywordInput">搜尋</label>
            <input id="keywordInput" placeholder="預購單號 / 客人 / 電話 / LINE / 商品 / SKU">
          </div>
          <div class="col-2">
            <button id="btnLoad" type="button">載入清單</button>
          </div>
          <div class="col-2">

          </div>

      <div class="grid">
        <section class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;">
            <b>預購清單</b>
            <span class="badge" id="countBadge">0 筆</span>
          </div>
          <div class="list" id="preorderList"></div>
        </section>

        <section class="card" id="detailCard">
          <div class="empty">請先從左側選擇一筆預購登記</div>
        </section>

<script>
(function(){
  const API = String(window.API_BASE || "https://api.murain.tw").replace(/\/+$/,"");
  const KEY_STORAGE = "MURAIN_ADMIN_OP_KEY";

  const $ = (id) => document.getElementById(id);

  function getSharedAdminKey(){
    try {
      if (window.MURAIN_AUTH && typeof window.MURAIN_AUTH.getKey === "function") {
        const k = window.MURAIN_AUTH.getKey("admin");
        if (k) return String(k || "").trim();
      }
    } catch(e) {}

    try {
      const auth = window.MURAIN_AUTH && typeof window.MURAIN_AUTH.get === "function"
        ? window.MURAIN_AUTH.get()
        : null;

      if (auth && auth.key && String(auth.role || "").toLowerCase() === "admin") {
        return String(auth.key || "").trim();
      }
    } catch(e) {}

    try {
      const raw = localStorage.getItem("MURAIN_BACKOFFICE_AUTH_V1") || "";
      const auth = raw ? JSON.parse(raw) : null;

      if (auth && auth.key && String(auth.role || "").toLowerCase() === "admin") {
        return String(auth.key || "").trim();
      }
    } catch(e) {}

    try {
      return String(
        localStorage.getItem(KEY_STORAGE) ||
        localStorage.getItem("MURAIN_ADMIN_OP_KEY") ||
        localStorage.getItem("stock_op") ||
        ""
      ).trim();
    } catch(e) {
      return "";
    }
  }

  const loginCard = $("loginCard");
  const app = $("app");
  const opKeyInput = $("opKeyInput");
  const loginMsg = $("loginMsg");
  const btnLogin = $("btnLogin");
  const btnLogout = $("btnLogout");

  const statusFilter = $("statusFilter");
  const keywordInput = $("keywordInput");
  const btnLoad = $("btnLoad");
  const btnClear = $("btnClear");
  const listMsg = $("listMsg");
  const preorderList = $("preorderList");
  const detailCard = $("detailCard");
  const countBadge = $("countBadge");

  let OP = "";
  let items = [];
  let selected = null;

  function saveKey(v){
    OP = String(v || "").trim();
    if (OP) {
      localStorage.setItem(KEY_STORAGE, OP);
      localStorage.setItem("MURAIN_ADMIN_OP_KEY", OP);
    }
  }

  function loadKey(){
    OP = getSharedAdminKey();
    if (OP) opKeyInput.value = OP;
  }

  function money(n){
    const v = Math.round(Number(n || 0) || 0);
    return "NT$ " + v.toLocaleString("zh-TW");
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function ymd(v){
    if (!v) return "";
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v || "");
    return d.getFullYear() + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + String(d.getDate()).padStart(2,"0");
  }

  function badgeClass(status){
    const s = String(status || "");
    if (s.includes("完成") || s.includes("已通知")) return "ok";
    if (s.includes("取消")) return "bad";
    return "wait";
  }

  async function api(path, payload){
    const r = await fetch(API + path, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      credentials:"include",
      body:JSON.stringify(payload || {})
    });

    const text = await r.text();
    let j = {};
    try { j = JSON.parse(text); } catch(e){}

    if (!r.ok || !j.ok) {
      throw new Error(j.message || j.error || text.slice(0,200) || "API 失敗");
    }

    return j;
  }

function showApp(){
  loginCard.classList.add("hidden");
  app.classList.remove("hidden");
  if (btnLogout) btnLogout.style.display = "";
}

function showLogin(){
  app.classList.add("hidden");
  loginCard.classList.remove("hidden");
  if (btnLogout) btnLogout.style.display = "none";
}

  async function loadList(){
    if (!OP) {
      listMsg.textContent = "請先登入";
      listMsg.className = "status-line err";
      showLogin();
      return;
    }

    listMsg.textContent = "讀取預購清單中…";
    listMsg.className = "status-line";
    preorderList.innerHTML = "";
    detailCard.innerHTML = '<div class="empty">請先從左側選擇一筆預購登記</div>';
    selected = null;

    try {
      const res = await api("/op/preorders/list", {
        op_key: OP,
        status: statusFilter.value,
        q: keywordInput.value
      });

      items = Array.isArray(res.items) ? res.items : [];
      renderList();

      listMsg.textContent = items.length ? "已載入預購清單" : "目前沒有符合條件的預購資料";
      listMsg.className = "status-line ok";
    } catch (e) {
      listMsg.textContent = "載入失敗：" + (e.message || e);
      listMsg.className = "status-line err";

      if (String(e.message || "").includes("bad_op_key") || String(e.message || "").includes("forbidden")) {
        localStorage.removeItem(KEY_STORAGE);
        OP = "";
        showLogin();
      }
    }
  }

  function renderList(){
    countBadge.textContent = items.length + " 筆";
    preorderList.innerHTML = "";

    if (!items.length) {
      preorderList.innerHTML = '<div class="empty">尚無預購資料</div>';
      return;
    }

    items.forEach((it) => {
      const node = document.createElement("div");
      node.className = "item" + (selected && selected.id === it.id ? " active" : "");
      node.innerHTML = `
        <div class="item-head">
          <div>
            <div class="po">${esc(it.preorder_id || it.id || "—")}</div>
            <div class="date">${esc(ymd(it.created_at) || "—")}</div>
          </div>
          <span class="badge ${badgeClass(it.preorder_status)}">${esc(it.preorder_status || "等待到貨")}</span>
        </div>

        <div class="meta">
          <div>客人：<b>${esc(it.customer_name || "—")}</b></div>
          <div>電話：<b>${esc(it.phone || "—")}</b></div>
          <div>商品：<b>${esc(it.product_name || "—")}</b></div>
          <div>數量：<b>${esc(it.qty || 1)}</b></div>
          <div>付款：<b>${esc(it.payment_status || "—")}</b></div>
          <div>到貨：<b>${esc(it.arrival_notify_status || "未到貨")}</b></div>
        </div>
      `;

      node.addEventListener("click", () => {
        selected = it;
        renderList();
        renderDetail(it);
      });

      preorderList.appendChild(node);
    });
  }

  function val(v){ return String(v == null ? "" : v); }

  function renderDetail(it){
    const canCheckoutChecked = it.arrived_can_checkout ? "checked" : "";

    detailCard.innerHTML = `
      <div class="detail-title">
        <div>
          <h2>${esc(it.preorder_id || it.id)}</h2>
          <div class="detail-sub">
            ${esc(it.customer_name || "—")}｜${esc(it.phone || "—")}｜LINE：${esc(it.line_name || "—")}
          </div>
        </div>
        <span class="badge ${badgeClass(it.preorder_status)}">${esc(it.preorder_status || "等待到貨")}</span>
      </div>

      <div class="quick-actions">
        <button class="ok" id="btnConfirmDeposit" type="button">確認定金</button>
        <button class="warn" id="btnMarkArrived" type="button">標記已到貨</button>
        <button class="danger" id="btnCancelPo" type="button">取消預購</button>
        <button class="ghost" id="btnDonePo" type="button">標記完成</button>
      </div>

      <div class="kv"><div class="k">商品</div><div class="v">${esc(it.product_name || "—")}</div></div>
      <div class="kv"><div class="k">規格</div><div class="v">${esc(it.product_spec || "—")}</div></div>
      <div class="kv"><div class="k">備註</div><div class="v">${esc(it.note || "—")}</div></div>
      <div class="kv"><div class="k">預付定金</div><div class="v">${esc(money(it.deposit_amount || 0))}　後五碼：${esc(it.deposit_last5 || "—")}</div></div>
      <div class="kv"><div class="k">LineUserId</div><div class="v">${esc(it.line_user_id || "—")}</div></div>

      <hr style="border:0;border-top:1px solid rgba(120,80,70,.10);margin:16px 0;">

      <div class="row">
        <div class="col-6">
          <label for="fPreStatus">預購狀態</label>
          <select id="fPreStatus">
            ${optionHtml(["等待到貨","已到貨待通知","已通知","已取消","已完成"], it.preorder_status || "等待到貨")}
          </select>
        </div>
        <div class="col-6">
          <label for="fPayStatus">付款狀態</label>
          <select id="fPayStatus">
            ${optionHtml(["不需定金","未確認定金","已確認定金","已取消"], it.payment_status || "不需定金")}
          </select>
        </div>

        <div class="col-6">
          <label for="fArrivalStatus">到貨通知狀態</label>
          <select id="fArrivalStatus">
            ${optionHtml(["未到貨","已到貨待通知","已發送到貨結帳通知"], it.arrival_notify_status || "未到貨")}
          </select>
        </div>
        <div class="col-6">
          <label style="display:flex;align-items:center;gap:8px;margin-top:25px;">
            <input id="fCanCheckout" type="checkbox" ${canCheckoutChecked} style="width:auto;min-height:auto;">
            到貨可結帳
          </label>
        </div>

        <div class="col-6">
          <label for="fSku">到貨商品 SKU</label>
          <input id="fSku" value="${esc(val(it.arrived_sku))}" placeholder="例：C000123">
        </div>
        <div class="col-6">
          <label for="fArrivedName">到貨商品名稱</label>
          <input id="fArrivedName" value="${esc(val(it.arrived_product_name))}" placeholder="正式入庫商品名稱">
        </div>

        <div class="col-4">
          <label for="fArrivedRecordId">到貨商品 RecordId</label>
          <input id="fArrivedRecordId" value="${esc(val(it.arrived_product_record_id))}" placeholder="rec...">
        </div>
        <div class="col-4">
          <label for="fArrivedQty">到貨數量</label>
          <input id="fArrivedQty" type="number" min="0" step="1" value="${esc(val(it.arrived_qty || it.qty || 1))}">
        </div>
        <div class="col-4">
          <label for="fArrivedPrice">到貨商品單價</label>
          <input id="fArrivedPrice" type="number" min="0" step="1" value="${esc(val(it.arrived_price || 0))}">
        </div>

        <div class="col-6">
          <label for="fCheckoutUrl">到貨結帳連結</label>
          <input id="fCheckoutUrl" value="${esc(val(it.checkout_url))}" placeholder="下一階段自動產生">
        </div>
        <div class="col-6">
          <label for="fCartToken">結帳購物車 Token</label>
          <input id="fCartToken" value="${esc(val(it.checkout_cart_token))}" placeholder="下一階段自動產生">
        </div>

        <div class="col-12">
          <label for="fInternalNote">內部備註</label>
          <textarea id="fInternalNote" placeholder="小幫手內部紀錄">${esc(val(it.internal_note))}</textarea>
        </div>
      </div>

      <div class="small-note">
        第一版先儲存 PreOrders 欄位，不會建立購物車、不會發到貨結帳 LINE 卡片。下一階段才會把「到貨 SKU → 建購物車 → 發 LINE 結帳卡片」接上。
      </div>

      <div class="footer-actions">
        <button id="btnSave" type="button">儲存預購資料</button>
        <button class="ghost" id="btnCopyPo" type="button">複製預購單號</button>
      </div>

      <div class="status-line" id="detailMsg"></div>
    `;

    $("btnSave").addEventListener("click", () => saveDetail(it.id));
    $("btnCopyPo").addEventListener("click", async () => {
      const text = it.preorder_id || "";
      try {
        await navigator.clipboard.writeText(text);
        detailMsg("已複製：" + text, "ok");
      } catch(e) {
        detailMsg("複製失敗，請手動複製", "err");
      }
    });

    $("btnConfirmDeposit").addEventListener("click", () => quickPatch(it.id, { payment_status:"已確認定金" }));
    $("btnMarkArrived").addEventListener("click", () => {
      $("fPreStatus").value = "已到貨待通知";
      $("fArrivalStatus").value = "已到貨待通知";
      $("fCanCheckout").checked = true;
      saveDetail(it.id);
    });
    $("btnCancelPo").addEventListener("click", () => {
      if (!confirm("確定要取消這筆預購？")) return;
      quickPatch(it.id, { preorder_status:"已取消", payment_status:"已取消" });
    });
    $("btnDonePo").addEventListener("click", () => quickPatch(it.id, { preorder_status:"已完成" }));
  }

  function optionHtml(list, current){
    return list.map(x => `<option value="${esc(x)}" ${x === current ? "selected" : ""}>${esc(x)}</option>`).join("");
  }

  function detailMsg(text, cls){
    const el = $("detailMsg");
    if (!el) return;
    el.textContent = text || "";
    el.className = "status-line" + (cls ? " " + cls : "");
  }

  async function quickPatch(recordId, patch){
    try {
      detailMsg("更新中…");
      await api("/op/preorders/update", {
        op_key: OP,
        record_id: recordId,
        ...patch
      });
      detailMsg("已更新", "ok");
      await loadList();
    } catch(e) {
      detailMsg("更新失敗：" + (e.message || e), "err");
    }
  }

  async function saveDetail(recordId){
    if (!recordId) return;

    const payload = {
      op_key: OP,
      record_id: recordId,
      preorder_status: $("fPreStatus").value,
      payment_status: $("fPayStatus").value,
      arrival_notify_status: $("fArrivalStatus").value,
      internal_note: $("fInternalNote").value,

      arrived_sku: $("fSku").value,
      arrived_product_name: $("fArrivedName").value,
      arrived_product_record_id: $("fArrivedRecordId").value,
      arrived_qty: $("fArrivedQty").value,
      arrived_price: $("fArrivedPrice").value,
      arrived_can_checkout: $("fCanCheckout").checked,

      checkout_url: $("fCheckoutUrl").value,
      checkout_cart_token: $("fCartToken").value
    };

    try {
      detailMsg("儲存中…");
      await api("/op/preorders/update", payload);
      detailMsg("已儲存預購資料", "ok");
      await loadList();
    } catch(e) {
      detailMsg("儲存失敗：" + (e.message || e), "err");
    }
  }

  btnLogin.addEventListener("click", () => {
    const k = opKeyInput.value.trim();
    if (!k) {
      loginMsg.textContent = "請輸入密碼";
      loginMsg.className = "status-line err";
      return;
    }

    saveKey(k);
    loginMsg.textContent = "";
    showApp();
    loadList();
  });

if (btnLogout) {
  btnLogout.addEventListener("click", () => {
    localStorage.removeItem(KEY_STORAGE);
    localStorage.removeItem("MURAIN_ADMIN_OP_KEY");
    localStorage.removeItem("MURAIN_BACKOFFICE_AUTH_V1");
    OP = "";
    opKeyInput.value = "";
    showLogin();
  });
}

  btnLoad.addEventListener("click", loadList);

  btnClear.addEventListener("click", () => {
    statusFilter.value = "";
    keywordInput.value = "";
    loadList();
  });

  keywordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") loadList();
  });

  loadKey();
  if (OP) {
    showApp();
    loadList();
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
