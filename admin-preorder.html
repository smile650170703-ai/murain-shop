<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>XUYUAN｜預購後台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <script src="/config.js"></script>
  <style>
    :root{
      --bg:#fff8f5;
      --card:#fffdfb;
      --line:rgba(120,80,70,.14);
      --text:#3f2d28;
      --muted:#8b7269;
      --soft:#fff2ee;
      --main:#4a2f27;
      --main2:#744838;
      --pink:#ead0d2;
      --gold:#b79269;
      --ok:#2f7a4f;
      --bad:#b42318;
      --warn:#a56a1d;
      --shadow:0 18px 42px rgba(96,60,50,.10);
      --r:22px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(238,210,210,.68), transparent 26%),
        radial-gradient(circle at 92% 4%, rgba(255,231,214,.76), transparent 24%),
        linear-gradient(180deg,#fffaf7,#fff5f4);
      min-height:100vh;
    }

    .page-tabs{
      position:sticky;
      top:0;
      z-index:10;
      padding:10px;
      background:rgba(255,248,245,.88);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .page-tabs-bar{
      display:flex;
      gap:8px;
      overflow:auto;
      max-width:1180px;
      margin:0 auto;
    }

    .page-tab{
      flex:0 0 auto;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      border:1px solid rgba(120,80,70,.12);
      background:rgba(255,255,255,.74);
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      font-weight:800;
      white-space:nowrap;
    }

    .page-tab.is-active{
      background:linear-gradient(135deg,#3b2923,#7a4b3c);
      color:#fff;
      border-color:transparent;
    }

    .wrap{
      max-width:1180px;
      margin:0 auto;
      padding:18px 14px 60px;
    }

    .hero{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      padding:24px;
      border-radius:30px;
      background:rgba(255,255,255,.72);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }

    .hero small{
      display:block;
      color:var(--gold);
      letter-spacing:.18em;
      font-weight:900;
      font-size:10px;
      margin-bottom:8px;
    }

    .hero h1{
      margin:0;
      font-size:28px;
      line-height:1.2;
      letter-spacing:.03em;
    }

    .hero p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.75;
    }

    .card{
      background:rgba(255,255,255,.78);
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow:0 10px 24px rgba(96,60,50,.06);
      padding:16px;
      margin-bottom:14px;
    }

    .hidden{display:none !important}

    .row{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:10px;
      align-items:end;
    }

    .col-2{grid-column:span 2}
    .col-3{grid-column:span 3}
    .col-4{grid-column:span 4}
    .col-5{grid-column:span 5}
    .col-6{grid-column:span 6}
    .col-7{grid-column:span 7}
    .col-8{grid-column:span 8}
    .col-12{grid-column:span 12}

    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      font-weight:900;
      margin:0 0 5px;
    }

    input,select,textarea{
      width:100%;
      min-height:40px;
      border:1px solid rgba(120,80,70,.14);
      border-radius:14px;
      padding:9px 11px;
      background:rgba(255,255,255,.9);
      color:var(--text);
      font:inherit;
      outline:none;
    }

    textarea{
      min-height:90px;
      resize:vertical;
      line-height:1.6;
    }

    button{
      min-height:40px;
      border:0;
      border-radius:999px;
      padding:0 15px;
      background:linear-gradient(135deg,var(--main),var(--main2));
      color:#fff;
      font-weight:900;
      cursor:pointer;
      letter-spacing:.04em;
    }

    button.ghost{
      background:rgba(255,255,255,.85);
      color:var(--text);
      border:1px solid rgba(120,80,70,.14);
    }

    button.warn{
      background:#fff2da;
      color:#8a4b00;
      border:1px solid rgba(165,106,29,.18);
    }

    button.danger{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid rgba(180,35,24,.18);
    }

    button.ok{
      background:#e5f5eb;
      color:#17603a;
      border:1px solid rgba(47,122,79,.18);
    }

    button:disabled{opacity:.55;cursor:not-allowed}

    .status-line{
      font-size:13px;
      color:var(--muted);
      min-height:20px;
      line-height:1.6;
      margin-top:8px;
    }

    .status-line.ok{color:var(--ok);font-weight:900}
    .status-line.err{color:var(--bad);font-weight:900}

    .grid{
      display:grid;
      grid-template-columns:minmax(0,.94fr) minmax(380px,.72fr);
      gap:14px;
      align-items:start;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      max-height:68vh;
      overflow:auto;
      padding-right:4px;
    }

    .item{
      border:1px solid rgba(120,80,70,.10);
      border-radius:18px;
      padding:14px;
      background:rgba(255,255,255,.76);
      cursor:pointer;
      transition:.15s ease;
    }

    .item:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(96,60,50,.07)}
    .item.active{border-color:rgba(183,146,105,.42);box-shadow:0 0 0 2px rgba(183,146,105,.12)}

    .item-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .po{
      font-weight:950;
      letter-spacing:.04em;
      color:#2f211d;
      word-break:break-all;
    }

    .date{
      font-size:11px;
      color:var(--muted);
      margin-top:4px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:26px;
      padding:0 9px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
      border:1px solid rgba(120,80,70,.10);
      background:#fff5ed;
      color:#8a5b20;
    }

    .badge.ok{background:#eaf8ef;color:#17603a}
    .badge.bad{background:#fee2e2;color:#991b1b}
    .badge.wait{background:#fff4e5;color:#a15c07}

    .meta{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:7px 10px;
      margin-top:11px;
      font-size:12px;
      color:var(--muted);
      line-height:1.45;
    }

    .meta b{color:var(--text)}
    .empty{
      padding:40px 14px;
      text-align:center;
      color:var(--muted);
      border:1px dashed rgba(120,80,70,.18);
      border-radius:20px;
      background:rgba(255,255,255,.58);
    }

    .detail-title{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .detail-title h2{
      margin:0;
      font-size:20px;
      line-height:1.3;
      word-break:break-all;
    }

    .detail-sub{
      color:var(--muted);
      font-size:12px;
      margin-top:5px;
      line-height:1.55;
    }

    .quick-actions{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin:12px 0;
    }

    .kv{
      display:grid;
      grid-template-columns:120px minmax(0,1fr);
      gap:10px;
      padding:9px 0;
      border-bottom:1px solid rgba(120,80,70,.07);
      font-size:13px;
      line-height:1.5;
    }

    .kv .k{color:var(--muted);font-weight:800}
    .kv .v{word-break:break-word}

    .small-note{
      margin-top:10px;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,245,238,.75);
      border:1px solid rgba(120,80,70,.08);
      color:var(--muted);
      font-size:12px;
      line-height:1.65;
    }

    .footer-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    @media(max-width:900px){
      .hero{display:block;padding:20px}
      .grid{grid-template-columns:1fr}
      .list{max-height:none}
      .row{grid-template-columns:1fr}
      .col-2,.col-3,.col-4,.col-5,.col-6,.col-7,.col-8,.col-12{grid-column:span 1}
      .quick-actions{grid-template-columns:1fr}
      .meta{grid-template-columns:1fr}
    }
  </style>
</head>

<body>
  <div class="page-tabs">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html" target="_blank" rel="noopener noreferrer">直播主開單</a>
      <a class="page-tab" href="/admin.html" target="_blank" rel="noopener noreferrer">訂單後台</a>
      <a class="page-tab" href="/stock-in.html" target="_blank" rel="noopener noreferrer">入庫</a>
      <a class="page-tab is-active" href="/admin-preorder.html">預購</a>
      <a class="page-tab" href="/shop-product-admin" target="_blank" rel="noopener noreferrer">上架官網</a>
      <a class="page-tab" href="/stock.html" target="_blank" rel="noopener noreferrer">庫存</a>
      <a class="page-tab" href="/admin-auction.html" target="_blank" rel="noopener noreferrer">寄賣競標</a>
      <a class="page-tab" href="/procurement-center/procurement-index.html" target="_blank" rel="noopener noreferrer">進貨</a>
      <a class="page-tab" href="/company-files/company-profit-summary.html" target="_blank" rel="noopener noreferrer">公司檔案管理</a>
    </div>
  </div>

  <div class="wrap">
    <section class="hero">
      <div>
        <small>PREORDER ADMIN</small>
        <h1>預購登記後台</h1>
        <p>管理 PreOrders 預購登記資料。第一版先做預購清單、狀態、定金確認、到貨 SKU 與到貨可結帳資料維護。</p>
      </div>
      <div>
        <button class="ghost" id="btnLogout" type="button" style="display:none;">登出</button>
      </div>
    </section>

    <section class="card" id="loginCard">
      <h2 style="margin:0 0 10px;font-size:20px;">後台登入</h2>
      <div class="row">
        <div class="col-8">
          <label for="opKeyInput">統一密碼 / 主管密碼</label>
          <input id="opKeyInput" type="password" placeholder="輸入統一密碼或主管密碼">
        </div>
        <div class="col-4">
          <button id="btnLogin" type="button">登入</button>
        </div>
      </div>
      <div class="status-line" id="loginMsg"></div>
    </section>

    <section id="app" class="hidden">
      <section class="card">
        <div class="row">
          <div class="col-3">
            <label for="statusFilter">預購狀態</label>
            <select id="statusFilter">
              <option value="">全部狀態</option>
              <option>等待到貨</option>
              <option>已到貨待通知</option>
              <option>已通知</option>
              <option>已取消</option>
              <option>已完成</option>
            </select>
          </div>
          <div class="col-5">
            <label for="keywordInput">搜尋</label>
            <input id="keywordInput" placeholder="預購單號 / 客人 / 電話 / LINE / 商品 / SKU">
          </div>
          <div class="col-2">
            <button id="btnLoad" type="button">載入清單</button>
          </div>
          <div class="col-2">
            <button class="ghost" id="btnClear" type="button">清除</button>
          </div>
        </div>
        <div class="status-line" id="listMsg"></div>
      </section>

      <div class="grid">
        <section class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;">
            <b>預購清單</b>
            <span class="badge" id="countBadge">0 筆</span>
          </div>
          <div class="list" id="preorderList"></div>
        </section>

        <section class="card" id="detailCard">
          <div class="empty">請先從左側選擇一筆預購登記</div>
        </section>
      </div>
    </section>
  </div>

<script>
(function(){
  const API = String(window.API_BASE || "https://api.murain.tw").replace(/\/+$/,"");
  const KEY_STORAGE = "MURAIN_ADMIN_PREORDER_OP_KEY";

  const $ = (id) => document.getElementById(id);

  const loginCard = $("loginCard");
  const app = $("app");
  const opKeyInput = $("opKeyInput");
  const loginMsg = $("loginMsg");
  const btnLogin = $("btnLogin");
  const btnLogout = $("btnLogout");

  const statusFilter = $("statusFilter");
  const keywordInput = $("keywordInput");
  const btnLoad = $("btnLoad");
  const btnClear = $("btnClear");
  const listMsg = $("listMsg");
  const preorderList = $("preorderList");
  const detailCard = $("detailCard");
  const countBadge = $("countBadge");

  let OP = "";
  let items = [];
  let selected = null;

  function saveKey(v){
    OP = String(v || "").trim();
    if (OP) localStorage.setItem(KEY_STORAGE, OP);
  }

  function loadKey(){
    OP = String(localStorage.getItem(KEY_STORAGE) || "").trim();
    if (OP) opKeyInput.value = OP;
  }

  function money(n){
    const v = Math.round(Number(n || 0) || 0);
    return "NT$ " + v.toLocaleString("zh-TW");
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function ymd(v){
    if (!v) return "";
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v || "");
    return d.getFullYear() + "/" + String(d.getMonth()+1).padStart(2,"0") + "/" + String(d.getDate()).padStart(2,"0");
  }

  function badgeClass(status){
    const s = String(status || "");
    if (s.includes("完成") || s.includes("已通知")) return "ok";
    if (s.includes("取消")) return "bad";
    return "wait";
  }

  async function api(path, payload){
    const r = await fetch(API + path, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      credentials:"include",
      body:JSON.stringify(payload || {})
    });

    const text = await r.text();
    let j = {};
    try { j = JSON.parse(text); } catch(e){}

    if (!r.ok || !j.ok) {
      throw new Error(j.message || j.error || text.slice(0,200) || "API 失敗");
    }

    return j;
  }

  function showApp(){
    loginCard.classList.add("hidden");
    app.classList.remove("hidden");
    btnLogout.style.display = "";
  }

  function showLogin(){
    app.classList.add("hidden");
    loginCard.classList.remove("hidden");
    btnLogout.style.display = "none";
  }

  async function loadList(){
    if (!OP) {
      listMsg.textContent = "請先登入";
      listMsg.className = "status-line err";
      showLogin();
      return;
    }

    listMsg.textContent = "讀取預購清單中…";
    listMsg.className = "status-line";
    preorderList.innerHTML = "";
    detailCard.innerHTML = '<div class="empty">請先從左側選擇一筆預購登記</div>';
    selected = null;

    try {
      const res = await api("/op/preorders/list", {
        op_key: OP,
        status: statusFilter.value,
        q: keywordInput.value
      });

      items = Array.isArray(res.items) ? res.items : [];
      renderList();

      listMsg.textContent = items.length ? "已載入預購清單" : "目前沒有符合條件的預購資料";
      listMsg.className = "status-line ok";
    } catch (e) {
      listMsg.textContent = "載入失敗：" + (e.message || e);
      listMsg.className = "status-line err";

      if (String(e.message || "").includes("bad_op_key") || String(e.message || "").includes("forbidden")) {
        localStorage.removeItem(KEY_STORAGE);
        OP = "";
        showLogin();
      }
    }
  }

  function renderList(){
    countBadge.textContent = items.length + " 筆";
    preorderList.innerHTML = "";

    if (!items.length) {
      preorderList.innerHTML = '<div class="empty">尚無預購資料</div>';
      return;
    }

    items.forEach((it) => {
      const node = document.createElement("div");
      node.className = "item" + (selected && selected.id === it.id ? " active" : "");
      node.innerHTML = `
        <div class="item-head">
          <div>
            <div class="po">${esc(it.preorder_id || it.id || "—")}</div>
            <div class="date">${esc(ymd(it.created_at) || "—")}</div>
          </div>
          <span class="badge ${badgeClass(it.preorder_status)}">${esc(it.preorder_status || "等待到貨")}</span>
        </div>

        <div class="meta">
          <div>客人：<b>${esc(it.customer_name || "—")}</b></div>
          <div>電話：<b>${esc(it.phone || "—")}</b></div>
          <div>商品：<b>${esc(it.product_name || "—")}</b></div>
          <div>數量：<b>${esc(it.qty || 1)}</b></div>
          <div>付款：<b>${esc(it.payment_status || "—")}</b></div>
          <div>到貨：<b>${esc(it.arrival_notify_status || "未到貨")}</b></div>
        </div>
      `;

      node.addEventListener("click", () => {
        selected = it;
        renderList();
        renderDetail(it);
      });

      preorderList.appendChild(node);
    });
  }

  function val(v){ return String(v == null ? "" : v); }

  function renderDetail(it){
    const canCheckoutChecked = it.arrived_can_checkout ? "checked" : "";

    detailCard.innerHTML = `
      <div class="detail-title">
        <div>
          <h2>${esc(it.preorder_id || it.id)}</h2>
          <div class="detail-sub">
            ${esc(it.customer_name || "—")}｜${esc(it.phone || "—")}｜LINE：${esc(it.line_name || "—")}
          </div>
        </div>
        <span class="badge ${badgeClass(it.preorder_status)}">${esc(it.preorder_status || "等待到貨")}</span>
      </div>

      <div class="quick-actions">
        <button class="ok" id="btnConfirmDeposit" type="button">確認定金</button>
        <button class="warn" id="btnMarkArrived" type="button">標記已到貨</button>
        <button class="danger" id="btnCancelPo" type="button">取消預購</button>
        <button class="ghost" id="btnDonePo" type="button">標記完成</button>
      </div>

      <div class="kv"><div class="k">商品</div><div class="v">${esc(it.product_name || "—")}</div></div>
      <div class="kv"><div class="k">規格</div><div class="v">${esc(it.product_spec || "—")}</div></div>
      <div class="kv"><div class="k">備註</div><div class="v">${esc(it.note || "—")}</div></div>
      <div class="kv"><div class="k">預付定金</div><div class="v">${esc(money(it.deposit_amount || 0))}　後五碼：${esc(it.deposit_last5 || "—")}</div></div>
      <div class="kv"><div class="k">LineUserId</div><div class="v">${esc(it.line_user_id || "—")}</div></div>

      <hr style="border:0;border-top:1px solid rgba(120,80,70,.10);margin:16px 0;">

      <div class="row">
        <div class="col-6">
          <label for="fPreStatus">預購狀態</label>
          <select id="fPreStatus">
            ${optionHtml(["等待到貨","已到貨待通知","已通知","已取消","已完成"], it.preorder_status || "等待到貨")}
          </select>
        </div>
        <div class="col-6">
          <label for="fPayStatus">付款狀態</label>
          <select id="fPayStatus">
            ${optionHtml(["不需定金","未確認定金","已確認定金","已取消"], it.payment_status || "不需定金")}
          </select>
        </div>

        <div class="col-6">
          <label for="fArrivalStatus">到貨通知狀態</label>
          <select id="fArrivalStatus">
            ${optionHtml(["未到貨","已到貨待通知","已發送到貨結帳通知"], it.arrival_notify_status || "未到貨")}
          </select>
        </div>
        <div class="col-6">
          <label style="display:flex;align-items:center;gap:8px;margin-top:25px;">
            <input id="fCanCheckout" type="checkbox" ${canCheckoutChecked} style="width:auto;min-height:auto;">
            到貨可結帳
          </label>
        </div>

        <div class="col-6">
          <label for="fSku">到貨商品 SKU</label>
          <input id="fSku" value="${esc(val(it.arrived_sku))}" placeholder="例：C000123">
        </div>
        <div class="col-6">
          <label for="fArrivedName">到貨商品名稱</label>
          <input id="fArrivedName" value="${esc(val(it.arrived_product_name))}" placeholder="正式入庫商品名稱">
        </div>

        <div class="col-4">
          <label for="fArrivedRecordId">到貨商品 RecordId</label>
          <input id="fArrivedRecordId" value="${esc(val(it.arrived_product_record_id))}" placeholder="rec...">
        </div>
        <div class="col-4">
          <label for="fArrivedQty">到貨數量</label>
          <input id="fArrivedQty" type="number" min="0" step="1" value="${esc(val(it.arrived_qty || it.qty || 1))}">
        </div>
        <div class="col-4">
          <label for="fArrivedPrice">到貨商品單價</label>
          <input id="fArrivedPrice" type="number" min="0" step="1" value="${esc(val(it.arrived_price || 0))}">
        </div>

        <div class="col-6">
          <label for="fCheckoutUrl">到貨結帳連結</label>
          <input id="fCheckoutUrl" value="${esc(val(it.checkout_url))}" placeholder="下一階段自動產生">
        </div>
        <div class="col-6">
          <label for="fCartToken">結帳購物車 Token</label>
          <input id="fCartToken" value="${esc(val(it.checkout_cart_token))}" placeholder="下一階段自動產生">
        </div>

        <div class="col-12">
          <label for="fInternalNote">內部備註</label>
          <textarea id="fInternalNote" placeholder="小幫手內部紀錄">${esc(val(it.internal_note))}</textarea>
        </div>
      </div>

      <div class="small-note">
        第一版先儲存 PreOrders 欄位，不會建立購物車、不會發到貨結帳 LINE 卡片。下一階段才會把「到貨 SKU → 建購物車 → 發 LINE 結帳卡片」接上。
      </div>

      <div class="footer-actions">
        <button id="btnSave" type="button">儲存預購資料</button>
        <button class="ghost" id="btnCopyPo" type="button">複製預購單號</button>
      </div>

      <div class="status-line" id="detailMsg"></div>
    `;

    $("btnSave").addEventListener("click", () => saveDetail(it.id));
    $("btnCopyPo").addEventListener("click", async () => {
      const text = it.preorder_id || "";
      try {
        await navigator.clipboard.writeText(text);
        detailMsg("已複製：" + text, "ok");
      } catch(e) {
        detailMsg("複製失敗，請手動複製", "err");
      }
    });

    $("btnConfirmDeposit").addEventListener("click", () => quickPatch(it.id, { payment_status:"已確認定金" }));
    $("btnMarkArrived").addEventListener("click", () => {
      $("fPreStatus").value = "已到貨待通知";
      $("fArrivalStatus").value = "已到貨待通知";
      $("fCanCheckout").checked = true;
      saveDetail(it.id);
    });
    $("btnCancelPo").addEventListener("click", () => {
      if (!confirm("確定要取消這筆預購？")) return;
      quickPatch(it.id, { preorder_status:"已取消", payment_status:"已取消" });
    });
    $("btnDonePo").addEventListener("click", () => quickPatch(it.id, { preorder_status:"已完成" }));
  }

  function optionHtml(list, current){
    return list.map(x => `<option value="${esc(x)}" ${x === current ? "selected" : ""}>${esc(x)}</option>`).join("");
  }

  function detailMsg(text, cls){
    const el = $("detailMsg");
    if (!el) return;
    el.textContent = text || "";
    el.className = "status-line" + (cls ? " " + cls : "");
  }

  async function quickPatch(recordId, patch){
    try {
      detailMsg("更新中…");
      await api("/op/preorders/update", {
        op_key: OP,
        record_id: recordId,
        ...patch
      });
      detailMsg("已更新", "ok");
      await loadList();
    } catch(e) {
      detailMsg("更新失敗：" + (e.message || e), "err");
    }
  }

  async function saveDetail(recordId){
    if (!recordId) return;

    const payload = {
      op_key: OP,
      record_id: recordId,
      preorder_status: $("fPreStatus").value,
      payment_status: $("fPayStatus").value,
      arrival_notify_status: $("fArrivalStatus").value,
      internal_note: $("fInternalNote").value,

      arrived_sku: $("fSku").value,
      arrived_product_name: $("fArrivedName").value,
      arrived_product_record_id: $("fArrivedRecordId").value,
      arrived_qty: $("fArrivedQty").value,
      arrived_price: $("fArrivedPrice").value,
      arrived_can_checkout: $("fCanCheckout").checked,

      checkout_url: $("fCheckoutUrl").value,
      checkout_cart_token: $("fCartToken").value
    };

    try {
      detailMsg("儲存中…");
      await api("/op/preorders/update", payload);
      detailMsg("已儲存預購資料", "ok");
      await loadList();
    } catch(e) {
      detailMsg("儲存失敗：" + (e.message || e), "err");
    }
  }

  btnLogin.addEventListener("click", () => {
    const k = opKeyInput.value.trim();
    if (!k) {
      loginMsg.textContent = "請輸入密碼";
      loginMsg.className = "status-line err";
      return;
    }

    saveKey(k);
    loginMsg.textContent = "";
    showApp();
    loadList();
  });

  btnLogout.addEventListener("click", () => {
    localStorage.removeItem(KEY_STORAGE);
    OP = "";
    opKeyInput.value = "";
    showLogin();
  });

  btnLoad.addEventListener("click", loadList);

  btnClear.addEventListener("click", () => {
    statusFilter.value = "";
    keywordInput.value = "";
    loadList();
  });

  keywordInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") loadList();
  });

  loadKey();
  if (OP) {
    showApp();
    loadList();
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
