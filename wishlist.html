<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>XUYUAN | 我的收藏</title>
  <meta name="description" content="XUYUAN 我的收藏商品" />

  <link rel="stylesheet" href="/common-shell.css" />

  <style>
    body{
      margin:0;
      background:
        radial-gradient(circle at 18% 0%, rgba(255,236,232,.72) 0%, transparent 34%),
        linear-gradient(180deg, #fff9f6 0%, #f6efeb 100%);
      color:#211815;
      font-family:'Noto Sans TC', system-ui, sans-serif;
    }

    .wish-page{
      min-height:100vh;
      padding:26px 16px 90px;
    }

    .wish-head{
      max-width:980px;
      margin:0 auto 24px;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
    }

    .wish-title{
      margin:0;
      font-size:28px;
      font-weight:600;
      letter-spacing:.06em;
      color:#4a3b36;
    }

    .wish-back{
      color:#8f7668;
      text-decoration:none;
      font-size:13px;
      letter-spacing:.08em;
    }

    .wish-grid{
      max-width:980px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:18px;
      row-gap:34px;
    }

    .wish-card{
      position:relative;
      cursor:pointer;
    }

    .wish-img{
      position:relative;
      width:100%;
      padding-top:134%;
      border-radius:8px;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,.55), transparent 42%),
        linear-gradient(180deg, #f2ebe6 0%, #e9ded7 100%);
      margin-bottom:14px;
    }

    .wish-img img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .wish-remove{
      position:absolute;
      top:10px;
      right:10px;
      z-index:2;
      width:34px;
      height:34px;
      border:0;
      border-radius:999px;
      background:rgba(255,255,255,.78);
      color:#ef6b91;
      font-size:22px;
      cursor:pointer;
    }

    .wish-brand{
      color:#a9826b;
      font-size:10px;
      font-weight:700;
      letter-spacing:.22em;
      text-transform:uppercase;
      margin-bottom:8px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .wish-name{
      min-height:40px;
      font-size:14px;
      line-height:1.45;
      color:#211815;
    }

    .wish-price{
      margin-top:10px;
      font-family:Georgia, 'Times New Roman', serif;
      font-size:20px;
      color:#211815;
    }

    .wish-empty{
      max-width:520px;
      margin:90px auto;
      text-align:center;
      color:#9b8377;
      letter-spacing:.08em;
      line-height:1.8;
    }

    .wish-empty a{
      display:inline-flex;
      margin-top:20px;
      padding:12px 22px;
      border-radius:999px;
      background:#211815;
      color:#fff;
      text-decoration:none;
      font-size:13px;
    }

    @media (min-width:768px){
      .wish-grid{
        grid-template-columns:repeat(4, minmax(0,1fr));
      }
    }
  </style>
</head>

<body>
  <main class="wish-page">
    <div class="wish-head">
      <h1 class="wish-title">我的收藏</h1>
      <a class="wish-back" href="/shop.html">返回商城</a>
    </div>

    <div id="wishGrid" class="wish-grid"></div>
    <div id="wishEmpty" class="wish-empty" hidden>
      目前還沒有收藏商品<br>
      <a href="/shop.html">去逛逛新品</a>
    </div>
  </main>

  <script>
    const XUYUAN_WISHLIST_KEY = 'xuyuan_wishlist_v1';

    function getWishlist(){
      try{
        return JSON.parse(localStorage.getItem(XUYUAN_WISHLIST_KEY) || '[]');
      }catch(e){
        return [];
      }
    }

    function saveWishlist(list){
      localStorage.setItem(XUYUAN_WISHLIST_KEY, JSON.stringify(list || []));
    }

    function escapeHtml(str){
      return String(str || '').replace(/[&<>"']/g, s => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[s]));
    }

    function renderWishlist(){
      const grid = document.getElementById('wishGrid');
      const empty = document.getElementById('wishEmpty');
      const list = getWishlist();

      grid.innerHTML = '';
      empty.hidden = list.length > 0;

      list.forEach(item => {
        const card = document.createElement('div');
        card.className = 'wish-card';

        const img = item.image ? `
          <img src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}">
        ` : '';

        card.innerHTML = `
          <button class="wish-remove" type="button" aria-label="移除收藏">♥</button>
          <div class="wish-img">${img}</div>
          <div class="wish-brand">${escapeHtml(item.brand || 'XUYUAN SELECT')}</div>
          <div class="wish-name">${escapeHtml(item.title)}</div>
          <div class="wish-price">NT$ ${Number(item.price || 0).toLocaleString()}</div>
        `;

        card.addEventListener('click', () => {
          if(item.sku){
            location.href = '/product.html?sku=' + encodeURIComponent(item.sku);
          }
        });

        card.querySelector('.wish-remove').addEventListener('click', e => {
          e.preventDefault();
          e.stopPropagation();

          const next = getWishlist().filter(x => String(x.sku) !== String(item.sku));
          saveWishlist(next);
          renderWishlist();
        });

        grid.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', renderWishlist);
  </script>
</body>
</html>
