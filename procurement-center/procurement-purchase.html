  <script>
    const STORAGE_OK = "procurement_entry_ok";

const API_CREATE = "https://api.murain.tw/op/procurement/purchase/create-with-items";
const API_PURCHASE_CHECK = "https://api.murain.tw/op/procurement/purchase/check";
const API_BAD_LIST = "https://api.murain.tw/op/procurement/purchase/bad-list";
const API_RECENT_LIST = "https://api.murain.tw/op/procurement/purchase/recent-list";

const $ = (id) => document.getElementById(id);
const rowsEl = $("itemRows");
const msgEl = $("msg");
const btnSubmit = $("btnSubmit");
const btnAddRow = $("btnAddRow");

const ITEM_COLS = [
  "name",
  "qty",
  "usdUnitPrice",
  "color",
  "size",
  "packageCode"
];

const MAIN_FIELDS = ["vendor", "orderNo", "usdTotal", "twdAfterTax", "usdRate", "buyDate"];

    function normalizeDateInput(v) {
  let s = String(v || "").trim();
  if (!s) return "";
  s = s.replace(/\./g, "-").replace(/\//g, "-");
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (!m) return s;
  return `${m[1]}-${String(m[2]).padStart(2, "0")}-${String(m[3]).padStart(2, "0")}`;
}

function resetPurchaseForm() {
  $("vendor").value = "";
  $("twdAfterTax").value = "";
  $("orderNo").value = "";
  $("usdTotal").value = "";
  $("usdRate").value = "";
  $("buyDate").value = "";
  $("packageCode").value = "";

  if ($("quickOrderNo")) $("quickOrderNo").value = "";
setPurchaseCheckResult("尚未查詢");

  rowsEl.innerHTML = "";
  createRow();
  refreshRows();
}

function getRowList() {
  return [...rowsEl.querySelectorAll("tr")];
}

function ensureRowCount(targetCount) {
  while (getRowList().length < targetCount) {
    createRow();
  }
}

function focusMainNext(currentId) {
  const idx = MAIN_FIELDS.indexOf(currentId);
  if (idx < 0) return;
  const nextId = MAIN_FIELDS[idx + 1];
  if (!nextId) {
    const firstRowName = rowsEl.querySelector("tr .name");
    if (firstRowName) firstRowName.focus();
    return;
  }
  const nextEl = $(nextId);
  if (nextEl) nextEl.focus();
}

function bindMainEnterNav() {
  MAIN_FIELDS.forEach((id) => {
    const el = $(id);
    if (!el) return;
    el.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      focusMainNext(id);
    });
  });
}

function moveToNextRowSameCol(currentEl, selector) {
  const tr = currentEl.closest("tr");
  if (!tr) return;
  const rows = getRowList();
  const rowIndex = rows.indexOf(tr);
  if (rowIndex < 0) return;

  ensureRowCount(rowIndex + 2);
  const nextRows = getRowList();
  const nextTr = nextRows[rowIndex + 1];
  const nextEl = nextTr?.querySelector(selector);
  if (nextEl) nextEl.focus();
}

function updateRowReadyState(tr) {
  if (!tr) return;
  const packageCode = tr.querySelector(".packageCode")?.value.trim() || "";
  tr.classList.toggle("row-ready", !!packageCode);
}

function handleSingleColumnPaste(e) {
  const target = e.target;
  if (!(target instanceof HTMLInputElement)) return;

  const colKey = ITEM_COLS.find(k => target.classList.contains(k));
  if (!colKey) return;

  const text = e.clipboardData?.getData("text/plain") || "";
  if (!text) return;

  const lines = String(text)
    .replace(/\r\n/g, "\n")
    .replace(/\r/g, "\n")
    .split("\n")
    .map(s => s.trim())
    .filter(Boolean);

  // 單一值就保留原本貼上
  if (lines.length <= 1) return;

  e.preventDefault();

  const startTr = target.closest("tr");
  if (!startTr) return;

  const rowListBefore = getRowList();
  const startRowIndex = rowListBefore.indexOf(startTr);
  if (startRowIndex < 0) return;

  ensureRowCount(startRowIndex + lines.length);

  const rowList = getRowList();

  lines.forEach((val, idx) => {
    const tr = rowList[startRowIndex + idx];
    if (!tr) return;

    const input = tr.querySelector(`.${colKey}`);
    if (!input) return;

    input.value = val;
  });

  refreshRows();
}

    function setMsg(text, type) {
      msgEl.textContent = text || "";
      msgEl.className = "msg";
      if (type === "ok") msgEl.classList.add("ok");
      if (type === "err") msgEl.classList.add("err");
    }

    async function apiFetch(url, payload) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}

    async function createDirectUploadUrl(filename) {
  const r = await fetch(API_IMAGE_DIRECT_UPLOAD, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ filename })
  });

  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "建立圖片上傳網址失敗");
  }
  return data;
}

async function uploadImageToCloudflare(file) {
  if (!file) return { imageUrl: "", imageId: "" };

  const info = await createDirectUploadUrl(file.name);

  const form = new FormData();
  form.append("file", file, file.name);

  const uploadResp = await fetch(info.upload_url, {
    method: "POST",
    body: form
  });

  if (!uploadResp.ok) {
    throw new Error(`圖片上傳失敗：${uploadResp.status}`);
  }

  return {
    imageUrl: info.image_url || "",
    imageId: info.image_id || ""
  };
}

    async function apiGet(url) {
  const r = await fetch(url);
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "查詢失敗");
  }
  return data;
}

function setPurchaseCheckResult(text) {
  const el = $("purchaseCheckResult");
  if (el) el.textContent = text || "";
}

async function checkPurchaseQuick() {
  const orderNo = $("quickOrderNo")?.value.trim();
  if (!orderNo) {
    setPurchaseCheckResult("請先輸入訂單編號。");
    return;
  }

  setPurchaseCheckResult("查詢中...");

  try {
    const data = await apiGet(`${API_PURCHASE_CHECK}?orderNo=${encodeURIComponent(orderNo)}`);

    if (!data.exists) {
      setPurchaseCheckResult(`查無訂單編號：${orderNo}`);
      return;
    }

    const lines = [
      `訂單編號：${data.order_no || orderNo}`,
      `採購單 ID：${data.purchase_id || "-"}`,
      `進貨商：${data.vendor || "-"}`,
      `購買日期：${data.buy_date || "-"}`,
      `包裹編號：${data.package_code || "-"}`,
      `商品數：${data.item_count ?? 0}`,
      `訂單核對：${data.order_check || "-"}`
    ];

    setPurchaseCheckResult(lines.join("\n"));
  } catch (err) {
    setPurchaseCheckResult(`❌ ${err.message || err}`);
  }
}

async function loadBadPurchases() {
  const wrap = $("badOrderList");
  if (!wrap) return;

  wrap.innerHTML = `<div class="bad-empty">載入中...</div>`;

  try {
    const data = await apiGet(API_BAD_LIST);
    const rows = Array.isArray(data.rows) ? data.rows : [];

    if (!rows.length) {
      wrap.innerHTML = `<div class="bad-empty">目前沒有訂單核對為 ❌ 的清單。</div>`;
      return;
    }

    wrap.innerHTML = rows.map(row => `
      <div class="bad-item">
        <div class="bad-top">
          <strong>${escapeHtml(row.orderNo || "-")}</strong>
          <span class="badge">❌</span>
        </div>
        <div class="sub">
          進貨商：${escapeHtml(row.vendor || "-")}<br>
          購買日期：${escapeHtml(row.buyDate || "-")}<br>
          訂單核對：${escapeHtml(row.orderCheck || "❌")}
        </div>
      </div>
    `).join("");
  } catch (err) {
    wrap.innerHTML = `<div class="bad-empty">❌ ${escapeHtml(err.message || String(err))}</div>`;
  }
}


async function loadRecentPurchases() {
  const wrap = $("recentOrderList");
  if (!wrap) return;

  wrap.innerHTML = `<div class="bad-empty">載入中...</div>`;

  try {
    const data = await apiGet(API_RECENT_LIST);
    const rows = Array.isArray(data.rows) ? data.rows : [];

    if (!rows.length) {
      wrap.innerHTML = `<div class="bad-empty">目前沒有可顯示的訂單。</div>`;
      return;
    }

    wrap.innerHTML = rows.map(row => `
      <div class="recent-item">
        <div class="recent-date">${escapeHtml(row.buyDate || "-")}</div>
        <div class="recent-no">${escapeHtml(row.orderNo || "-")}</div>
      </div>
    `).join("");
  } catch (err) {
  wrap.innerHTML = `<div class="bad-empty">❌ ${escapeHtml(err.message || String(err))}</div>`;
}
}
    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

function createRow(data = {}) {
  const fileId = `photo_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="row-no"></td>
    <td><input class="name" value="${escapeHtml(data.name || "")}" placeholder="名稱"></td>
    <td><input class="qty" type="text" inputmode="numeric" value="${escapeHtml(data.qty || "")}" placeholder=""></td>
    <td><input class="usdUnitPrice" type="text" inputmode="decimal" value="${escapeHtml(data.usdUnitPrice || "")}" placeholder=""></td>
    <td>
      <div class="file-wrap photoPasteWrap" tabindex="0" title="點一下後可 Ctrl+V 貼上圖片，或按左側選擇檔案">
        <input id="${fileId}" class="photoFile photo-hidden" type="file" accept="image/*">
        <input class="photoUrl" type="hidden" value="${escapeHtml(data.photoUrl || "")}">
        <label class="photo-btn" for="${fileId}">選擇</label>
        <span class="photo-name">${escapeHtml(data.photoUrl ? "已上傳圖片" : "點此後 Ctrl+V / 可選檔")}</span>
      </div>
    </td>
    <td><input class="color" value="${escapeHtml(data.color || "")}" placeholder="顏色"></td>
    <td><input class="size" value="${escapeHtml(data.size || "")}" placeholder="尺寸"></td>
    <td><input class="packageCode" value="${escapeHtml(data.packageCode || "")}" placeholder="包裹編號"></td>
    <td><button type="button" class="btn danger btn-del">刪除</button></td>
  `;

  tr.querySelector(".btn-del").addEventListener("click", () => {
    tr.remove();
    refreshRows();
  });

  const fileInput = tr.querySelector(".photoFile");
  const fileName = tr.querySelector(".photo-name");
  const photoUrlInput = tr.querySelector(".photoUrl");
  const photoWrap = tr.querySelector(".photoPasteWrap");

  fileInput.addEventListener("change", () => {
  const f = fileInput.files && fileInput.files[0];
  tr._pastedPhotoFile = null;
  photoUrlInput.value = "";
  fileName.textContent = f ? "已選擇圖片" : "點此後 Ctrl+V / 可選檔";
});

  photoWrap.addEventListener("paste", (e) => {
    const items = [...(e.clipboardData?.items || [])];
    const imageItem = items.find(item => item.type && item.type.startsWith("image/"));
    if (!imageItem) return;

    e.preventDefault();
    const file = imageItem.getAsFile();
    if (!file) return;

    tr._pastedPhotoFile = file;
    photoUrlInput.value = "";
    fileName.textContent = "已貼上圖片";
  });

  photoWrap.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    moveToNextRowSameCol(photoWrap, ".photoPasteWrap");
  });

  tr.querySelectorAll('input:not([type="file"])').forEach((el) => {
    el.addEventListener("input", () => {
      refreshSummary();
      updateRowReadyState(tr);
    });
    el.addEventListener("paste", handleSingleColumnPaste);
    el.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();

      if (el.classList.contains("name")) return moveToNextRowSameCol(el, ".name");
      if (el.classList.contains("qty")) return moveToNextRowSameCol(el, ".qty");
      if (el.classList.contains("usdUnitPrice")) return moveToNextRowSameCol(el, ".usdUnitPrice");
      if (el.classList.contains("color")) return moveToNextRowSameCol(el, ".color");
      if (el.classList.contains("size")) return moveToNextRowSameCol(el, ".size");
      if (el.classList.contains("packageCode")) return moveToNextRowSameCol(el, ".packageCode");
    });
  });

  rowsEl.appendChild(tr);
  updateRowReadyState(tr);
  refreshRows();
}

    function refreshRows() {
      [...rowsEl.querySelectorAll("tr")].forEach((tr, i) => {
        tr.querySelector(".row-no").textContent = i + 1;
        updateRowReadyState(tr);
      });
      refreshSummary();
    }

    function refreshSummary() {
      const rows = collectItems();
      $("itemCount").textContent = rows.length;
      $("qtyTotal").textContent = rows.reduce((sum, row) => {
        const qty = Number(row.qty || 0);
        return sum + (Number.isFinite(qty) ? qty : 0);
      }, 0);
    }

function collectItems() {
  return [...rowsEl.querySelectorAll("tr")].map((tr) => ({
    name: tr.querySelector(".name")?.value.trim() || "",
    qty: tr.querySelector(".qty")?.value.trim() || "",
    usdUnitPrice: tr.querySelector(".usdUnitPrice")?.value.trim() || "",
    photoUrl: tr.querySelector(".photoUrl")?.value.trim() || "",
    color: tr.querySelector(".color")?.value.trim() || "",
    size: tr.querySelector(".size")?.value.trim() || "",
    packageCode: tr.querySelector(".packageCode")?.value.trim() || ""
  }));
}

    function calcTwd() {
      const usd = Number($("usdTotal").value || 0);
      const rate = Number($("usdRate").value || 0);
      if (usd > 0 && rate > 0) {
        $("twdAfterTax").value = Math.round(usd * rate);
      }
    }

async function submitForm() {
  const payload = {
    purchase: {
      vendor: $("vendor").value.trim(),
      orderNo: $("orderNo").value.trim(),
      usdTotal: $("usdTotal").value.trim(),
      twdAfterTax: $("twdAfterTax").value.trim(),
      usdRate: $("usdRate").value.trim(),
      buyDate: $("buyDate").value.trim(),
      packageCode: $("packageCode")?.value.trim() || ""
    },
    items: collectItems()
  };

  if (!payload.purchase.vendor) {
    setMsg("❌ 請先選擇進貨商。", "err");
    return;
  }
  if (!payload.purchase.orderNo) {
    setMsg("❌ 請先輸入訂單編號。", "err");
    return;
  }
  if (!payload.items.length) {
    setMsg("❌ 請至少新增 1 列商品。", "err");
    return;
  }

  const defaultPackageCode = payload.purchase.packageCode || "";

  let validItems = payload.items
    .filter(row =>
      row.name || row.qty || row.usdUnitPrice || row.photoUrl || row.color || row.size || row.packageCode
    )
    .map(row => ({
      ...row,
      packageCode: row.packageCode || defaultPackageCode
    }));

  if (!validItems.length) {
    setMsg("❌ 商品明細目前都是空白列。", "err");
    return;
  }

  const missingPackageRow = validItems.findIndex(row => !row.packageCode);
  if (missingPackageRow >= 0) {
    setMsg(`❌ 第 ${missingPackageRow + 1} 列商品沒有包裹編號。`, "err");
    return;
  }

  btnSubmit.disabled = true;
  setMsg("圖片上傳中...");

  try {
    const rowEls = [...rowsEl.querySelectorAll("tr")];

    for (let i = 0; i < validItems.length; i++) {
      const row = validItems[i];
      const tr = rowEls[i];
      const fileInput = tr?.querySelector(".photoFile");
      const photoUrlInput = tr?.querySelector(".photoUrl");
      const fileName = tr?.querySelector(".photo-name");
      const file = tr?._pastedPhotoFile || fileInput?.files?.[0];

      if (file) {
        const uploaded = await uploadImageToCloudflare(file);
        row.photoUrl = uploaded.imageUrl || "";
        if (photoUrlInput) photoUrlInput.value = row.photoUrl || "";
        if (fileName) fileName.textContent = row.photoUrl ? "已上傳圖片" : file.name;
      } else {
        row.photoUrl = row.photoUrl || "";
      }
    }

    payload.items = validItems;

    setMsg("送出中...");

    const data = await apiFetch(API_CREATE, payload);

    setMsg(
`✅ 建立成功
採購單 ID：${data.purchase_id || ""}
包裹數：${data.package_created_count || 0}
包裹編號：${Array.isArray(data.package_codes) ? data.package_codes.join("、") : ""}
成功商品筆數：${data.item_created_count || 0}
失敗商品筆數：${data.item_failed_count || 0}

${data.item_failed_count ? "失敗明細：\n" + JSON.stringify(data.failed_items || [], null, 2) : "全部商品都已建立完成。"}`,
      "ok"
    );

    resetPurchaseForm();
    loadBadPurchases();
  } catch (err) {
    setMsg("❌ " + (err.message || err), "err");
  } finally {
    btnSubmit.disabled = false;
  }
}

btnAddRow.addEventListener("click", () => createRow());
btnSubmit.addEventListener("click", submitForm);

const btnCheckPurchase = $("btnCheckPurchase");
if (btnCheckPurchase) {
  btnCheckPurchase.addEventListener("click", checkPurchaseQuick);
}

const quickOrderNo = $("quickOrderNo");
if (quickOrderNo) {
  quickOrderNo.addEventListener("keydown", (e) => {
    if (e.key === "Enter") checkPurchaseQuick();
  });
}

const vendorEl = $("vendor");
if (vendorEl) {
  vendorEl.addEventListener("change", calcTwd);
}
["usdTotal", "usdRate"].forEach((id) => {
  const el = $(id);
  if (el) el.addEventListener("input", calcTwd);
});

const buyDateEl = $("buyDate");
if (buyDateEl) {
  buyDateEl.addEventListener("blur", () => {
    buyDateEl.value = normalizeDateInput(buyDateEl.value);
  });

  buyDateEl.addEventListener("paste", (e) => {
    const text = e.clipboardData?.getData("text/plain") || "";
    if (!text) return;
    e.preventDefault();
    buyDateEl.value = normalizeDateInput(text);
  });
}

bindMainEnterNav();
createRow();
loadBadPurchases();
loadRecentPurchases();
  </script>
</body>
</html>
