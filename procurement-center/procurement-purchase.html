    function normalizeDateInput(v) {
  let s = String(v || "").trim();
  if (!s) return "";
  s = s.replace(/\./g, "-").replace(/\//g, "-");
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (!m) return s;
  return `${m[1]}-${String(m[2]).padStart(2, "0")}-${String(m[3]).padStart(2, "0")}`;
}

    function setPdfImportStatus(text, type = "") {
  const el = $("pdfImportStatus");
  if (!el) return;
  el.textContent = text || "";
  el.style.color = type === "err" ? "var(--danger)" : (type === "ok" ? "var(--ok)" : "var(--muted)");
}

function normalizePdfNumber(v) {
  return String(v == null ? "" : v).replace(/,/g, "").trim();
}

function formatPdfDate(y, m, d) {
  return `${String(y).padStart(4, "0")}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
}

function pickPdfDate(text, label) {
  const re = new RegExp(`${label}\\s*(\\d{4})年\\s*(\\d{1,2})月\\s*(\\d{1,2})日`);
  const m = String(text || "").match(re);
  return m ? formatPdfDate(m[1], m[2], m[3]) : "";
}

function setSelectIfExists(id, value) {
  const el = $(id);
  if (!el || !value) return;

  const wanted = String(value).trim();
  const option = [...el.options].find(opt => opt.value === wanted || opt.textContent.trim() === wanted);
  if (option) el.value = option.value;
}

function parsePurchasePdfText(rawText) {
  const text = String(rawText || "")
    .replace(/\u00a0/g, " ")
    .replace(/[ \t]+/g, " ")
    .trim();

  const flat = text.replace(/\s+/g, " ");
  const parsed = {
    purchase: {
      vendor: "",
      orderNo: "",
      usdTotal: "",
      twdAfterTax: "",
      usdRate: "",
      buyDate: ""
    },
    items: []
  };

  if (/Buyforyou|Buy\s*&\s*Ship/i.test(flat)) {
    parsed.purchase.vendor = "Buy&Ship";
  } else if (/MICHAEL\s*KORS/i.test(flat)) {
    parsed.purchase.vendor = "MICHAEL KORS 官網";
  }

  const orderNo = flat.match(/訂單編號[:：]\s*([A-Z0-9-]+)/i);
  if (orderNo) parsed.purchase.orderNo = orderNo[1].trim();

  parsed.purchase.buyDate = pickPdfDate(flat, "訂購日期") || pickPdfDate(flat, "付款日期");

  const usdTotal = flat.match(/商品總值\s*US\$\s*([\d,]+(?:\.\d+)?)/i);
  if (usdTotal) parsed.purchase.usdTotal = normalizePdfNumber(usdTotal[1]);

  const usdRate = flat.match(/匯率\s*US\$\s*1\s*[≈=]\s*NT\$\s*([\d,]+(?:\.\d+)?)/i);
  if (usdRate) parsed.purchase.usdRate = normalizePdfNumber(usdRate[1]);

  const twdTotal = flat.match(/合計\s*[（(]?\s*TWD\s*[）)]?\s*NT\$\s*([\d,]+)/i);
  if (twdTotal) parsed.purchase.twdAfterTax = normalizePdfNumber(twdTotal[1]);

  const lines = text
    .split(/\n+/g)
    .map(s => s.replace(/\s+/g, " ").trim())
    .filter(Boolean);

  let inItems = false;
  const pendingNameLines = [];

  for (const line of lines) {
    if (line.includes("商品資料")) {
      inItems = true;
      continue;
    }
    if (line.includes("收費總計")) break;
    if (!inItems) continue;

    if (
      line === "品名" ||
      line === "數量" ||
      line.includes("商品單價") ||
      line === "小計" ||
      /USD/.test(line) ||
      /^（.*）$/.test(line)
    ) {
      continue;
    }

    const row = line.match(/^(.+?)\s+(\d{1,4})\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)$/);
    if (row) {
      const name = [...pendingNameLines, row[1]].join(" ").replace(/\s+/g, " ").trim();
      parsed.items.push({
        name,
        qty: normalizePdfNumber(row[2]),
        usdUnitPrice: normalizePdfNumber(row[3]),
        photoUrl: "",
        color: "",
        size: "",
        packageCode: ""
      });
      pendingNameLines.length = 0;
      continue;
    }

    pendingNameLines.push(line);
  }

  if (!parsed.items.length) {
    const sectionMatch = flat.match(/商品資料\s+(.+?)\s+收費總計/);
    const section = sectionMatch ? sectionMatch[1] : "";
    const cleaned = section
      .replace(/品名|數量|商品單價|小計|（\s*USD\s*）|\(\s*USD\s*\)/g, " ")
      .replace(/\s+/g, " ")
      .trim();

    const itemRe = /(.+?)\s+(\d{1,4})\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)(?=\s+.+?\s+\d{1,4}\s+[\d,]+(?:\.\d+)?\s+[\d,]+(?:\.\d+)?|$)/g;
    let m;
    while ((m = itemRe.exec(cleaned))) {
      parsed.items.push({
        name: m[1].replace(/\s+/g, " ").trim(),
        qty: normalizePdfNumber(m[2]),
        usdUnitPrice: normalizePdfNumber(m[3]),
        photoUrl: "",
        color: "",
        size: "",
        packageCode: ""
      });
    }
  }

  if (!parsed.purchase.usdTotal && parsed.items.length) {
    const total = parsed.items.reduce((sum, row) => {
      const qty = Number(row.qty || 0);
      const price = Number(row.usdUnitPrice || 0);
      return sum + (Number.isFinite(qty * price) ? qty * price : 0);
    }, 0);
    if (total > 0) parsed.purchase.usdTotal = total.toFixed(2);
  }

  return parsed;
}

async function readPdfTextFromFile(file) {
  if (!window.pdfjsLib) {
    throw new Error("PDF 解析套件尚未載入，請重新整理頁面後再試。");
  }

  window.pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER_SRC;

  const buffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buffer }).promise;
  const allLines = [];

  for (let pageNo = 1; pageNo <= pdf.numPages; pageNo++) {
    const page = await pdf.getPage(pageNo);
    const content = await page.getTextContent();
    const rows = new Map();

    for (const item of content.items || []) {
      const str = String(item.str || "").trim();
      if (!str) continue;

      const transform = Array.isArray(item.transform) ? item.transform : [];
      const x = Number(transform[4] || 0);
      const y = Math.round(Number(transform[5] || 0));
      const key = String(y);

      if (!rows.has(key)) rows.set(key, []);
      rows.get(key).push({ x, str });
    }

    const pageLines = [...rows.entries()]
      .sort((a, b) => Number(b[0]) - Number(a[0]))
      .map(([, arr]) => arr
        .sort((a, b) => a.x - b.x)
        .map(x => x.str)
        .join(" ")
        .replace(/\s+/g, " ")
        .trim()
      )
      .filter(Boolean);

    allLines.push(...pageLines);
  }

  return allLines.join("\n");
}

function applyPurchasePdfData(parsed) {
  const p = parsed?.purchase || {};

  setSelectIfExists("vendor", p.vendor);
  if (p.orderNo) $("orderNo").value = p.orderNo;
  if (p.usdTotal) $("usdTotal").value = p.usdTotal;
  if (p.twdAfterTax) $("twdAfterTax").value = p.twdAfterTax;
  if (p.usdRate) $("usdRate").value = p.usdRate;
  if (p.buyDate) $("buyDate").value = normalizeDateInput(p.buyDate);

  rowsEl.innerHTML = "";
  const itemRows = Array.isArray(parsed?.items) && parsed.items.length ? parsed.items : [{}];
  itemRows.forEach(row => createRow(row));
  refreshRows();

  if (!p.twdAfterTax && p.usdTotal && p.usdRate) calcTwd();
}

async function handlePdfImport() {
  const file = $("pdfImportFile")?.files?.[0];
  if (!file) {
    setPdfImportStatus("請先選擇 PDF 檔。", "err");
    return;
  }

  if (!String(file.type || "").includes("pdf") && !/\.pdf$/i.test(file.name || "")) {
    setPdfImportStatus("請上傳 PDF 檔案。", "err");
    return;
  }

  setPdfImportStatus("PDF 解析中，請稍候...");
  setMsg("PDF 解析中，正在自動填表...");

  try {
    const text = await readPdfTextFromFile(file);
    const parsed = parsePurchasePdfText(text);

    if (!parsed.purchase.orderNo && !parsed.items.length) {
      throw new Error("這份 PDF 沒有解析到訂單編號或商品明細，請確認是不是 Buyforyou 收據格式。");
    }

    applyPurchasePdfData(parsed);

    const itemCount = parsed.items.length;
    const textMsg = `✅ PDF 已自動填入${itemCount ? ` ${itemCount} 筆商品` : "資料"}。請再手動補商品照片、顏色、尺寸、包裹編號後，再按送出建立採購單。`;
    setPdfImportStatus(textMsg, "ok");
    setMsg(textMsg, "ok");
  } catch (err) {
    const msg = `❌ PDF 解析失敗：${err.message || err}`;
    setPdfImportStatus(msg, "err");
    setMsg(msg, "err");
  }
}

function focusMainNext(currentId) {

  if (idx < 0) return;

  if (!nextId) {
    const firstRowName = rowsEl.querySelector("tr .name");

  const nextEl = $(nextId);
  if (nextEl) nextEl.focus();
}

function moveToNextRowSameCol(currentEl, selector) {
  const tr = currentEl.closest("tr");
  if (!tr) return;
  const rows = getRowList();
  const rowIndex = rows.indexOf(tr);
  if (rowIndex < 0) return;

  ensureRowCount(rowIndex + 2);
  const nextRows = getRowList();
  const nextTr = nextRows[rowIndex + 1];
  const nextEl = nextTr?.querySelector(selector);
  if (nextEl) nextEl.focus();
}

function updateRowReadyState(tr) {

function handleSingleColumnPaste(e) {
  const target = e.target;
  if (!(target instanceof HTMLInputElement)) return;

  const colKey = ITEM_COLS.find(k => target.classList.contains(k));
  if (!colKey) return;

  const text = e.clipboardData?.getData("text/plain") || "";
  if (!text) return;

  const lines = String(text)
    .replace(/\r\n/g, "\n")
    .replace(/\r/g, "\n")
    .split("\n")
    .map(s => s.trim())
    .filter(Boolean);

  // 單一值就保留原本貼上
  if (lines.length <= 1) return;

  e.preventDefault();

  const startTr = target.closest("tr");
  if (!startTr) return;

  const rowListBefore = getRowList();
  const startRowIndex = rowListBefore.indexOf(startTr);
  if (startRowIndex < 0) return;

  ensureRowCount(startRowIndex + lines.length);

  const rowList = getRowList();

  lines.forEach((val, idx) => {
    const tr = rowList[startRowIndex + idx];
    if (!tr) return;

    const input = tr.querySelector(`.${colKey}`);
    if (!input) return;

    input.value = val;
  });

  refreshRows();
}

    async function apiFetch(url, payload) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}

    async function createDirectUploadUrl(filename) {
  const r = await fetch(API_IMAGE_DIRECT_UPLOAD, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ filename })
  });

  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "建立圖片上傳網址失敗");
  }
  return data;
}

async function uploadImageToCloudflare(file) {
  if (!file) return { imageUrl: "", imageId: "" };

  const info = await createDirectUploadUrl(file.name);

  const form = new FormData();
  form.append("file", file, file.name);

  const uploadResp = await fetch(info.upload_url, {
    method: "POST",
    body: form
  });

  if (!uploadResp.ok) {
    throw new Error(`圖片上傳失敗：${uploadResp.status}`);
  }

  return {
    imageUrl: info.image_url || "",
    imageId: info.image_id || ""
  };
}

    async function apiGet(url) {
  const r = await fetch(url);
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "查詢失敗");
  }
  return data;
}

async function checkPurchaseQuick() {

      `訂單核對：${data.order_check || "-"}`

    setPurchaseCheckResult(lines.join("\n"), "ok");

async function loadRecentPurchases(keyword = "") {
  const wrap = $("recentOrderList");
  if (!wrap) return;

  const kw = String(keyword || "").trim();
  wrap.innerHTML = `<div class="bad-empty">載入中...</div>`;

  try {
    const url = `${API_RECENT_LIST}?limit=80${kw ? `&keyword=${encodeURIComponent(kw)}` : ""}`;
    const data = await apiGet(url);
    const rows = Array.isArray(data.rows) ? data.rows : [];

    if (!rows.length) {
      wrap.innerHTML = `<div class="bad-empty">${kw ? "沒有找到相關訂單。" : "目前沒有可顯示的訂單。"}</div>`;
      return;
    }

    wrap.innerHTML = rows.map(row => `
      <div class="recent-item" data-order-no="${escapeHtml(row.orderNo || "")}">
        <div class="recent-date">${escapeHtml(row.buyDate || "-")}</div>
        <div class="recent-no">${escapeHtml(row.orderNo || "-")}</div>
      </div>
    `).join("");

    wrap.querySelectorAll(".recent-item").forEach((el) => {
      el.addEventListener("click", () => {
        const no = el.getAttribute("data-order-no") || "";
        if ($("quickOrderNo")) $("quickOrderNo").value = no;
        checkPurchaseQuick();
      });
    });
  } catch (err) {
    wrap.innerHTML = `<div class="bad-empty">❌ ${escapeHtml(err.message || String(err))}</div>`;
  }
}

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function moneyText(v) {
  const n = Number(String(v ?? "").replace(/,/g, "").trim());
  if (!Number.isFinite(n) || n === 0) return String(v || "");
  return n.toLocaleString("zh-TW");
}

async function saveMissingPackageItems() {
  const tbody = $("missingPackageRows");
  if (!tbody) return;

  const rows = [...tbody.querySelectorAll("tr")]
    .map((tr) => {
      const checked = tr.querySelector(".missing-row-check")?.checked;
      const itemId = tr.getAttribute("data-item-id") || "";
      const packageCode = tr.querySelector(".packageInput")?.value.trim() || "";
      return checked && itemId && packageCode
        ? { item_id: itemId, package_code: packageCode }
        : null;
    })
    .filter(Boolean);

  if (!rows.length) {
    setMsg("❌ 請先輸入包裹編號，系統會自動勾選該列。", "err");
    return;
  }

  const btn = $("btnSaveMissingPackages");
  if (btn) btn.disabled = true;
  setMsg("儲存包裹編號中...");

  try {
    const data = await apiFetch(API_MISSING_PACKAGE_SAVE, { rows });

    setMsg(
      `✅ 已儲存 ${data.updated_count || 0} 筆包裹編號${data.failed_count ? `，失敗 ${data.failed_count} 筆` : ""}`,
      data.failed_count ? "err" : "ok"
    );

    await loadMissingPackageItems();
  } catch (err) {
    setMsg("❌ " + (err.message || err), "err");
  } finally {
    if (btn) btn.disabled = false;
  }
}

function createRow(data = {}) {
  const fileId = `photo_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="row-no"></td>
    <td><input class="name" value="${escapeHtml(data.name || "")}" placeholder="名稱"></td>
    <td><input class="qty" type="text" inputmode="numeric" value="${escapeHtml(data.qty || "")}" placeholder=""></td>
    <td><input class="usdUnitPrice" type="text" inputmode="decimal" value="${escapeHtml(data.usdUnitPrice || "")}" placeholder=""></td>
    <td>
      <div class="file-wrap photoPasteWrap" tabindex="0" title="點一下後可 Ctrl+V 貼上圖片，或按左側選擇檔案">
        <input id="${fileId}" class="photoFile photo-hidden" type="file" accept="image/*">
        <input class="photoUrl" type="hidden" value="${escapeHtml(data.photoUrl || "")}">
        <label class="photo-btn" for="${fileId}">選擇</label>
        <span class="photo-name">${escapeHtml(data.photoUrl ? "已上傳圖片" : "點此後 Ctrl+V / 可選檔")}</span>
      </div>
    </td>
    <td><input class="color" value="${escapeHtml(data.color || "")}" placeholder="顏色"></td>
    <td><input class="size" value="${escapeHtml(data.size || "")}" placeholder="尺寸"></td>
    <td><input class="packageCode" value="${escapeHtml(data.packageCode || "")}" placeholder="包裹編號"></td>
    <td><button type="button" class="btn danger btn-del">刪除</button></td>
  `;

  tr.querySelector(".btn-del").addEventListener("click", () => {
    tr.remove();
    refreshRows();
  });

  const fileInput = tr.querySelector(".photoFile");
  const fileName = tr.querySelector(".photo-name");
  const photoUrlInput = tr.querySelector(".photoUrl");
  const photoWrap = tr.querySelector(".photoPasteWrap");

  fileInput.addEventListener("change", () => {
  const f = fileInput.files && fileInput.files[0];
  tr._pastedPhotoFile = null;
  photoUrlInput.value = "";
  fileName.textContent = f ? "已選擇圖片" : "點此後 Ctrl+V / 可選檔";
});

  photoWrap.addEventListener("paste", (e) => {
    const items = [...(e.clipboardData?.items || [])];
    const imageItem = items.find(item => item.type && item.type.startsWith("image/"));
    if (!imageItem) return;

    e.preventDefault();
    const file = imageItem.getAsFile();
    if (!file) return;

    tr._pastedPhotoFile = file;
    photoUrlInput.value = "";
    fileName.textContent = "已貼上圖片";
  });

  photoWrap.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    moveToNextRowSameCol(photoWrap, ".photoPasteWrap");
  });

  tr.querySelectorAll('input:not([type="file"])').forEach((el) => {
    el.addEventListener("input", () => {
      refreshSummary();
      updateRowReadyState(tr);
    });
    el.addEventListener("paste", handleSingleColumnPaste);
    el.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();

      if (el.classList.contains("name")) return moveToNextRowSameCol(el, ".name");
      if (el.classList.contains("qty")) return moveToNextRowSameCol(el, ".qty");
      if (el.classList.contains("usdUnitPrice")) return moveToNextRowSameCol(el, ".usdUnitPrice");
      if (el.classList.contains("color")) return moveToNextRowSameCol(el, ".color");
      if (el.classList.contains("size")) return moveToNextRowSameCol(el, ".size");
      if (el.classList.contains("packageCode")) return moveToNextRowSameCol(el, ".packageCode");
    });
  });

  rowsEl.appendChild(tr);
  updateRowReadyState(tr);
  refreshRows();
}

    function refreshRows() {
      [...rowsEl.querySelectorAll("tr")].forEach((tr, i) => {
        tr.querySelector(".row-no").textContent = i + 1;
        updateRowReadyState(tr);
      });
      refreshSummary();
    }

    function refreshSummary() {
      const rows = collectItems();
      $("itemCount").textContent = rows.length;
      $("qtyTotal").textContent = rows.reduce((sum, row) => {
        const qty = Number(row.qty || 0);
        return sum + (Number.isFinite(qty) ? qty : 0);
      }, 0);
    }

function collectItems() {
  return [...rowsEl.querySelectorAll("tr")].map((tr) => ({
    name: tr.querySelector(".name")?.value.trim() || "",
    qty: tr.querySelector(".qty")?.value.trim() || "",
    usdUnitPrice: tr.querySelector(".usdUnitPrice")?.value.trim() || "",
    photoUrl: tr.querySelector(".photoUrl")?.value.trim() || "",
    color: tr.querySelector(".color")?.value.trim() || "",
    size: tr.querySelector(".size")?.value.trim() || "",
    packageCode: tr.querySelector(".packageCode")?.value.trim() || ""
  }));
}

    function calcTwd() {
      const usd = Number($("usdTotal").value || 0);
      const rate = Number($("usdRate").value || 0);
      if (usd > 0 && rate > 0) {
        $("twdAfterTax").value = Math.round(usd * rate);
      }
    }

function parseMoneyNumber(v) {
  const n = Number(String(v ?? "").replace(/,/g, "").trim());
  return Number.isFinite(n) ? n : 0;
}

function calcItemsUsdTotal(items) {
  return (Array.isArray(items) ? items : []).reduce((sum, row) => {
    const qty = parseMoneyNumber(row.qty);
    const price = parseMoneyNumber(row.usdUnitPrice);
    return sum + qty * price;
  }, 0);
}

async function submitForm() {
  const payload = {
    purchase: {
      vendor: $("vendor").value.trim(),
      orderNo: $("orderNo").value.trim(),
      usdTotal: $("usdTotal").value.trim(),
      twdAfterTax: $("twdAfterTax").value.trim(),
      usdRate: $("usdRate").value.trim(),
      buyDate: $("buyDate").value.trim(),
      packageCode: $("packageCode")?.value.trim() || ""
    },
    items: collectItems()
  };

  if (!payload.purchase.vendor) {
    setMsg("❌ 請先選擇進貨商。", "err");
    return;
  }
  if (!payload.purchase.orderNo) {
    setMsg("❌ 請先輸入訂單編號。", "err");
    return;
  }

  const defaultPackageCode = payload.purchase.packageCode || "";

  let validItems = payload.items
    .filter(row =>
      row.name || row.qty || row.usdUnitPrice || row.photoUrl || row.color || row.size || row.packageCode
    )
    .map(row => ({
      ...row,
      packageCode: row.packageCode || defaultPackageCode
    }));

  if (!validItems.length) {
    setMsg("❌ 商品明細目前都是空白列。", "err");
    return;
  }

  const orderUsdTotal = parseMoneyNumber(payload.purchase.usdTotal);
  const itemsUsdTotal = calcItemsUsdTotal(validItems);
  const diff = Math.abs(orderUsdTotal - itemsUsdTotal);

  if (!orderUsdTotal) {
    setMsg("❌ 請先輸入美金總額 or 稅前。", "err");
    return;
  }

  if (diff > 0.01) {
    setMsg(
      `❌ 金額不一致，不能送出。\n訂單美金總額：${orderUsdTotal.toFixed(2)}\n商品美金總額：${itemsUsdTotal.toFixed(2)}\n差額：${diff.toFixed(2)}`,
      "err"
    );
    return;
  }

  btnSubmit.disabled = true;
  setMsg("圖片上傳中...");

  try {
    const rowEls = [...rowsEl.querySelectorAll("tr")];

    for (let i = 0; i < validItems.length; i++) {
      const row = validItems[i];
      const tr = rowEls[i];
      const fileInput = tr?.querySelector(".photoFile");
      const photoUrlInput = tr?.querySelector(".photoUrl");
      const fileName = tr?.querySelector(".photo-name");
      const file = tr?._pastedPhotoFile || fileInput?.files?.[0];

      if (file) {
        const uploaded = await uploadImageToCloudflare(file);
        row.photoUrl = uploaded.imageUrl || "";
        if (photoUrlInput) photoUrlInput.value = row.photoUrl || "";
        if (fileName) fileName.textContent = row.photoUrl ? "已上傳圖片" : file.name;
      } else {
        row.photoUrl = row.photoUrl || "";
      }
    }

    payload.items = validItems;

    setMsg("送出中...");

    const data = await apiFetch(API_CREATE, payload);

    setMsg(
`✅ 建立成功
採購單 ID：${data.purchase_id || ""}
包裹數：${data.package_created_count || 0}
成功商品筆數：${data.item_created_count || 0}
缺包裹編號商品：${data.missing_package_count || 0}`,
      "ok"
    );

    resetPurchaseForm();
    loadRecentPurchases();
    loadMissingPackageItems();
  } catch (err) {
    setMsg("❌ " + (err.message || err), "err");
  } finally {
    btnSubmit.disabled = false;
  }
}

btnAddRow.addEventListener("click", () => createRow());
btnSubmit.addEventListener("click", submitForm);

let quickSearchTimer = null;

}

loadRecentPurchases();
loadMissingPackageItems();
