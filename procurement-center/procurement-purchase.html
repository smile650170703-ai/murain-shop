<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>採購單｜採購／到貨入庫中心</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#b91c1c;
      --ok:#0f766e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.proc-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.proc-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
      color:#fff;
    }
    .page-tab{
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,
    .proc-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .proc-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .proc-tab.is-disabled{
      opacity:.45;
      pointer-events:none;
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    h1{
      margin:0 0 8px;
      font-size:34px;
    }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    h2{
      margin:0 0 14px;
      font-size:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .full{ grid-column:1 / -1; }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, textarea, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    textarea{
      min-height:90px;
      resize:vertical;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.danger{ background:var(--danger); }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .helper{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
    }
    .row-no{
      font-weight:800;
    }
    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:#eef6ff;
      border:1px solid #cfe3ff;
      color:#0f3f8c;
      font-size:13px;
      font-weight:700;
    }
    .sticky-summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    @media (max-width: 1100px){
      .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 720px){
      .grid{ grid-template-columns:1fr; }
      .page-head{ flex-direction:column; }
    }

.bad-list{

.bad-item{

.bad-top{

@media (max-width: 900px){

  <script>
    const STORAGE_OK = "procurement_entry_ok";
    const STORAGE_TOKEN = "procurement_entry_token";

    if (sessionStorage.getItem(STORAGE_OK) !== "1") {
      location.href = "/procurement-center/procurement-index.html";
    }

const API_CREATE = "https://api.murain.tw/op/procurement/purchase/create-with-items";
const API_PURCHASE_CHECK = "https://api.murain.tw/op/procurement/purchase/check";
const API_BAD_LIST = "https://api.murain.tw/op/procurement/purchase/bad-list";

const $ = (id) => document.getElementById(id);
const rowsEl = $("itemRows");
const msgEl = $("msg");
const btnSubmit = $("btnSubmit");
const btnAddRow = $("btnAddRow");

const ITEM_COLS = [
  "name",
  "color",
  "size",
  "usdUnitPrice",
  "qty"
];

function resetPurchaseForm() {
  $("vendor").value = "";
  $("twdAfterTax").value = "";
  $("orderNo").value = "";
  $("usdTotal").value = "";
  $("usdRate").value = "";
  $("buyDate").value = "";
  $("packageCode").value = "";

  if ($("quickOrderNo")) $("quickOrderNo").value = "";
setPurchaseCheckResult("尚未查詢");

  rowsEl.innerHTML = "";
  createRow();
  refreshRows();
}

function getRowList() {
  return [...rowsEl.querySelectorAll("tr")];
}

function ensureRowCount(targetCount) {
  while (getRowList().length < targetCount) {
    createRow();
  }
}

function handleSingleColumnPaste(e) {
  const target = e.target;
  if (!(target instanceof HTMLInputElement)) return;

  const colKey = ITEM_COLS.find(k => target.classList.contains(k));
  if (!colKey) return;

  const text = e.clipboardData?.getData("text/plain") || "";
  if (!text) return;

  const lines = String(text)
    .replace(/\r\n/g, "\n")
    .replace(/\r/g, "\n")
    .split("\n")
    .map(s => s.trim())
    .filter(Boolean);

  // 單一值就保留原本貼上
  if (lines.length <= 1) return;

  e.preventDefault();

  const startTr = target.closest("tr");
  if (!startTr) return;

  const rowListBefore = getRowList();
  const startRowIndex = rowListBefore.indexOf(startTr);
  if (startRowIndex < 0) return;

  ensureRowCount(startRowIndex + lines.length);

  const rowList = getRowList();

  lines.forEach((val, idx) => {
    const tr = rowList[startRowIndex + idx];
    if (!tr) return;

    const input = tr.querySelector(`.${colKey}`);
    if (!input) return;

    input.value = val;
  });

  refreshRows();
}

    function setMsg(text, type) {
      msgEl.textContent = text || "";
      msgEl.className = "msg";
      if (type === "ok") msgEl.classList.add("ok");
      if (type === "err") msgEl.classList.add("err");
    }

    async function apiFetch(url, payload) {
  const r = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "API 失敗");
  }
  return data;
}

    async function apiGet(url) {
  const r = await fetch(url);
  const data = await r.json().catch(() => ({}));
  if (!r.ok || !data.ok) {
    throw new Error(data.message || data.error || "查詢失敗");
  }
  return data;
}

function setPurchaseCheckResult(text) {
  const el = $("purchaseCheckResult");
  if (el) el.textContent = text || "";
}

async function checkPurchaseQuick() {
  const orderNo = $("quickOrderNo")?.value.trim();
  if (!orderNo) {
    setPurchaseCheckResult("請先輸入訂單編號。");
    return;
  }

  setPurchaseCheckResult("查詢中...");

  try {
    const data = await apiGet(`${API_PURCHASE_CHECK}?orderNo=${encodeURIComponent(orderNo)}`);

    if (!data.exists) {
      setPurchaseCheckResult(`查無訂單編號：${orderNo}`);
      return;
    }

    const lines = [
      `訂單編號：${data.order_no || orderNo}`,
      `採購單 ID：${data.purchase_id || "-"}`,
      `進貨商：${data.vendor || "-"}`,
      `購買日期：${data.buy_date || "-"}`,
      `包裹編號：${data.package_code || "-"}`,
      `商品數：${data.item_count ?? 0}`,
      `訂單核對：${data.order_check || "-"}`
    ];

    setPurchaseCheckResult(lines.join("\n"));
  } catch (err) {
    setPurchaseCheckResult(`❌ ${err.message || err}`);
  }
}

async function loadBadPurchases() {
  const wrap = $("badOrderList");
  if (!wrap) return;

  wrap.innerHTML = `<div class="bad-empty">載入中...</div>`;

  try {
    const data = await apiGet(API_BAD_LIST);
    const rows = Array.isArray(data.rows) ? data.rows : [];

    if (!rows.length) {
      wrap.innerHTML = `<div class="bad-empty">目前沒有訂單核對為 ❌ 的清單。</div>`;
      return;
    }

    wrap.innerHTML = rows.map(row => `
      <div class="bad-item">
        <div class="bad-top">
          <strong>${escapeHtml(row.orderNo || "-")}</strong>
          <span class="badge">❌</span>
        </div>
        <div class="sub">
          進貨商：${escapeHtml(row.vendor || "-")}<br>
          購買日期：${escapeHtml(row.buyDate || "-")}<br>
          訂單核對：${escapeHtml(row.orderCheck || "❌")}
        </div>
      </div>
    `).join("");
  } catch (err) {
    wrap.innerHTML = `<div class="bad-empty">❌ ${escapeHtml(err.message || String(err))}</div>`;
  }
}
    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

function createRow(data = {}) {
  const fileId = `photo_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="row-no"></td>
    <td><input class="name" value="${escapeHtml(data.name || "")}" placeholder="名稱"></td>
    <td><input class="color" value="${escapeHtml(data.color || "")}" placeholder="顏色"></td>
    <td><input class="size" value="${escapeHtml(data.size || "")}" placeholder="尺寸"></td>
    <td>
      <div class="file-wrap">
        <input id="${fileId}" class="photoFile photo-hidden" type="file" accept="image/*">
        <label class="photo-btn" for="${fileId}">選擇檔案</label>
        <span class="photo-name">未選擇</span>
      </div>
    </td>
    <td><input class="usdUnitPrice" type="number" step="0.01" value="${escapeHtml(data.usdUnitPrice || "")}" placeholder="0.00"></td>
    <td><input class="qty" type="number" step="1" value="${escapeHtml(data.qty || "1")}" placeholder="1"></td>
    <td><button type="button" class="btn danger btn-del">刪除</button></td>
  `;

  tr.querySelector(".btn-del").addEventListener("click", () => {
    tr.remove();
    refreshRows();
  });

  const fileInput = tr.querySelector(".photoFile");
  const fileName = tr.querySelector(".photo-name");

  fileInput.addEventListener("change", () => {
    const f = fileInput.files && fileInput.files[0];
    fileName.textContent = f ? f.name : "未選擇";
  });

  tr.querySelectorAll('input:not([type="file"])').forEach((el) => {
    el.addEventListener("input", refreshSummary);
    el.addEventListener("paste", handleSingleColumnPaste);
  });

  rowsEl.appendChild(tr);
  refreshRows();
}

    function refreshRows() {
      [...rowsEl.querySelectorAll("tr")].forEach((tr, i) => {
        tr.querySelector(".row-no").textContent = i + 1;
      });
      refreshSummary();
    }

    function refreshSummary() {
      const rows = collectItems();
      $("itemCount").textContent = rows.length;
      $("qtyTotal").textContent = rows.reduce((sum, row) => {
        const qty = Number(row.qty || 0);
        return sum + (Number.isFinite(qty) ? qty : 0);
      }, 0);
    }

    function collectItems() {
  return [...rowsEl.querySelectorAll("tr")].map((tr) => ({
    name: tr.querySelector(".name")?.value.trim() || "",
    color: tr.querySelector(".color")?.value.trim() || "",
    size: tr.querySelector(".size")?.value.trim() || "",
    usdUnitPrice: tr.querySelector(".usdUnitPrice")?.value.trim() || "",
    qty: tr.querySelector(".qty")?.value.trim() || "1"
  }));
}

    function calcTwd() {
      const usd = Number($("usdTotal").value || 0);
      const rate = Number($("usdRate").value || 0);
      if (usd > 0 && rate > 0) {
        $("twdAfterTax").value = Math.round(usd * rate);
      }
    }

    async function submitForm() {
      const payload = {
        purchase: {
          vendor: $("vendor").value.trim(),
          twdAfterTax: $("twdAfterTax").value.trim(),
          orderNo: $("orderNo").value.trim(),
          usdTotal: $("usdTotal").value.trim(),
          usdRate: $("usdRate").value.trim(),
          buyDate: $("buyDate").value.trim(),
          packageCode: $("packageCode").value.trim()
        },
        items: collectItems()
      };

      if (!payload.purchase.vendor) {
        setMsg("❌ 請先選擇進貨商。", "err");
        return;
      }
      if (!payload.purchase.orderNo) {
        setMsg("❌ 請先輸入訂單編號。", "err");
        return;
      }
      if (!payload.purchase.packageCode) {
        setMsg("❌ 請先輸入包裹編號。", "err");
        return;
      }
      if (!payload.items.length) {
        setMsg("❌ 請至少新增 1 列商品。", "err");
        return;
      }

      const validItems = payload.items.filter(row =>
  row.name || row.color || row.size || row.usdUnitPrice || row.qty
);

      if (!validItems.length) {
        setMsg("❌ 商品明細目前都是空白列。", "err");
        return;
      }

      payload.items = validItems;

      btnSubmit.disabled = true;
      setMsg("送出中...");

      try {
        const data = await apiFetch(API_CREATE, payload);

        setMsg(
`✅ 建立成功
採購單 ID：${data.purchase_id || ""}
包裹單號 ID：${data.package_id || ""}
成功商品筆數：${data.item_created_count || 0}
失敗商品筆數：${data.item_failed_count || 0}

${data.item_failed_count ? "失敗明細：\n" + JSON.stringify(data.failed_items || [], null, 2) : "全部商品都已建立完成。"}`,
  "ok"
);

resetPurchaseForm();
loadBadPurchases();
      } catch (err) {
        setMsg("❌ " + (err.message || err), "err");
      } finally {
        btnSubmit.disabled = false;
      }
    }

btnAddRow.addEventListener("click", () => createRow());
btnSubmit.addEventListener("click", submitForm);

const btnCheckPurchase = $("btnCheckPurchase");
if (btnCheckPurchase) {
  btnCheckPurchase.addEventListener("click", checkPurchaseQuick);
}

const quickOrderNo = $("quickOrderNo");
if (quickOrderNo) {
  quickOrderNo.addEventListener("keydown", (e) => {
    if (e.key === "Enter") checkPurchaseQuick();
  });
}

createRow();
loadBadPurchases();
  </script>
</body>
</html>
