<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>採購單｜採購／到貨入庫中心</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#b91c1c;
      --ok:#0f766e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.proc-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.proc-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
      color:#fff;
    }
    .page-tab{
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,
    .proc-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .proc-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .proc-tab.is-disabled{
      opacity:.45;
      pointer-events:none;
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    h1{
      margin:0 0 8px;
      font-size:34px;
    }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    h2{
      margin:0 0 14px;
      font-size:20px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .full{ grid-column:1 / -1; }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, textarea, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    textarea{
      min-height:90px;
      resize:vertical;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.danger{ background:var(--danger); }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .helper{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
    }
    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    table{
      width:100%;
      min-width:1240px;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:top;
    }
    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }
    td input{
      min-width:110px;
    }
    .row-no{
      font-weight:800;
    }
    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:#eef6ff;
      border:1px solid #cfe3ff;
      color:#0f3f8c;
      font-size:13px;
      font-weight:700;
    }
    .sticky-summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    @media (max-width: 1100px){
      .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 720px){
      .grid{ grid-template-columns:1fr; }
      .page-head{ flex-direction:column; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html">直播主開單</a>
      <a class="page-tab" href="/admin.html">訂單後台</a>
      <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
      <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
      <a class="page-tab" href="/op/preorder-cost.html">預購成本補登</a>
      <a class="page-tab" href="/stock.html">庫存查詢</a>
      <a class="page-tab is-active" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
    </div>

    <div class="proc-tabs-bar">
      <a class="proc-tab is-active" href="/procurement-center/procurement-purchase.html">採購單</a>
      <a class="proc-tab" href="/procurement-center/procurement-transfer.html">包裹／轉運</a>
      <a class="proc-tab" href="/procurement-center/procurement-inbound.html">待入庫</a>
      <a class="proc-tab" href="/procurement-center/procurement-label-print.html">標籤列印</a>
      <a class="proc-tab" href="/procurement-center/procurement-label-done.html">列印完成</a>
      <a class="proc-tab is-disabled" href="javascript:void(0)">保留</a>
    </div>
  </div>

  <div class="wrap">
    <div class="page-head">
      <div>
        <h1>採購單</h1>
        <div class="sub">
          這一頁處理：<br>
          採購單主資料 + 包裹單號 + 多列商品明細，一次送出。
        </div>
      </div>
      <div class="badge">第一版：商品照片先用網址欄位</div>
    </div>

    <div class="card">
      <h2>1. 採購單主資料</h2>
      <div class="grid">
        <div>
          <label>進貨商</label>
          <select id="vendor">
            <option value="">請選擇</option>
            <option value="MICHAEL KORS 官網">MICHAEL KORS 官網</option>
            <option value="Buy&Ship">Buy&Ship</option>
            <option value="台中叫貨單 - K">台中叫貨單 - K</option>
          </select>
        </div>

        <div>
          <label>台幣總額[稅後]</label>
          <input id="twdAfterTax" type="number" step="1" placeholder="例如 22638" />
        </div>

        <div>
          <label>訂單編號</label>
          <input id="orderNo" placeholder="例如 P003101819" />
        </div>

        <div>
          <label>美金總額 or 稅前</label>
          <input id="usdTotal" type="number" step="0.01" placeholder="例如 211.80" />
        </div>

        <div>
          <label>匯率USD</label>
          <input id="usdRate" type="number" step="0.0001" placeholder="例如 32.7941" />
        </div>

        <div>
          <label>購買日期</label>
          <input id="buyDate" type="date" />
        </div>

        <div>
          <label>包裹編號</label>
          <input id="packageCode" placeholder="例如 490697164804" />
        </div>

        <div>
          <label>備註</label>
          <input id="purchaseNote" placeholder="需要就填" />
        </div>
      </div>

      <div class="helper">
        <button class="btn secondary" type="button" id="btnCalcTwd">美元 × 匯率 帶出台幣</button>
        <span>這顆只做輔助計算，不會改你其他流程。</span>
      </div>
    </div>

    <div class="card">
      <h2>2. 商品明細</h2>
      <div class="sub" style="margin-bottom:12px;">
        每列一筆商品。第一版先填：名稱、顏色、尺寸、商品照片網址、美金單價、數量。
      </div>

      <div class="toolbar">
        <button class="btn secondary" type="button" id="btnAddRow">+ 新增一列商品</button>
      </div>

      <div class="table-wrap" style="margin-top:14px;">
        <table>
          <thead>
            <tr>
              <th style="width:60px;">#</th>
              <th>名稱</th>
              <th>顏色</th>
              <th>尺寸</th>
              <th>商品照片網址</th>
              <th style="width:140px;">美金單價</th>
              <th style="width:100px;">數量</th>
              <th>備註</th>
              <th style="width:100px;">刪除</th>
            </tr>
          </thead>
          <tbody id="itemRows"></tbody>
        </table>
      </div>

      <div class="sticky-summary">
        <div class="badge">商品筆數：<span id="itemCount" style="margin-left:6px;">0</span></div>
        <div class="badge">商品總數量：<span id="qtyTotal" style="margin-left:6px;">0</span></div>
      </div>

      <div class="toolbar">
        <button class="btn" type="button" id="btnSubmit">送出建立採購單＋包裹＋商品</button>
      </div>
    </div>

    <div class="card">
      <h2>3. 執行結果</h2>
      <div id="msg" class="msg">尚未送出</div>
    </div>
  </div>

  <script>
    const STORAGE_OK = "procurement_entry_ok";
    const STORAGE_TOKEN = "procurement_entry_token";

    if (sessionStorage.getItem(STORAGE_OK) !== "1") {
      location.href = "/procurement-center/procurement-index.html";
    }

    const API_CREATE = "https://api.murain.tw/op/procurement/purchase/create-with-items";

    const $ = (id) => document.getElementById(id);
    const rowsEl = $("itemRows");
    const msgEl = $("msg");
    const btnSubmit = $("btnSubmit");
    const btnAddRow = $("btnAddRow");

    function setMsg(text, type) {
      msgEl.textContent = text || "";
      msgEl.className = "msg";
      if (type === "ok") msgEl.classList.add("ok");
      if (type === "err") msgEl.classList.add("err");
    }

    async function apiFetch(url, payload) {
      const token = sessionStorage.getItem(STORAGE_TOKEN) || "";
      const headers = { "Content-Type": "application/json" };
      if (token) headers["X-Procurement-Entry"] = token;

      const r = await fetch(url, {
        method: "POST",
        headers,
        body: JSON.stringify(payload)
      });

      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        throw new Error(data.message || data.error || "API 失敗");
      }
      return data;
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function createRow(data = {}) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="row-no"></td>
        <td><input class="name" value="${escapeHtml(data.name || "")}" placeholder="名稱"></td>
        <td><input class="color" value="${escapeHtml(data.color || "")}" placeholder="顏色"></td>
        <td><input class="size" value="${escapeHtml(data.size || "")}" placeholder="尺寸"></td>
        <td><input class="photoUrl" value="${escapeHtml(data.photoUrl || "")}" placeholder="https://..."></td>
        <td><input class="usdUnitPrice" type="number" step="0.01" value="${escapeHtml(data.usdUnitPrice || "")}" placeholder="0.00"></td>
        <td><input class="qty" type="number" step="1" value="${escapeHtml(data.qty || "1")}" placeholder="1"></td>
        <td><input class="note" value="${escapeHtml(data.note || "")}" placeholder="備註"></td>
        <td><button type="button" class="btn danger btn-del">刪除</button></td>
      `;

      tr.querySelector(".btn-del").addEventListener("click", () => {
        tr.remove();
        refreshRows();
      });

      tr.querySelectorAll("input").forEach((el) => {
        el.addEventListener("input", refreshSummary);
      });

      rowsEl.appendChild(tr);
      refreshRows();
    }

    function refreshRows() {
      [...rowsEl.querySelectorAll("tr")].forEach((tr, i) => {
        tr.querySelector(".row-no").textContent = i + 1;
      });
      refreshSummary();
    }

    function refreshSummary() {
      const rows = collectItems();
      $("itemCount").textContent = rows.length;
      $("qtyTotal").textContent = rows.reduce((sum, row) => {
        const qty = Number(row.qty || 0);
        return sum + (Number.isFinite(qty) ? qty : 0);
      }, 0);
    }

    function collectItems() {
      return [...rowsEl.querySelectorAll("tr")].map((tr) => ({
        name: tr.querySelector(".name")?.value.trim() || "",
        color: tr.querySelector(".color")?.value.trim() || "",
        size: tr.querySelector(".size")?.value.trim() || "",
        photoUrl: tr.querySelector(".photoUrl")?.value.trim() || "",
        usdUnitPrice: tr.querySelector(".usdUnitPrice")?.value.trim() || "",
        qty: tr.querySelector(".qty")?.value.trim() || "1",
        note: tr.querySelector(".note")?.value.trim() || ""
      }));
    }

    function calcTwd() {
      const usd = Number($("usdTotal").value || 0);
      const rate = Number($("usdRate").value || 0);
      if (usd > 0 && rate > 0) {
        $("twdAfterTax").value = Math.round(usd * rate);
      }
    }

    async function submitForm() {
      const payload = {
        purchase: {
          vendor: $("vendor").value.trim(),
          twdAfterTax: $("twdAfterTax").value.trim(),
          orderNo: $("orderNo").value.trim(),
          usdTotal: $("usdTotal").value.trim(),
          usdRate: $("usdRate").value.trim(),
          buyDate: $("buyDate").value.trim(),
          packageCode: $("packageCode").value.trim(),
          note: $("purchaseNote").value.trim()
        },
        items: collectItems()
      };

      if (!payload.purchase.vendor) {
        setMsg("❌ 請先選擇進貨商。", "err");
        return;
      }
      if (!payload.purchase.orderNo) {
        setMsg("❌ 請先輸入訂單編號。", "err");
        return;
      }
      if (!payload.purchase.packageCode) {
        setMsg("❌ 請先輸入包裹編號。", "err");
        return;
      }
      if (!payload.items.length) {
        setMsg("❌ 請至少新增 1 列商品。", "err");
        return;
      }

      const validItems = payload.items.filter(row =>
        row.name || row.color || row.size || row.photoUrl || row.usdUnitPrice || row.qty
      );

      if (!validItems.length) {
        setMsg("❌ 商品明細目前都是空白列。", "err");
        return;
      }

      payload.items = validItems;

      btnSubmit.disabled = true;
      setMsg("送出中...");

      try {
        const data = await apiFetch(API_CREATE, payload);

        setMsg(
`✅ 建立成功
採購單 ID：${data.purchase_id || ""}
包裹單號 ID：${data.package_id || ""}
成功商品筆數：${data.item_created_count || 0}
失敗商品筆數：${data.item_failed_count || 0}

${data.item_failed_count ? "失敗明細：\n" + JSON.stringify(data.failed_items || [], null, 2) : "全部商品都已建立完成。"}`,
          "ok"
        );
      } catch (err) {
        setMsg("❌ " + (err.message || err), "err");
      } finally {
        btnSubmit.disabled = false;
      }
    }

    $("btnCalcTwd").addEventListener("click", calcTwd);
    btnAddRow.addEventListener("click", () => createRow());
    btnSubmit.addEventListener("click", submitForm);

    // 預設先給 3 列
    createRow();
    createRow();
    createRow();
  </script>
</body>
</html>
