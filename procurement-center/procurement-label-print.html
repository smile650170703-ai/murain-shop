table{

<div class="table-wrap">
  <table>
   <colgroup>

<thead>

    <th>商品照片</th>

<div class="summary-bar">
  <div class="summary-pill">清單筆數：<span id="totalCount">0</span></div>
  <div class="summary-pill">已可儲存：<span id="savableCount">0</span></div>
</div>
    </div>
  </div>

  <script>
    const STORAGE_OK = "procurement_entry_ok";
    if (sessionStorage.getItem(STORAGE_OK) !== "1") {
      location.href = "/procurement-center/procurement-index.html";
    }

    const API_LIST = "https://api.murain.tw/op/procurement/label-print/list";
const API_SAVE_DRAFT = "https://api.murain.tw/op/procurement/label-print/save-draft";
const API_SAVE_EXPORT = "https://api.murain.tw/op/procurement/label-print/save-export";

    const $ = (id) => document.getElementById(id);
    const rowsEl = $("rows");
    const statusBar = $("statusBar");

let currentRows = [];
const DRAFT_KEY = "procurement_label_print_draft_v1";

function clearDraftLocal() {
  localStorage.removeItem(DRAFT_KEY);
}

function applyDraftToScreen() {
  // 改成以後端資料為準，不再把 localStorage 舊草稿蓋回畫面
}

function getDraftPayload() {
  const items = [];

  [...rowsEl.querySelectorAll("tr[data-id]")].forEach((tr) => {
    const id = String(tr.dataset.id || "").trim();
    if (!id) return;

    const labelCode = String(tr.querySelector('[data-role="labelCode"]')?.value || "").trim();
    const suggestPrice = normalizePrice(tr.querySelector('[data-role="suggestPrice"]')?.value || "");
    const receivedQty = normalizeInt(tr.querySelector('[data-role="receivedQty"]')?.value || "");

    const hasAnyValue = labelCode || suggestPrice || receivedQty;
    if (!hasAnyValue) return;

    items.push({
      id,
      labelCode,
      suggestPrice,
      receivedQty
    });
  });

  return items;
}

async function saveDraftToServer() {
  const items = getDraftPayload();

  if (!items.length) {
    throw new Error("請先至少輸入 1 筆標籤碼、建議售價或累計實收數量，再進行暫存。");
  }

  setStatus("暫存中...", "info");

  const data = await apiPost(API_SAVE_DRAFT, { items });

  clearDraftLocal();

  const lines = [];
  lines.push(`✅ 已暫存 ${data.updated_count || 0} 筆資料`);

  if (data.failed_count) {
    lines.push(`⚠️ 失敗 ${data.failed_count} 筆`);
  }

  if (Array.isArray(data.errors) && data.errors.length) {
    lines.push("");
    lines.push("失敗明細：");
    data.errors.slice(0, 10).forEach((msg, idx) => {
      lines.push(`${idx + 1}. ${msg}`);
    });
  }

  setStatus(lines.join("\n"), data.failed_count ? "info" : "ok");
}
    function isRowSavableByTr(tr) {
  const labelCode = String(tr.querySelector('[data-role="labelCode"]')?.value || "").trim();
  const suggestPrice = String(tr.querySelector('[data-role="suggestPrice"]')?.value || "").trim();
  return !!(labelCode && suggestPrice);
}

function refreshSummary() {
  $("totalCount").textContent = String(currentRows.length);

  const savable = [...rowsEl.querySelectorAll("tr[data-id]")].filter(tr => isRowSavableByTr(tr)).length;
  $("savableCount").textContent = String(savable);
}

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setStatus(text, type = "info") {
      statusBar.textContent = text || "";
      statusBar.className = `status show ${type}`;
    }

    async function apiGet(url) {
      const r = await fetch(url);
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        throw new Error(data.message || data.error || "讀取失敗");
      }
      return data;
    }

    async function apiPost(url, payload) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        throw new Error(data.message || data.error || "送出失敗");
      }
      return data;
    }

    function renderPhotoCell(row) {
      if (row.photoUrl) {
        return `<img class="thumb" src="${escapeHtml(row.photoUrl)}" alt="">`;
      }
      return `<div class="thumb-empty">無照片</div>`;
    }
    function formatRefPrice(v) {
  const s = String(v ?? "").replaceAll(",", "").trim();
  if (!s) return "";
  const n = Number(s);
  if (Number.isFinite(n)) return String(Math.trunc(n));
  return s.split(".")[0];
}
function normalizeInt(v) {
  const s = String(v ?? "").replace(/[^\d\-]/g, "").trim();
  if (!s) return "";
  const n = Number(s);
  if (!Number.isFinite(n)) return "";
  return String(Math.max(0, Math.trunc(n)));
}

function computeAbnormalQty(orderQty, receivedQty) {
  const oq = Number(String(orderQty ?? "").trim());
  const rqText = String(receivedQty ?? "").trim();

  if (!rqText) return "";
  const rq = Number(rqText);

  if (!Number.isFinite(oq) || !Number.isFinite(rq)) return "";
  return String(Math.max(0, oq - rq));
}
    function shouldShowAbnormalBox(row, abnormalQty) {
  return Number(abnormalQty || 0) > 0 ||
    String(row.abnormalStatus || "").trim() ||
    String(row.abnormalReason || "").trim() ||
    String(row.abnormalMethod || "").trim() ||
    String(row.abnormalNote || "").trim();
}

function renderRows(rows) {
  currentRows = Array.isArray(rows) ? rows : [];

  if (!currentRows.length) {
    rowsEl.innerHTML = `<tr><td colspan="9"><div class="empty">目前沒有需要處理的資料。</div></td></tr>`;
    refreshSummary();
    return;
  }

  rowsEl.innerHTML = currentRows.map((row) => {
    const receivedQty = String(row.receivedQty || "").trim();
    const abnormalQty = computeAbnormalQty(row.qty || "", receivedQty);

    return `
      <tr data-id="${escapeHtml(row.id)}">
        <td>${renderPhotoCell(row)}</td>
        <td>${escapeHtml(row.brand || "")}</td>
        <td>${escapeHtml(row.productName || "")}</td>
        <td>
          <input
            class="cell-input"
            type="text"
            data-role="labelCode"
            value="${escapeHtml(row.labelCode || "")}"
            placeholder="輸入標籤碼"
          />
        </td>
        <td>${escapeHtml(formatRefPrice(row.refPrice || ""))}</td>
        <td>
          <input
            class="cell-input price"
            type="text"
            inputmode="decimal"
            data-role="suggestPrice"
            value="${escapeHtml(row.suggestPrice || "")}"
            placeholder="輸入建議售價"
          />
        </td>
        <td>${escapeHtml(row.qty || "")}</td>
        <td>
          <input
            class="cell-input"
            type="text"
            inputmode="numeric"
            data-role="receivedQty"
            value="${escapeHtml(receivedQty)}"
            placeholder="實收數量"
          />
        </td>
        <td>
          <span data-role="abnormalQtyText">${escapeHtml(abnormalQty)}</span>
        </td>
      </tr>
    `;
  }).join("");

  const allRows = [...rowsEl.querySelectorAll("tr[data-id]")];

  function focusNextSameRole(tr, role) {
    const idx = allRows.indexOf(tr);
    const nextTr = allRows[idx + 1];
    const nextInput = nextTr?.querySelector(`[data-role="${role}"]`);
    if (nextInput) {
      nextInput.focus();
      nextInput.select?.();
    }
  }

  function refreshAbnormalUI(tr) {
    const qty = currentRows.find(r => String(r.id) === String(tr.dataset.id || ""))?.qty || "";
    const receivedQty = normalizeInt(tr.querySelector('[data-role="receivedQty"]')?.value || "");
    const abnormalQty = computeAbnormalQty(qty, receivedQty);

    const abnormalQtyText = tr.querySelector('[data-role="abnormalQtyText"]');
    if (abnormalQtyText) abnormalQtyText.textContent = abnormalQty;
  }

  allRows.forEach((tr) => {
    const labelInput = tr.querySelector('[data-role="labelCode"]');
    const priceInput = tr.querySelector('[data-role="suggestPrice"]');
    const receivedInput = tr.querySelector('[data-role="receivedQty"]');

    [labelInput, priceInput, receivedInput]
      .filter(Boolean)
      .forEach((el) => {
        el.addEventListener("input", () => {
          if (el === receivedInput) {
            refreshAbnormalUI(tr);
          }
          refreshSummary();
        });
      });

    labelInput?.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      focusNextSameRole(tr, "labelCode");
    });

    priceInput?.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      focusNextSameRole(tr, "suggestPrice");
    });

    receivedInput?.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      focusNextSameRole(tr, "receivedQty");
    });
  });

  applyDraftToScreen();
  refreshSummary();
}

    function normalizePrice(v) {
      return String(v || "").replaceAll(",", "").trim();
    }

function getSelectedPayload() {
  const rows = [];

  [...rowsEl.querySelectorAll("tr[data-id]")].forEach((tr) => {
    if (!isRowSavableByTr(tr)) return;

    const id = String(tr.dataset.id || "").trim();
    const row = currentRows.find(r => String(r.id) === id) || {};

    const labelCode = String(tr.querySelector('[data-role="labelCode"]')?.value || "").trim();
    const suggestPrice = normalizePrice(tr.querySelector('[data-role="suggestPrice"]')?.value || "");
    const receivedQty = normalizeInt(tr.querySelector('[data-role="receivedQty"]')?.value || "");

    rows.push({
      id,
      labelCode,
      suggestPrice,
      receivedQty,
      newBarcode: row.newBarcode || "",
      brand: row.brand || "",
      productName: row.productName || "",
      qty: row.qty || "",
      unitCost: row.unitCost || ""
    });
  });

  return rows;
}

    function validateSelectedRows(items) {
      if (!items.length) {
        throw new Error("請先輸入「標籤輸入碼」與「建議售價 (TWD)」，系統才會自動勾選。");
      }

      for (let i = 0; i < items.length; i++) {
        const row = items[i];
        if (!row.id) {
          throw new Error(`第 ${i + 1} 筆缺少 id`);
        }
        if (!row.labelCode) {
          throw new Error(`第 ${i + 1} 筆缺少標籤輸入碼`);
        }
        if (!row.suggestPrice) {
          throw new Error(`第 ${i + 1} 筆缺少建議售價 (TWD)`);
        }
        if (!/^\d+(\.\d+)?$/.test(row.suggestPrice)) {
          throw new Error(`第 ${i + 1} 筆建議售價格式不正確`);
        }
      }
    }

    function downloadExcel(rows) {
      const fileName = buildFileName();

      const tableRows = rows.map((row) => `
  <tr>
    <td>${escapeHtml(row["新條碼（主播版）"] ?? "")}</td>
    <td>${escapeHtml(row["品牌"] ?? "")}</td>
    <td>${escapeHtml(row["商品名稱"] ?? "")}</td>
    <td>${escapeHtml(formatRefPrice(row["單品到手成本"] ?? ""))}</td>
    <td>${escapeHtml(row["建議售價 (TWD)"] ?? "")}</td>
    <td>${escapeHtml(row["數量"] ?? "")}</td>
  </tr>
`).join("");

      const html = `
        <html xmlns:o="urn:schemas-microsoft-com:office:office"
              xmlns:x="urn:schemas-microsoft-com:office:excel"
              xmlns="http://www.w3.org/TR/REC-html40">
        <head>
          <meta charset="utf-8" />
        </head>
        <body>
<table border="1">
  <tr>
    <th>新條碼（主播版）</th>
    <th>品牌</th>
    <th>商品名稱</th>
    <th>單品到手成本</th>
    <th>建議售價 (TWD)</th>
    <th>數量</th>
  </tr>
  ${tableRows}
</table>
        </body>
        </html>
      `.trim();

      const blob = new Blob(["\ufeff", html], {
        type: "application/vnd.ms-excel;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function buildFileName() {
      const now = new Date();
      const tw = new Date(now.toLocaleString("en-US", { timeZone: "Asia/Taipei" }));
      const pad = (n) => String(n).padStart(2, "0");
      const y = tw.getFullYear();
      const m = pad(tw.getMonth() + 1);
      const d = pad(tw.getDate());
      const hh = pad(tw.getHours());
      const mm = pad(tw.getMinutes());
      const ss = pad(tw.getSeconds());
      return `標籤列印_${y}${m}${d}_${hh}${mm}${ss}.xls`;
    }

    async function loadList() {
  setStatus("載入中...", "info");

  try {
    const url = `${API_LIST}?keyword=&limit=100`;
    const data = await apiGet(url);
    renderRows(data.rows || []);
    setStatus(`✅ 清單已更新，共 ${Array.isArray(data.rows) ? data.rows.length : 0} 筆`, "ok");
  } catch (err) {
    rowsEl.innerHTML = `<tr><td colspan="9"><div class="empty">❌ ${escapeHtml(err.message || String(err))}</div></td></tr>`;
refreshSummary();
    setStatus(`❌ ${err.message || err}`, "err");
  }
}

    async function saveAndExport() {
      try {
        const items = getSelectedPayload();
        validateSelectedRows(items);

        setStatus("儲存中...", "info");

        const data = await apiPost(API_SAVE_EXPORT, { items });

        const exportRows = Array.isArray(data.export_rows) ? data.export_rows : [];
        if (exportRows.length) {
          downloadExcel(exportRows);
        }

        clearDraftLocal();
setStatus(`✅ 已儲存 ${data.updated_count || 0} 筆，並完成 Excel 下載`, "ok");
await loadList();
      } catch (err) {
        setStatus(`❌ ${err.message || err}`, "err");
      }
    }

  $("btnReload").addEventListener("click", async () => {
  try {
    const items = getDraftPayload();
    if (items.length) {
      await saveDraftToServer();
    }
    await loadList();
  } catch (err) {
    setStatus(`❌ ${err.message || err}`, "err");
  }
});

$("btnDraft").addEventListener("click", async () => {
  try {
    await saveDraftToServer();
  } catch (err) {
    setStatus(`❌ ${err.message || err}`, "err");
  }
});

$("btnSaveExport").addEventListener("click", saveAndExport);

loadList();
  </script>
</body>
</html>
