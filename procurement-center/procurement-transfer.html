<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>包裹／轉運｜採購／到貨入庫中心</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#c81e1e;
      --ok:#0f766e;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.proc-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.proc-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
      color:#fff;
    }
    .page-tab{
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,
    .proc-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .proc-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .proc-tab.is-disabled{
      opacity:.45;
      pointer-events:none;
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .page-head-left{
      flex:1;
      min-width:0;
    }
    .page-head-right{
      width:380px;
      max-width:100%;
      flex:0 0 auto;
    }
    h1{
      margin:0 0 8px;
      font-size:34px;
    }
    h2{
      margin:0 0 14px;
      font-size:20px;
    }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
    }
    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .full{ grid-column:1 / -1; }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, select, textarea, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    input[type="checkbox"]{
      width:18px;
      height:18px;
      padding:0;
      border-radius:4px;
    }
    .checkbox-row{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:46px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:0 14px;
      background:#fff;
      font-size:14px;
      font-weight:700;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn.danger{ background:var(--danger); }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .soft-box{
      background:var(--soft);
      border:1px solid var(--soft-border);
      border-radius:16px;
      padding:16px;
    }
    .soft-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }
    .soft-text{
      color:#31538f;
      line-height:1.7;
      font-size:14px;
      white-space:pre-wrap;
    }
    .helper{
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
      margin-top:10px;
    }
    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    table{
      width:100%;
      min-width:980px;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:top;
    }
    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }
    .row-no{
      font-weight:800;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:#eef6ff;
      border:1px solid #cfe3ff;
      color:#0f3f8c;
      font-size:13px;
      font-weight:700;
    }
    .sticky-summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }

    td input.packageCode{
      width:170px;
      min-width:170px;
    }
    td input.weightLbs{
      width:72px;
      min-width:72px;
    }
    td input.packageRemark{
      width:180px;
      min-width:180px;
    }

    @media (max-width: 1100px){
      .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
      .page-head{ flex-direction:column; }
      .page-head-right{ width:100%; }
    }
    @media (max-width: 720px){
      .grid,.grid-2{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html">直播主開單</a>
      <a class="page-tab" href="/admin.html">訂單後台</a>
      <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
      <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
      <a class="page-tab" href="/op/preorder-cost.html">預購成本補登</a>
      <a class="page-tab" href="/stock.html">庫存查詢</a>
      <a class="page-tab is-active" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
      <a class="page-tab" href="/company-files/company-index.html">公司檔案管理</a>
    </div>

    <div class="proc-tabs-bar">
      <a class="proc-tab" href="/procurement-center/procurement-purchase.html">採購單</a>
      <a class="proc-tab is-active" href="/procurement-center/procurement-transfer.html">包裹／轉運</a>
      <a class="proc-tab" href="/procurement-center/procurement-inbound.html">待入庫</a>
      <a class="proc-tab" href="/procurement-center/procurement-label-print.html">標籤列印</a>
      <a class="proc-tab" href="/procurement-center/procurement-label-done.html">列印完成</a>
      <a class="proc-tab is-disabled" href="javascript:void(0)">保留</a>
    </div>
  </div>

  <div class="wrap">
    <div class="page-head">
      <div class="page-head-left">
        <h1>包裹／轉運</h1>
      </div>
    </div>

    <div class="card">
      <h2>1. 轉運單主資料</h2>
      <div class="grid">
        <div>
          <label>轉運單號</label>
          <input id="transferNo" placeholder="例如 TBA326081060966" />
        </div>

        <div>
          <label>轉運日期</label>
          <input id="transferDate" type="date" />
        </div>

        <div>
          <label>運費 or 稅額</label>
          <input id="shippingFeeOrTax" type="number" step="1" placeholder="例如 1290" />
        </div>

        <div>
          <label>附加費用 (TWD)</label>
          <input id="extraFeeTwd" type="number" step="1" placeholder="例如 120" />
        </div>

        <div>
          <label>購物金 or 台中</label>
          <div class="checkbox-row">
            <input id="creditOrTaichung" type="checkbox" />
            <span>有勾選代表是購物金 / 台中處理</span>
          </div>
        </div>

        <div>
          <label>發票核對</label>
          <input id="invoiceRef" placeholder="請輸入發票核對流水號" />
        </div>
      </div>
    </div>

<div class="card">
  <h2>2. 包裹管理</h2>

  <div class="table-wrap" style="margin-top:14px;">
    <table>
      <thead>
        <tr>
          <th style="width:60px;">選取</th>
          <th style="width:70px;">#</th>
          <th>包裹編號</th>
          <th style="width:130px;">重量[磅]</th>
          <th style="width:140px;">包裹附加費</th>
        </tr>
      </thead>
      <tbody id="packageRows"></tbody>
    </table>
  </div>

  <div class="sticky-summary">
    <div class="badge">待補重量包裹：<span id="packageCount" style="margin-left:6px;">0</span></div>
    <div class="badge">已勾選：<span id="selectedCount" style="margin-left:6px;">0</span></div>
    <div class="badge">已填總重量[磅]：<span id="weightTotal" style="margin-left:6px;">0</span></div>
  </div>

  <div class="toolbar">
    <button class="btn secondary" type="button" id="btnReloadPackages">重新載入</button>
    <button class="btn" type="button" id="btnSubmit">儲存勾選包裹資料</button>
  </div>
</div>

    <div class="card">
      <h2>3. 執行結果</h2>
      <div id="msg" class="msg">尚未送出</div>
    </div>
  </div>
<script>
  const STORAGE_OK = "procurement_entry_ok";
  if (sessionStorage.getItem(STORAGE_OK) !== "1") {
    location.href = "/procurement-center/procurement-index.html";
  }

const API_LIST_ZERO_WEIGHT = "https://api.murain.tw/op/procurement/package/list-zero-weight";
const API_SAVE_TRANSFER = "https://api.murain.tw/op/procurement/transfer/save";

  const $ = (id) => document.getElementById(id);
  const rowsEl = $("packageRows");
  const msgEl = $("msg");

  const btnSubmit = $("btnSubmit");
  const btnReloadPackages = $("btnReloadPackages");

  function setMsg(text, type) {
    msgEl.textContent = text || "";
    msgEl.className = "msg";
    if (type === "ok") msgEl.classList.add("ok");
    if (type === "err") msgEl.classList.add("err");
  }

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  async function apiGet(url) {
    const r = await fetch(url);
    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "查詢失敗");
    }
    return data;
  }

  async function apiPost(url, payload) {
    const r = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "API 失敗");
    }
    return data;
  }

  function createRow(data = {}, index = 0) {
    const tr = document.createElement("tr");
    tr.dataset.packageId = data.package_id || "";

    tr.innerHTML = `
      <td>
        <input type="checkbox" class="rowCheck">
      </td>
      <td class="row-no">${index + 1}</td>
      <td>
        <input class="packageCode" value="${escapeHtml(data.package_code || "")}" readonly>
      </td>
      <td>
        <input class="weightLbs" type="number" step="0.1" value="${escapeHtml(data.weight_lbs || "")}" placeholder="0">
      </td>
      <td>
        <input class="packageFeeTwd" type="number" step="1" value="${escapeHtml(data.package_fee_twd || "")}" placeholder="0">
      </td>
    `;

    tr.querySelectorAll("input").forEach((el) => {
      el.addEventListener("input", refreshSummary);
      el.addEventListener("change", refreshSummary);
    });

    rowsEl.appendChild(tr);
  }

  function getRowList() {
    return [...rowsEl.querySelectorAll("tr")];
  }

  function refreshSummary() {
    const rows = getRowList();

    const selectedRows = rows.filter(tr => tr.querySelector(".rowCheck")?.checked);
    const weightTotal = selectedRows.reduce((sum, tr) => {
      const n = Number(tr.querySelector(".weightLbs")?.value || 0);
      return sum + (Number.isFinite(n) ? n : 0);
    }, 0);

    $("packageCount").textContent = rows.length;
    $("selectedCount").textContent = selectedRows.length;
    $("weightTotal").textContent = weightTotal;
  }

  async function loadZeroWeightPackages() {
    setMsg("載入中...");
    rowsEl.innerHTML = "";

    try {
      const data = await apiGet(API_LIST_ZERO_WEIGHT);
      const rows = Array.isArray(data.rows) ? data.rows : [];

      rows.forEach((row, i) => createRow(row, i));

      refreshSummary();
      setMsg(`✅ 已載入 ${rows.length} 筆重量[磅] = 0 的包裹`, "ok");
    } catch (err) {
      setMsg(`❌ ${err.message || err}`, "err");
    }
  }

  function collectSelectedRows() {
    return getRowList()
      .filter(tr => tr.querySelector(".rowCheck")?.checked)
      .map(tr => ({
  package_id: tr.dataset.packageId || "",
  package_code: tr.querySelector(".packageCode")?.value.trim() || "",
  weight_lbs: tr.querySelector(".weightLbs")?.value.trim() || "",
  package_fee_twd: tr.querySelector(".packageFeeTwd")?.value.trim() || ""
}));
  }

async function submitForm() {
  const transfer = {
    transferNo: $("transferNo").value.trim(),
    transferDate: $("transferDate").value.trim(),
    shippingFeeOrTax: $("shippingFeeOrTax").value.trim(),
    extraFeeTwd: $("extraFeeTwd").value.trim(),
    creditOrTaichung: $("creditOrTaichung").checked,
    invoiceRef: $("invoiceRef").value.trim()
  };

  const selectedRows = collectSelectedRows();

  if (!transfer.transferNo) {
    setMsg("❌ 請先輸入轉運單號。", "err");
    return;
  }

  if (!selectedRows.length) {
    setMsg("❌ 請先勾選要儲存的包裹。", "err");
    return;
  }

  const invalid = selectedRows.find(r => !r.weight_lbs);
  if (invalid) {
    setMsg(`❌ 請先填寫重量[磅]：${invalid.package_code || invalid.package_id}`, "err");
    return;
  }

  const payload = {
    transfer,
    packages: selectedRows.map(r => ({
  packageCode: r.package_code || "",
  weightLbs: r.weight_lbs || "",
  packageFeeTwd: r.package_fee_twd || ""
}))
  };

  btnSubmit.disabled = true;
  setMsg("送出中...");

  try {
    const data = await apiPost(API_SAVE_TRANSFER, payload);

    setMsg(
`✅ 建立／更新成功
轉運單 ID：${data.transfer_id || ""}
成功包裹筆數：${data.package_updated_count || 0}
失敗包裹筆數：${data.package_failed_count || 0}

${data.package_failed_count ? "失敗明細：\n" + JSON.stringify(data.failed_packages || [], null, 2) : "全部包裹都已完成更新。"}`,
      "ok"
    );

    $("transferNo").value = "";
    $("transferDate").value = "";
    $("shippingFeeOrTax").value = "";
    $("extraFeeTwd").value = "";
    $("creditOrTaichung").checked = false;
    $("invoiceRef").value = "";

    await loadZeroWeightPackages();
  } catch (err) {
    setMsg(`❌ ${err.message || err}`, "err");
  } finally {
    btnSubmit.disabled = false;
  }
}

  btnReloadPackages.addEventListener("click", loadZeroWeightPackages);
  btnSubmit.addEventListener("click", submitForm);

  loadZeroWeightPackages();
</script>
</body>
</html>
