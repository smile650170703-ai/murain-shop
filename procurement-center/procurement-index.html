<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>採購／到貨入庫中心</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --nav2:#0a1b43;
      --active:#19c6f2;
      --btn:#0f172a;
      --danger:#b91c1c;
      --ok:#0f766e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,var(--nav),#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      color:#fff;
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
      font-weight:700;
      font-size:15px;
    }
    .page-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      border-color:transparent;
      color:#fff;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }
    .hero{
      display:grid;
      grid-template-columns:1.3fr .9fr;
      gap:18px;
      margin-bottom:18px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    h1{
      margin:0 0 10px;
      font-size:34px;
      line-height:1.2;
    }
    h2{
      margin:0 0 14px;
      font-size:20px;
    }
    .sub{
      color:var(--muted);
      line-height:1.75;
      font-size:15px;
    }
    .flow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }
    .pill{
      border-radius:999px;
      padding:10px 14px;
      background:#eef6ff;
      color:#0f3f8c;
      font-weight:700;
      font-size:14px;
      border:1px solid #cfe3ff;
    }
    .gate{
      display:grid;
      gap:12px;
    }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      outline:none;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .btn{
      border:none;
      border-radius:12px;
      padding:12px 18px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      background:var(--btn);
      color:#fff;
    }
    .btn.secondary{
      background:#475569;
    }
    .btn.danger{
      background:var(--danger);
    }
    .msg{
      min-height:24px;
      font-size:14px;
      white-space:pre-wrap;
      line-height:1.6;
    }
    .msg.ok{ color:var(--ok); }
    .msg.err{ color:var(--danger); }
    .module-card{
      margin-top:18px;
    }
    .module-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
      margin-top:16px;
    }
    .module-btn{
      display:flex;
      flex-direction:column;
      gap:6px;
      text-decoration:none;
      color:var(--text);
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      min-height:116px;
      box-shadow:0 8px 20px rgba(15,23,42,.04);
    }
    .module-btn strong{
      font-size:18px;
    }
    .module-btn span{
      color:var(--muted);
      line-height:1.6;
      font-size:14px;
    }
    .module-btn.active{
      border-color:#99ddff;
      background:linear-gradient(180deg,#f8fdff,#eefbff);
    }
    .module-btn.disabled{
      opacity:.5;
      pointer-events:none;
      background:#f8fafc;
    }
    .tips{
      margin-top:18px;
      line-height:1.8;
      color:var(--muted);
      font-size:14px;
    }
    .hidden{ display:none !important; }

    @media (max-width: 980px){
      .hero{ grid-template-columns:1fr; }
      .module-grid{ grid-template-columns:1fr; }
    }
    .module-btn{
  position: relative;
}

.module-badge{
  position:absolute;
  top:-8px;
  right:-8px;
  min-width:22px;
  height:22px;
  padding:0 6px;
  border-radius:999px;
  background:#dc2626;
  color:#fff;
  font-size:12px;
  font-weight:800;
  display:none;
  align-items:center;
  justify-content:center;
  line-height:22px;
  box-shadow:0 4px 12px rgba(220,38,38,.25);
}

.module-badge.show{
  display:inline-flex;
}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html">直播主開單</a>
      <a class="page-tab" href="/admin.html">訂單後台</a>
      <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
      <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
      <a class="page-tab" href="/shop-product-admin">上架官網</a>
      <a class="page-tab" href="/stock.html">庫存查詢</a>
      <a class="page-tab is-active" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
      <a class="page-tab" href="/company-files/company-index.html">公司檔案管理</a>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <div class="card">
        <h1>採購／到貨入庫中心</h1>
        <div class="flow">
          <div class="pill">1. 採購單</div>
          <div class="pill">2. 包裹／轉運</div>
          <div class="pill">3. 待入庫</div>
          <div class="pill">4. 標籤列印</div>
          <div class="pill">5. 列印完成</div>
          <div class="pill">6. 待確認追蹤</div>
        </div>
      </div>

      <div class="card">
        <h2>進入驗證</h2>

        <div class="gate" id="gateBox">
          <div>
            <label for="entryPassword">首頁進入密碼</label>
            <input id="entryPassword" type="password" placeholder="請輸入進入密碼" />
          </div>

          <div class="toolbar">
            <button class="btn" id="btnEnter" type="button">進入模組</button>
            <button class="btn secondary hidden" id="btnUnlockLocal" type="button">本機直接放行</button>
            <button class="btn danger hidden" id="btnLogout" type="button">登出</button>
          </div>

          <div id="msg" class="msg"></div>
        </div>
      </div>
    </div>

    <div class="card module-card hidden" id="moduleCard">
      <h2>工作頁</h2>

      <div class="module-grid">
        <a class="module-btn active" href="/procurement-center/procurement-purchase.html">
          <strong>採購單</strong>
          <span>建立採購單、包裹單號、商品明細的一頁式輸入。</span>
        </a>

        <a class="module-btn" href="/procurement-center/procurement-transfer.html">
          <strong>包裹／轉運</strong>
          <span>處理轉運單、重量[磅]、運費、稅額、附加費。</span>
        </a>

        <a class="module-btn" href="/procurement-center/procurement-inbound.html">
          <strong>待入庫</strong>
          <span>補品牌、商品種類、商品名稱、標籤輸入碼與建議售價。</span>
        </a>

        <a class="module-btn" href="/procurement-center/procurement-label-print.html">
          <strong>標籤列印</strong>
          <span>一鍵整理列印資料、輸入列印批次、勾列印完成。</span>
        </a>

        <a class="module-btn" href="/procurement-center/procurement-label-done.html">
          <strong>列印完成</strong>
          <span>查詢已完成列印的批次與資料。</span>
        </a>

        <a class="module-btn" href="/procurement-center/procurement-refund-register.html" id="pendingReviewBtn">
  <strong>待確認追蹤</strong>
  <span>追蹤少件、缺貨、規格錯誤、顏色錯誤等異常商品。</span>
  <span id="pendingReviewBadge" class="module-badge"></span>
</a>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_OK = "procurement_entry_ok";
    const STORAGE_TOKEN = "procurement_entry_token";

    const msgEl = document.getElementById("msg");
    const moduleCard = document.getElementById("moduleCard");
    const btnEnter = document.getElementById("btnEnter");
    const btnLogout = document.getElementById("btnLogout");
    const btnUnlockLocal = document.getElementById("btnUnlockLocal");
    const inputPassword = document.getElementById("entryPassword");
const API_PENDING_REVIEW_LIST = "https://api.murain.tw/op/procurement/pending-review/list";

async function loadPendingReviewBadge() {
  const badge = document.getElementById("pendingReviewBadge");
  if (!badge) return;

  try {
    const r = await fetch(API_PENDING_REVIEW_LIST);
    const data = await r.json().catch(() => ({}));

    if (!r.ok || !data.ok) {
      badge.textContent = "";
      badge.classList.remove("show");
      return;
    }

    const count = Number(data.count || 0);

    if (count > 0) {
      badge.textContent = count > 99 ? "99+" : String(count);
      badge.classList.add("show");
    } else {
      badge.textContent = "";
      badge.classList.remove("show");
    }
  } catch (e) {
    badge.textContent = "";
    badge.classList.remove("show");
  }
}
    function setMsg(text, type) {
      msgEl.textContent = text || "";
      msgEl.className = "msg";
      if (type === "ok") msgEl.classList.add("ok");
      if (type === "err") msgEl.classList.add("err");
    }

    function showUnlocked() {
  moduleCard.classList.remove("hidden");
  btnLogout.classList.remove("hidden");
  setMsg("✅ 已通過首頁驗證，可以進入模組。", "ok");
  loadPendingReviewBadge();
}

    function showLocked() {
      moduleCard.classList.add("hidden");
      btnLogout.classList.add("hidden");
    }

    async function checkPassword() {
      const password = inputPassword.value.trim();
      if (!password) {
        setMsg("請先輸入首頁進入密碼。", "err");
        return;
      }

      btnEnter.disabled = true;
      setMsg("驗證中...");

      try {
        const API_BASE = "https://api.murain.tw";

const r = await fetch(`${API_BASE}/op/procurement/check-entry-password`, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ password })
});

        const data = await r.json().catch(() => ({}));

        if (!r.ok || !data.ok) {
          throw new Error(data.message || data.error || "密碼驗證失敗");
        }

        sessionStorage.setItem(STORAGE_OK, "1");
        if (data.token) {
          sessionStorage.setItem(STORAGE_TOKEN, data.token);
        } else {
          sessionStorage.removeItem(STORAGE_TOKEN);
        }

        inputPassword.value = "";
        showUnlocked();
      } catch (err) {
        setMsg("❌ " + (err.message || err), "err");
      } finally {
        btnEnter.disabled = false;
      }
    }

    function logout() {
      sessionStorage.removeItem(STORAGE_OK);
      sessionStorage.removeItem(STORAGE_TOKEN);
      showLocked();
      setMsg("已登出。", "ok");
    }

    btnEnter.addEventListener("click", checkPassword);
    btnLogout.addEventListener("click", logout);

    inputPassword.addEventListener("keydown", (e) => {
      if (e.key === "Enter") checkPassword();
    });

       // 開發期本機快速放行用。正式上線可刪掉這段。
    if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
      btnUnlockLocal.classList.remove("hidden");
      btnUnlockLocal.addEventListener("click", () => {
        sessionStorage.setItem(STORAGE_OK, "1");
        showUnlocked();
      });
    }

    function forceLockEveryOpen() {
      sessionStorage.removeItem(STORAGE_OK);
      sessionStorage.removeItem(STORAGE_TOKEN);
      inputPassword.value = "";
      showLocked();
      setMsg("請輸入首頁進入密碼。");
    }

    // 一般載入
    forceLockEveryOpen();

    // 瀏覽器上一頁 / 返回快取時，也一律重新鎖住
    window.addEventListener("pageshow", () => {
      forceLockEveryOpen();
    });
  </script>
</body>
</html>
