  <style>
    :root{
      --bg:#f5f7fb;

    *{box-sizing:border-box}
    body{
      margin:0;

.card{

.section-head{

.btn{

.soft-box{

  font-size:15px;

  color:var(--ok);

}

}
.status-text{

.table-wrap{
  overflow:auto;

  border-radius:16px;
  background:#fff;
}
table{
  width:100%;
  min-width:900px;

}
th,td{
  border-bottom:1px solid var(--line);

}
th{
  background:#f8fafc;
  text-align:left;
  font-size:13px;
  white-space:nowrap;
}
td input, td select{
  width:100%;
  min-width:80px;
  border:1px solid var(--line);
  border-radius:10px;
  padding:8px 10px;
  font-size:12px;
  background:#fff;
  outline:none;
}
td .sm{ min-width:90px; width:90px; }
td .md{ min-width:118px; width:118px; }
td .lg{ min-width:150px; width:150px; }

.badge{
  display:inline-flex;
  align-items:center;
  padding:7px 11px;
  border-radius:999px;

  border:1px solid #cfe3ff;
  color:#0f3f8c;
  font-size:13px;

}

  gap:10px;
  flex-wrap:wrap;

}

.msg{
  white-space:pre-wrap;
  line-height:1.7;
  font-size:14px;

}
.msg.ok{ color:var(--ok); }
.msg.err{ color:#c81e1e; }

.empty{
  color:var(--muted);
  font-size:14px;
  padding:10px 0;
}

.photo-box{
  width:54px;
  height:54px;
  border-radius:10px;
  border:1px solid var(--line);
  background:#f8fafc;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#94a3b8;
  font-size:11px;
}
.photo-box img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.auto-text{
  color:#334155;
  line-height:1.3;
  white-space:pre-wrap;
  word-break:break-word;

}
.name-text{
  font-size:12px;

}
.color-text{
  font-size:12px;

}
.row-ready td{
  background:#f7fcf9;
}
.helper{
  color:var(--muted);
  font-size:12px;

}

@media (max-width: 1100px){
  .page-head{ flex-direction:column; align-items:stretch; }

}

  <div class="card">

      <div class="action-group">

    <div class="table-wrap">
      <table>
        <thead>

  <th style="width:160px;">名稱</th>

  <script>
  const STORAGE_OK = "procurement_entry_ok";
  if (sessionStorage.getItem(STORAGE_OK) !== "1") {
    location.href = "/procurement-center/procurement-index.html";
  }

  const API_LIST = "https://api.murain.tw/op/procurement/inbound/list";
  const API_SAVE = "https://api.murain.tw/op/procurement/inbound/save";

  const $ = (id) => document.getElementById(id);
  const rowsEl = $("rows");
  const msgEl = $("msg");

  let currentRows = [];

  const COLOR_DICT = [
    [/black gold/gi, "黑金"],
    [/full pink/gi, "滿版粉"],
    [/milk tea/gi, "奶茶"],
    [/coffee/gi, "咖"],
    [/brown/gi, "咖啡"],
    [/beige/gi, "米色"],
    [/black/gi, "黑色"],
    [/white/gi, "白色"],
    [/pink/gi, "粉色"],
    [/red/gi, "紅色"],
    [/blue/gi, "藍色"],
    [/green/gi, "綠色"],
    [/gray/gi, "灰色"],
    [/grey/gi, "灰色"],
    [/purple/gi, "紫色"],
    [/yellow/gi, "黃色"],
    [/orange/gi, "橘色"]
  ];

  const NAME_DICT = [
  [/long zip around wallet/gi, "全拉鍊長夾"],
  [/zip around wallet/gi, "拉鍊長夾"],
  [/messenger bag/gi, "郵差包"],
  [/mini belt bag/gi, "迷你腰包"],
  [/belt bag/gi, "腰包"],
  [/sling pack/gi, "胸包"],
  [/wristlet/gi, "手拿包"],
  [/card holder/gi, "卡夾"],
  [/card case/gi, "卡夾"],
  [/coin purse/gi, "零錢包"],
  [/crossbody bag/gi, "斜背包"],
  [/shoulder bag/gi, "肩背包"],
  [/tote bag/gi, "托特包"],
  [/satchel/gi, "手提包"],
  [/bifold/gi, "短夾"],
  [/wallet/gi, "皮夾"],
  [/pouch/gi, "小包"],
  [/bag/gi, "包"],
  [/classic/gi, "經典"],
  [/medium/gi, "中"],
  [/small/gi, "小"],
  [/large/gi, "大"],
  [/logo/gi, "LOGO"]
];

  function escapeHtml(str) {
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function setMsg(text, type) {
    msgEl.textContent = text || "";
    msgEl.className = "soft-text status-text";
    if (type === "ok") msgEl.classList.add("ok");
    if (type === "err") msgEl.classList.add("err");
  }

  async function apiGet(url) {
    const r = await fetch(url);
    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "查詢失敗");
    }
    return data;
  }

  async function apiPost(url, payload) {
    const r = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || !data.ok) {
      throw new Error(data.message || data.error || "API 失敗");
    }
    return data;
  }

  function makeInputClass(base, id) {
    return `${base}_${String(id || "").replace(/[^a-zA-Z0-9_-]/g, "_")}`;
  }

  function normalizePhotoUrl(row) {
    return row.photo || row.image || row.productPhoto || row.photoUrl || row.imageUrl || "";
  }

  function renderPhoto(row) {
    const url = normalizePhotoUrl(row);
    if (!url) return `<div class="photo-box">無照片</div>`;
    return `<div class="photo-box"><img src="${escapeHtml(url)}" alt="商品照片"></div>`;
  }

  function formatIntegerText(v) {
    const s = String(v ?? "").replace(/,/g, "").trim();
    if (!s) return "";
    const n = Number(s);
    return Number.isFinite(n) ? String(Math.round(n)) : String(v ?? "");
  }

  function applyDict(text, dict) {
    let out = String(text || "");
    for (const [re, zh] of dict) {
      out = out.replace(re, zh);
    }
    return out.replace(/\s{2,}/g, " ").trim();
  }

  function translateColorDisplay(text) {
    return applyDict(text, COLOR_DICT);
  }

  function translateNameDisplay(text) {
    let out = String(text || "");
    out = applyDict(out, NAME_DICT);
    out = applyDict(out, COLOR_DICT);
    out = out.replace(/\[(.*?)\]/g, (_, inner) => `[${translateColorDisplay(inner)}]`);
    return out.trim();
  }

    function extractEcomColorLabel(text) {
  const raw = String(text || "").trim();
  if (!raw) return "";

  const rules = [
    [/black gold/i, "黑金"],
    [/full pink/i, "滿版粉"],
    [/milk tea/i, "奶茶"],
    [/dove grey/i, "灰色"],
    [/charcoal/i, "炭灰"],
    [/chalk multi/i, "拼色"],
    [/multi/i, "拼色"],
    [/coffee/i, "咖啡"],
    [/brown/i, "咖啡"],
    [/beige/i, "米色"],
    [/black/i, "黑色"],
    [/white/i, "白色"],
    [/chalk/i, "白色"],
    [/pink/i, "粉色"],
    [/red/i, "紅色"],
    [/blue/i, "藍色"],
    [/green/i, "綠色"],
    [/gray/i, "灰色"],
    [/grey/i, "灰色"],
    [/purple/i, "紫色"],
    [/yellow/i, "黃色"],
    [/orange/i, "橘色"]
  ];

  for (const [re, label] of rules) {
    if (re.test(raw)) return label;
  }

  const parts = raw
    .split(/[\/,|]+/)
    .map(s => s.trim())
    .filter(Boolean);

  const skipRe = /(leather|canvas|jacquard|coated|signature|smooth|pebbled|refined|polished|crossgrain|glovetanned|gunmetal|silver|gold|brass|hardware)/i;
  const picked = parts.find(part => !skipRe.test(part)) || parts[parts.length - 1] || raw;

  for (const [re, label] of rules) {
    if (re.test(picked)) return label;
  }

  return picked;
}

function buildAutoProductName(row) {
  const nameZh = translateNameDisplay(row?.name || "");
  const colorLabel = extractEcomColorLabel(row?.color || "");

  if (nameZh && colorLabel) return `${nameZh} [${colorLabel}]`;
  if (nameZh) return nameZh;
  if (colorLabel) return `[${colorLabel}]`;
  return "";
}

  function getRowFormValues(rowId, rowObj) {
  const safeId = String(rowId || "").replace(/[^a-zA-Z0-9_-]/g, "_");
  const row = rowObj || currentRows.find(r => String(r.id) === String(rowId)) || {};
  const fallbackProductName =
  buildAutoProductName(row) ||
  String(row.productName || "").trim() ||
  String(row.name || "").trim();

  return {
    brand: document.querySelector(`.brand_${safeId}`)?.value.trim() || "",
    productType: document.querySelector(`.productType_${safeId}`)?.value.trim() || "",
    productName: document.querySelector(`.productName_${safeId}`)?.value.trim() || fallbackProductName
  };
}

function isRowReady(values) {
  return !!(
    String(values?.brand || "").trim() &&
    String(values?.productType || "").trim() &&
    String(values?.productName || "").trim()
  );
}

  function refreshSummary() {
    $("rowCount").textContent = String(currentRows.length);

    const readyCount = currentRows.filter(row => {
      const values = getRowFormValues(row.id, row);
      return isRowReady(values);
    }).length;

    $("selectedCount").textContent = String(readyCount);
  }

  function renderRows(rows) {
    currentRows = Array.isArray(rows) ? rows : [];

    if (!currentRows.length) {
      rowsEl.innerHTML = `<tr><td colspan="7"><div class="empty">目前沒有待入庫資料。</div></td></tr>`;
      refreshSummary();
      return;
    }

    rowsEl.innerHTML = currentRows.map(row => {
      const id = escapeHtml(row.id || "");
const brandCls = makeInputClass("brand", row.id);
const typeCls = makeInputClass("productType", row.id);
const productNameCls = makeInputClass("productName", row.id);

      const displayName = String(row.name || "").trim();
const displayColor = String(row.color || "").trim();
const autoProductName = buildAutoProductName(row);
const defaultProductName = autoProductName || String(row.productName || "").trim() || displayName || "";
      const readyNow = isRowReady({
  brand: row.brand || "",
  productType: row.productType || "",
  productName: defaultProductName || ""
});
      return `
        <tr data-row-id="${id}" class="${readyNow ? "row-ready" : ""}">
          <td><div class="auto-text name-text">${escapeHtml(displayName || row.name || "")}</div></td>
          <td>${renderPhoto(row)}</td>
          <td><div class="auto-text">${escapeHtml(row.qty || "")}</div></td>
          <td><div class="auto-text color-text">${escapeHtml(displayColor || row.color || "")}</div></td>

          <td>
            <input
              list="brandOptions"
              class="md js-watch ${brandCls}"
              value="${escapeHtml(row.brand || "")}"
              placeholder="品牌"
            >
          </td>

          <td>
            <input
              list="typeOptions"
              class="md js-watch ${typeCls}"
              value="${escapeHtml(row.productType || "")}"
              placeholder="商品種類"
            >
          </td>

         <td>
  <input
    class="xl js-watch ${productNameCls}"
    value="${escapeHtml(defaultProductName)}"
    placeholder="商品名稱"
  >
</td>
        </tr>
      `;
    }).join("");

    rowsEl.querySelectorAll(".js-watch").forEach(el => {
      const onChange = () => {
        const tr = el.closest("tr");
        if (!tr) return;

        const rowId = tr.getAttribute("data-row-id") || "";
        const values = getRowFormValues(rowId);
        tr.classList.toggle("row-ready", isRowReady(values));
        refreshSummary();
      };

      el.addEventListener("input", onChange);
      el.addEventListener("change", onChange);
      el.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  e.preventDefault();

  const tr = el.closest("tr");
  if (!tr) return;

  const currentInputs = Array.from(tr.querySelectorAll("input, select"));
  const colIndex = currentInputs.indexOf(el);
  if (colIndex < 0) return;

  let nextTr = tr.nextElementSibling;
  while (nextTr) {
    const nextInputs = Array.from(nextTr.querySelectorAll("input, select"));
    const target = nextInputs[colIndex];
    if (target) {
      target.focus();
      if (typeof target.select === "function") target.select();
      break;
    }
    nextTr = nextTr.nextElementSibling;
  }
});
    });

    refreshSummary();
  }

function collectPayload() {
  const readyRows = currentRows.map(row => {
    const values = getRowFormValues(row.id, row);
    return {
      id: row.id,
      name: row.name || "",
      brand: values.brand,
      productType: values.productType,
      productName: values.productName
    };
  }).filter(isRowReady);

  return readyRows.map((row, index) => ({
    ...row,
    serialNo: (index % 9) + 1,
    printable: "1"
  }));
}

  async function loadList() {
    setMsg("載入中...");

    try {
      const data = await apiGet(API_LIST);
      renderRows(data.rows || []);
      setMsg("✅ 清單已更新", "ok");
    } catch (err) {
      rowsEl.innerHTML = `<tr><td colspan="7"><div class="empty">❌ ${escapeHtml(err.message || String(err))}</div></td></tr>`;
      setMsg(`❌ ${err.message || err}`, "err");
    }
  }

async function saveSelected() {
  const rows = collectPayload();

  if (!rows.length) {
    setMsg("❌ 請先把 品牌 / 商品種類 / 商品名稱 填完整。", "err");
    return;
  }

  setMsg("送出中...");

  try {
    const data = await apiPost(API_SAVE, { rows });

    const updatedCount = Number(data.updated_count || 0);
    const failedCount = Number(data.failed_count || 0);
    const failedRows = Array.isArray(data.failed) ? data.failed : [];

    if (failedCount > 0) {
      const failedText = failedRows.map((r, i) => {
        const name = String(r?.name || "").trim() || "(未帶名稱)";
        const err = String(r?.error || "").trim() || "未知錯誤";
        return `${i + 1}. ${name}｜${err}`;
      }).join("\n");

      setMsg(
`⚠️ 部分儲存成功
成功筆數：${updatedCount}
失敗筆數：${failedCount}

失敗明細：
${failedText}`,
        "err"
      );
      return;
    }

        setMsg(
`✅ 已全部儲存成功
成功筆數：${updatedCount}
失敗筆數：0`,
      "ok"
    );

    await loadList();

  } catch (err) {
    setMsg(`❌ ${err.message || err}`, "err");
  }
}

  $("btnReload").addEventListener("click", loadList);
  $("btnSave").addEventListener("click", saveSelected);

  loadList();
</script>
</body>
</html>
