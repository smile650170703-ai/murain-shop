<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>列印紀錄｜採購／到貨入庫中心</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --danger:#c81e1e;
      --ok:#0f766e;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }
    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }
    .page-tabs-bar,.proc-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }
    .page-tab,.proc-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
      color:#fff;
    }
    .page-tab{
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }
    .page-tab.is-active,
    .proc-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }
    .proc-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }
    .proc-tab.is-disabled{
      opacity:.45;
      pointer-events:none;
    }
    .wrap{
      max-width:1280px;
      margin:0 auto;
      padding:24px;
    }
    .page-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }
    .page-head-left{
      flex:1;
      min-width:0;
    }
    .page-head-right{
      width:420px;
      max-width:100%;
      flex:0 0 auto;
    }
    h1{
      margin:0 0 8px;
      font-size:34px;
    }
    h2{
      margin:0 0 14px;
      font-size:20px;
    }
    .sub{
      color:var(--muted);
      line-height:1.8;
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:22px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
    }
    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
    }
    input, button{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      outline:none;
      background:#fff;
    }
    .btn{
      width:auto;
      min-width:120px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }
    .btn.secondary{ background:var(--btn2); }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .soft-box{
      background:var(--soft);
      border:1px solid var(--soft-border);
      border-radius:16px;
      padding:16px;
    }
    .soft-title{
      font-size:15px;
      font-weight:800;
      margin-bottom:8px;
    }
    .soft-text{
      color:#31538f;
      line-height:1.7;
      font-size:14px;
      white-space:pre-wrap;
    }
    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }
    table{
      width:100%;
      min-width:1200px;
      border-collapse:collapse;
    }
    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:top;
    }
    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }
    .msg{
      white-space:pre-wrap;
      line-height:1.7;
      font-size:14px;
      min-height:24px;
    }
    .msg.ok{ color:#0f766e; }
    .msg.err{ color:#c81e1e; }
    .empty{
      color:var(--muted);
      font-size:14px;
      padding:10px 0;
    }
    .card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .link-btn{
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    @media (max-width: 1100px){
      .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); }
      .page-head{ flex-direction:column; }
      .page-head-right{ width:100%; }
    }
    @media (max-width: 720px){
      .grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html">直播主開單</a>
      <a class="page-tab" href="/admin.html">訂單後台</a>
      <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
      <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
      <a class="page-tab" href="/shop-product-admin">上架官網</a>
      <a class="page-tab" href="/stock.html">庫存查詢</a>
      <a class="page-tab is-active" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
      <a class="page-tab" href="/company-files/company-index.html">公司檔案管理</a>
    </div>

    <div class="proc-tabs-bar">
      <a class="proc-tab" href="/procurement-center/procurement-purchase.html">採購單</a>
      <a class="proc-tab" href="/procurement-center/procurement-transfer.html">包裹／轉運</a>
      <a class="proc-tab" href="/procurement-center/procurement-inbound.html">待入庫</a>
      <a class="proc-tab" href="/procurement-center/procurement-label-print.html">標籤列印</a>
      <a class="proc-tab is-active" href="/procurement-center/procurement-label-done.html">列印紀錄</a>
      <a class="proc-tab" href="/procurement-center/procurement-refund-register.html">待確認追蹤</a>
    </div>
  </div>

  <div class="wrap">
    <div class="page-head">
      <div class="page-head-left">
        <h1>列印紀錄</h1>
        <div class="sub">
          這一頁只保留查詢用途：<br>
          查看最近列印紀錄、用批次或關鍵字回查資料。
        </div>
      </div>

      <div class="page-head-right">
        <div class="soft-box">
          <div class="soft-title">使用方式</div>
          <div class="soft-text">可直接輸入列印批次查單一批，也可空白查最近列印紀錄。</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>查詢條件</h2>
      <div class="grid">
        <div>
          <label>列印批次</label>
          <input id="batch" placeholder="例如 20260413-A" />
        </div>
        <div>
          <label>關鍵字</label>
          <input id="keyword" placeholder="搜尋新條碼 / 品牌 / 商品名稱 / 名稱" />
        </div>
        <div>
          <label>&nbsp;</label>
          <div class="toolbar" style="margin-top:0;">
            <button class="btn secondary" type="button" id="btnSearch">查詢</button>
            <button class="btn" type="button" id="btnReset">清空</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <h2 style="margin:0;">列印紀錄明細</h2>
        <a class="btn secondary link-btn" href="/procurement-center/procurement-label-print.html">回標籤列印</a>
      </div>

      <div id="msg" class="msg" style="margin-bottom:12px;">尚未查詢</div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:140px;">列印批次</th>
              <th style="width:160px;">完成時間</th>
              <th style="width:150px;">新條碼（主播版）</th>
              <th style="width:120px;">品牌</th>
              <th>商品名稱</th>
              <th style="width:120px;">建議售價 (TWD)</th>
              <th style="width:80px;">數量</th>
              <th>名稱</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_OK = "procurement_entry_ok";
    if (sessionStorage.getItem(STORAGE_OK) !== "1") {
      location.href = "/procurement-center/procurement-index.html";
    }

    const API_LIST = "https://api.murain.tw/op/procurement/label-done/list";

    const $ = (id) => document.getElementById(id);
    const rowsEl = $("rows");
    const msgEl = $("msg");

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setMsg(text, type) {
      msgEl.textContent = text || "";
      msgEl.className = "msg";
      if (type === "ok") msgEl.classList.add("ok");
      if (type === "err") msgEl.classList.add("err");
    }

    async function apiGet(url) {
      const r = await fetch(url);
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        throw new Error(data.message || data.error || "查詢失敗");
      }
      return data;
    }

    function renderRows(list) {
      const rows = Array.isArray(list) ? list : [];

      if (!rows.length) {
        rowsEl.innerHTML = `<tr><td colspan="8"><div class="empty">目前沒有列印紀錄。</div></td></tr>`;
        return;
      }

      rowsEl.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.batch || "")}</td>
          <td>${escapeHtml(row.completedAt || "")}</td>
          <td>${escapeHtml(row.newBarcode || "")}</td>
          <td>${escapeHtml(row.brand || "")}</td>
          <td>${escapeHtml(row.productName || "")}</td>
          <td>${escapeHtml(row.suggestPrice || "")}</td>
          <td>${escapeHtml(row.qty || "")}</td>
          <td>${escapeHtml(row.name || "")}</td>
        </tr>
      `).join("");
    }

    async function loadDoneList() {
      const batch = $("batch").value.trim();
      const keyword = $("keyword").value.trim();
      const limit = "50";

      setMsg("查詢中...");

      try {
        const url = `${API_LIST}?batch=${encodeURIComponent(batch)}&keyword=${encodeURIComponent(keyword)}&limit=${encodeURIComponent(limit)}`;
        const data = await apiGet(url);

        renderRows(data.rows || []);
        setMsg(`✅ 查詢完成，共 ${Array.isArray(data.rows) ? data.rows.length : 0} 筆`, "ok");
      } catch (err) {
        renderRows([]);
        setMsg(`❌ ${err.message || err}`, "err");
      }
    }

    $("btnSearch").addEventListener("click", loadDoneList);

    $("btnReset").addEventListener("click", () => {
      $("batch").value = "";
      $("keyword").value = "";
      loadDoneList();
    });

    $("batch").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadDoneList();
    });

    $("keyword").addEventListener("keydown", (e) => {
      if (e.key === "Enter") loadDoneList();
    });

    loadDoneList();
  </script>
</body>
</html>
