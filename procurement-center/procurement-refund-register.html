<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>待確認追蹤｜採購／到貨入庫中心</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#fff;
      --line:#d8deea;
      --text:#14213d;
      --muted:#6b7280;
      --nav:#06142f;
      --active:#19c6f2;
      --btn:#0f172a;
      --btn2:#475569;
      --ok:#0f766e;
      --err:#c81e1e;
      --warn:#b45309;
      --soft:#eef6ff;
      --soft-border:#cfe3ff;
      --badge:#dc2626;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Arial,"Noto Sans TC",sans-serif;
    }

    .topbar{
      background:linear-gradient(180deg,#06142f,#000a1f);
      padding:18px 28px 12px;
    }

    .page-tabs-bar,.proc-tabs-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .page-tabs-bar{ margin-bottom:12px; }

    .page-tab,.proc-tab{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:700;
      font-size:15px;
      color:#fff;
      position:relative;
    }

    .page-tab{
      border:1px solid rgba(255,255,255,.28);
      background:rgba(255,255,255,.03);
    }

    .page-tab.is-active,
    .proc-tab.is-active{
      background:linear-gradient(90deg,#1e90ff,#22d3ee);
      color:#fff;
      border:none;
      box-shadow:0 8px 18px rgba(34,211,238,.25);
    }

    .proc-tab{
      color:#0f172a;
      border:1px solid #cfe0ff;
      background:#fff;
    }

    .badge-dot{
      position:absolute;
      top:-6px;
      right:-6px;
      min-width:20px;
      height:20px;
      padding:0 6px;
      border-radius:999px;
      background:var(--badge);
      color:#fff;
      font-size:12px;
      font-weight:800;
      display:none;
      align-items:center;
      justify-content:center;
      line-height:20px;
      box-shadow:0 4px 12px rgba(220,38,38,.25);
    }
    .badge-dot.show{
      display:inline-flex;
    }

    .wrap{
      max-width:1480px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:20px;
      margin-bottom:18px;
      box-shadow:0 10px 30px rgba(15,23,42,.05);
    }

    .head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .head h1{
      margin:0 0 6px;
      font-size:32px;
    }

    .sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.8;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:end;
    }

    .btn{
      width:auto;
      min-width:140px;
      border:none;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-size:14px;
      font-weight:800;
      color:#fff;
      background:var(--btn);
    }

    .btn.secondary{ background:var(--btn2); }
    .btn.small{
      min-width:auto;
      padding:9px 12px;
      border-radius:10px;
      font-size:13px;
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .status{
      display:none;
      margin-bottom:14px;
      border-radius:14px;
      padding:12px 14px;
      font-size:14px;
      line-height:1.6;
      white-space:pre-wrap;
      border:1px solid transparent;
    }
    .status.show{ display:block; }
    .status.ok{
      color:#0f766e;
      background:#ecfdf5;
      border-color:#a7f3d0;
    }
    .status.err{
      color:#b91c1c;
      background:#fef2f2;
      border-color:#fecaca;
    }
    .status.info{
      color:#1d4ed8;
      background:#eff6ff;
      border-color:#bfdbfe;
    }

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .section-head h2{
      margin:0;
      font-size:22px;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid #cfe3ff;
      background:#eef6ff;
      color:#0f3f8c;
      font-size:13px;
      font-weight:700;
    }

    .tag.warn{
      border-color:#f5d7a1;
      background:#fff7e6;
      color:#b45309;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    table{
  width:100%;
  min-width:1500px;
  border-collapse:collapse;
}

    th,td{
      border-bottom:1px solid var(--line);
      padding:10px 8px;
      vertical-align:middle;
      font-size:14px;
    }

    th{
      background:#f8fafc;
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }

    .cell-input,.cell-select{
      width:100%;
      min-width:0;
      padding:8px 10px;
      border:1px solid #cfd8e6;
      border-radius:10px;
      font-size:14px;
      background:#fff;
      color:var(--text);
    }
    .note-input{
  min-width:260px;
}

.refund-input{
  min-width:120px;
}

.th-refund{
  color:#dc2626;
  font-weight:800;
}
    .cell-textarea{
  width:100%;
  min-width:0;
  padding:8px 10px;
  border:1px solid #cfd8e6;
  border-radius:10px;
  font-size:14px;
  background:#fff;
  color:var(--text);
  resize:vertical;
  min-height:92px;
  line-height:1.6;
}

.note-textarea{
  min-width:340px;
}

.subrow-label{
  background:#fafcff;
  color:var(--muted);
  font-weight:700;
}

    .empty{
      color:var(--muted);
      font-size:14px;
      padding:18px;
    }

    @media (max-width: 900px){
      .head{
        flex-direction:column;
        align-items:stretch;
      }
    }
    .track-panel{
  padding:14px 16px;
  background:#fafcff;
}

.track-grid{
  display:grid;
  grid-template-columns:160px 160px 160px 140px 1fr 110px;
  gap:12px;
  align-items:start;
}

.track-item label{
  display:block;
  font-size:12px;
  font-weight:800;
  color:#64748b;
  margin-bottom:6px;
}

.track-item .cell-select,
.track-item .cell-input,
.track-item .cell-textarea{
  width:100%;
}

.note-wrap{
  min-width:320px;
}

.cell-textarea{
  width:100%;
  min-width:0;
  padding:10px 12px;
  border:1px solid #cfd8e6;
  border-radius:10px;
  font-size:14px;
  background:#fff;
  color:var(--text);
  resize:vertical;
  min-height:110px;
  line-height:1.65;
}

.th-refund{
  color:#dc2626;
  font-weight:800;
}

@media (max-width: 1200px){
  .track-grid{
    grid-template-columns:1fr 1fr;
  }
  .note-wrap{
    grid-column:1 / -1;
  }
}

@media (max-width: 720px){
  .track-grid{
    grid-template-columns:1fr;
  }
}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-tabs-bar">
      <a class="page-tab" href="/op.html">直播主開單</a>
      <a class="page-tab" href="/admin.html">訂單後台</a>
      <a class="page-tab" href="/stock-in.html">入庫／自有+寄賣</a>
      <a class="page-tab" href="/op/preorder-order.html">預購入庫＋發送</a>
      <a class="page-tab" href="/op/preorder-cost.html">預購成本補登</a>
      <a class="page-tab" href="/stock.html">庫存查詢</a>
      <a class="page-tab is-active" href="/procurement-center/procurement-index.html">採購／到貨入庫</a>
      <a class="page-tab" href="/company-files/company-index.html">公司檔案管理</a>
    </div>

    <div class="proc-tabs-bar">
      <a class="proc-tab" href="/procurement-center/procurement-purchase.html">採購單</a>
      <a class="proc-tab" href="/procurement-center/procurement-transfer.html">包裹／轉運</a>
      <a class="proc-tab" href="/procurement-center/procurement-inbound.html">待入庫</a>
      <a class="proc-tab" href="/procurement-center/procurement-label-print.html">標籤列印</a>
      <a class="proc-tab" href="/procurement-center/procurement-label-done.html">列印完成</a>
      <a class="proc-tab is-active" href="/procurement-center/procurement-refund-register.html">
        待確認追蹤
        <span id="procTabBadge" class="badge-dot"></span>
      </a>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="head">
        <div>
          <h1>待確認追蹤</h1>
          <div class="sub">
            這一頁顯示「☆4 — 待確認追蹤」清單。<br>
            可追蹤異常商品，更新異常狀態、異常原因、處理方式與異常備註。
          </div>
        </div>

        <div class="toolbar">
          <button class="btn secondary" type="button" id="btnReload">重新整理</button>
        </div>
      </div>

      <div id="pageStatus" class="status"></div>
    </div>

    <div class="card">
      <div class="section-head">
        <h2>待確認追蹤清單</h2>
        <span class="tag warn" id="pendingCountTag">0 筆</span>
      </div>

      <div class="table-wrap">
        <table>
         <thead>
  <tr>
    <th>品牌</th>
    <th>商品名稱</th>
    <th>數量</th>
    <th>累計實收數量</th>
    <th>異常數量</th>
    <th>追蹤設定</th>
  </tr>
</thead>
          <tbody id="pendingReviewRows">
            <tr><td colspan="10" class="empty">載入中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_OK = "procurement_entry_ok";
    if (sessionStorage.getItem(STORAGE_OK) !== "1") {
      location.href = "/procurement-center/procurement-index.html";
    }

    const API_PENDING_REVIEW_LIST = "https://api.murain.tw/op/procurement/pending-review/list";
    const API_PENDING_REVIEW_UPDATE = "https://api.murain.tw/op/procurement/pending-review/update";

    const STATUS_OPTIONS = [
      "待確認",
      "待廠商回覆",
      "待退款",
      "待補寄",
      "已退款",
      "已補寄",
      "已結案"
    ];

    const REASON_OPTIONS = [
      "少件",
      "缺貨",
      "規格錯誤",
      "顏色錯誤",
      "損壞"
    ];

    const METHOD_OPTIONS = [
      "退款",
      "補寄",
      "下次折抵",
      "不處理"
    ];

    const $ = (id) => document.getElementById(id);

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function setStatus(text, type = "info") {
      const el = $("pageStatus");
      el.textContent = text || "";
      el.className = `status show ${type}`;
    }

    function setBadgeCount(n) {
      const count = Number(n || 0);
      $("pendingCountTag").textContent = `${count} 筆`;

      const badge = $("procTabBadge");
      if (count > 0) {
        badge.textContent = count > 99 ? "99+" : String(count);
        badge.classList.add("show");
      } else {
        badge.textContent = "";
        badge.classList.remove("show");
      }
    }

    async function apiGet(url) {
      const r = await fetch(url);
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        throw new Error(data.message || data.error || "讀取失敗");
      }
      return data;
    }

    async function apiPost(url, payload) {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        throw new Error(data.message || data.error || "送出失敗");
      }
      return data;
    }

    function buildSelectOptions(list, value) {
      return list.map(v => {
        const selected = String(value || "") === v ? "selected" : "";
        return `<option value="${escapeHtml(v)}" ${selected}>${escapeHtml(v)}</option>`;
      }).join("");
    }

function renderPendingReviewRows(list) {
  const rows = Array.isArray(list) ? list : [];
  setBadgeCount(rows.length);

  if (!rows.length) {
    $("pendingReviewRows").innerHTML = `<tr><td colspan="6" class="empty">目前沒有待確認追蹤資料。</td></tr>`;
    return;
  }

  $("pendingReviewRows").innerHTML = rows.map((row) => `
    <tr>
      <td>${escapeHtml(row.brand || "")}</td>
      <td>${escapeHtml(row.productName || "")}</td>
      <td>${escapeHtml(row.qty || "")}</td>
      <td>${escapeHtml(row.receivedQty || "")}</td>
      <td>${escapeHtml(row.abnormalQty || "")}</td>
      <td style="color:#64748b;font-weight:700;">請在下方設定</td>
    </tr>

    <tr data-id="${escapeHtml(row.id)}">
      <td colspan="6" class="track-panel">
        <div class="track-grid">
          <div class="track-item">
            <label>異常狀態</label>
            <select class="cell-select" data-role="abnormalStatus">
              ${buildSelectOptions(STATUS_OPTIONS, row.abnormalStatus)}
            </select>
          </div>

          <div class="track-item">
            <label>異常原因</label>
            <select class="cell-select" data-role="abnormalReason">
              ${buildSelectOptions(REASON_OPTIONS, row.abnormalReason)}
            </select>
          </div>

          <div class="track-item">
            <label>處理方式</label>
            <select class="cell-select" data-role="abnormalMethod">
              ${buildSelectOptions(METHOD_OPTIONS, row.abnormalMethod)}
            </select>
          </div>

          <div class="track-item">
            <label class="th-refund">退款金額</label>
            <input
              class="cell-input"
              type="text"
              inputmode="decimal"
              data-role="refundAmount"
              value="${escapeHtml(row.refundAmount || "")}"
              placeholder="退款金額"
            />
          </div>

          <div class="track-item note-wrap">
            <label>異常備註</label>
            <textarea
              class="cell-textarea"
              data-role="abnormalNote"
              placeholder="輸入備註"
            >${escapeHtml(row.abnormalNote || "")}</textarea>
          </div>

          <div class="track-item">
            <label>&nbsp;</label>
            <button class="btn small secondary btnSaveRow" type="button" data-id="${escapeHtml(row.id)}">儲存</button>
          </div>
        </div>
      </td>
    </tr>
  `).join("");

  document.querySelectorAll(".btnSaveRow").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const tr = btn.closest("tr[data-id]");
      const payload = {
        id: btn.dataset.id,
        abnormal_status: String(tr.querySelector('[data-role="abnormalStatus"]')?.value || "").trim(),
        abnormal_reason: String(tr.querySelector('[data-role="abnormalReason"]')?.value || "").trim(),
        abnormal_method: String(tr.querySelector('[data-role="abnormalMethod"]')?.value || "").trim(),
        abnormal_note: String(tr.querySelector('[data-role="abnormalNote"]')?.value || "").trim(),
        refund_amount: String(tr.querySelector('[data-role="refundAmount"]')?.value || "").trim()
      };

      const oldText = btn.textContent;
      btn.disabled = true;
      btn.textContent = "儲存中...";

      try {
        await apiPost(API_PENDING_REVIEW_UPDATE, payload);
        setStatus("✅ 已更新待確認追蹤資料", "ok");
        await loadPendingReviewList();
      } catch (err) {
        setStatus(`❌ ${err.message || err}`, "err");
        btn.disabled = false;
        btn.textContent = oldText;
      }
    });
  });
}

    async function loadPendingReviewList() {
      setStatus("載入中...", "info");
      try {
        const data = await apiGet(API_PENDING_REVIEW_LIST);
        renderPendingReviewRows(data.rows || []);
        setStatus(`✅ 待確認追蹤已更新，共 ${data.count || 0} 筆`, "ok");
      } catch (err) {
        $("pendingReviewRows").innerHTML = `<tr><td colspan="6" class="empty">❌ ${escapeHtml(err.message || String(err))}</td></tr>`;
        setBadgeCount(0);
        setStatus(`❌ ${err.message || err}`, "err");
      }
    }

    $("btnReload").addEventListener("click", loadPendingReviewList);

    loadPendingReviewList();
  </script>
</body>
</html>
