<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>訂單後台</title>
<style>
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",Roboto}
  body{margin:0;background:#020617;color:#e2e8f0}
  .wrap{max-width:1200px;margin:0 auto;padding:16px}
  h1{margin:0 0 6px;font-size:24px}

  /* 新版上方工具列（含快速 filter + 日期/狀態 + 匯出） */
  .toolbar-main{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
  .toolbar-left{flex:1;display:flex;flex-direction:column;gap:6px}
  .filter-group{display:flex;flex-wrap:wrap;gap:6px}
  .filter-btn{padding:7px 12px;border-radius:999px;border:1px solid rgba(148,163,184,.7);background:rgba(15,23,42,.9);color:#e5e7eb;font-size:13px;cursor:pointer}
  .filter-btn.active{background:#22d3ee;color:#0f172a;border-color:#22d3ee;box-shadow:0 8px 20px rgba(34,211,238,.35)}
  .small-btn{padding:6px 10px;border-radius:999px;border:1px solid rgba(148,163,184,.7);background:transparent;color:#e5e7eb;font-size:12px;cursor:pointer}

  .filter-row{display:flex;flex-wrap:wrap;gap:6px;font-size:12px;align-items:flex-end;margin-top:2px}
  .filter-row .field{min-width:140px;flex:0 0 auto}
  .filter-row label{display:block;font-size:11px;margin:0 0 2px;color:#94a3b8}
  .filter-row input,
  .filter-row select{width:100%;padding:5px 8px;border-radius:999px;border:1px solid rgba(148,163,184,.6);background:#020617;color:#e2e8f0;font-size:12px}

  .summary-row{font-size:12px;color:#cbd5f5;display:flex;flex-wrap:wrap;gap:10px;margin-top:2px}
  .summary-row span{white-space:nowrap}
  #msg{font-size:12px;color:#94a3b8;margin-top:2px}

  .layout{display:grid;grid-template-columns:minmax(0,0.9fr) minmax(0,1.1fr);gap:12px}
  @media (max-width:900px){.layout{grid-template-columns:1fr;}}

  .card{background:rgba(15,23,42,.95);border-radius:16px;border:1px solid rgba(148,163,184,.3);padding:10px;min-height:120px}
  #orderList{max-height:calc(100vh - 190px);overflow:auto}

  .order-row{padding:8px 10px;border-radius:12px;cursor:pointer;border:1px solid transparent;margin-bottom:6px;background:rgba(15,23,42,.95)}
  .order-row:hover{border-color:rgba(148,163,184,.8);background:rgba(15,23,42,1)}
  .order-row.active{border-color:#22d3ee;background:rgba(15,23,42,1);box-shadow:0 8px 20px rgba(34,211,238,.25)}

  .ord-top{display:flex;align-items:center;gap:6px;font-size:13px}
.ord-right{margin-left:auto;text-align:right}
.ord-check{display:flex;align-items:center;flex:0 0 auto}
.ord-cb{width:18px;height:18px;cursor:pointer}
  .ord-id{font-weight:600}
  .ord-amount{font-weight:600}
  .ord-sub{font-size:12px;color:#94a3b8;margin-top:3px}
  .badges{display:flex;flex-wrap:wrap;gap:4px;font-size:11px;margin-top:4px}
  .badge{padding:2px 7px;border-radius:999px;border:1px solid rgba(148,163,184,.7);background:rgba(15,23,42,1)}
  .badge.green{border-color:#22c55e;color:#bbf7d0;background:rgba(22,163,74,.2)}
  .badge.yellow{border-color:#eab308;color:#facc15;background:rgba(234,179,8,.15)}
  .badge.red{border-color:#f97373;color:#fecaca;background:rgba(220,38,38,.2)}
  .badge.blue{border-color:#38bdf8;color:#bae6fd;background:rgba(56,189,248,.2)}
  .muted{font-size:13px;color:#94a3b8}
 .credit-red { color:#ff4d4f; font-weight:800; }

  .detail-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:10px}
  @media (max-width:900px){.detail-grid{grid-template-columns:1fr}}

  label{display:block;font-size:12px;margin:6px 0 3px;color:#cbd5f5}
  input,select,textarea{width:100%;padding:8px 9px;border-radius:10px;border:1px solid rgba(148,163,184,.6);background:#020617;color:#e2e8f0;font-size:13px}
  textarea{min-height:70px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:2px solid #38bdf8;outline-offset:1px;border-color:#38bdf8}
  .row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .mt-2{margin-top:8px}
  .mt-3{margin-top:12px}
  .mt-4{margin-top:16px}
  .btn-primary{margin-top:8px;padding:10px 14px;border-radius:999px;border:none;background:#22d3ee;color:#0f172a;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 10px 30px rgba(34,211,238,.35)}
  .btn-secondary{margin-top:8px;padding:8px 12px;border-radius:999px;border:1px solid rgba(148,163,184,.7);background:transparent;color:#e5e7eb;font-size:13px;cursor:pointer}
 .pickup-wrap{display:flex;gap:6px;align-items:center}
.pickup-wrap input{flex:1}
.btn-mini{
  width:auto;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid rgba(148,163,184,.7);
  background:rgba(15,23,42,.9);
  color:#e2e8f0;
  font-size:12px;
  cursor:pointer;
}
.btn-mini:hover{border-color:#22d3ee}
  .section-title{font-size:13px;font-weight:600;color:#e5e7eb;margin-top:4px;margin-bottom:2px}
  .pill{display:inline-block;padding:3px 7px;border-radius:999px;background:rgba(15,23,42,1);border:1px solid rgba(148,163,184,.6);font-size:11px;color:#cbd5f5;margin-right:4px;margin-top:2px}
  .pill.cod711 {
  background: #7f1d1d;      /* 深紅底 */
  border-color: #fecaca;    /* 淡紅邊框 */
  color: #fee2e2;           /* 字體偏粉 */
}
.pill.cod711 span {
  color: #fee2e2;
}
 .tag-small{font-size:11px;color:#94a3b8}
 /* ★ 購物金折抵顯示紅色（列表 + 右側 pill 共用） */
.credit-red { color:#f87171; font-weight:700; }

.tag-small.credit-red { color:#f87171; font-weight:700; }
 
 .pickup-reg-inline{
  color:#f87171;
  font-weight:700;
}

.hidden{display:none !important;}

.btn-badge-wrap{
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.count-badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:18px;
  height:18px;
  padding:0 6px;
  border-radius:999px;
  background:#ef4444;
  color:#fff;
  font-size:11px;
  line-height:1;
  font-weight:700;
}

.side-box-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:6px;
}

.side-box-head label{
  margin:0;
}

.panel-close{
  width:auto;
  padding:2px 8px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,.7);
  background:transparent;
  color:#e2e8f0;
  font-size:12px;
  cursor:pointer;
}

.benefit-alert-text{
  color:#f87171;
  font-weight:700;
}

 .toolbar-side{
  min-width:260px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.side-box{
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(148,163,184,.3);
  background:rgba(15,23,42,.95);
}
#vendor_month_summary{
  margin-top:8px;
  line-height:1.6;
  white-space:pre-wrap;
}

.pill.credit-red{
  border-color:#fca5a5;
  background:rgba(239,68,68,.12);
  color:#fecaca;
}
.pill.credit-red span{ color:#fecaca; }
 /* ★ 只把賣貨便累積那一行改成紅色 */
#d_vendor_stats {
  color:#fecaca;   /* 你也可以換成 #f87171 或 red */
}
#btnQuickPaid,
#btnRemindToday,
#btnPickupNeed,
#btnConsign,
#btnConsignAccounting{
  display:none !important;
}

/* ✅ 收款按鈕統一：隱藏「已收定金」與「現金分期第幾期」多餘按鈕 */
#btnDepositPayAndNoticeTop,
#btnCashInstPart1Top,
#btnCashInstPart2Top,
#btnCashInstPart3Top,
#btnCashInstAllDoneTop,
#orderDetail #btnDepositPayAndNotice,
#orderDetail #btnCashInstPart1,
#orderDetail #btnCashInstPart2,
#orderDetail #btnCashInstPart3,
#orderDetail #btnCashInstAllDone{
  display:none !important;
}
  .label-inline{display:flex;align-items:center;gap:5px;font-size:12px;margin-top:4px}
  .label-inline input[type="checkbox"]{width:auto}
  .error{color:#fecaca;font-size:13px;margin-top:4px}
 /* 上方「今日尾款提醒」旁的快捷操作列 */
  .top-order-actions{
    margin-top:6px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }
  .top-order-actions > button{
    margin-top:0; /* 不要再往下推一格，看起來才會平整 */
  }
.ro-field.ro-sm{ height: 38px; }

 .retry-mini label{
  font-size:11px;
  margin:4px 0 2px;
}

.retry-mini .ro-field{
  height:34px;
  font-size:12px;
  padding:0 10px;
}

/* ===== 唯讀顯示欄位 ===== */
.ro-field{
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-radius: 12px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.10);
  color: rgba(255,255,255,.92);
  position: relative;
  box-shadow: inset 3px 0 0 rgba(212,175,55,.45); /* 左側金色提示條 */
}

.ro-field::after{
  content: none !important;
  display: none !important;
}

.ro-field.ro-empty{
  color: rgba(255,255,255,.55);
  font-style: italic;
}

/* 如果你仍有用 readonly/disabled input，也讓它好看 */
input[readonly], input:disabled, textarea[readonly], textarea:disabled, select:disabled{
  opacity: 1 !important;
  color: rgba(255,255,255,.92) !important;
  background: rgba(255,255,255,.04) !important;
  border: 1px solid rgba(255,255,255,.10) !important;
  cursor: not-allowed;
}
 #orderDetail #btnSaveAndShip,
  #orderDetail #btnConfirmPayOk,
  #orderDetail #btnMarkZcFail,
  #orderDetail #btnPrintOrder,
  #orderDetail #btnSendTailLink,
  #orderDetail #btnCancelOrder,
  #orderDetail #btnMeetupNotify,
  #orderDetail #btnDepositPayAndNotice,
  #orderDetail #btnSaveDetailOnly {
    display: none;
  }

 /* ★ 隱藏：0 元包裹匯出按鈕（不動其他邏輯） */
  #btnExportZero{display:none !important;}
 button.filter-btn[data-filter="unshipped"]{display:none !important;}
 /* ===== 共用六頁頁籤 ===== */
.page-tabs{
  margin:0 0 18px;
}

.page-tabs-bar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px 14px;
  border-radius:18px;
  background:#020617;
  border:1px solid rgba(148,163,184,.28);
  box-shadow:0 10px 30px rgba(15,23,42,.12);
}

.page-tab{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:0 18px;
  border-radius:999px;
  text-decoration:none;
  font-size:14px;
  font-weight:800;
  letter-spacing:.01em;
  background:rgba(15,23,42,.92);
  color:#e2e8f0;
  border:1px solid rgba(148,163,184,.55);
  transition:.18s ease;
}

.page-tab:hover{
  transform:translateY(-1px);
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.18);
}

.page-tab.is-active{
  background:#22d3ee;
  color:#0f172a;
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.32);
}

@media (max-width:900px){
  .page-tabs-bar{
    gap:8px;
    padding:10px;
  }
  .page-tab{
    min-height:40px;
    padding:0 14px;
    font-size:13px;
  }
}
 #d_cash_inst_progress_ro,
#d_cash_inst_completed_ro{
  font-size:12px;
  font-weight:600;
}


/* ===== 訂單後台內頁按鈕列：放在第二排，不放到最上方主頁籤 ===== */
.admin-sub-tabs a.filter-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  text-decoration:none;
}
.admin-sub-tabs a.filter-btn.active{
  background:#22d3ee;
  color:#0f172a;
  border-color:#22d3ee;
  box-shadow:0 8px 20px rgba(34,211,238,.35);
}
/* ===== 賣貨便登記頁：精簡畫面 ===== */
body.pickup-clean-page .top-order-actions,
body.pickup-clean-page .toolbar-side,
body.pickup-clean-page .admin-sub-tabs .count-badge{
  display:none !important;
}

body.pickup-clean-page #detailMsg{
  min-height:18px;
  margin:8px 0 6px;
  color:#bbf7d0;
  font-weight:700;
}
</style>
</head>

 function getBiMonthLabel(dateLike){
  const s = String(dateLike || '').trim();
  if (!s) return '';
  const d = new Date(s);
  if (Number.isNaN(d.getTime())) return '';
  const m = d.getMonth() + 1;

  if (m <= 2) return '1-2月';
  if (m <= 4) return '3-4月';
  if (m <= 6) return '5-6月';
  if (m <= 8) return '7-8月';
  if (m <= 10) return '9-10月';
  return '11-12月';
}

      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({

        status: 'all'

function renderConsignAccountingBuckets(){
  const listEl = $('#orderList');

  buckets.forEach(k => grouped[k] = []);

  (currentConsignAccountingRows || []).forEach(row => {
    const doneAt =
      row.creditDoneAt ||
      row.bankDoneAt ||
      row.doneAt ||
      row.updatedAt ||
      '';
    const label = getBiMonthLabel(doneAt);
    if (label && grouped[label]) grouped[label].push(row);
  });

  listEl.innerHTML = buckets.map(label => {
    const count = grouped[label].length;
    return `
      <div class="order-row" data-bucket="${label}">

function fmtDateInput(d){
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getLast30DaysRange(){
  const toDate = new Date();
  const fromDate = new Date();
  fromDate.setDate(fromDate.getDate() - 30);

  return {
    date_from: fmtDateInput(fromDate),
    date_to: fmtDateInput(toDate)
  };
}

function getCurrentDateRange(){
  return {
    date_from: $('#date_from') ? ($('#date_from').value || '') : '',
    date_to: $('#date_to') ? ($('#date_to').value || '') : ''
  };
}

function monthKeyOfRecord(f){
  let month = String(f['賣貨便月份'] || '').trim();
  if (!month) {
    const shipAt = String(f.shipped_at || f.ship_at || '').trim();
    if (shipAt) month = shipAt.slice(0, 7);
  }
  return month;
}

function applyLineNameSearch(rows){
  const q = String(LINE_SEARCH_TERM || '').trim().toLowerCase();
  if (!q) return rows || [];

  return (rows || []).filter(rec => {
    const f = rec.fields || rec || {};
    const lineName = String(getLineName(f, parseShippingInfo(f)) || '').trim().toLowerCase();
    return lineName.includes(q);
  });
}

function finalizeOrderRows(rows, emptyText = '查無符合條件的訂單。', okText = ''){
  currentOrders = applyLineNameSearch(rows || []);
 updateCurrentSubTabCount(currentOrders.length);
  ORDERS_CACHE = currentOrders.map(rec => rec.fields || rec || {});
  renderOrderList();

  const msgEl = $('#msg');
  if (msgEl) {
    msgEl.textContent = currentOrders.length ? okText : emptyText;
  }

  // ✅ 賣貨便月份統計只在「賣貨便登記」頁渲染
  if (ADMIN_PAGE_FILE === 'admin-pickup.html') {
    renderVendorMonthSummary();
  }
}

function renderVendorMonthSummary(){
  const panel = $('#vendor_month_summary');
  const monthEl = $('#vendor_month');
  if (!panel || !monthEl) return;

  const month = String(monthEl.value || '').trim();
  const source = VENDOR_SUMMARY_CACHE || [];
  const map = new Map();

  source.forEach(rec => {
    const f = rec.fields || rec || {};
    const name = String(f['賣貨便名稱'] || '').trim();
    if (!name) return;

    // 只算已收款
    const ps = String(f.pay_status || '').trim().toLowerCase();
    if (ps !== 'paid_ok') return;

    const m = monthKeyOfRecord(f);
    if (month && m !== month) return;

    // 改成加總「應付金額」
    const a = calcAmounts(f);
    const amount = Number(a.net || 0);

    map.set(name, (map.get(name) || 0) + amount);
  });

  const rows = Array.from(map.entries()).sort((a, b) => b[1] - a[1]);

  if (!rows.length) {
    panel.textContent = month ? `${month} 尚無已收款資料` : '尚無已收款資料';
    return;
  }

  panel.innerHTML = rows
    .map(([name, sum]) => `${name}：${money(sum)}`)
    .join('<br>');
}

async function applyFullView(mode = 'all', save = true){
  currentPanelMode = 'orders';
  await ensureOpKey();

  // ✅ 賣貨便月份統計只在「賣貨便登記」頁載入
  if (ADMIN_PAGE_FILE === 'admin-pickup.html') {
    await loadVendorSummaryCache();
  }

  const dateRange = getCurrentDateRange();
  const statusVal = $('#status') ? ($('#status').value || '') : '';

  if (save) {
    saveViewState(mode || 'all', {
      filter: 'all',
      date_from: dateRange.date_from,
      date_to: dateRange.date_to,
      status: statusVal
    });
  }

  await loadOrders('all', dateRange);
 ALL_ORDERS_CACHE = [...(currentOrders || [])];
if (ADMIN_PAGE_FILE === 'admin.html') {
  refreshTopShortcutBadges();
}

  const hasFee = (f) => {
    if (!f) return false;
    const fee1 = f.shipping_fee;
    const fee2 = f.ship_fee;
    const filled1 = fee1 !== undefined && fee1 !== null && String(fee1) !== '';
    const filled2 = fee2 !== undefined && fee2 !== null && String(fee2) !== '';
    return filled1 || filled2;
  };

  let rows = ALL_ORDERS_CACHE;
  let emptyText = '查無符合條件的訂單。';
  let okText = '';

  if (mode === 'quick_paid'){
    rows = rows.filter(rec => {
      const f = rec.fields || rec || {};
      return String(f.pay_status || '').toLowerCase() === 'paid_ok' && !hasFee(f);
    });
    emptyText = '目前沒有「已收款且運費未填寫」的訂單。';
    okText = '僅顯示「已收款(pay_status = paid_ok) 且 運費 TWD 未填寫」的訂單。';
  }

else if (mode === 'remind_today'){
  rows = rows.filter(rec => {
    const f = rec.fields || rec || {};
    return String(f.pay_status || '').toLowerCase() === 'pending';
  });
  emptyText = '目前沒有「付款狀態＝待確認」的訂單。';
  okText = '僅顯示「付款狀態＝待確認(pay_status = pending)」的訂單。';
}

  else if (mode === 'pickup_need'){
    rows = rows.filter(rec => {
      const f  = rec.fields || rec || {};
      const ps = String(f.pay_status || '').toLowerCase();
      if (ps === 'failed' || ps === 'cancelled') return false;

      const st = String(f.status || '').toLowerCase();
      const ss = String(f.ship_status || f.shipping_status || '').toLowerCase();
      const shipped = (st === 'shipped') || (ss === 'shipped') || (ss === 'arrived') || (ss === 'picked_up');

      const shipInfo = parseShippingInfo(f) || {};
      const ship = shipInfo.ship || {};
      const is711 = String(ship.type || '').toLowerCase() === '711';

      const pickReg = String(f['取貨登記'] || '').trim();
      const notPicked = (pickReg !== '已取貨');

      return shipped && is711 && notPicked;

async function remindCartRows(rows){
  const targets = (rows || []).filter(x => x && x.cart_token);
  if (!targets.length) {
    alert('目前沒有可提醒的購物車');
    return;
  }

  let ok = 0;
  let skipped = 0;
  let failed = 0;
  const failedMsgs = [];

  for (const row of targets) {
    const token = String(row.cart_token || '').trim();
    const lineId = String(row.line_user_id || '').trim();

    if (!token) continue;

    if (!lineId) {
      skipped++;
      failedMsgs.push(`${row.customer_name || token}：沒有 LINE 綁定`);
      continue;
    }

    try {
      const r = await fetch(`${API}/op/cart/send-link`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          op_key: OP_KEY,
          cart_token: token,
          line_user_id: lineId,
          customer_name: row.customer_name || ''
        })
      });

      const j = await r.json().catch(() => ({}));
      if (!r.ok || !j.ok) {
        failed++;
        failedMsgs.push(`${row.customer_name || token}：${j.error || ('HTTP ' + r.status)}`);
        continue;
      }

      ok++;
    } catch (e) {
      failed++;
      failedMsgs.push(`${row.customer_name || token}：${e.message || e}`);
    }
  }

  alert(
    `購物車提醒完成\n成功 ${ok} 筆 / 略過 ${skipped} 筆 / 失敗 ${failed} 筆` +
    (failedMsgs.length ? `\n\n${failedMsgs.slice(0, 8).join('\n')}` : '')
  );

  if (VIEW_STATE.mode === 'cart_open' || currentPanelMode === 'cart_open') {
    await loadOpenCartList();
  }
}

 function isDepositForfeitOrder(f = {}) {
  const st = String(f.status || '').trim().toLowerCase();
  const ps = String(f.pay_status || '').trim().toLowerCase();
  const cancelReason = String(f['取消原因'] || f.cancel_reason || '').trim();
  const note = String(f.internal_note || '').trim();
  const cashStatus = String(f.cash_inst_status || '').trim().toLowerCase();

  return (
    st === 'cancelled' &&
    ps === 'deposit_ok' &&
    (
      cancelReason.includes('訂金沒收') ||
      note.includes('[TAIL_OVERDUE_DEPOSIT_FORFEIT]') ||
      note.includes('[CASH_INST_OVERDUE_CANCEL]') ||
      cashStatus === 'cancelled_forfeit'
    )
  );
}

function isRestockNeedsAttention(f = {}) {
  const note = String(f.internal_note || '').trim();

  const didDeductStock =
    f.stock_deduct_done === true ||
    String(f.stock_deduct_done || '').trim().toLowerCase() === 'true';

  const hasRestockOk =
    note.includes('[AUTO_RESTOCK_TAIL_OVERDUE_CANCEL]') ||
    note.includes('[AUTO_RESTOCK_CASH_INST_OVERDUE]') ||
    note.includes('[MANUAL_RESTOCK_TAIL_FORFEIT]') ||
    note.includes('[MANUAL_RESTOCK_CASH_INST_FORFEIT]');

  const hasRestockFail =
    note.includes('[RESTOCK_FAILED_TAIL_OVERDUE]') ||
    note.includes('[RESTOCK_FAILED_CASH_INST_OVERDUE]');

  if (hasRestockFail) return true;

  return isDepositForfeitOrder(f) && didDeductStock && !hasRestockOk;
}
 function hasTailChildInRows(parentOrderId, rows = ALL_ORDERS_CACHE){
  const pid = String(parentOrderId || '').trim();

  return (rows || []).some(rec => {
    const f = rec?.fields || rec || {};

      !!f.is_tail ||

function toDatetimeLocal(v){
  if(!v) return '';
  const d = new Date(v);
  if(isNaN(d.getTime())) return '';
  const pad = n => String(n).padStart(2,'0');
  return d.getFullYear() + '-' +
    pad(d.getMonth()+1) + '-' +
    pad(d.getDate()) + 'T' +
    pad(d.getHours()) + ':' +
    pad(d.getMinutes());
}

 function safeJsonParse(s, fallback = null){
  try{
    if (!s) return fallback;
    if (typeof s === "object") return s;
    return JSON.parse(String(s));
  }catch(e){
    return fallback;
  }
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}
 function firstNonEmpty(...vals){
  for (const v of vals) {
    const s = String(v ?? '').trim();
    if (s) return s;
  }
  return '';
}

function getLineName(f, shipInfo){
  const lp = (shipInfo?.line_profile || shipInfo?.line || shipInfo?.lineProfile || {}) || {};
  return firstNonEmpty(
    f?.['LINE名稱'],
    f?.['LINE 名稱'],
    f?.line_name,
    f?.['line_name'],
    lp.displayName,
    lp.display_name,
    lp.name
  );
}

// 從 OD（主單）的 fields 裡抓尾款資訊（優先 tail_* 欄位，其次 tail_paid_snapshot）
function getTailInfoFromParentFields(f){
  const snap = safeJsonParse(f?.tail_paid_snapshot, null) || {};
  const pick = (a,b,def="") => (String(a||"").trim() ? a : (String(b||"").trim() ? b : def));

  return {
    order_id: pick(f?.tail_order_id, snap?.tail_order_id, ""),
    payment_method: pick(f?.tail_payment_method, snap?.tail_payment_method, ""),
    total_amount: Number(f?.tail_total_amount ?? snap?.tail_total_amount ?? 0) || 0,
    credit_used: Number(f?.tail_credit_used ?? snap?.tail_credit_used ?? 0) || 0,
    net_amount: Number(f?.tail_net_amount ?? snap?.tail_net_amount ?? 0) || 0,
    pay_channel: pick(f?.tail_pay_channel, snap?.tail_pay_channel, ""),
    paid_at: pick(f?.tail_paid_at, snap?.tail_paid_at, ""),

    invoice_no: pick(f?.tail_invoice_no, snap?.invoice?.invoice_no ?? snap?.tail_invoice_no, ""),
    invoice_date: (f?.tail_invoice_date ?? snap?.invoice?.invoice_date ?? snap?.tail_invoice_date ?? ""),
    invoice_random: pick(f?.tail_invoice_random, snap?.invoice?.invoice_random ?? snap?.tail_invoice_random, ""),
    invoice_rtn_code: pick(f?.tail_invoice_rtn_code, snap?.invoice?.invoice_rtn_code ?? snap?.tail_invoice_rtn_code, ""),
    invoice_rtn_msg: pick(f?.tail_invoice_rtn_msg, snap?.invoice?.invoice_rtn_msg ?? snap?.tail_invoice_rtn_msg, ""),
    invoice_issued: (f?.tail_invoice_issued ?? snap?.invoice?.invoice_issued ?? snap?.tail_invoice_issued ?? null),

}

async function ensureOpKey(){
  $('#opLabel').textContent = OP_KEY ? '已登入後台' : '尚未登入';

    try{

      });

async function refreshTopShortcutBadges(){
  const rows = ALL_ORDERS_CACHE || [];

  const getF = (rec) => rec.fields || rec || {};

  const hasFee = (f) => {
    if (!f) return false;
    const fee1 = f.shipping_fee;
    const fee2 = f.ship_fee;
    const filled1 = fee1 !== undefined && fee1 !== null && String(fee1) !== '';
    const filled2 = fee2 !== undefined && fee2 !== null && String(fee2) !== '';
    return filled1 || filled2;
  };

  const isCancelledLike = (f) => {
    const st = String(f.status || '').trim().toLowerCase();
    const ps = String(f.pay_status || '').trim().toLowerCase();
    return (
      st === 'cancelled' ||
      ps === 'cancelled' ||
      ps === 'failed'
    );
  };

  const isCashInstOrder = (f) => {
    const pm = String(f.payment_method || f.pay_method || '').trim().toLowerCase();
    const plan = String(f.cash_inst_plan || '').trim();
    const cs = String(f.cash_inst_status || '').trim();
    return (
      pm.startsWith('cash_inst') ||
      !!plan ||
      !!cs
    );
  };

  const isCashInstUnpaid = (f) => {
    if (!isCashInstOrder(f)) return false;

    const ps = String(f.pay_status || '').trim().toLowerCase();
    const st = String(f.status || '').trim().toLowerCase();
    const cs = String(f.cash_inst_status || '').trim().toLowerCase();

    if (ps === 'paid_ok') return false;
    if (ps === 'cancelled' || ps === 'failed') return false;
    if (st === 'cancelled') return false;
    if (cs === 'all_done' || cs === 'completed' || cs === 'paid_ok') return false;

    return true;
  };

  const isDepositUnshipped = (rec) => {
    const f = getF(rec);
    const ps = String(f.pay_status || '').trim().toLowerCase();

    // 現金分期不要混到「已收定金未出貨」
    if (isCashInstOrder(f)) return false;

    return ps === 'deposit_ok' && isUnshippedOrder(rec);
  };

  // 🛒 未結單購物車：用專用 API，不吃 Orders
  let cartOpenCount = 0;
  try {
    if (OP_KEY) {
      const cartParams = new URLSearchParams();
      cartParams.set('op_key', OP_KEY);
      cartParams.set('limit', '80');

      const rCart = await fetch(`${API}/admin/cart/pending-list?` + cartParams.toString());
      const jCart = await rCart.json().catch(() => ({}));

      if (rCart.ok && jCart.ok) {
        cartOpenCount = Array.isArray(jCart.carts) ? jCart.carts.length : 0;
      }
    }
  } catch (e) {
    console.warn('cart badge load failed', e);
  }

  // ⭐ 待出貨訂單：沿用你原本邏輯
  const quickCount = rows.filter(rec => {
    const f = getF(rec);
    return String(f.pay_status || '').toLowerCase() === 'paid_ok' && !hasFee(f);
  }).length;

  // 匯款待確認：沿用你原本邏輯
  const remindCount = rows.filter(rec => {
    const f = getF(rec);
    return String(f.pay_status || '').toLowerCase() === 'pending';
  }).length;

  // 賣貨便登記：沿用你原本邏輯
  const pickupCount = rows.filter(rec => {
    const f  = getF(rec);
    const ps = String(f.pay_status || '').toLowerCase();
    if (ps === 'failed' || ps === 'cancelled') return false;

    const st = String(f.status || '').toLowerCase();
    const ss = String(f.ship_status || f.shipping_status || '').toLowerCase();
    const shipped = (st === 'shipped') || (ss === 'shipped') || (ss === 'arrived') || (ss === 'picked_up');

    const shipInfo = parseShippingInfo(f) || {};
    const ship = shipInfo.ship || {};
    const is711 = String(ship.type || '').toLowerCase() === '711';

    const pickReg = String(f['取貨登記'] || '').trim();

    return shipped && is711 && pickReg !== '已取貨';
  }).length;

  // ✅ 已收定金未出貨
  const depositCount = rows.filter(rec => {
    return isDepositUnshipped(rec);
  }).length;

  // ✅ 現金分期未收齊
  const cashInstCount = rows.filter(rec => {
    const f = getF(rec);
    return isCashInstUnpaid(f);
  }).length;

  // ✅ 已取消／棄標
  const cancelledCount = rows.filter(rec => {
    const f = getF(rec);
    return isCancelledLike(f);
  }).length;

  // 寄賣 + 一時貿易：用寄賣專用 API
  let consignCount = 0;
  let tradeCount = 0;

  try {
    if (OP_KEY) {
      const r = await fetch(`${API}/op/consign/settlement/list`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          op_key: OP_KEY,
          status: 'all'
        })
      });

      const j = await r.json().catch(() => ({}));

      if (r.ok && j.ok) {
        const items = j.items || [];

        // 寄賣：未完成結算
        consignCount = items.filter(x => {
          return String(x.status || '').trim().toLowerCase() !== 'settled';
        }).length;

        // 一時貿易：已完成匯款／購物金
        tradeCount = items.filter(x => {
          const st = String(x.status || '').trim().toLowerCase();
          const method = String(x.method || '').trim().toLowerCase();
          return st === 'settled' && (method === 'bank_transfer' || method === 'store_credit');
        }).length;
      }
    }
  } catch (e) {
    console.warn('consign/trade badge load failed', e);
  }

  // ✅ 原本就有 id 的小圓圈
  setCountBadge($('#cartOpenBadge'), cartOpenCount);
  setCountBadge($('#quickPaidBadge'), quickCount);
  setCountBadge($('#remindTodayBadge'), remindCount);
  setCountBadge($('#pickupNeedBadge'), pickupCount);
  setCountBadge($('#consignBadge'), consignCount);

  // ✅ 原本沒有小圓圈的頁籤，這裡自動補
  setAdminTabBadge('admin-deposit.html', depositCount);
  setAdminTabBadge('admin-cashinst.html', cashInstCount);
  setAdminTabBadge('admin-cancelled.html', cancelledCount);
  setAdminTabBadge('admin-trade.html', tradeCount);

  // ✅ 審核購物金沿用你的專用函式
  if (typeof refreshBenefitBadge === 'function') {
    refreshBenefitBadge();
  }
}

  const st = String(row.status || '').trim().toLowerCase();
  return st !== 'settled';
});
    renderConsignList();
updateCurrentSubTabCount(currentConsignRows.length);
setTopFilterActive('consign_settlement');

      msgEl.textContent = currentConsignRows.length

async function consignNotify(orderItemId){
  await ensureOpKey();

    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ op_key: OP_KEY, orderItemId })
  });

    alert('通知失敗：' + (j.error || 'unknown'));

  await loadConsignSettlementList();
  await refreshTopShortcutBadges();
}

async function consignAction(orderItemId, action){
  await ensureOpKey();
  const r = await fetch(`${API}/op/consign/settlement/action`, {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body: JSON.stringify({ op_key: OP_KEY, orderItemId, action })
  });
  const j = await r.json().catch(() => ({}));

  if (!r.ok || !j.ok) {
    alert('操作失敗：' + (j.error || 'unknown'));

    alert('這筆已經加值過');

    await refreshTopShortcutBadges();
    return;

  alert('已更新');

  await refreshTopShortcutBadges();
}

async function reloadCurrentView(){

    saveViewState(`page_${ADMIN_PAGE.viewKey}`, {
      filter: 'all',
      date_from: '',
      date_to: '',

    });

    await loadOrders('all', { view_key: ADMIN_PAGE.viewKey });
    ALL_ORDERS_CACHE = [...(currentOrders || [])];

    updateCurrentSubTabCount(currentOrders.length);

    const msgEl = $('#msg');
    if (msgEl) {
      msgEl.textContent = `目前顯示 Airtable View：${ADMIN_PAGE.viewName}。`;
    }

    return;
  }

  if (mode === 'cart_open' || currentPanelMode === 'cart_open') {
    return loadOpenCartList();
  }

  if (mode === 'consign_settlement' || currentPanelMode === 'consign') {
    saveViewState('consign_settlement', {
      filter: 'all',
      date_from: $('#date_from') ? ($('#date_from').value || '') : '',
      date_to: $('#date_to') ? ($('#date_to').value || '') : '',
      status: st
    });
    return loadConsignSettlementList();
  }

  if (mode === 'consign_accounting' || currentPanelMode === 'consign_accounting') {
    saveViewState('consign_accounting', {
      filter: 'all',
      date_from: $('#date_from') ? ($('#date_from').value || '') : '',
      date_to: $('#date_to') ? ($('#date_to').value || '') : '',
      status: st
    });
    return loadConsignAccountingList();
  }

  if (st === 'unshipped_custom') {
    setBatchActionMode('none');
    return applyFullView('status_unshipped_custom');
  }

  if (st === 'deposit_unshipped_custom') {
    setBatchActionMode('none');
    return applyFullView('status_deposit_unshipped_custom');
  }

  setBatchActionMode('none');
  return applyFullView(mode || 'all');
}


// 更新下方 summary + 匯出按鈕狀態
function updateSummary(){
  const sumEl         = $('#summary');
  const btnExport     = $('#exportBtn');
  const btnExportShip = $('#btnExportShip');
  const btnExportZero = $('#btnExportZero');
  if (!sumEl) return;

  // ✅ 只有全部訂單頁顯示總筆數＋合計金額
  if (ADMIN_PAGE_FILE !== 'admin.html') {
    sumEl.textContent = '';
    if (btnExport) btnExport.disabled = true;
    if (btnExportShip) btnExportShip.disabled = true;
    if (btnExportZero) btnExportZero.disabled = true;
    return;
  }

  // 沒有任何訂單時：清空 summary，三顆匯出按鈕都變灰色
  if (!currentOrders.length){
    sumEl.textContent = '';
    if (btnExport) btnExport.disabled = true;
    if (btnExportShip) btnExportShip.disabled = true;
    if (btnExportZero) btnExportZero.disabled = true;
    return;
  }

  // 計算合計金額 & 各狀態筆數
  let sum = 0;
  let countSubmitted = 0, countPaid = 0, countShipped = 0, countCancelled = 0;

  for (const rec of currentOrders){
    const f = rec.fields || rec || {};
    const a = calcAmounts(f);
    sum += a.net;
    const st = f.status || '';
    if (st === 'submitted') countSubmitted++;
    else if (st === 'paid') countPaid++;
    else if (st === 'shipped') countShipped++;
    else if (st === 'cancelled') countCancelled++;
  }

  const sumText = 'NT$ ' + (Number(sum)||0).toLocaleString('zh-TW',{minimumFractionDigits:0});
  sumEl.innerHTML =
    '<span>筆數：' + currentOrders.length +
    '（已送出: ' + countSubmitted +
    ' / 已付款: ' + countPaid +
    ' / 已出貨: ' + countShipped +
    ' / 已取消: ' + countCancelled + '）</span>' +
    '<span>合計金額：' + sumText + '</span>';

  // 有訂單時：三顆匯出按鈕都可以用
  if (btnExport) btnExport.disabled = false;
  if (btnExportShip) btnExportShip.disabled = false;
  if (btnExportZero) btnExportZero.disabled = false;
}

 function statusBadgePay(pay){
  if (!pay) return '';
  let cls  = 'badge';
  let text = pay;

  if (pay === 'paid_ok') {
    cls  += ' green';
    text  = '已收款';
  } else if (pay === 'deposit_ok') {
    // 訂金已收
    cls  += ' green';
    text  = '訂金已收';
  } else if (pay === 'pending') {
    cls  += ' yellow';
    text  = '待確認';
  } else if (pay === 'unpaid') {
    text  = '未收款';
  } else if (pay === 'cancelled') {
    // 付款狀態 = cancelled
    cls  += ' red';
    text  = '取消訂單（補回庫存）';
  } else if (pay === 'failed') {
    cls  += ' red';
    text  = '失敗 / 作廢';
  }

  return `<span class="${cls}">${text}</span>`;
}

function statusBadgeShip(st){
  if(!st) return '';
  let cls = 'badge blue';
  let text = st;
  if(st === 'none'){ text = '未設定'; cls='badge'; }
  else if(st === 'ready_to_ship'){ text = '待出貨'; }
  else if(st === 'shipped'){ text = '已出貨'; }
  else if(st === 'returned'){ text = '退貨'; cls='badge red'; }
  else if(st === 'cancelled'){ text = '取消'; cls='badge red'; }
  return `<span class="${cls}">${text}</span>`;
}

  if(!key) return;

    if (x.id && String(x.id) === String(key)) return true;
    const f = x.fields || x || {};
    return f.order_id && String(f.order_id) === String(key);
  });
  if(!rec) return;
  renderDetail(rec);
}

function updateVendorStats() {
  const sel    = $('#d_vendor_name');
  const infoEl = $('#d_vendor_stats');
  if (!sel || !infoEl) return;

  const name = String(sel.value || '').trim();
  if (!name) {
    infoEl.textContent = '';
    return;
  }

  // 目前這筆訂單的欄位
  const f = (currentRecord && (currentRecord.fields || currentRecord)) || {};

  // 先用 Airtable 的「賣貨便月份」，沒有的話就用 shipped_at / ship_at 算 YYYY-MM
  let month = String(f['賣貨便月份'] || '').trim();
  if (!month) {
    const shipAt = String(f.shipped_at || f.ship_at || '').trim();
    if (shipAt) month = shipAt.slice(0, 7);
  }

  if (!month) {
    infoEl.textContent = '尚未抓到賣貨便月份';
    return;
  }

  const source = ORDERS_CACHE || [];
  let count = 0;
  let sum = 0;

  source.forEach(rec => {
    const x = rec.fields || rec || {};

    if (String(x['賣貨便名稱'] || '').trim() !== name) return;
    if (monthKeyOfRecord(x) !== month) return;

    // 只算已收款
    const ps = String(x.pay_status || '').trim().toLowerCase();
    if (ps !== 'paid_ok') return;

    const a = calcAmounts(x);
    sum += Number(a.net || 0);
    count += 1;
  });

  infoEl.textContent = `${month}，${name} 已收款 ${count} 筆，應付金額合計 ${money(sum)}`;
}

async function shipAndLine(){
  if(!currentRecord) return;
  const msgEl = $('#detailMsg');

  if (!orderId){
    alert('這筆訂單沒有 order_id，無法出貨。');
    return;
  }

  const feeTxt   = $('#d_ship_fee').value.trim();

  msgEl.textContent = '出貨處理中（會同時發送 LINE 通知）…';

  try{
    const res = await fetch(API + '/admin/order/ship', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    const j = await res.json().catch(()=> ({}));
    if (!res.ok || !j.ok){

async function markMeetupCashDone(){

      body: JSON.stringify(updatePayload)
    });
    const j = await res.json().catch(()=> ({}));
    if (!res.ok || !j.ok) {

async function copyNotice(){
  const ta = $('#d_notice_text');
  if(!ta) return;
  const text = ta.value || '';
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
    }else{
      ta.select();
      document.execCommand('copy');
      window.getSelection().removeAllRanges();
    }
    alert('已複製出貨通知文字，可以貼到 LINE / Messenger。');
  }catch(e){
    console.error(e);
    alert('複製失敗，請手動選取文字複製。');

function printCurrentOrder() {
  if (!currentRecord) {
    alert('請先選一筆訂單');
    return;
  }

  const f = currentRecord.fields || currentRecord || {};
  const shipInfo = parseShippingInfo(f) || {};
  const ship  = shipInfo.ship  || {};
  const store = ship.store     || {};
  const post  = ship.post      || {};

  let shipType = '';
  let shipAddr = '';
  if (ship.type === '711') {
    shipType = '7-11 超商取貨';
    shipAddr = `7-11 ${store.name || ''}（${store.id || ''}）\n${store.addr || ''}`;
  } else if (ship.type === 'post') {
    shipType = '郵寄';
    shipAddr = `${post.zip || ''} ${post.addr || ''}`;
  } else if (ship.type === 'meetup') {
    shipType = '面交';
    const place = ship.meetup_place || ship.meet_place || '';
    const time  = ship.meetup_time  || ship.meet_time  || '';
    shipAddr = ['面交', time].filter(Boolean).join(' ');
    if (place) shipAddr += ` @ ${place}`;
  }
  const itemsText = f.items_text || '';
  const a = calcAmounts(f);
  const totalBase = money(a.base);
  const creditUse = money(a.credit);
  const totalNet  = money(a.net);
  const orderId   = f.order_id || '';

  const html = `
<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>訂單 ${orderId}</title>
<style>
  body{font-family:-apple-system,"Noto Sans TC";margin:20px;font-size:12px}

</style>
<meta name="robots" content="noindex, nofollow">
</head>
<body>
  <h1>MURAIN 訂單明細</h1>
  <table>
    <tr><th>訂單編號</th><td>${orderId}</td></tr>
    <tr><th>建立時間</th><td>${f.CreatedAt || f.created_at || ''}</td></tr>
    <tr><th>付款方式</th><td>${f.payment_method || ''}</td></tr>
    <tr><th>訂單金額</th><td>${totalBase}</td></tr>
${a.credit>0 ? `<tr><th>購物金折抵</th><td>-${creditUse}</td></tr>` : ``}
<tr><th>應付金額</th><td>${totalNet}</td></tr>
    <tr><th>收件人</th><td>${ship.name || ''}</td></tr>
    <tr><th>電話</th><td>${ship.phone || ''}</td></tr>
    <tr><th>出貨方式</th><td>${shipType}</td></tr>
    <tr><th>取貨門市 / 地址</th><td><pre>${shipAddr}</pre></td></tr>
    <tr><th>物流單號</th><td>${f.ship_tracking || f.tracking_no || ''}</td></tr>
    <tr><th>運費</th><td>${f.ship_fee ?? f.shipping_fee ?? ''}</td></tr>
    <tr><th>客戶備註</th><td><pre>${(shipInfo.note || '').trim()}</pre></td></tr>
    <tr><th>商品明細</th><td><pre>${itemsText}</pre></td></tr>

</body>

function proxyButton(topId, originalId){
  const top = $('#' + topId);
  if (!top) return;

  top.addEventListener('click', async () => {
    const f = currentRecord?.fields || currentRecord || {};

    const dangerousForfeitButtons = [
      'btnSaveAndShipTop',
      'btnConfirmPayOkTop',
      'btnMarkZcFailTop',
      'btnSendTailLinkTop',
      'btnMeetupCashDoneTop',
      'btnMeetupNotifyTop',
      'btnCancelOrderTop'
    ];

    if (dangerousForfeitButtons.includes(topId) && isDepositForfeitOrder(f)) {
      alert('這筆訂單已棄標，訂金已沒收，不能再收款、出貨、發尾款單或重新結帳。');
      return;
    }

    await runButtonJob(top, async () => {
      const orig = $('#' + originalId);
      if (orig) {
        orig.click();
        await new Promise(resolve => setTimeout(resolve, 900));
      } else {
        alert('請先在右側選一筆訂單');
      }
    }, '執行中…');
  });
}

  proxyButton('btnSaveAndShipTop',   'btnSaveAndShip');

// ✅ 上方唯一「收款/審核通過+發LINE」：現金分期也統一走後端完整推進
const btnConfirmPayOkTopBind = $('#btnConfirmPayOkTop');
if (btnConfirmPayOkTopBind) {
  btnConfirmPayOkTopBind.addEventListener('click', async () => {
    if (!currentRecord) {
      alert('請先在左邊選一筆訂單');
      return;
    }

    const f = currentRecord.fields || currentRecord || {};

    if (isDepositForfeitOrder(f)) {
      alert('這筆訂單已棄標，訂金已沒收，不能再收款、出貨、發尾款單或重新結帳。');
      return;
    }

    const pm = String(f.payment_method || '').trim().toLowerCase();
    const cashStatus = String(f.cash_inst_status || '').trim().toLowerCase();
    const payStatus = String(f.pay_status || '').trim().toLowerCase();

    const isCashInstOrder =
      pm === 'cash_inst_2' ||
      pm === 'cash_inst_3' ||
      pm.startsWith('cash_install_');

    // 非現金分期：維持原本一般收款/審核通過流程
    if (!isCashInstOrder) {
      const orig = $('#btnConfirmPayOk');
      if (orig) orig.click();
      else await confirmPay('ok');
      return;
    }

    const totalParts = getCurrentCashInstTotalParts();

    if (!totalParts) {
      alert('這筆現金分期訂單缺少分期期數，請檢查 payment_method。');
      return;
    }

    if (cashStatus === 'completed' || payStatus === 'paid_ok') {
      alert('這筆現金分期已收齊。');
      return;
    }

    // 第一次：收定金、啟動現金分期，然後發「定金已收」專用卡
    if (cashStatus === 'pending_deposit') {
      const ok = await confirmPay('ok');
      if (!ok) return;

      try {
        await sendCashInstLineNotify('deposit', 0, totalParts);
      } catch (e) {
        console.error(e);
        alert('定金狀態已更新，但現金分期 LINE 通知發送失敗：' + (e.message || e));
      }
      return;
    }

    // ✅ 已進入分期：不要再走 markCashInstProgress 前端自記錄
    // 改走 /admin/order/confirm-pay，讓後端 advanceCashInstAfterPaid 完整推進：
    // cash_inst_paid_count / remaining / next_due_date / due_dates_json
    const currentPaid =
      Math.max(
        Number(f.cash_inst_paid_count || 0) || 0,
        Number(f.cash_inst_paid_parts || 0) || 0
      );

    const nextPart = Math.min(currentPaid + 1, totalParts);
    const isAllDone = nextPart >= totalParts;

    const ok = await confirmPay('ok');
    if (!ok) return;

    try {
      await sendCashInstLineNotify(
        isAllDone ? 'all_done' : `part_${nextPart}`,
        nextPart,
        totalParts
      );
    } catch (e) {
      console.error(e);
      alert('分期狀態已更新，但現金分期 LINE 通知發送失敗：' + (e.message || e));
    }
  });
}
